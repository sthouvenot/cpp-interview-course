p(`The subtler trap &#8212; and a genuine bug source in real code &#8212; is <b>member initialization order</b>. Class members are constructed in the order they are <em>declared in the class</em>, <b>not</b> the order you list them in the constructor's initializer list. If one member's initializer reads another, the declaration order is what actually runs, so you can read an as-yet-uninitialized member and not notice. Good compilers warn (<code>-Wreorder</code>), but the rule is the thing to know cold.`),
worked("The member-init-order trap","<code>Bad</code> looks correct &#8212; the init list initializes <code>size</code> from <code>n</code>, then <code>data</code> from <code>size</code>. But members are built in <em>declaration</em> order, and <code>data</code> is declared <em>first</em>, so it's initialized from <code>size</code> <b>before <code>size</code> exists</b> &#8212; reading garbage. <code>Good</code> declares the members in dependency order so declaration order matches intent. The fix is always to order the <em>declarations</em>, never to trust the init-list order.",
`struct Bad {
    int* data;          // declared FIRST -> initialized FIRST
    int  size;          // declared second
    Bad(int n) : size(n), data(new int[size]) { }
    //            ^ init list says size first, but 'data' is built first,
    //              reading 'size' before it's set -> garbage size. Bug.
};

struct Good {
    int  size;          // declare in dependency order: size before data
    int* data;
    Good(int n) : size(n), data(new int[size]) { }   // now correct
};`),
note(`&#128221;`,`The most vexing parse, in one line`,`<code>Widget w();</code> does <em>not</em> create a default-constructed <code>Widget</code> &#8212; the compiler reads it as the declaration of a <em>function</em> <code>w</code> taking no args and returning <code>Widget</code>. It's "vexing" because it looks exactly like construction. Brace-init dodges it: <code>Widget w{};</code> is unambiguously an object. Same reason <code>Widget w(Foo());</code> can be parsed as a function declaration &#8212; use braces and the ambiguity disappears.`),
p(`Two more tools worth a sentence each. <b>Default member initializers</b> &#8212; <code>int id = 0;</code> right in the class body &#8212; give every constructor a baseline so you can't forget to init a member; an init-list entry overrides it when needed. And <code>std::initializer_list</code> is the mechanism behind <code>{...}</code> contents: a constructor taking <code>std::initializer_list&lt;T&gt;</code> is what lets <code>vector&lt;int&gt; v{1,2,3}</code> and your own container types accept a braced list of elements.`),

sub("5 · Object layout: why sizeof surprises you"),
p(`For a game-engine candidate this is a likely probe, because cache behavior <em>is</em> performance and layout <em>is</em> cache behavior. The headline: <b><code>sizeof</code> a struct is almost never the sum of its members.</b> The compiler inserts <b>padding</b> so that each member sits at an offset that satisfies its <b>alignment</b> &#8212; a 4-byte <code>int</code> must start at an address divisible by 4, an 8-byte <code>double</code> at one divisible by 8, and so on, because the hardware loads aligned data faster (and on some architectures, only aligned). The struct as a whole is then padded up to a multiple of its <em>largest member's</em> alignment, so that arrays of the struct keep every element aligned.`),
p(`The classic surprise is <code>struct { char a; int b; char c; }</code>. You'd guess 1 + 4 + 1 = 6 bytes; it's actually <b>12</b>. <code>a</code> takes offset 0, but <code>b</code> needs a 4-aligned offset, so 3 padding bytes go in after <code>a</code> to push <code>b</code> to offset 4. <code>c</code> lands at offset 8, and then the struct is padded to 12 (a multiple of 4, <code>int</code>'s alignment) so arrays stay aligned. <b>Reorder largest-to-smallest</b> &#8212; <code>{ int b; char a; char c; }</code> &#8212; and the two chars pack into the gap after the int: 8 bytes, a third smaller, same data.`),
svg("essentials_layout","The same three fields, two orders. As declared {char, int, char}, padding after the first char pushes the int to a 4-aligned offset and the struct rounds up to 12 bytes. Reordered to {int, char, char}, the int is already aligned and the two chars share the tail &#8212; 8 bytes. Largest member first means fewer gaps."),
worked("The struct whose size surprises you, and the fix","Print the sizes and the reordering pays for itself. <code>alignof</code> tells you the alignment that drives the padding; reordering members from largest to smallest alignment minimizes the gaps. In a struct you allocate by the million (particles, entities, vertices), shrinking 12 &#8594; 8 is a third less memory traffic and a third more per cache line.",
`struct Wasteful {       // char, int, char
    char a;             // offset 0
    int  b;             // offset 4  (3 bytes padding after 'a')
    char c;             // offset 8
};                      // padded to 12

struct Tight {          // int, char, char  -- largest first
    int  b;             // offset 0
    char a;             // offset 4
    char c;             // offset 5
};                      // padded to 8

static_assert(sizeof(Wasteful) == 12);
static_assert(sizeof(Tight)    == 8);
// alignof(int) == 4 is what forces b to a 4-aligned offset in both`),
p(`Three nearby tools complete the picture. <b><code>alignof(T)</code></b> reports a type's required alignment; <b><code>alignas(N)</code></b> forces a stricter one &#8212; <code>alignas(64) struct CacheLine { ... };</code> pins an object to a 64-byte cache-line boundary, the standard trick for avoiding false sharing in the <em>Concurrency</em> lesson. <b>Bit-fields</b> pack several small fields into the bits of one integer &#8212; <code>unsigned flag : 1;</code> uses a single bit &#8212; handy for dense flag sets or wire formats, at the cost of unspecified bit ordering across compilers.`),
note(`&#128221;`,`Unions and the active-member rule`,`A <code>union</code> overlays all its members in <em>one shared storage</em>, sized to its largest member &#8212; only one member is "active" (holds a valid value) at a time. Writing one member and reading a <em>different</em> one is <b>type punning</b>, and outside a few blessed cases it's the same <em>strict-aliasing</em> undefined behavior from the <em>Type System</em> lesson &#8212; the compiler may assume the two members never alias. To reinterpret bytes safely, use <code>std::bit_cast</code> (C++20) or <code>memcpy</code>, not a union read of an inactive member. For a tagged value that's safe and ergonomic, reach for <code>std::variant</code> instead of a hand-rolled union.`),
cx(`Layout facts to keep crisp: padding is inserted so each member meets its alignment, and the struct is padded up to its largest member's alignment &#8226; reorder members largest-to-smallest to minimize padding &#8226; <code>alignof</code> reads alignment, <code>alignas</code> forces it &#8226; <code>sizeof</code>, <code>alignof</code>, and all of this are compile-time &#8212; zero runtime cost, but real memory and cache cost.`),

idea("Say it like this in the interview",`On <b>enums</b>: "I default to <code>enum class</code> &#8212; scoped names, no implicit <code>int</code> conversion so no accidental comparisons, and a specifiable underlying type like <code>: uint8_t</code> for packing; plain <code>enum</code> only for bit-flag sets I OR together." On <b>operators</b>: "<code>operator==</code> and <code>operator&lt;</code> make a type usable as a map key or sortable; symmetric ones like <code>+</code> and <code>==</code> are free functions so conversions apply to both sides, and <code>&lt;&lt;</code> must be free; in C++20 I default <code>operator&lt;=&gt;</code> to generate the relational operators and default <code>==</code> alongside it." On <b><code>static</code></b>: "four meanings &#8212; internal linkage at file scope, a single lazily-built persistent variable as a local, one shared instance as a data member, and a no-<code>this</code> function as a member; the function-local static is also the construct-on-first-use fix for the init-order fiasco." On <b>initialization</b>: "brace-init prevents narrowing and dodges the most vexing parse, but watch <code>vector&lt;int&gt;{3}</code> (one element) vs <code>(3)</code> (three zeros); and members are constructed in <em>declaration</em> order, not init-list order &#8212; a classic bug." On <b>layout</b>: "<code>sizeof</code> isn't the sum of members &#8212; alignment forces padding, and the struct rounds up to its largest member's alignment, so I order members largest-to-smallest to shrink hot structs." Each of those is a complete, senior-sounding answer on its own.`)
]},
{group:"Beyond Code",num:"▦",id:"sysdesign",color:"#14B8A6",title:"System Design Basics",badge:"intro",blocks:[
  cue(`Even for a mid-level role, you'll often get a lightweight design round: "design a URL shortener," "design a rate limiter." It's not about a perfect answer — it's about structured thinking out loud.`),
  p(`System design interviews test whether you can take a fuzzy prompt and reason about building something real: clarify the requirements, sketch the major components, and discuss the trade-offs. There's no single right answer; the interviewer wants to see you ask about scale, identify bottlenecks, and make justified choices. The vocabulary below is what those conversations are built from.`),
  sub("The building blocks to know"),
  ul([
    `<b>Client / server, latency vs throughput.</b> Latency is how long one request takes; throughput is how many you handle per second. Many decisions trade one for the other.`,
    `<b>Caching.</b> Store hot results in fast memory to avoid recomputing or re-fetching. Know hit/miss, eviction (LRU), and where caches sit (client, CDN, server, database).`,
    `<b>Load balancing &amp; scaling.</b> Horizontal (more machines) vs vertical (a bigger machine). A load balancer spreads requests across servers.`,
    `<b>SQL vs NoSQL.</b> Relational databases give you structure and joins; NoSQL trades that for scale and flexibility. Indexing makes lookups fast at the cost of write speed.`,
    `<b>A rough approach.</b> Clarify requirements → estimate scale → define the API → sketch components → zoom into the data model → discuss bottlenecks and trade-offs.`,
  ]),
  note("📚","Where to go deeper",`This is the on-ramp. For real depth, the standard resources are <em>Grokking the System Design Interview</em> and the <em>System Design Primer</em>. I can expand this into a full lesson with a worked example (designing a URL shortener end to end) on request.`),
]},
{group:"Beyond Code",num:"★",id:"behavioral",color:"#FB923C",title:"Behavioral & STAR",badge:"intro",blocks:[
  cue(`Almost every loop includes a behavioral round, and strong engineers routinely underprepare for it and lose offers there. A little structure goes a very long way.`),
  p(`Behavioral interviews probe how you work: how you handle conflict, ownership, failure, and collaboration. The trap is rambling. The fix is the <strong>STAR</strong> framework — a structure that keeps your answers tight and concrete: <b>Situation</b> (set the scene briefly), <b>Task</b> (your specific responsibility), <b>Action</b> (what <em>you</em> did, the bulk of the answer), and <b>Result</b> (the measurable outcome, ideally with a number).`),
  sub("Prepare these stories in advance"),
  ul([
    `<b>A shipped accomplishment</b> — something you built end to end and its impact.`,
    `<b>A hard technical problem</b> — a nasty bug or performance issue you diagnosed and fixed.`,
    `<b>A measured win</b> — a change where you can quote a real number (latency dropped X%, etc.).`,
    `<b>Conflict or hard feedback</b> — a disagreement you navigated, and what you learned.`,
    `<b>A failure</b> — something that went wrong, your ownership of it, and the change you made after.`,
  ]),
  idea("Lead with the result, then prove it",`Strong answers often state the outcome first — "I cut our build time roughly in half" — then back into the Situation/Task/Action that earned it. It hooks the interviewer and guarantees you actually land the point instead of running out of time mid-story.`),
  note("📝","Your raw material is strong",`Shipping a titled game, diagnosing GPU performance bottlenecks, and proposing your own process fixes are exactly the kinds of stories these rounds reward — they just need to be shaped into tight STAR form and rehearsed out loud. Want help drafting two or three from your actual experience? Just ask.`),
]},

function renderBlocks(blocks,color){

    if(b.t==="p")h+=`<p>${b.h}</p>`;
    else if(b.t==="h")h+=`<div class="subhead">${b.t2}</div>`;
    else if(b.t==="ul")h+=`<ul>${b.items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
    else if(b.t==="code")h+=`<div class="codeblock"><pre><code>${highlight(b.c)}</code></pre></div>`;
    else if(b.t==="cue")h+=`<div class="cue"><span class="ic">&#127919;</span><p>${b.h}</p></div>`;
    else if(b.t==="cx")h+=`<div><span class="complexity">&#9201; ${b.h}</span></div>`;
    else if(b.t==="note")h+=`<div class="note"><span class="ic">${b.ic}</span><div class="nbody"><strong>${b.title}</strong>${b.h}</div></div>`;
    else if(b.t==="idea")h+=`<div class="note idea"><span class="ic">&#128161;</span><div class="nbody"><strong>${b.title}</strong>${b.h}</div></div>`;
    else if(b.t==="pit")h+=`<div class="note pit"><span class="ic">&#9888;&#65039;</span><div class="nbody"><strong>${b.title}</strong>${b.h}</div></div>`;
    else if(b.t==="svg")h+=`<div class="svg-wrap">${SVG[b.key]}<div class="cap">${b.cap}</div></div>`;
    else if(b.t==="worked")h+=`<div class="worked"><div class="whead"><span class="wt">Worked example</span>${b.title}</div><div class="wexp">${b.exp}</div><pre><code>${highlight(b.c)}</code></pre></div>`;
    else if(b.t==="demoslot")h+=`<div data-demoslot></div>`;
    else if(b.t==="probs"){
      h+=`<div class="probwrap"><div class="pl">Practice &mdash; do these on LeetCode</div><div class="probs">`+b.items.map(pr=>{
        const dl={easy:"Easy",med:"Medium",hard:"Hard"}[pr[2]];

      }).join("")+`</div></div>`;
    }
    else if(b.t==="primer"){primerData.forEach(c=>{h+=`<div class="pcard"><div class="ptitle"><span class="pin"></span>${c.title}</div>`;c.items.forEach(it=>h+=`<div class="pitem"><div class="plabel">${it[0]}</div><div><pre><code>${highlight(it[1])}</code></pre></div></div>`);h+=`</div>`;});}
    else if(b.t==="cheat"){h+=`<div class="cheatgrid">`;cheatData.forEach(g=>{h+=`<div class="ccard"><div class="chead" style="--cc:${g.cc}">${g.title}</div>`;g.rows.forEach(r=>h+=`<div class="crow" style="--cc:${g.cc}"><span class="clabel">${r[0]}</span><code>${esc(r[1])}</code><button class="copy" data-copy="${esc(r[1]).replace(/"/g,"&quot;")}" aria-label="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></button></div>`);h+=`</div>`;});h+=`</div>`;}
  });
  return h;
}

navEl.innerHTML=navHTML;
function refreshNav(){[...navEl.querySelectorAll("a[data-nav]")].forEach(a=>{const id=a.getAttribute("data-nav");a.classList.toggle("done",!!id&&doneLessons.has(id));});}
refreshNav();
function setActive(id){[...navEl.querySelectorAll("a")].forEach(a=>a.classList.toggle("active",a.getAttribute("data-nav")===id));}
const homeHTML=`<div class="hero"><div class="eyebrow">Welcome</div><h2>Everything you need to be<br><em>interview-ready</em>.</h2><p class="lead">This isn't a problem dump. It's a complete course: deep written lessons with diagrams, the C++ language topics interviewers probe beyond data structures, and the exact common questions waiting for you on LeetCode. Concepts and patterns are interleaved &mdash; you learn an idea, then immediately use it.</p><p class="lead2">Each lesson is its own page, grouped by topic in the sidebar. Check off lessons as you finish them and tick problems as you solve them &mdash; the progress ring fills as you go, and everything saves automatically on this device.</p><div class="startrow"><a class="btn primary" href="#/how">Start at the beginning &#8594;</a><a class="btn ghost" href="#/syntax">Jump to the syntax primer</a></div><div class="planbar">${plan.map(x=>`<a class="pb" href="#/${x[2]}"><div class="wk">${x[0]}</div><div class="ti">${x[1]}</div></a>`).join("")}</div></div>`;
function wirePage(){
  page.querySelectorAll("[data-prob] .chk").forEach(chk=>{
    const slug=chk.getAttribute("data-slug");
    if(slug&&doneSet.has(slug))chk.classList.add("done");
    const tog=e=>{e.preventDefault();e.stopPropagation();chk.classList.toggle("done");if(slug){chk.classList.contains("done")?doneSet.add(slug):doneSet.delete(slug);saveDone(doneSet);}updateProgress();};
    chk.addEventListener("click",tog);chk.addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter")tog(e);});
  });
  page.querySelectorAll(".copy").forEach(btn=>{btn.addEventListener("click",async()=>{const txt=btn.getAttribute("data-copy").replace(/&quot;/g,'"').replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">");try{await navigator.clipboard.writeText(txt);}catch(e){const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(_){}document.body.removeChild(ta);}btn.classList.add("copied");setTimeout(()=>btn.classList.remove("copied"),1100);});});
}
function renderHome(){setActive("");page.className=reduce?"":"anim";page.innerHTML=homeHTML;wirePage();window.scrollTo(0,0);}
function renderLesson(s,i){
  const N=course.length;
  let h=`<div class="lesson-head" style="--accent:${s.color}"><div class="lh-meta"><span class="lh-week">${s.group}</span><span class="lh-count">Lesson ${i+1} of ${N}</span></div><h1 class="lh-title">${s.title}</h1></div>`;
  h+=`<div class="lesson">${renderBlocks(s.blocks,s.color)}</div>`;
  const ldone=doneLessons.has(s.id);
  h+=`<div class="lessondone"><button class="donebtn${ldone?' done':''}" id="lessonDoneBtn"><span class="box"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span><span id="lessonDoneTxt">${ldone?'Lesson completed':'Mark this lesson complete'}</span></button></div>`;
  const prev=course[i-1],next=course[i+1];
  h+=`<div class="pager">`;
  h+=prev?`<a class="pg" href="#/${prev.id}"><span>&#8592; Previous</span><b>${prev.title}</b></a>`:`<span></span>`;
  h+=next?`<a class="pg next start" href="#/${next.id}"><span>Next &#8594;</span><b>${next.title}</b></a>`:`<span></span>`;
  h+=`</div>`;
  page.className=reduce?"":"anim";
  page.innerHTML=h;
  setActive(s.id);
  if(s.demo){const slot=page.querySelector("[data-demoslot]");if(slot)slot.id="demo-"+s.demo;}
  initTwoPointers();initSlidingWindow();
  const ldb=page.querySelector("#lessonDoneBtn");
  if(ldb)ldb.addEventListener("click",()=>{const on=!doneLessons.has(s.id);if(on)doneLessons.add(s.id);else doneLessons.delete(s.id);saveLessons(doneLessons);ldb.classList.toggle("done",on);const tx=page.querySelector("#lessonDoneTxt");if(tx)tx.textContent=on?"Lesson completed":"Mark this lesson complete";refreshNav();updateProgress();});
  wirePage();updateProgress();window.scrollTo(0,0);
}
const sidebar=document.getElementById("sidebar"),hamb=document.getElementById("hamb"),scrim=document.getElementById("scrim");
function closeMenu(){sidebar.classList.remove("open");scrim.classList.remove("show");}
hamb&&hamb.addEventListener("click",()=>{sidebar.classList.toggle("open");scrim.classList.toggle("show");});
scrim&&scrim.addEventListener("click",closeMenu);
function route(){
  const hash=location.hash;
  let id=hash.indexOf("#/")===0?hash.slice(2):"";
  if(sidebar.classList.contains("open"))closeMenu();
  if(!id||!(id in idIndex))renderHome();
  else renderLesson(course[idIndex[id]],idIndex[id]);
}
function initTwoPointers(){
  const host=document.getElementById("demo-twoPointers");if(!host)return;
  const arr=[1,3,5,7,9,11],target=14;
  host.innerHTML=`<div class="demo" style="--accent:#FF8A3D"><div class="dlabel">&#9654; Live: find two numbers that sum to ${target}</div><div class="cells" id="tp-cells"></div><div class="readout" id="tp-read">Two pointers start at the ends and walk inward.</div><div class="dctrl"><button class="run" id="tp-run">Run it</button><button id="tp-reset">Reset</button></div></div>`;
  const cells=host.querySelector("#tp-cells"),read=host.querySelector("#tp-read");let timer=null;
  function draw(l,r,done){cells.innerHTML=arr.map((v,i)=>{let cls="cell",ptr="";if(i===l){cls+=" lp";ptr=`<span class="ptr">L</span>`;}if(i===r){cls+=" rp";ptr=`<span class="ptr">R</span>`;}if(done&&(i===l||i===r))cls="cell win";return `<div class="${cls}">${v}${ptr}</div>`;}).join("");}
  function reset(){if(timer)clearInterval(timer);timer=null;draw(-1,-1,false);read.innerHTML="Two pointers start at the ends and walk inward.";}
  function run(){if(timer)clearInterval(timer);let l=0,r=arr.length-1;draw(l,r,false);const step=()=>{const sum=arr[l]+arr[r];if(sum===target){draw(l,r,true);read.innerHTML=`<b>${arr[l]} + ${arr[r]} = ${target}</b> &#10003; found it`;clearInterval(timer);return;}if(sum<target){read.innerHTML=`${arr[l]} + ${arr[r]} = ${sum} &lt; ${target} &#8594; move <b>L</b> right`;l++;}else{read.innerHTML=`${arr[l]} + ${arr[r]} = ${sum} &gt; ${target} &#8594; move <b>R</b> left`;r--;}if(l>=r){read.innerHTML="No pair found.";clearInterval(timer);return;}draw(l,r,false);};timer=setInterval(step,1050);}
  host.querySelector("#tp-run").addEventListener("click",run);host.querySelector("#tp-reset").addEventListener("click",reset);reset();
}
function initSlidingWindow(){
  const host=document.getElementById("demo-slidingWindow");if(!host)return;
  const arr=[2,1,5,1,3,2],k=3;
  host.innerHTML=`<div class="demo" style="--accent:#FFC53D"><div class="dlabel">&#9654; Live: biggest sum of any ${k} in a row</div><div class="cells" id="sw-cells"></div><div class="readout" id="sw-read">A window of ${k} slides across &mdash; add the new, drop the old.</div><div class="dctrl"><button class="run" id="sw-run">Run it</button><button id="sw-reset">Reset</button></div></div>`;
  const cells=host.querySelector("#sw-cells"),read=host.querySelector("#sw-read");let timer=null;
  function draw(start){cells.innerHTML=arr.map((v,i)=>{const inWin=start>=0&&i>=start&&i<start+k;return `<div class="cell${inWin?" win":""}">${v}</div>`;}).join("");}
  function sumAt(s){let t=0;for(let i=s;i<s+k;i++)t+=arr[i];return t;}
  function reset(){if(timer)clearInterval(timer);timer=null;draw(-1);read.innerHTML=`A window of ${k} slides across &mdash; add the new, drop the old.`;}
  function run(){if(timer)clearInterval(timer);let s=0,best=-1,bestAt=0;const last=arr.length-k;const step=()=>{const sum=sumAt(s);draw(s);if(sum>best){best=sum;bestAt=s;}read.innerHTML=`window [${s}..${s+k-1}] sums to ${sum} &nbsp;&bull;&nbsp; best so far <b>${best}</b>`;if(s>=last){draw(bestAt);read.innerHTML=`Best window sums to <b>${best}</b> &#10003;`;clearInterval(timer);return;}s++;};timer=setInterval(step,1050);}
  host.querySelector("#sw-run").addEventListener("click",run);host.querySelector("#sw-reset").addEventListener("click",reset);reset();
}
window.addEventListener("hashchange",route);
route();
</script>
