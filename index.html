{group:"Week 2 · Core Patterns",num:"01",id:"arrays",color:"#FF5D73",title:"Arrays & Hashing",badge:"Week 2 · Pattern",blocks:[
  cue(`<b>Spot it when:</b> you need fast lookups, counting, or de-duping &#8212; anytime you're about to write a nested loop just to check "have I seen this before?", or you're being asked the same range question over and over.`),
  p(`This is the most foundational pattern in the whole course, because almost everything else is built on top of it. Two skills live here. First, the <em>array</em> itself &#8212; the contiguous block of memory underneath <code>std::vector</code>, and why some operations on it are free while others are secretly O(n). Second, <em>hashing</em> &#8212; replacing a search with a lookup, the single trade that collapses a huge fraction of brute-force O(n&#178;) solutions down to O(n). Master both and you'll recognize the right structure for a problem before you've finished reading it.`),
  sub("The array: a contiguous block of memory"),
  p(`An array is the simplest data structure there is: a single run of equally-sized slots, laid out back-to-back in memory. That layout is the whole reason arrays are fast. Because every element is the same size and they're packed contiguously, the address of element <code>i</code> is just <code>base + i &#215; sizeof(element)</code> &#8212; one multiply and one add. The hardware computes that and reads the slot in constant time, regardless of whether <code>i</code> is 0 or 2,000,000. That's the <b>O(1) random access</b> you rely on every time you write <code>v[i]</code>; it's the same pointer arithmetic from the Pointers lesson, since <code>v[i]</code> is literally <code>*(v.data() + i)</code>.`),
  p(`But the contiguity that buys you free indexing makes structural edits expensive. To <em>insert</em> or <em>erase</em> in the middle, every element after the edit point has to physically shift over to keep the block packed &#8212; that's <b>O(n)</b>. Appending at the end is cheap (amortized O(1)); inserting at the front or middle is not. This single fact drives a lot of pattern choices: when a problem needs frequent middle insertions you reach for a linked list or a different structure, and when it's append-and-index you stay with a vector.`),
  ul([
    `<b>Access / update by index</b> &#8212; <code>O(1)</code>. Direct address computation.`,
    `<b>Push / pop at the back</b> &#8212; <code>O(1)</code> amortized. The vector's natural growth end.`,
    `<b>Insert / erase in the middle or front</b> &#8212; <code>O(n)</code>. Everything after it shifts.`,
    `<b>Search for a value (unsorted)</b> &#8212; <code>O(n)</code>. You may scan the whole thing &#8212; and this is exactly what hashing fixes.`,
  ]),
  sub("std::vector — the workhorse"),
  p(`In interviews "array" almost always means <code>std::vector</code>. It's a dynamic array: a heap-allocated contiguous buffer plus a small handle (pointer, size, capacity) that lives on the stack. You get all the O(1) random access of a raw array, plus it grows on demand. The growth is the part worth understanding, because it's a callback to the amortized analysis from Big-O: when the buffer fills, the vector allocates a <em>bigger</em> one (typically double), copies every element across, and frees the old buffer &#8212; a genuine O(n) operation. But because capacity doubles, those resizes happen geometrically less often, and the total copying across <code>n</code> pushes sums to under <code>2n</code>. So <code>push_back</code> is <b>amortized O(1)</b>, even though individual calls occasionally aren't.`),
  note("📌","Reserve when you know the size",`If you know roughly how many elements you'll add, call <code>v.reserve(n)</code> once up front. It allocates the buffer a single time and skips every resize, turning amortized O(1) into a true O(1) per push. It's a small, senior-looking optimization to mention out loud &#8212; and the same reasoning explains why building a string with <code>+=</code> in a loop without reserving can quietly go quadratic.`),
  sub("Hashing: replace a search with a lookup"),
  p(`The defining move of the second half of this pattern is replacing a search with a lookup. Searching an array for a value is O(n) &#8212; you might scan the whole thing. A hash map (<code>unordered_map</code>) or hash set (<code>unordered_set</code>) makes that same question &#8212; "is this value present?" &#8212; an O(1)-average operation. You trade some memory for a dramatic speedup, and that single trade is what collapses nested-loop solutions into single passes.`),
  sub("How a hash map actually works"),
  p(`A hash map stores key&#8594;value pairs. When you insert a key, it runs the key through a <em>hash function</em> that turns it into an array index (a "bucket"), and drops the value there. Looking a key up re-runs the same function, jumps straight to that bucket, and finds the value &#8212; no scanning. Because computing the hash and indexing are both constant-time, lookups and inserts are O(1) on average. Notice the hash map is itself an <em>array</em> underneath &#8212; hashing is just a clever way to turn an arbitrary key into an array index, which is why the contiguous-memory section above matters here too.`),
  svg("hash","A key is hashed to a bucket index, so finding it later is a direct jump — not a search. This is why <code>m.count(key)</code> is effectively instant no matter how many keys you've stored."),
  p(`When two keys hash to the same bucket it's a <em>collision</em>, resolved by chaining (a little list in that bucket) or open addressing. Collisions are why we say lookups are <b>average</b> O(1), not guaranteed: if a pathological set of keys all collide into one bucket, the map degrades toward O(n) &#8212; the average-case-vs-worst-case distinction from Big-O, made concrete. In practice the standard library's hash spreads keys well enough that you treat it as O(1), but naming the worst case out loud ("average O(1), worst case O(n) on collisions") is exactly the kind of precise answer interviewers listen for.`),
  sub("The three things you'll do with it"),
  ul([
    `<b>Counting / frequencies.</b> <code>count[x]++</code> tallies occurrences in one pass — the backbone of anagram, duplicate, and "most frequent" problems.`,
    `<b>Remembering what you've seen.</b> Store each element as you go, then check membership instantly. This is the Two Sum trick: for each number, ask the map if its complement already appeared.`,
    `<b>De-duping.</b> An <code>unordered_set</code> keeps only unique values — insert everything, and duplicates collapse for free.`,
  ]),
  sub("Map vs set — which one?"),
  p(`Use a <code>map</code> when you need to remember something <em>about</em> each key (a count, an index, a grouping). Use a <code>set</code> when you only care whether a value is present or not — membership, with no associated data. If you find yourself storing a dummy value just to use a map, you wanted a set.`),
  sub("Frequency counting, deepened: the array-as-hashmap"),
  p(`When your keys are a small, dense range of integers &#8212; letters <code>'a'</code>&#8211;<code>'z'</code>, digits, ASCII bytes &#8212; you don't need a hash map at all. A plain fixed-size array <em>is</em> a hash map with a perfect, collision-free hash: the key is the index. <code>int count[26] = {};</code> then <code>count[c - 'a']++</code> is faster than <code>unordered_map</code> (no hashing, no allocation, perfect cache locality) and just as simple to read. Reach for this whenever the key space is bounded and small; fall back to a real map only when keys are sparse, large, or non-integer.`),
  svg("arrays_freq","Counting letters in a fixed 26-slot array. <code>'e' - 'a'</code> is 4, so every 'e' lands in slot [4] — the letter is its own index. This is the fastest possible frequency counter when the alphabet is small and known."),
  worked("Anagram check with a count array","Two strings are anagrams iff they have identical letter counts. Increment for one string, decrement for the other, then confirm every bucket returned to zero. One O(n) pass, O(1) space — the 26 slots don't grow with input.",
`bool isAnagram(const string& s, const string& t) {
    if (s.size() != t.size()) return false;
    int count[26] = {};                // one slot per lowercase letter
    for (char c : s) count[c - 'a']++; // tally s
    for (char c : t) count[c - 'a']--; // untally t
    for (int n : count)
        if (n != 0) return false;      // any nonzero -> not an anagram
    return true;
}
// O(n) time, O(1) space -- 26 is a constant, not part of n`),
  note("📌","Why count[26] is O(1) space, not O(n)",`The array's size is fixed by the alphabet, not by the input length &#8212; it's 26 slots whether the string is 10 characters or 10 million. A loop over those 26 slots is likewise O(1) with respect to <code>n</code>. This is the "counting a constant as a variable" trap from Big-O, used in your favor: a bounded key space gives you genuinely constant extra space.`),
  sub("The seen-set / complement trick, generalized"),
  p(`The most reusable hashing idea is: as you walk the array, remember what you've already passed, then ask the set or map a question about the current element against everything behind it. Two Sum is the canonical instance &#8212; for each number, ask whether its <em>complement</em> (<code>target - x</code>) has already been seen. The same shape solves "contains a duplicate" (have I seen <code>x</code> before?), "two elements differ by k" (have I seen <code>x - k</code> or <code>x + k</code>?), and many others. You're trading O(n) space for the ability to answer "does the partner I need already exist?" in O(1).`),
  worked("Two Sum, the O(n) way","Instead of checking every pair (O(n²)), walk once and ask the map whether the number that would complete the target has already been seen. One pass, O(n) time, O(n) space. The map stores value&#8594;index so you can return the indices.",
`vector<int> twoSum(const vector<int>& nums, int target) {
    unordered_map<int, int> seen;          // value -> its index
    for (int i = 0; i < nums.size(); i++) {
        int need = target - nums[i];       // the partner we want
        if (seen.count(need))              // have we seen it already?
            return {seen[need], i};        // yes -> done
        seen[nums[i]] = i;                 // no -> remember this one
    }
    return {};                             // nothing found
}`),
  sub("Prefix sums — precompute once, answer ranges in O(1)"),
  p(`Here's a core array technique that isn't hashing but pairs with it constantly. Suppose you're asked the sum of a range <code>nums[i..j]</code>, possibly many times. The naive answer re-adds the slice each time &#8212; O(n) per query, O(n&#183;q) for q queries. Instead, spend one O(n) pass building a <em>prefix-sum</em> array where <code>pre[k]</code> holds the sum of the first <code>k</code> elements. Then the sum of any range is a single subtraction: <code>sum(i..j) = pre[j+1] - pre[i]</code>. After the O(n) prep, every range query is O(1). This "precompute a running aggregate, then answer with subtraction" idea generalizes to running products, counts, and 2D grids.`),
  svg("arrays_prefix","Build <code>pre</code> once (each slot is the running sum of everything before it), then any range sum is the difference of two prefix values. The +1 offset — <code>pre</code> has one extra leading 0 — is what makes the subtraction land on the right boundaries."),
  worked("Range-sum queries with a prefix array","The leading 0 in <code>pre</code> (so <code>pre</code> has size n+1) removes the awkward edge case when <code>i == 0</code>. Build is O(n); each query is O(1). This is the engine behind \"subarray sum equals k\" when you combine it with a hash map of seen prefix sums.",
`struct RangeSum {
    vector<long long> pre;                 // pre[k] = sum of first k elements
    RangeSum(const vector<int>& nums) {
        pre.resize(nums.size() + 1, 0);    // pre[0] = 0 sentinel
        for (int i = 0; i < nums.size(); i++)
            pre[i + 1] = pre[i] + nums[i]; // running sum, O(n) once
    }
    long long query(int i, int j) {        // inclusive sum of nums[i..j]
        return pre[j + 1] - pre[i];        // O(1) -- no scanning
    }
};`),
  idea("Prefix sum + hash map = a whole problem class",`The famous \"Subarray Sum Equals K\" combines both halves of this lesson: walk the array tracking the running prefix sum, and keep a hash map of how many times each prefix sum has occurred. A subarray summing to <code>k</code> ending here exists exactly when <code>prefix - k</code> was a previous prefix &#8212; a seen-set lookup. That's an O(n) solution to what looks like an O(n&#178;) problem, and it's a direct fusion of prefix sums and the complement trick.`),
  sub("Grouping with a map — the canonical key"),
  p(`A map's value can be a <em>collection</em>, which turns it into a grouping tool: compute a canonical key that's identical for everything that belongs together, then append each item to <code>groups[key]</code>. \"Group Anagrams\" is the textbook case &#8212; every anagram of \"eat\" shares the same sorted form \"aet\", so the sorted string is a perfect canonical key. Group by it and the anagrams fall into the same bucket automatically.`),
  worked("Group Anagrams via a canonical key","Sorting each word gives a key that's identical for all its anagrams. Use that key to bucket words in an <code>unordered_map&lt;string, vector&lt;string&gt;&gt;</code>, then collect the buckets. The sort per word is the cost; the grouping itself is O(1) average per insert.",
`vector<vector<string>> groupAnagrams(const vector<string>& words) {
    unordered_map<string, vector<string>> groups;
    for (const string& w : words) {
        string key = w;                    // copy, then canonicalize
        sort(key.begin(), key.end());      // "eat" -> "aet": same for all anagrams
        groups[key].push_back(w);          // append into its bucket
    }
    vector<vector<string>> out;
    for (auto& [key, bucket] : groups)     // structured binding over the map
        out.push_back(move(bucket));       // move, don't copy, each group out
    return out;
}
// O(m * k log k) for m words of length up to k (the per-word sort dominates)`),
  note("📌","A cheaper canonical key",`Sorting each word is O(k log k). If the alphabet is small you can build a count-based key instead &#8212; a 26-length frequency signature &#8212; giving O(k) per word. Mentioning \"I could swap the sort for a count signature to drop the log factor\" is a clean optimization to offer once the sorted-key version works.`),
  sub("Set operations and de-duping"),
  p(`An <code>unordered_set</code> is the right tool whenever the question is purely about presence: drop everything in and duplicates vanish, or build two sets and walk one checking membership in the other for intersections. \"Contains Duplicate\" is a one-liner &#8212; insert as you go and return true the moment an insert finds the value already there. De-duping a vector is just \"insert into a set, read the set back out\" when order doesn't matter, or a sorted sweep when it does.`),
  code(`// de-dup, order not preserved
unordered_set<int> s(v.begin(), v.end());   // duplicates collapse on insert
vector<int> unique(s.begin(), s.end());     // O(n) total

// contains-duplicate in one pass, early-exit
unordered_set<int> seen;
for (int x : v)
    if (!seen.insert(x).second)             // .second is false if x was already in
        return true;                        // found a repeat`),
  sub("Ordered vs unordered — when ordering matters"),
  p(`<code>unordered_map</code> / <code>unordered_set</code> are hash tables: O(1) average operations, no ordering. <code>std::map</code> / <code>std::set</code> are balanced binary search trees: every operation is O(log n), but the keys stay <em>sorted</em>, and you get ordered iteration, <code>lower_bound</code> / <code>upper_bound</code> range queries, and finding the smallest or largest key in O(log n). Default to the unordered (hash) versions for raw speed; reach for the ordered ones only when you genuinely need sorted order or range/floor/ceiling queries. Picking <code>map</code> when you don't need ordering is a common, quietly costly mistake &#8212; it's a log-factor slower for no benefit.`),
  ul([
    `<b><code>unordered_map</code> / <code>unordered_set</code></b> &#8212; hash table, O(1) average, no order. The default for counting, seen-sets, grouping.`,
    `<b><code>std::map</code> / <code>std::set</code></b> &#8212; balanced tree, O(log n), keys sorted. Use when you need ordered iteration, range queries, or floor/ceiling lookups.`,
  ]),
  sub("Hashing custom keys"),
  p(`Built-in types and <code>std::string</code> hash out of the box, so a key like a sorted string \"just works.\" Two cases need a word of care. A <code>std::pair</code> or <code>std::tuple</code> key (common for grid coordinates, edges, or two-field keys) has <em>no</em> standard hash, so <code>unordered_map&lt;pair&lt;int,int&gt;, T&gt;</code> won't compile &#8212; you either provide a custom hash functor, or sidestep it by encoding the pair into a single key (e.g. <code>r * COLS + c</code> for a grid, or a <code>map</code> which only needs <code>operator&lt;</code>). It's worth being able to say \"pairs aren't hashable by default; I'd encode the coordinate or write a small hash\" rather than getting stuck on a compile error in the room.`),
  code(`// pair keys: unordered_map needs a hash; std::map needs only operator<
map<pair<int,int>, int> grid;              // works: pair has operator<
grid[{r, c}] = value;

// or encode into one integer key for unordered_map (faster, common in grids):
unordered_map<long long, int> grid2;
grid2[(long long)r * COLS + c] = value;    // pack (r,c) into one key`),
  sub("Spotting it & framing it in the room"),
  p(`The trigger phrases are loud once you listen for them. \"Have I seen this before?\", \"how many times does X occur?\", \"find a pair / group that...\", \"is there a duplicate?\", or any nested loop whose inner job is just <em>checking membership</em> &#8212; all say hash map or set. \"Sum of a range\" repeated across queries says prefix sums. \"Group these by some property\" says map-of-collections with a canonical key. And whenever you catch yourself about to write the O(n&#178;) double loop, pause and ask whether a one-pass lookup or a precomputed table removes the inner loop entirely.`),
  note("📌","Say it like this in the room",`\"Brute force is O(n&#178;) &#8212; for each element I'd scan the rest. But I only need to know whether a partner already exists, so I'll keep a hash set as I go and check it in O(1). That's one pass, O(n) time, O(n) space.\" Naming the brute force, the exact thing you're looking up, and the time/space trade in one breath is the senior signal interviewers reward.`),
  pit("The .count() vs [] gotcha",`Writing <code>if (m[key] == ...)</code> to check existence is a bug: <code>m[key]</code> <em>inserts</em> a default-constructed entry if the key is missing, silently growing your map and corrupting counts. To check without inserting, use <code>m.count(key)</code> or <code>m.find(key) != m.end()</code>. (The flip side: <code>count[x]++</code> on a fresh key is fine and idiomatic for frequency maps &#8212; there the auto-insert-to-zero is exactly what you want.)`),
  pit("Iterator and reference invalidation",`A vector reallocation (any <code>push_back</code> that grows the buffer) invalidates every pointer, reference, and iterator into it &#8212; a classic use-after-realloc bug when you hold a reference across a push. For hash maps, <code>insert</code> can rehash and invalidate iterators too. If you must hold a reference across modifications, <code>reserve</code> first or re-fetch after.`),
  cx(`Index access <b>O(1)</b> · search via hash <b>O(1)</b> avg, O(n) worst · prefix-sum query <b>O(1)</b> after O(n) build · ordered map/set <b>O(log n)</b> · space <b>O(n)</b>`),
  {t:"probs",items:[["Two Sum","two-sum","easy"],["Group Anagrams","group-anagrams","med"],["First Missing Positive","first-missing-positive","hard"]]}
]},
{group:"Week 2 · Core Patterns",num:"02",id:"twopointers",color:"#FF8A3D",title:"Two Pointers",badge:"Week 2 · Pattern",demo:"twoPointers",blocks:[
  cue(`<b>Spot it when:</b> the array is <em>sorted</em>, you're comparing or shrinking from both ends (pair/triplet sums, palindromes), you're walking a linked list at two speeds (midpoint, cycle), or you're compacting/partitioning a sequence in place. The tell is "I'm about to write a nested loop over the same array" — two pointers usually flattens it to one pass.`),
  note("🔗","A quick naming note",`"Two pointers" here usually means two <em>indices</em> (<code>int left, right</code>) walking an array — not raw pointers in the C++ sense. The exception is the fast/slow version on linked lists, where they're literal <code>ListNode*</code> pointers. Either way, the pointer mental model from Week 1 — a name that refers to a position in memory — is what makes this intuitive.`),
  p(`Two pointers replaces a nested loop with two positions that move through a sequence intelligently. Instead of testing all O(n²) pairs, you place the pointers somewhere sensible — both ends, or both at the start — and advance them based on what you observe, so each pointer crosses the data at most once. The payoff is a single O(n) sweep with O(1) extra space, which is frequently the optimal answer interviewers are fishing for. There are three sub-patterns worth knowing cold; the rest of this lesson takes them one at a time.`),
  ul([
    `<b>Converging.</b> Two pointers start at opposite ends and walk toward each other. The workhorse for sorted-array pair/triplet sums, palindromes, and container/water problems.`,
    `<b>Fast &amp; slow.</b> Two pointers traverse the same sequence at different speeds. Finds a linked list's midpoint and detects cycles in O(1) space.`,
    `<b>Read / write.</b> One pointer reads every element; a second, slower pointer writes only the elements you keep. The idiom behind in-place dedup, compaction, and partitioning.`,
  ]),
  sub("Flavor one: converging pointers"),
  p(`On a <em>sorted</em> array, this is almost magical. Put <code>left</code> at the front and <code>right</code> at the back, and look at <code>nums[left] + nums[right]</code>. If the sum is too small, the only way to make it bigger is to move <code>left</code> rightward to a larger value. If it's too big, move <code>right</code> leftward to a smaller one. Every move eliminates a value you've <em>proven</em> can't be part of the answer — so you never look at it again. Try the demo below and watch which pointer moves, and why.`),
  {t:"demoslot"},
  p(`That "proven" is the whole point, so let's make the argument explicit — this is the part interviewers want to hear, not just the code. Suppose the array is sorted ascending and you're hunting for a pair summing to <code>target</code>. Say <code>nums[left] + nums[right] &lt; target</code>. Could <code>nums[left]</code> pair with anything to reach the target? Its <em>largest</em> possible partner is <code>nums[right]</code> — every other candidate sits to the left of <code>right</code> and is therefore <em>smaller</em>. If even the biggest partner falls short, no partner for <code>nums[left]</code> works. So <code>left</code> is eliminated for good, and advancing it discards exactly one provably-dead value. The mirror argument handles a sum that's too big. Because each step retires one pointer's current value, the two pointers together take at most <code>n</code> steps — that's the O(n).`),
  idea("This is the elimination argument","Every two-pointer correctness proof has the same shape: <em>show that the move you make can't skip the answer.</em> Here, monotonicity (sorted order) guarantees the discarded value had no viable partner left. If you can articulate <em>why</em> a move is safe, you can adapt the pattern to a new problem on the spot instead of memorizing templates."),
  worked("Pair that sums to a target (sorted input)","Because the array is sorted, the sum is monotonic: moving left up only raises it, moving right down only lowers it. That lets you decide which pointer to move with zero guessing — no hash map, no extra space.",
`bool hasPair(const vector<int>& nums, int target) {
    int left = 0, right = nums.size() - 1;
    while (left < right) {                  // strict: a pair needs two distinct slots
        int sum = nums[left] + nums[right];
        if (sum == target) return true;     // found it
        if (sum < target)  left++;          // too small -> need a bigger left
        else               right--;         // too big   -> need a smaller right
    }
    return false;
}`),
  pit("left < right vs left <= right",`For a <em>pair</em> from two distinct positions, the loop is <code>while (left &lt; right)</code> — once they meet there's no second element to pair with, and <code>left &lt;= right</code> would let an element pair with itself. The <code>&lt;=</code> form belongs to a different family: classic binary search, where <code>left</code> and <code>right</code> bound a range you're still searching and the midpoint can legitimately equal either end. Pick the boundary by asking "is a single shared index a valid state?" — for converging pairs, no.`),
  sub("3Sum: fix one, two-pointer the rest"),
  p(`Once converging pointers click, <code>3Sum</code> stops being scary. You want three numbers that sum to zero. Sort the array, then walk a pointer <code>i</code> over each value and ask the converging sub-routine to find a <em>pair</em> in the remainder that sums to <code>-nums[i]</code>. You've turned a 3-dimensional search into "fix one number, solve 2Sum on what's left." The sort costs O(n log n); the outer loop is O(n) and each converging sweep is O(n), so the whole thing is O(n²) — a huge win over the O(n³) brute force, and the canonical "reduce by one dimension" trick.`),
  worked("3Sum — triplets that sum to zero","Sort first (enables converging + makes dedup trivial). For each i, converge left/right over the suffix toward -nums[i]. The skip-duplicates steps are what keep the output set unique.",
`vector<vector<int>> threeSum(vector<int>& nums) {
    sort(nums.begin(), nums.end());
    vector<vector<int>> out;
    for (int i = 0; i + 2 < (int)nums.size(); i++) {
        if (i > 0 && nums[i] == nums[i - 1]) continue;  // skip dup anchors
        int left = i + 1, right = nums.size() - 1;
        while (left < right) {
            int sum = nums[i] + nums[left] + nums[right];
            if (sum < 0)      left++;
            else if (sum > 0) right--;
            else {
                out.push_back({nums[i], nums[left], nums[right]});
                while (left < right && nums[left]  == nums[left + 1])  left++;
                while (left < right && nums[right] == nums[right - 1]) right--;
                left++; right--;                         // move past the pair found
            }
        }
    }
    return out;
}`),
  sub("Palindrome check: converge and compare"),
  p(`A palindrome reads the same forward and backward — so put one pointer at each end and compare. If the characters match, step both inward; the first mismatch proves it's not a palindrome. They only need to walk until they meet in the middle, so it's O(n) time, O(1) space, and no reversed copy of the string. The "valid palindrome" variant just skips non-alphanumerics and lowercases as you go — same skeleton, two small guards.`),
  worked("Valid palindrome (ignoring case &amp; non-alphanumerics)","Converge from both ends. Advance past anything that isn't a letter or digit, compare case-insensitively, and the moment a real mismatch appears, bail. Pointers meeting means every mirrored pair matched.",
`bool isPalindrome(const string& s) {
    int left = 0, right = s.size() - 1;
    while (left < right) {
        while (left < right && !isalnum(s[left]))  left++;   // skip junk on the left
        while (left < right && !isalnum(s[right])) right--;  // and on the right
        if (tolower(s[left]) != tolower(s[right])) return false;
        left++; right--;
    }
    return true;
}`),
  sub("Flavor two: fast & slow pointers"),
  p(`The second form runs two pointers at different speeds through the <em>same</em> sequence. A <em>slow</em> pointer takes one step while a <em>fast</em> pointer takes two. This is built for linked lists, where you can't index by position and a converging scan from "both ends" isn't possible — you only have <code>next</code>. With two speeds you still extract structural facts in a single O(1)-space pass: the midpoint, and whether the list loops.`),
  p(`<b>Finding the midpoint.</b> When <code>fast</code> reaches the end, it has covered twice the ground <code>slow</code> has — so <code>slow</code> sits at the middle. This is how you split a list for merge sort or find the center to reverse the second half.`),
  worked("Middle of a linked list","fast advances two nodes per step; slow advances one. When fast falls off the end, slow is at the midpoint. For an even-length list this returns the second of the two middle nodes (stop earlier if you want the first).",
`ListNode* middleNode(ListNode* head) {
    ListNode* slow = head;
    ListNode* fast = head;
    while (fast && fast->next) {     // guard BOTH: fast and the node after it
        slow = slow->next;          // +1
        fast = fast->next->next;    // +2
    }
    return slow;                    // fast ran out -> slow is halfway
}`),
  p(`<b>Detecting a cycle (Floyd's algorithm).</b> If the list has no loop, <code>fast</code> simply runs off the end and you return false. If there <em>is</em> a loop, both pointers get trapped circling inside it — and because <code>fast</code> gains one node on <code>slow</code> every step, the gap between them shrinks by exactly one per iteration until it hits zero. They are <em>guaranteed</em> to collide. That "gap closes by one each step" is the proof the two pointers must meet rather than leapfrog past each other forever.`),
  svg("twopointers_floyd","Inside a cycle, fast gains one node on slow per step, so the distance between them shrinks to zero and they collide. No cycle means fast hits <code>nullptr</code> first — which is exactly how you return “no loop.”"),
  worked("Cycle detection — Floyd's tortoise and hare","Same two-speed walk. If fast ever equals slow, they're circling a loop. If fast (or fast->next) reaches nullptr, the list is straight. O(1) space — no visited-set hash map needed.",
`bool hasCycle(ListNode* head) {
    ListNode* slow = head;
    ListNode* fast = head;
    while (fast && fast->next) {
        slow = slow->next;          // tortoise: +1
        fast = fast->next->next;    // hare: +2
        if (slow == fast) return true;   // they met -> cycle
    }
    return false;                   // fast escaped -> no cycle
}`),
  note("🔗","Where you'll meet this again",`Fast &amp; slow is really a linked-list tool wearing a two-pointer hat — the Linked Lists lesson reuses both routines above, plus the follow-up (finding the <em>start</em> of the cycle by resetting one pointer to the head). The instinct to reach for it: "I need a structural fact about a list in one pass and O(1) space."`),
  sub("Flavor three: read / write (in-place compaction)"),
  p(`The third form uses a fast <em>read</em> pointer that visits every element and a slow <em>write</em> pointer that only advances when it keeps one. Everything left of <code>write</code> is the finished, correct prefix; everything from <code>read</code> onward is still being scanned. This is how you remove duplicates, strip out unwanted values, or partition — <em>in place</em>, O(1) extra space, without allocating a second array. The diagram shows it compacting non-zeros to the front.`),
  svg("twopointers_rw","read scans the whole array; write only steps forward when read finds an element to keep. The region behind write is already final, so the result is built in place with no second buffer."),
  worked("Remove duplicates from a sorted array","Because it's sorted, duplicates are adjacent. write holds the last unique value's slot; read scans ahead, and whenever it finds something different from the last kept value, it gets written into the next slot. Returns the new logical length.",
`int removeDuplicates(vector<int>& nums) {
    if (nums.empty()) return 0;
    int write = 0;                              // index of last unique kept
    for (int read = 1; read < (int)nums.size(); read++) {
        if (nums[read] != nums[write])          // a new distinct value
            nums[++write] = nums[read];         // keep it just past the prefix
    }
    return write + 1;                           // length of the deduped prefix
}`),
  worked("Move zeroes to the end","Same read/write idiom, used as a partition. write marks where the next non-zero goes; read sweeps the array. Swap (don't just overwrite) so the zeros end up trailing instead of being lost. Order of the non-zeros is preserved — a stable partition.",
`void moveZeroes(vector<int>& nums) {
    int write = 0;
    for (int read = 0; read < (int)nums.size(); read++) {
        if (nums[read] != 0)
            swap(nums[write++], nums[read]);    // non-zero -> front, advance write
    }
    // everything from index 'write' onward is now zero
}`),
  idea("The write pointer is a running answer","In all three read/write examples, <code>write</code> is simultaneously the build cursor <em>and</em> the final count. When an interviewer asks for an in-place transform, your first thought should be “what decides whether read's current element survives, and where does it land?” Answer that and the loop writes itself."),
  sub("Two pointers vs. a hash map"),
  p(`These two patterns solve a lot of the same problems (Two Sum is the poster child), so know the trade. Two pointers needs <em>order</em> — sorted data, or a structure you can walk from both ends or at two speeds — and in exchange gives you O(1) extra space. A hash map needs no order but spends O(n) space to buy O(1) lookups. So: if the input is already sorted, converging pointers are strictly better (no allocation). If it's unsorted and you only need to detect a pair/complement, a hash map in one pass beats sorting-then-converging (O(n) vs O(n log n)). If you need the <em>actual elements</em> sorted anyway, or you need to avoid the memory, sort and use pointers.`),
  ul([
    `<b>Reach for two pointers</b> when the data is sorted or sequential, you must use O(1) space, or you're working a linked list (cycle/midpoint).`,
    `<b>Reach for a hash map</b> when the data is unsorted and order doesn't matter, you need fast membership/complement lookups, and O(n) space is acceptable.`,
  ]),
  sub("The pitfalls that actually bite"),
  pit("Converging assumes sorted data",`The converging trick relies on monotonicity — on an unsorted array, a too-small sum tells you nothing about which way to move. If the problem isn't sorted, either sort it first (adding O(n log n)) or switch to a hash map. State this precondition out loud before you commit; forgetting it is the classic two-pointer interview miss.`),
  pit("Off-by-one and the crossing condition",`Watch the boundary: <code>while (left &lt; right)</code> for distinct-pair problems, <code>left &lt;= right</code> only when a single shared index is a legal state (binary search). And never let pointers cross silently — if your loop body can advance a pointer past the other (e.g. skipping duplicates), re-check the <code>left &lt; right</code> guard inside the inner loops, as the 3Sum dedup code does.`),
  pit("Fast & slow: guard before you dereference",`<code>fast = fast-&gt;next-&gt;next</code> dereferences two links, so the loop condition must be <code>while (fast &amp;&amp; fast-&gt;next)</code> — check both before stepping. Test <code>fast</code> alone and you'll segfault on the very last hop of an even-length list. This is the single most common crash in fast/slow code.`),
  cx(`Converging / read-write: time <b>O(n)</b>, space <b>O(1)</b> · Fast &amp; slow: time <b>O(n)</b>, space <b>O(1)</b> · 3Sum: time <b>O(n&#178;)</b> (plus the O(n log n) sort), space <b>O(1)</b> beyond the output`),
  note("🔗","Saying it in the interview",`Name the flavor as you spot it: “it's sorted and I need a pair, so converging pointers — O(n), no extra space.” Then state the elimination reason (“the array's sorted, so a too-small sum means left can't pair with anything, advance it”). Naming the pattern <em>and</em> justifying the move is what reads as senior — far more than just producing the code.`),
  {t:"probs",items:[["Valid Palindrome","valid-palindrome","easy"],["3Sum","3sum","med"],["Trapping Rain Water","trapping-rain-water","hard"]]}
]},
{group:"Week 2 · Core Patterns",num:"03",id:"sliding",color:"#FFC53D",title:"Sliding Window",badge:"Week 2 · Pattern",demo:"slidingWindow",blocks:[
  cue(`<b>Spot it when:</b> you want the "longest / shortest / best" <em>contiguous</em> subarray or substring that satisfies some condition — anything phrased as "a run of consecutive elements such that&hellip;".`),
  p(`A sliding window maintains a contiguous range — a <em>window</em> — defined by a <code>left</code> and a <code>right</code> index, and slides it across the input. The whole pattern is one invariant: <b>the window <code>[left, right]</code> is the current candidate, and you keep it correct by updating it incrementally rather than recomputing from scratch.</b> When you extend the window by one on the right, you fold in one element's contribution; when you shrink from the left, you remove one. You never re-scan the interior. That single discipline is what turns an O(n&#178;) "check every subarray" brute force into a single O(n) pass.`),
  p(`Here is the brute force the window replaces. For every start index, you walk forward over every end index and inspect the run between them — two nested loops, O(n&#178;), and often an O(n) cost inside to re-sum or re-check the run, pushing it toward O(n&#179;). The window keeps the <em>work you already did</em> around in a couple of running variables (a sum, a count, a frequency map) so each new position costs O(1) amortized. You are trading a recomputation for a small amount of bookkeeping.`),
  idea("The one invariant to hold in your head",`At every step the window <code>[left, right]</code> is a valid candidate, and every running variable you keep (sum, counts, a set) describes <em>exactly the elements inside it</em> — no more, no less. Every line you write either (a) extends <code>right</code> and updates the bookkeeping for the entering element, or (b) advances <code>left</code> and undoes the bookkeeping for the leaving element. If a line does neither, question it.`),
  sub("Why the total work is O(n) — the amortized argument"),
  p(`The code often <em>looks</em> like a nested loop: a <code>for</code> over <code>right</code> with a <code>while</code> that moves <code>left</code> inside it. That nesting is a trap for the eye. The honest way to count is to ask: <b>how many times can each pointer move?</b> <code>right</code> advances exactly n times (once per outer iteration). <code>left</code> only ever moves forward and never resets — so across the entire run it advances at most n times <em>total</em>, not n times per outer step. Add them: at most 2n pointer moves, each doing O(1) work. That is O(n).`),
  p(`This is the same <em>amortized</em> reasoning from the Big-O lesson — the one behind <code>vector::push_back</code> and the monotonic stack. Any single iteration of the inner <code>while</code> might do several moves, but each index can enter the window once and leave once over the whole algorithm, so the cost is shared out to O(1) per element. When an interviewer asks "isn't that nested loop O(n&#178;)?", this is the answer: count total pointer travel, not loop nesting.`),
  sub("Fixed vs. dynamic windows"),
  ul([
    `<b>Fixed-size window.</b> The length <code>k</code> is given up front — "max sum of any k consecutive elements," "average of every window of size k." You slide it one step at a time: add the entering element, subtract the leaving one, done. The size never changes. The live demo below animates exactly this.`,
    `<b>Dynamic window.</b> The window grows and shrinks to stay <em>valid</em> against some rule. You always expand <code>right</code>; whenever the window breaks the rule (a repeated character, a sum over a limit, too many distinct values), you advance <code>left</code> until it is legal again. This is the form behind "longest substring without repeating characters" and most "smallest window that covers X" problems.`,
  ]),
  svg("sliding_step","A fixed window of size k slides one position: subtract the element that fell off the left, add the element that entered on the right. The interior is never re-summed — each slide is O(1)."),
  {t:"demoslot"},
  sub("Fixed window: max sum of k consecutive elements"),
  p(`Start by summing the first <code>k</code> elements — that is your first window. Then slide: each step, add <code>nums[right]</code> and subtract <code>nums[right - k]</code> (the element that just fell off the left edge). The running <code>sum</code> always equals the current window's total, so you check the answer every step in O(1). No inner loop at all here — a fixed window is the gentlest case.`),
  worked("Maximum sum of any k consecutive elements","Build the first window explicitly, then slide it across the rest. The element leaving the window is always exactly k positions behind the one entering, so one add and one subtract keep the sum exact.",
`int maxSumK(const vector<int>& nums, int k) {
    int sum = 0;
    for (int i = 0; i < k; i++) sum += nums[i];   // first window
    int best = sum;
    for (int right = k; right < nums.size(); right++) {
        sum += nums[right];          // element entering on the right
        sum -= nums[right - k];      // element leaving on the left
        best = max(best, sum);       // window is exact -> check now
    }
    return best;
}`),
  note("📌","Fixed window, one line of state",`A fixed window usually needs nothing more than a single running aggregate — a sum, a product, a count of zeros. The "entering" and "leaving" elements are always a fixed distance <code>k</code> apart, so you never need a map to remember positions. If you find yourself reaching for more state in a fixed-size problem, re-read the prompt: it is often simpler than you fear.`),
  sub("Dynamic window: the general template to memorize"),
  p(`This is the skeleton worth burning into muscle memory, because nearly every dynamic-window problem is a fill-in-the-blanks of it. Expand <code>right</code> over the whole input. After each expansion, <em>while</em> the window violates the rule, shrink from the left. Then update the answer. The only per-problem parts are the three blanks: how you record an entering element, what "invalid" means, and how you undo a leaving element.`),
  code(`// THE TEMPLATE — longest valid window
int left = 0, best = 0;
for (int right = 0; right < n; right++) {
    add(s[right]);                       // 1. fold the entering element in
    while (window_is_invalid()) {        // 2. while the rule is broken...
        remove(s[left]);                 //    undo the leaving element
        left++;                          //    ...shrink from the left
    }
    best = max(best, right - left + 1);  // 3. window is now valid -> record it
}`),
  p(`Read it as three slots. <b>(1) add</b> — insert into a set, bump a count in a frequency map, add to a running sum. <b>(2) the invalid test</b> — "this char is already in the window," "sum exceeds the limit," "more than two distinct letters." <b>(3) remove</b> — the exact inverse of add, applied to the element at <code>left</code>. Get those three right and the loop scaffolding is identical every time. The placement of the answer update matters too — for a "longest" problem it goes <em>after</em> the shrink (the window is valid there); for a "shortest" problem it goes <em>inside</em> the shrink, as you will see below.`),
  worked("Longest substring with no repeated characters","Grow the window to the right; the moment you would include a character already inside it, shrink from the left until that duplicate is gone. A set is the window's contents. Each character enters once and leaves once — O(n).",
`int lengthOfLongest(const string& s) {
    unordered_set<char> window;          // chars currently in the window
    int left = 0, best = 0;
    for (int right = 0; right < s.size(); right++) {
        while (window.count(s[right]))   // duplicate -> shrink first
            window.erase(s[left++]);     // undo the leaving char
        window.insert(s[right]);         // now safe to add the entering char
        best = max(best, right - left + 1);
    }
    return best;
}`),
  idea("The last-index variant — jump left instead of crawling",`The set version moves <code>left</code> one step at a time. A common optimization keeps an <code>unordered_map&lt;char,int&gt;</code> of each character's <em>last seen index</em>, so on a duplicate you jump <code>left</code> straight past it in one move: <code>left = max(left, lastSeen[c] + 1);</code>. Same O(n) bound (each char is still touched O(1) times), but it is the answer that signals you have seen the pattern more than once. Interviewers like seeing the jump.`),
  code(`// same problem, map-of-last-index variant
int lengthOfLongest(const string& s) {
    unordered_map<char,int> lastSeen;    // char -> most recent index
    int left = 0, best = 0;
    for (int right = 0; right < s.size(); right++) {
        char c = s[right];
        if (lastSeen.count(c))
            left = max(left, lastSeen[c] + 1);   // jump past the old copy
        lastSeen[c] = right;                     // record / overwrite
        best = max(best, right - left + 1);
    }
    return best;
}`),
  sub(`The "shrink to satisfy" variant — shortest window`),
  p(`The longest-window template grows greedily and shrinks only to stay legal. The mirror image is the <em>shortest</em> window: you grow <code>right</code> until the window first <em>satisfies</em> a requirement, then shrink <code>left</code> as far as you can while it still satisfies it, recording the answer on each successful shrink. "Smallest subarray whose sum is &#8805; target" is the clean example. Notice the answer update has moved <em>inside</em> the shrink loop — every valid-and-smaller window is a candidate.`),
  worked("Smallest subarray with sum &#8805; target","Expand right and accumulate the sum. The instant the sum reaches the target, shrink from the left as far as possible while it still qualifies, updating the best length each time. Both pointers only move forward, so it is O(n) despite the inner while.",
`int minSubArrayLen(int target, const vector<int>& nums) {
    int left = 0, sum = 0, best = INT_MAX;
    for (int right = 0; right < nums.size(); right++) {
        sum += nums[right];                 // grow
        while (sum >= target) {             // already satisfied -> try to shrink
            best = min(best, right - left + 1);   // record BEFORE removing
            sum -= nums[left++];            // shrink from the left
        }
    }
    return best == INT_MAX ? 0 : best;     // no qualifying window
}`),
  p(`The minimum-window-substring family ("smallest window of <code>s</code> containing all of <code>t</code>") is the same shape with richer bookkeeping. Instead of one running sum you keep a <code>need</code> map (how many of each required character) and a <code>have</code> counter of requirements currently satisfied. Expand <code>right</code>, decrementing <code>need</code> for the entering char and bumping <code>have</code> when a requirement is fully met. While <code>have</code> equals the number of distinct required chars, the window is valid — record its length, then shrink <code>left</code>, reversing the bookkeeping and dropping <code>have</code> the moment a requirement slips below zero. Same three blanks, just a count/need map standing in for the simple sum.`),
  sub("Set vs. frequency map inside the window"),
  ul([
    `<b>A set</b> (<code>unordered_set</code>) answers "is this element present?" — perfect when the rule is "no duplicates." Insert on entry, erase on exit.`,
    `<b>A frequency map</b> (<code>unordered_map&lt;char,int&gt;</code>) answers "how many of this element are present?" — needed the moment duplicates are allowed but <em>counted</em>: "at most K distinct characters," "contains all of <code>t</code>," "at most two of any letter." Increment on entry; on exit, decrement and <code>erase</code> the key when its count hits zero so your "distinct count" stays honest.`,
  ]),
  note("📌","Let the count hit zero, then erase",`With a frequency map, the size of the map is your "number of distinct elements in the window." That only stays correct if you erase a key when its count drops to 0 on the way out — otherwise a character that has fully left still inflates the distinct count and your "at most K distinct" check silently breaks. <code>if (--cnt[c] == 0) cnt.erase(c);</code> is the idiom.`),
  sub("When sliding window applies — and when it doesn't"),
  p(`Two conditions must both hold. <b>Contiguity:</b> the answer is a single unbroken run; you are not free to skip elements. <b>Monotone feasibility:</b> growing the window can only push it toward (or away from) valid in a consistent direction — extending a too-small sum can only make it larger, adding a character can only keep or break the no-duplicate property. That monotonicity is what makes "shrink until valid / grow until satisfied" sound. If extending the window could flip the condition unpredictably, the window logic is invalid and you will skip answers.`),
  pit(`"Contiguous" is the keyword`,`Sliding window only works when the answer is a single unbroken run. If the problem lets you pick non-adjacent elements ("any subsequence," "any subset"), this pattern does not apply — you are almost certainly looking at dynamic programming, or a heap if it is a top-K / streaming "k largest" question. Read the prompt for "subarray"/"substring" (contiguous) vs "subsequence" (not).`),
  pit("Update the answer at the right moment",`The single most common bug is recording the answer in the wrong place. For a <em>longest</em> window, update <em>after</em> the shrink loop, when the window is guaranteed valid. For a <em>shortest</em> window, update <em>inside</em> the shrink loop, before you remove the element that would break validity. Putting a "longest" update inside the shrink, or a "shortest" update after it, quietly returns a wrong length on the boundary cases.`),
  pit("Mind the empty window",`When the window can legally be empty (size 0), make sure your length math and your "no answer" sentinel behave. <code>right - left + 1</code> is only meaningful while <code>left &lt;= right</code>; for shortest-window problems initialize <code>best</code> to <code>INT_MAX</code> and translate "still INT_MAX" into "no valid window found" rather than returning a bogus huge length.`),
  idea("How to frame it in the interview",`Say the recognition out loud, then the template: <em>"This asks for the best contiguous run, so it is a sliding window. I will expand <code>right</code> across the array; whenever the window is invalid I shrink <code>left</code>; each index enters and leaves once, so it is O(n)."</em> Then write the skeleton — expand right, while-invalid shrink left, update the answer — and fill the three blanks for this specific rule. Memorize the skeleton, not nine separate solutions; the problems differ only in what goes in <code>add</code>, <code>invalid</code>, and <code>remove</code>.`),
  svg("sliding_grow","A dynamic window in action: expand right while the run stays valid; when a duplicate enters, advance left to drop the offending element, then keep growing. Both pointers only ever move forward."),
  cx(`Time <b>O(n)</b> — each index enters and leaves the window at most once · space <b>O(k)</b> for the window's contents (set or frequency map), O(1) when a running sum is all you keep.`),
  {t:"probs",items:[["Best Time to Buy & Sell Stock","best-time-to-buy-and-sell-stock","easy"],["Longest Substring w/o Repeating","longest-substring-without-repeating-characters","med"],["Minimum Window Substring","minimum-window-substring","hard"]]}
]},
{group:"Week 3 · Patterns + C++",num:"04",id:"stack",color:"#2DD4A7",title:"Stack",badge:"Week 3 · Pattern",blocks:[
  cue(`<b>Spot it when:</b> you're matching pairs (brackets, tags), evaluating an expression, finding the "next greater / smaller element," or undoing in reverse order. The tell is always the same: <em>the thing you care about is the most recent unresolved item behind you</em> &#8212; the last open bracket, the previous taller bar, the operator you haven't applied yet.`),
  p(`A stack is a last-in, first-out (LIFO) container: you push items on top and pop them off the top, and you only ever touch the top. Both operations are O(1). That single constraint &#8212; no reaching into the middle &#8212; is exactly what makes a stack the right tool whenever the relevant item is the <em>closest unresolved thing</em>, not the oldest. You'll reach for it more in interviews than its plainness suggests.`),
  svg("stack","You only ever interact with the top of the stack. That constraint is the feature: it perfectly models dealing with the most recent thing first."),
  sub("How std::stack actually works"),
  p(`In C++, <code>std::stack</code> isn't a container of its own &#8212; it's a thin <em>adapter</em> wrapped around another container, <code>std::deque</code> by default (you can swap in a <code>vector</code> with <code>stack&lt;int, vector&lt;int&gt;&gt;</code>). All it does is expose a deliberately tiny interface that forbids everything except top-of-stack access. The underlying container already gives you amortized O(1) push and pop at one end, so the adapter inherits those costs for free. There's no balancing, no reallocation surprises beyond what a <code>vector</code>/<code>deque</code> already does.`),
  code(`#include <stack>

stack<int> st;            // adapter over deque<int> by default
st.push(5);               // 5 is now on top
st.push(9);               // 9 on top, 5 underneath
int t = st.top();         // read the top -> 9 (does NOT remove it)
st.pop();                 // remove the top -> returns void, NOT the value
bool empty = st.empty();  // always check this before top()/pop()
size_t n = st.size();`),
  pit("top() and pop() are two separate steps",`This trips up people coming from languages where <code>pop()</code> returns the removed element. In C++, <code>std::stack::pop()</code> returns <code>void</code> &#8212; it only removes. To consume the top you must read it first, then pop: <code>int x = st.top(); st.pop();</code>. The split exists for exception-safety reasons, but practically it means: forget the <code>top()</code> and you pop a value into the void; forget the <code>pop()</code> and you loop forever on the same element.`),
  note("🧠","The mental model that unlocks every stack problem",`Don't think "LIFO container." Think: <em>"I'm tracking unresolved things, and the one that resolves next is always the most recent."</em> Open brackets waiting to close. Operators waiting for their operand. Bars waiting for a shorter neighbor. The instant a problem has that "most-recent-first" structure, a stack is almost certainly the answer &#8212; and recognizing that shape is the whole skill.`),
  sub("Matching pairs"),
  p(`The cleanest use is bracket matching. Push every opening bracket. On a closing bracket, the only valid partner is whatever's on top &#8212; the most recently opened, still-unclosed bracket. If the top matches, pop it; if it doesn't (or the stack is empty), the string is invalid. At the end, a truly balanced string leaves the stack empty. The invariant is worth saying out loud in an interview: <em>the top of the stack is always the bracket that must close next.</em>`),
  worked("Valid parentheses","A clean trick: store the pairs in a map so the close-bracket logic is one lookup instead of a chain of <code>||</code>s. On any closing bracket, the top must be its matching opener, or the string is invalid. One pass, O(n).",
`bool isValid(const string& s) {
    unordered_map<char,char> match = {       // close -> its opener
        {')', '('}, {']', '['}, {'}', '{'}
    };
    stack<char> st;
    for (char c : s) {
        if (c == '(' || c == '[' || c == '{') {
            st.push(c);                      // remember this opener
        } else {                             // c is a closer
            if (st.empty() || st.top() != match[c])
                return false;                // nothing open, or wrong opener
            st.pop();                        // matched -> resolve it
        }
    }
    return st.empty();                       // leftover openers -> invalid
}`),
  idea("Why the map cleanup matters",`The three-way <code>||</code> chain in the naive version works, but the map-of-pairs version generalizes instantly: add a new pair type (angle brackets, custom delimiters) by adding one map entry, not another <code>||</code> clause. Interviewers read that as "this person factors the special-casing out of the control flow" &#8212; a small signal of taste that costs you nothing.`),
  sub("The call stack: recursion is a stack"),
  p(`You already use a stack constantly without naming it: the <em>call stack</em>. Every function call pushes a frame (parameters, locals, the return address); every <code>return</code> pops it. Recursion is just this stack growing deeper &#8212; each recursive call pushes another frame, and the base case is where it finally starts popping back. That's why deep recursion blows the stack (stack overflow) and why a recursive algorithm's space cost is O(depth): the frames are physically stacked in memory.`),
  p(`This connection is practical, not trivia. <em>Any</em> recursion can be converted into an explicit loop with your own <code>std::stack</code>, and interviewers sometimes ask for exactly that &#8212; "do this iteratively" usually means "simulate the call stack yourself." You push the work items you'd have recursed into, and pop them in a loop. An iterative DFS is the textbook case: instead of recursing on children, you push them onto a stack and process until it's empty.`),
  worked("Recursion &#8594; explicit stack (iterative DFS)","The recursive version calls itself on each child; the iterative version pushes children onto a stack and loops. Same traversal, but now the 'stack' is a data structure you control &#8212; no risk of a stack-overflow on a pathologically deep graph.",
`// recursive: the call stack does the bookkeeping
void dfs(Node* n) {
    if (!n) return;
    visit(n);
    for (Node* c : n->children) dfs(c);
}

// iterative: you own the stack explicitly
void dfs(Node* root) {
    if (!root) return;
    stack<Node*> st;
    st.push(root);
    while (!st.empty()) {
        Node* n = st.top(); st.pop();        // top() then pop()
        visit(n);
        for (Node* c : n->children) st.push(c);
    }
}`),
  sub("Evaluating expressions"),
  p(`Stacks are how machines evaluate arithmetic. The clean form is <em>postfix</em> (Reverse Polish Notation), where operators come after their operands: <code>3 4 + 5 *</code> means <code>(3 + 4) * 5</code>. The rule is mechanical: scan left to right, push every number, and when you hit an operator pop its two operands, apply it, and push the result. No precedence rules, no parentheses &#8212; the order is already baked into the token sequence. That's why compilers and calculators convert to postfix first.`),
  worked("Evaluate Reverse Polish Notation","Numbers get pushed; an operator pops the top two, applies, and pushes the result back. Mind the operand order for non-commutative ops: the <em>second</em> pop is the left-hand side. One pass, O(n), and the stack ends holding the single final answer.",
`int evalRPN(const vector<string>& tokens) {
    stack<int> st;
    for (const string& t : tokens) {
        if (t == "+" || t == "-" || t == "*" || t == "/") {
            int b = st.top(); st.pop();      // right operand (popped first)
            int a = st.top(); st.pop();      // left operand
            if      (t == "+") st.push(a + b);
            else if (t == "-") st.push(a - b);
            else if (t == "*") st.push(a * b);
            else               st.push(a / b);
        } else {
            st.push(stoi(t));                // a number -> push it
        }
    }
    return st.top();                         // last value standing
}`),
  note("📐","Infix needs two stacks (shunting-yard)",`Normal "infix" math like <code>3 + 4 * 5</code> has precedence and parentheses, so you can't evaluate it in a single naive pass. Dijkstra's <em>shunting-yard</em> algorithm handles it with two stacks &#8212; one for operators, one for output (or values) &#8212; popping higher-precedence operators before pushing a lower one. You rarely have to write it from scratch in an interview, but knowing the name and that "it's two stacks driven by precedence" is the expected level of awareness.`),
  sub("The monotonic stack"),
  p(`This is the technique that turns "stack" from a humble container into a genuine pattern, and it shows up in a surprising number of mediums and hards. A <em>monotonic</em> stack is one you deliberately keep sorted &#8212; entirely increasing or entirely decreasing from bottom to top &#8212; by popping anything that would break the order before you push. You almost always store <em>indices</em>, not values, so you can recover positions and distances later.`),
  ul([
    `<b>Decreasing stack &#8594; next greater element.</b> Values go in decreasing. When a bigger value arrives, it pops everything smaller off the top &#8212; and that arriving value <em>is</em> the "next greater element" for each thing it pops.`,
    `<b>Increasing stack &#8594; next smaller element.</b> The mirror image: values go in increasing, and a smaller arrival pops everything larger, becoming their "next smaller."`,
    `<b>Rule of thumb.</b> Want the next <em>greater</em>? Pop while the top is <em>smaller</em> (keep a decreasing stack). Want the next <em>smaller</em>? Pop while the top is <em>larger</em>. Pick the variant by what you're searching for, then the loop writes itself.`,
  ]),
  svg("stack_mono","A decreasing stack of indices. When a larger value (76) arrives, it pops every smaller value off the top, and each popped index records 76 as its answer. The stack stays monotonic afterward."),
  p(`Here's the part interviewers want you to articulate: <em>why is this O(n) and not O(n&#178;)?</em> It looks like a nested loop &#8212; an outer pass over the array with an inner "pop while smaller." But callback to the Big-O lesson's amortized argument: each index is pushed exactly once and popped <em>at most</em> once over the entire run. The inner pops can't sum to more than <code>n</code> total, no matter how they cluster. So the whole thing is O(n) amortized, the same accounting that makes <code>vector::push_back</code> O(1).`),
  worked("Daily Temperatures (next warmer day)","Classic decreasing monotonic stack of indices. While today is warmer than the day on top, pop it &#8212; today is its answer &#8212; and record the distance. Each index is pushed and popped once, so it's O(n) despite the inner while.",
`vector<int> dailyTemperatures(const vector<int>& temps) {
    int n = temps.size();
    vector<int> answer(n, 0);                // 0 = no warmer day ahead
    stack<int> st;                           // indices, values decreasing
    for (int i = 0; i < n; i++) {
        while (!st.empty() && temps[i] > temps[st.top()]) {
            int prev = st.top(); st.pop();   // today is warmer than prev
            answer[prev] = i - prev;         // days until it got warmer
        }
        st.push(i);                          // i waits for its own warmer day
    }
    return answer;
}`),
  note("📊","The hard application: Largest Rectangle in Histogram",`The same machinery solves the canonical hard problem. Keep an <em>increasing</em> stack of bar indices; when a shorter bar arrives, pop each taller bar and, at the moment you pop it, you finally know both its left and right boundaries &#8212; so you can compute the largest rectangle with that bar as the limiting height. One O(n) pass settles a problem that looks like it needs O(n&#178;). If you can explain why next-greater is O(n), you can explain this; it's the same amortized pop-each-index-once argument wearing a different hat.`),
  sub("Designing a min-stack"),
  p(`A favorite design question: build a stack that also returns its current minimum in O(1). The naive idea &#8212; scan for the min on each query &#8212; is O(n) and disqualifying. The trick is to push the running minimum <em>alongside</em> each value, so every element remembers "the smallest thing in the stack at or below me." Popping discards that bookkeeping automatically, restoring the previous minimum for free.`),
  worked("Min-Stack with O(1) getMin","Store a pair per push: the value and the minimum of the stack including it. The top pair's second field is always the current minimum, so getMin is a single read. Every operation stays O(1).",
`class MinStack {
    stack<pair<int,int>> st;                  // {value, min-so-far}
public:
    void push(int x) {
        int m = st.empty() ? x : min(x, st.top().second);
        st.push({x, m});                      // carry the running min
    }
    void pop()      { st.pop(); }
    int  top()      { return st.top().first;  }
    int  getMin()   { return st.top().second; } // O(1), no scanning
};`),
  sub("When to reach for a stack"),
  ul([
    `<b>Pairing / nesting.</b> Brackets, HTML/XML tags, nested structures &#8212; anything where opens must be closed in reverse order.`,
    `<b>Next greater / smaller / span.</b> Daily temperatures, stock spans, histogram rectangles &#8212; the monotonic-stack family.`,
    `<b>Expression evaluation.</b> Postfix evaluation, and infix via shunting-yard.`,
    `<b>Undo / backtracking in reverse.</b> Editor undo, simplifying a Unix path (<code>..</code> pops the last directory), function-call simulation.`,
    `<b>Converting recursion to iteration.</b> When you'd otherwise blow the call stack, push the work items yourself.`,
  ]),
  pit("Empty pop is undefined behavior",`Calling <code>.top()</code> or <code>.pop()</code> on an empty stack is undefined behavior &#8212; a crash or silent garbage, not a caught error. Guard with <code>!st.empty()</code> <em>every</em> time. In bracket and monotonic problems this guard is also a genuine logical case: a closer with nothing open means invalid input; an empty monotonic stack means "no greater element exists yet."`),
  idea("The interview framing",`When you spot the structure, say it: "The relevant item here is always the most recent unresolved one, so I'll use a stack." For the monotonic version, name the invariant and the cost up front: "I'll keep a decreasing stack of indices; each index is pushed and popped once, so it's O(n) amortized." Stating the invariant and the amortized bound before you write a line is exactly the senior-sounding move interviewers are listening for.`),
  cx(`Push / pop / top all <b>O(1)</b> &#183; a full stack pass (bracket, monotonic, RPN) is <b>O(n)</b> time, <b>O(n)</b> space`),
  {t:"probs",items:[["Valid Parentheses","valid-parentheses","easy"],["Daily Temperatures","daily-temperatures","med"],["Largest Rectangle in Histogram","largest-rectangle-in-histogram","hard"]]}
]},
{group:"Week 3 · Patterns + C++",num:"05",id:"binsearch",color:"#14B8A6",title:"Binary Search",badge:"Week 3 · Pattern",blocks:[
  cue(`<b>Spot it when:</b> the input is <em>sorted</em> (find a value, an insertion point, the first/last occurrence) &#8212; or, the bigger superpower, when you can rephrase the question as <em>"the smallest x where some yes/no test flips to true."</em> If a candidate answer X works and every larger X works too (or vice versa), you can binary-search the answer itself.`),
  p(`Binary search finds a target in a sorted array by repeatedly halving the search space. You look at the middle element: if it's the target, you're done; if the target is smaller, the answer must be in the left half, so you discard the right; if larger, you discard the left. Each comparison throws away half of what remains, so you reach the answer in <code>O(log n)</code> steps. That logarithm is the whole appeal: for a million elements it's about 20 comparisons, for a billion about 30. Doubling the input adds <em>one</em> step.`),
  svg("binsearch","Each round throws away half the remaining range. Logarithmic growth means even enormous arrays resolve in a couple dozen steps."),
  p(`Recall the recursion-tree argument from the Big-O lesson: anything that divides the problem in half each step has depth <code>log&#8322;(n)</code>, and here each level does <code>O(1)</code> work (one comparison), so the total is <code>O(log n)</code>. That's the same shape as the height of a balanced binary tree &#8212; halving and tree-depth are two views of the same idea. The catch that makes it all work: the data must be ordered so that <em>one look at the middle tells you which half to keep.</em> No order, no halving.`),
  note("🧭","Sorted, or monotonic &#8212; that's the precondition",`Binary search doesn't strictly need a sorted <em>array</em>. It needs a <b>monotonic</b> property: as you move along the search space in one direction, some condition only ever turns on (never flips back off). A sorted array is the most common case (values only increase). But "minimum speed that finishes in time" is monotonic too, and that's what unlocks the advanced half of this lesson.`),
  sub("The template, and the part everyone gets wrong"),
  p(`The loop body is four lines. Every bug lives in the <em>boundaries</em>: whether to write <code>left &lt;= right</code> or <code>left &lt; right</code>, and whether you move to <code>mid + 1</code> / <code>mid - 1</code> or leave a pointer on <code>mid</code>. Get one of those wrong and you either skip the answer or spin forever. The reliable cure is to <b>fix one template and trust it</b> rather than re-deriving the boundaries under pressure. Use the inclusive-range version below, and learn it cold.`),
  p(`The contract for the inclusive template, stated precisely so the boundaries stop being guesswork: <code>left</code> and <code>right</code> are both <em>candidate</em> indices &#8212; the answer, if it exists, is somewhere in <code>[left, right]</code>. The loop runs <em>while that range is non-empty</em>, which is exactly <code>left &lt;= right</code> (when <code>left == right</code> there's still one candidate to check). Each iteration <em>checks</em> <code>mid</code> and then <em>excludes</em> it by moving past it &#8212; <code>left = mid + 1</code> or <code>right = mid - 1</code>. Because every iteration removes at least one index, the range always shrinks, so the loop must terminate.`),
  worked("Classic binary search (the canonical template)","Read it as the contract above: inclusive [left, right], loop while non-empty, always move PAST the checked mid. Note left + (right - left) / 2 for the midpoint &#8212; it computes the same value as (left + right) / 2 but can't overflow when the indices are large. Small detail, the kind interviewers notice.",
`int search(const vector<int>& nums, int target) {
    int left = 0, right = (int)nums.size() - 1;  // inclusive range [left, right]
    while (left <= right) {                       // non-empty range
        int mid = left + (right - left) / 2;      // overflow-safe midpoint
        if (nums[mid] == target) return mid;      // hit
        if (nums[mid] < target)  left  = mid + 1; // target is to the right; drop mid + left half
        else                     right = mid - 1; // target is to the left;  drop mid + right half
    }
    return -1;                                    // range emptied -> not present
}`),
  pit("The infinite loop: mid must always move",`The deadliest boundary bug is a <code>mid</code> that doesn't make progress. If you ever write <code>left = mid</code> (instead of <code>mid + 1</code>) while <code>mid</code> can equal <code>left</code>, the range stops shrinking and you loop forever. In the inclusive template this can't happen, because both branches step strictly past <code>mid</code>. Whenever you deviate from the template &#8212; especially in the "search the answer" variants below where you sometimes <em>keep</em> <code>mid</code> &#8212; convince yourself the range gets strictly smaller every iteration.`),
  idea("Never guess the boundaries again","Pick ONE invariant and let it dictate every line. \"<code>[left, right]</code> is inclusive\" forces <code>left &lt;= right</code>, forces <code>mid&#177;1</code>, and forces returning <code>-1</code> when the range empties. If instead you adopt the half-open <code>[left, right)</code> invariant (used by the library and by leftmost/rightmost search below), it forces <code>left &lt; right</code> and <code>right = mid</code>. Mixing the two is what produces off-by-one bugs. Commit to one per problem and the four lines write themselves."),
  sub("The library already wrote it: lower_bound / upper_bound / equal_range"),
  p(`In real code you rarely hand-roll the loop &#8212; you reach for <code>&lt;algorithm&gt;</code>. These run on any sorted range and return <em>iterators</em>, and the difference between them is one word, <code>&gt;=</code> vs <code>&gt;</code>:`),
  ul([
    `<b><code>lower_bound(first, last, x)</code></b> &#8594; iterator to the first element that is <code>&gt;= x</code>. This is the <em>insertion point</em>: where <code>x</code> would go to keep the range sorted, and the start of any run of <code>x</code>s.`,
    `<b><code>upper_bound(first, last, x)</code></b> &#8594; iterator to the first element that is <em>strictly</em> <code>&gt; x</code>. This is one past the last <code>x</code>, i.e. the end of the run of <code>x</code>s.`,
    `<b><code>equal_range(first, last, x)</code></b> &#8594; the pair <code>{lower_bound, upper_bound}</code> in one call. The half-open range <code>[first, second)</code> is exactly the block of elements equal to <code>x</code>.`,
    `<b><code>binary_search(first, last, x)</code></b> &#8594; a plain <code>bool</code>: is <code>x</code> present at all. (Internally just checks <code>lower_bound</code>.)`,
  ]),
  worked("Using the library: presence, insertion point, and count","Subtract iterators to turn positions into indices and counts. upper_bound minus lower_bound is the multiplicity of x in O(log n) &#8212; no scanning. This is the idiomatic answer when an interviewer says \"the array is sorted.\"",
`vector<int> v = {1, 2, 2, 2, 4, 7, 9};

bool present = binary_search(v.begin(), v.end(), 2);     // true

auto lo = lower_bound(v.begin(), v.end(), 2);  // -> first 2  (index 1)
auto hi = upper_bound(v.begin(), v.end(), 2);  // -> the 4    (index 4)

int insert_at = lo - v.begin();                // 1  (where a new 2 would go)
int count_of_2 = hi - lo;                       // 3  (there are three 2s)

auto [a, b] = equal_range(v.begin(), v.end(), 2);  // same lo..hi in one call
// elements equal to 2 are exactly [a, b)`),
  note("📌","On comparators","All four take an optional comparator and assume the range is sorted <em>by that same comparator</em>. For descending data or custom keys, pass the matching predicate (e.g. <code>greater&lt;&gt;{}</code>) &#8212; otherwise the monotonicity assumption is violated and the result is meaningless. The functions don't check; they trust you."),
  sub("Find first / last occurrence: the bias trick"),
  p(`When duplicates exist, "find target" is ambiguous &#8212; the plain template returns <em>some</em> match, not necessarily the leftmost or rightmost. The fix is to <b>not stop on a hit.</b> Instead, record the candidate and keep searching the side you care about. To find the <em>first</em> (leftmost) occurrence: on a match, remember it and push <code>right</code> left to hunt for an even-earlier one. For the <em>last</em> (rightmost), do the mirror &#8212; remember it and push <code>left</code> right.`),
  worked("Leftmost and rightmost occurrence","The bias is the whole trick: on equality you don't return, you record and keep going toward the side you want. This is exactly what lower_bound / upper_bound do under the hood &#8212; reproducing it by hand is a classic interview ask (\"find the range of a target\").",
`// First index where nums[i] == target, or -1.
int firstOccurrence(const vector<int>& nums, int target) {
    int left = 0, right = (int)nums.size() - 1, ans = -1;
    while (left <= right) {
        int mid = left + (right - left) / 2;
        if (nums[mid] == target) { ans = mid; right = mid - 1; }  // record, bias LEFT
        else if (nums[mid] < target) left = mid + 1;
        else                         right = mid - 1;
    }
    return ans;
}

// Last index where nums[i] == target, or -1.
int lastOccurrence(const vector<int>& nums, int target) {
    int left = 0, right = (int)nums.size() - 1, ans = -1;
    while (left <= right) {
        int mid = left + (right - left) / 2;
        if (nums[mid] == target) { ans = mid; left = mid + 1; }   // record, bias RIGHT
        else if (nums[mid] < target) left = mid + 1;
        else                         right = mid - 1;
    }
    return ans;
}`),
  p(`That pair is the entire solution to LeetCode's "Find First and Last Position of Element in Sorted Array" &#8212; two biased searches, <code>O(log n)</code> each. Notice how recording-then-continuing keeps the loop honest: <code>mid</code> still moves every iteration, so there's no infinite-loop risk even though you didn't return on the hit.`),
  sub("Binary search the answer &#8212; the real level-up"),
  p(`This is the technique that separates people who "know binary search" from people who <em>recognize</em> it in disguise. The thing you search doesn't have to be an array &#8212; it can be the <b>answer space</b> itself. The setup: you can't easily compute the optimal answer directly, but given a <em>candidate</em> answer <code>x</code>, you <em>can</em> cheaply check "does <code>x</code> work?" with a function <code>feasible(x)</code>. If that check is <b>monotonic</b> &#8212; false, false, &#8230;, false, then true, true, &#8230;, true, flipping exactly once &#8212; then the boundary where it flips is your answer, and you can binary-search for it.`),
  svg("binsearch_predicate","The answer space sorted by feasibility: every value below the boundary fails, every value at or above it works. Because feasible(x) flips exactly once, you can halve toward that flip instead of trying every candidate."),
  p(`The mental checklist, which doubles as your <b>interview opener</b>: (1) Can I phrase the answer as <em>"the smallest x where <code>feasible(x)</code> is true"</em> (or the largest where it's true)? (2) Is <code>feasible</code> monotonic &#8212; if <code>x</code> works, does every larger <code>x</code> also work? (3) Can I evaluate <code>feasible(x)</code> in, say, <code>O(n)</code>? If all three are yes, the whole problem collapses to <code>O(n log(range))</code>: a binary search over the value range, with one feasibility scan per step.`),
