pit("Off-by-one / out-of-bounds on grid neighbors",`The four-direction loop is where boundary bugs live. Check <code>nr/nc</code> against <code>[0, rows)</code> and <code>[0, cols)</code> <em>before</em> indexing the grid &#8212; an unchecked <code>grid[nr][nc]</code> at the edge is undefined behavior, not a clean error. Order matters: bounds-check first, <em>then</em> look at the cell's contents.`),
pit("Deep DFS recursion blows the call stack",`Callback to the Stack lesson: recursion <em>is</em> the call stack, and a DFS on a graph with hundreds of thousands of nodes (a long grid corridor, a degenerate chain) can overflow it and crash. On large inputs, convert the recursive DFS to an iterative one with an explicit <code>std::stack</code> &#8212; same traversal, but the stack lives on the heap where it can grow. Or use BFS, whose queue has the same protection.`),
idea("The interview framing",`Narrate the recipe out loud: <em>"This is a graph &#8212; nodes are the cells, edges are the four neighbors. I want the fewest steps, so I'll BFS from the source, marking visited at enqueue, and the first time I reach the goal that distance is the answer; it's O(V + E)."</em> Stating the representation, the traversal choice with its reason, the visited discipline, and the complexity &#8212; in one breath, before writing code &#8212; is exactly what reads as fluency to an interviewer.`),
cx(`Both BFS and DFS visit every node once and every edge a constant number of times, so a traversal is <b>O(V + E)</b> time. Space is <b>O(V)</b> for the visited set plus the queue or recursion stack. An adjacency list is <b>O(V + E)</b> space; a matrix is <b>O(V&#178;)</b>.`),
{t:"probs",items:[["Number of Islands","number-of-islands","med"],["Course Schedule","course-schedule","med"],["Word Ladder","word-ladder","hard"]]}
]},
{group:"Data Structures & Algorithms",num:"12",id:"dp",color:"#84CC16",title:"Dynamic Programming",badge:"Pattern",blocks:[
  cue(`<b>Spot it when:</b> the question asks for a <em>min / max / longest / count of ways</em>, you make a <em>choice at each step</em> (take it or skip it, this coin or that one), and a brute-force solution would keep recomputing the same smaller problem. That last tell is the real one: if your recursion solves <code>f(3)</code> over and over, you're looking at dynamic programming.`),
  p(`Dynamic programming sounds intimidating and isn't. Strip the name away and it's one idea: <em>solve each smaller subproblem exactly once, remember the answer, and build the big answer out of the small ones.</em> No clever data structure, no trick &#8212; just recursion with a memory. The reason it has a reputation is that the hard part isn't the code (the loop is usually four lines); it's <em>defining the subproblem</em>. Get the definition right and the rest is mechanical. This is the topic most worth slowing down on, because the payoff is recognizing a whole family of problems as the same problem.`),
  sub("The two preconditions: when DP even applies"),
  p(`DP works on a problem only when two things are true. First, <b>overlapping subproblems</b>: the same smaller problem comes up again and again as you break the big one down. (If every subproblem were distinct, caching would buy you nothing &#8212; that's plain divide-and-conquer, like merge sort.) Second, <b>optimal substructure</b>: the best answer to the whole is built out of the best answers to its parts. The cheapest way to make 11 cents is one coin plus the cheapest way to make the remaining amount &#8212; the optimal big answer reuses optimal small answers. When both hold, you can compute each subproblem once and combine.`),
  ul([
    `<b>Overlapping subproblems</b> &#8594; caching pays off. The naive recursion revisits the same inputs; storing them collapses exponential work to polynomial.`,
    `<b>Optimal substructure</b> &#8594; the recurrence is valid. You can express the answer for size <code>n</code> in terms of answers for smaller sizes, and combining optimal parts gives an optimal whole.`,
    `<b>Missing either?</b> It's not DP. No overlap means divide-and-conquer; no optimal substructure (the parts interfere) means you may need a different technique entirely.`,
  ]),
  sub("The recipe: four questions, in order"),
  p(`Every DP problem yields to the same four-step ritual. Interviewers want to <em>hear</em> you walk through it &#8212; narrating these steps out loud is half the signal. The order matters: each answer constrains the next.`),
  ul([
    `<b>1. Define the subproblem in one sentence.</b> "<code>dp[i]</code> = the best answer using the first <code>i</code> items," or "<code>dp[i]</code> = the best answer <em>ending at</em> index <code>i</code>." If you can't say it in one clean sentence, stop &#8212; a fuzzy definition is the #1 cause of a wrong solution.`,
    `<b>2. Find the recurrence.</b> How is <code>dp[i]</code> built from earlier <code>dp</code> values? Almost always it's a <em>choice</em>: take this item or skip it, use this coin or don't &#8212; take the min/max/sum over the options.`,
    `<b>3. Set the base cases.</b> The smallest inputs you can answer with no recursion: <code>dp[0]</code>, an empty string, amount zero. Get these wrong and the whole table is poisoned.`,
    `<b>4. Decide the iteration order.</b> Fill the table so that every value a cell needs is already computed when you reach it. For 1D that's usually just left-to-right; for 2D it's row-by-row.`,
  ]),
  note(`&#128205;`,"Subproblem definition is the whole game",`If you take one thing from this lesson: <b>nail the subproblem sentence before writing any code.</b> "<code>dp[amount]</code> = the minimum number of coins that sum to exactly <code>amount</code>" is a good definition &#8212; precise, one number per state, obviously composable. "<code>dp[i]</code> = something about the array up to <code>i</code>" is a bad one, because "something" hides the bug. Nearly every failed DP attempt traces back to a definition that was ambiguous or didn't actually compose. Spend your time here.`),
  sub("Memoization vs tabulation: same idea, two directions"),
  p(`Once you have a recurrence, there are two ways to realize it, and they compute identical values &#8212; just in opposite order. <b>Memoization</b> (top-down) is the natural one: write the plain recursion exactly as the recurrence reads, then add a cache so each input is computed once. <b>Tabulation</b> (bottom-up) flips it: start from the base cases and fill a table iteratively until you reach the answer. Top-down is easier to <em>derive</em> (it's just your recursion plus a map); bottom-up is usually faster and avoids deep call stacks, and it's what unlocks the space optimizations below.`),
  ul([
    `<b>Memoization (top-down).</b> Recurse as the recurrence dictates; before doing work, check a cache; after computing, store the result. You only ever fill the subproblems you actually reach.`,
    `<b>Tabulation (bottom-up).</b> Allocate the table, seed the base cases, loop in dependency order filling each cell from earlier ones. You fill every cell, but with no recursion overhead.`,
    `<b>Which to use?</b> Reach for memoization first in an interview &#8212; it's the most direct translation of your recurrence and the hardest to get wrong. Convert to tabulation if you need the speed or the space trick.`,
  ]),
  sub("Always start from the brute force"),
  p(`Here's the workflow that never fails you under pressure: <b>write the plain recursive brute force first, confirm it's correct, then add a cache.</b> Don't try to invent the table directly &#8212; that's where people freeze. The brute force <em>is</em> the recurrence written as code; once it's right, memoizing is a two-line edit. And the contrast between the two makes the payoff vivid. Take Fibonacci, the canonical example. The naive recursion recomputes the same values an exponential number of times:`),
  code(`// Naive: correct, but recomputes everything. O(2^n) time.
long long fib(int n) {
    if (n <= 1) return n;                 // base cases
    return fib(n - 1) + fib(n - 2);       // the recurrence
}`),
  p(`Recall the recursion-tree picture from the Big-O lesson: this tree branches two ways at every level and is <code>n</code> deep, so it has on the order of <code>2&#8319;</code> nodes &#8212; and most of them recompute a value that was already computed elsewhere in the tree. <code>fib(50)</code> launches over a billion calls. The diagram below shows the overlap: <code>fib(3)</code> shows up twice, <code>fib(2)</code> three times, all redone from scratch.`),
  svg("dp_memo","The recursion tree for fib(5). The same subproblems recur all over the tree &#8212; fib(3) twice, fib(2) three times &#8212; and naive recursion redoes each one. A memo computes each value exactly once, collapsing O(2^n) to O(n)."),
  worked("Climbing Stairs / Fibonacci: brute force &#8594; memo &#8594; O(1) space","The same recurrence, three ways. Climbing Stairs is literally Fibonacci: the ways to reach step n = ways to reach n-1 (take 1 step) + ways to reach n-2 (take 2). First memoize the brute force; then notice you only ever read the last two values, so you can throw the whole array away.",
`// (1) Top-down memo: the brute force plus a cache. O(n) time, O(n) space.
long long climbMemo(int n, vector<long long>& memo) {
    if (n <= 2) return n;                  // 1 way to step 1, 2 ways to step 2
    if (memo[n] != -1) return memo[n];     // already solved -> reuse
    memo[n] = climbMemo(n - 1, memo) + climbMemo(n - 2, memo);
    return memo[n];
}

// (2) Bottom-up table: same values, filled iteratively. O(n) time, O(n) space.
int climbTable(int n) {
    if (n <= 2) return n;
    vector<int> dp(n + 1);
    dp[1] = 1; dp[2] = 2;                  // base cases
    for (int i = 3; i <= n; i++)
        dp[i] = dp[i - 1] + dp[i - 2];     // each step from the two before it
    return dp[n];
}

// (3) Rolling variables: only the last two values are ever needed. O(1) space.
int climbOptimal(int n) {
    if (n <= 2) return n;
    int prev2 = 1, prev1 = 2;              // dp[i-2], dp[i-1]
    for (int i = 3; i <= n; i++) {
        int cur = prev1 + prev2;
        prev2 = prev1;                     // slide the window forward
        prev1 = cur;
    }
    return prev1;
}`),
  idea("The memoization edit is mechanical","Notice what turned the O(2^n) brute force into O(n): one cache lookup at the top, one store at the bottom. That's the entire transformation. In an interview, write the naive recursion, say \"this recomputes subproblems, so I'll memoize,\" then add those two lines. You don't have to be clever &#8212; you have to be systematic."),
  sub("1D DP: a table indexed by one number"),
  p(`The Fibonacci family is <em>1D</em> DP: the state is a single index, so the answer lives in a one-dimensional array <code>dp[i]</code>. Most "min/max/count along a sequence" problems are 1D &#8212; house robber, climbing stairs, longest increasing subsequence, and the coin-change problem below. The pattern is always: one number identifies a subproblem, and <code>dp[i]</code> combines a few earlier entries. The canonical 1D <em>optimization</em> problem &#8212; the one that shows up constantly &#8212; is coin change.`),
  worked("Coin Change: fewest coins to make an amount","Subproblem: dp[a] = the minimum number of coins that sum to exactly a. Recurrence: for each coin c, making a costs 1 + dp[a - c] (use one c, then optimally make the rest). Take the min over all coins. Base case dp[0] = 0. This is 'unbounded' &#8212; coins can repeat &#8212; which is why the inner loop tries every coin at every amount.",
`int coinChange(const vector<int>& coins, int amount) {
    const int INF = amount + 1;                  // sentinel: 'impossible', bigger than any real answer
    vector<int> dp(amount + 1, INF);             // dp[a] = fewest coins for amount a
    dp[0] = 0;                                   // base case: zero coins make zero
    for (int a = 1; a <= amount; a++) {          // fill amounts in increasing order
        for (int c : coins) {                    // try every coin as the last one used
            if (c <= a && dp[a - c] + 1 < dp[a]) // can we afford c, and does it help?
                dp[a] = dp[a - c] + 1;           // one c plus the best way to make a - c
        }
    }
    return dp[amount] > amount ? -1 : dp[amount]; // still INF -> no combination works
}`),
  p(`Why does iterating <code>a</code> from small to large work? Because <code>dp[a]</code> only ever reads <code>dp[a - c]</code> for positive <code>c</code> &#8212; strictly smaller amounts &#8212; and those are already final by the time we reach <code>a</code>. That's step 4 of the recipe in action: the iteration order guarantees every dependency is ready. Flip the loops or count down and you'd be reading values that aren't filled yet.`),
  note(`&#128202;`,"Number-of-ways is the same skeleton",`Swap <code>min</code> for <code>+</code> and you get the counting variant. "<em>How many ways</em> to make this amount" uses <code>dp[a] += dp[a - c]</code> with <code>dp[0] = 1</code>; "<em>how many ways</em> to climb" uses <code>dp[i] = dp[i-1] + dp[i-2]</code>. The recurrence skeleton &#8212; "combine the subproblems reachable in one choice" &#8212; is shared; only the combine operator changes (min/max for optimization, sum for counting). Spotting that they're the same problem is the level-up.`),
  sub("2D DP: a grid over two inputs"),
  p(`When the state needs <em>two</em> indices &#8212; a position in string A and a position in string B, a row and a column &#8212; the table becomes a 2D grid <code>dp[i][j]</code>. This is the family for problems comparing two sequences (edit distance, longest common subsequence) or moving through a grid (unique paths, minimum path sum). The mechanics don't change; there's just one more loop, and the iteration order has to respect dependencies in two directions. The flagship is <b>edit distance</b>: the minimum number of single-character insertions, deletions, or replacements to turn one string into another.`),
  p(`The subproblem: <code>dp[i][j]</code> = the edit distance between the first <code>i</code> characters of word A and the first <code>j</code> characters of word B. The recurrence reads off the three operations directly. If the current characters match, you pay nothing and inherit the diagonal, <code>dp[i-1][j-1]</code>. If they differ, you take <code>1 +</code> the cheapest of three neighbors: <em>delete</em> a char from A (<code>dp[i-1][j]</code>, the cell above), <em>insert</em> a char into A (<code>dp[i][j-1]</code>, the cell to the left), or <em>replace</em> (<code>dp[i-1][j-1]</code>, the diagonal). Each cell depends only on its top, left, and diagonal &#8212; so filling row by row, left to right, always has them ready.`),
  svg("dp_grid","The edit-distance table for HORSE &#8594; ROS. Each cell dp[i][j] is built from three already-filled neighbors: top (delete), left (insert), and diagonal (replace, or free if the characters match). Filling row by row keeps every dependency ready; the bottom-right cell is the answer."),
  worked("Edit Distance: the canonical 2D grid","Base cases form the first row and column: turning a string of length k into the empty string takes k deletions, so dp[i][0] = i and dp[0][j] = j. Then each interior cell is one min over the three operations. The bottom-right corner holds the answer. O(n*m) time and space.",
`int minDistance(const string& a, const string& b) {
    int n = a.size(), m = b.size();
    vector<vector<int>> dp(n + 1, vector<int>(m + 1));   // (n+1) x (m+1) grid
    for (int i = 0; i <= n; i++) dp[i][0] = i;           // a[0..i) -> "" : i deletions
    for (int j = 0; j <= m; j++) dp[0][j] = j;           // "" -> b[0..j) : j insertions
    for (int i = 1; i <= n; i++) {
        for (int j = 1; j <= m; j++) {
            if (a[i - 1] == b[j - 1]) {
                dp[i][j] = dp[i - 1][j - 1];              // chars match -> free, take diagonal
            } else {
                dp[i][j] = 1 + min({ dp[i - 1][j],       // delete from a (cell above)
                                     dp[i][j - 1],       // insert into a (cell to the left)
                                     dp[i - 1][j - 1] }); // replace      (the diagonal)
            }
        }
    }
    return dp[n][m];                                      // edits over the full strings
}`),
  pit("Watch the index offset between the table and the strings",`The table is sized <code>(n+1) &#215; (m+1)</code> so row/column 0 can represent the empty prefix &#8212; which means <code>dp[i][j]</code> compares <code>a[i-1]</code> and <code>b[j-1]</code>, <em>not</em> <code>a[i]</code> and <code>b[j]</code>. That off-by-one between "the first <code>i</code> characters" and "index <code>i</code>" is the single most common 2D-DP bug. Decide up front that table index <code>i</code> means "<code>i</code> characters consumed," and the string index is always <code>i - 1</code>.`),
  sub("Space optimization: you rarely need the whole table"),
  p(`Look back at the three Fibonacci versions: the O(1)-space one works because <code>dp[i]</code> only reads <code>dp[i-1]</code> and <code>dp[i-2]</code> &#8212; the last two values. Once a value is two steps behind, it's never read again, so storing the full array is wasted memory. The general principle: <b>if <code>dp[i]</code> only depends on a fixed window of recent entries, keep just that window in a few rolling variables.</b> This drops 1D problems from O(n) space to O(1).`),
  p(`The same trick works in 2D. Edit distance's <code>dp[i][j]</code> reads only from row <code>i</code> and row <code>i-1</code> &#8212; never row <code>i-2</code> or earlier. So you can keep <em>two rows</em> (or even one, with care) instead of the whole grid, cutting space from O(n&#183;m) to O(m). The time stays the same; you're just not hoarding rows you'll never look at again. Mentioning this optimization after you've got a working table is a clean way to show depth &#8212; "this is O(n&#183;m) space, but since each row only needs the previous one, I can reduce it to O(m)."`),
  idea("Optimize space only after correctness","Write the full-table version first and get it right; the rolling-array version is an optimization, not a starting point. Squeezing to O(1) space up front is exactly how off-by-one bugs sneak in (you overwrite a value you still needed). Correct-then-optimize is the order that keeps you out of trouble &#8212; and interviewers would rather see a correct O(n) table than a buggy O(1) attempt."),
  sub("How to recognize DP in the room"),
  p(`You won't be told "this is a DP problem." The signals, in rough order of reliability: the prompt asks for a <em>minimum, maximum, longest, shortest, or count of ways</em>; there's a <em>sequence of choices</em> where each choice constrains the next; and your first instinct &#8212; a brute-force recursion trying all options &#8212; would <em>recompute the same subproblem</em> many times. When you notice that last one, say it: "the brute force recomputes overlapping subproblems, so I'll memoize." That single sentence frames the whole solution and tells the interviewer you've recognized the pattern.`),
  ul([
    `<b>"Min / max / longest / count of ways."</b> Optimization or counting over a structure is the loudest DP tell.`,
    `<b>A choice at each step.</b> Take it or skip it; this coin or that; cut here or there. The choices compound, and you want the best combination.`,
    `<b>A brute force that recomputes.</b> If your recursion solves the same smaller instance repeatedly, caching it is DP. This is the precondition (overlapping subproblems) showing up in practice.`,
  ]),
  sub("The pitfalls that sink DP solutions"),
  pit("A wrong or ambiguous subproblem definition",`This is the #1 failure, full stop. If <code>dp[i]</code> means something fuzzy &#8212; or means two different things in different lines of your code &#8212; nothing downstream can be correct, and you'll waste the whole interview debugging a recurrence that was never sound. Force yourself to write the one-sentence definition first and check that the recurrence and base cases both speak to <em>that exact</em> definition. "Best answer ending at <code>i</code>" and "best answer using the first <code>i</code>" are different subproblems with different recurrences &#8212; pick one and stay consistent.`),
  pit("Missing or wrong base cases",`The recurrence only covers the inductive step; the base cases are the floor it stands on. Forget <code>dp[0] = 0</code> in coin change, or seed it with the wrong value, and every cell built on it inherits the error silently. Before trusting a table, hand-check the smallest inputs: does <code>dp[0]</code> / the empty-string row / amount-zero actually hold the right answer? Base-case bugs don't crash &#8212; they just quietly return a number that's off.`),
  pit("Iterating in an order where a dependency isn't ready yet",`<code>dp[i]</code> must be computed <em>after</em> everything it reads. If you fill the table in the wrong direction &#8212; counting down when the recurrence reads smaller indices, or looping the two strings in the wrong nesting &#8212; you'll read cells that are still at their initial value and get a wrong (not crashing) answer. After you write the recurrence, trace which earlier cells it touches and make the loop order put those first.`),
  pit("Off-by-one on the table size",`Sizing the table is where indices bite. A 1D table over amounts <code>0..amount</code> needs <code>amount + 1</code> slots; a 2D string table needs <code>(n+1) &#215; (m+1)</code> so the empty prefix gets row/column 0. Allocate one too few and you index out of bounds (or, worse, silently truncate the answer). When the table has a "size 0" base case &#8212; empty string, zero amount &#8212; remember the <code>+1</code>.`),
  idea("The interview narration that lands","Walk the four steps out loud: \"Subproblem: dp[i] is X. Recurrence: dp[i] is the min over these choices. Base case: dp[0] is Y. I'll fill it in this order so dependencies are ready.\" Then: \"I'll start with the recursive brute force, confirm it, and memoize the overlapping subproblems.\" Saying this before you code is the difference between looking like you memorized a solution and looking like you can derive one. The recipe is the skill; the table is just bookkeeping."),
  cx(`Typically <b>O(n)</b> states for 1D or <b>O(n&#183;m)</b> for 2D, each filled in O(1) (or O(choices)) &#8212; so <b>O(n)</b> / <b>O(n&#183;m)</b> time. Space matches the table, but often drops to <b>O(1)</b> or <b>O(m)</b> with a rolling window.`),
  {t:"probs",items:[["Climbing Stairs","climbing-stairs","easy"],["Coin Change","coin-change","med"],["Edit Distance","edit-distance","hard"]]}
]},
{group:"Data Structures & Algorithms",num:"13",id:"intervals",color:"#F59E0B",title:"Intervals",badge:"Pattern",blocks:[
cue(`<b>Spot it when:</b> the input is a list of <code>[start, end]</code> ranges and the question is about <em>overlap</em> — merge the ones that touch, insert a new range, count how many you must drop, or find how many fit at once (meeting rooms). Any prompt with "intervals," "ranges," "meetings," "appointments," or "[start, end]" pairs is pointing here.`),
p(`An interval is just a pair: a <code>start</code> and an <code>end</code> bounding a range on a number line — a meeting from 9 to 10, a segment from index 3 to 7. On their own they're trivial. What makes the family its own pattern is that the interesting questions are all about how intervals <em>relate</em>: do two of them collide, can you fuse a cluster into one, how few can you keep so none collide. The brute force is to compare every pair — O(n&#178;) — but almost every interval problem collapses to O(n log n) the moment you do the one move that defines the pattern.`),
idea("The one move: sort first","Raw intervals arrive in arbitrary order, and arbitrary order hides the structure. <em>Sort them</em> — almost always by <code>start</code>, occasionally by <code>end</code> — and suddenly a single left-to-right sweep can answer the whole question, because once they're ordered you only ever have to compare each interval against the one you're currently holding, never against all the rest. The sort is the algorithm; the sweep after it is bookkeeping."),
p(`Before any of that, you need the primitive everything is built on: <em>do two intervals overlap?</em> Get this test exactly right and the rest of the pattern is mechanical.`),
sub("The overlap test (memorize this)"),
p(`Two intervals <code>[a, b]</code> and <code>[c, d]</code> overlap <em>if and only if</em> <code>a &lt;= d &amp;&amp; c &lt;= b</code>. That looks fiddly, so reason about its opposite instead, which is far easier to see: two ranges <em>fail</em> to overlap only when one sits entirely to the left of the other — either <code>b &lt; c</code> (the first ends before the second starts) or <code>d &lt; a</code> (the second ends before the first starts). Negate that "one of these two disjoint cases" and you get exactly <code>a &lt;= d &amp;&amp; c &lt;= b</code>. So the overlap condition is really "neither one finishes before the other begins."`),
svg("intervals_overlap","Two intervals overlap exactly when neither finishes before the other starts: a &#8804; d and c &#8804; b. In the disjoint case the second range begins after the first ends, so c &gt; b and the test is false."),
note("📌","Once sorted by start, the test simplifies",`After you sort by <code>start</code>, you compare each interval only against the one before it, and you already know the earlier one started first — so <code>a &lt;= c</code> is guaranteed and half the test is free. Overlap then reduces to the single check <code>c &lt;= b</code>: <em>does this interval start at or before the previous one ended?</em> That one comparison is the engine of the whole sweep — it's what you'll write in merge, in insert, and in scheduling.`),
pit("Do touching endpoints count as overlapping?",`Does <code>[1, 2]</code> overlap <code>[2, 3]</code>? With the <code>&lt;=</code> test above, yes — they share the point 2. But many scheduling problems treat <code>end</code> as exclusive (a meeting "ending at 2" frees the room at 2, so a meeting "starting at 2" is fine). That flips the comparison to strict <code>&lt;</code>. There is no universal answer — it depends on the convention. <b>Ask the interviewer:</b> "are these closed intervals, and do shared endpoints count as a conflict?" Picking the wrong one silently merges (or splits) one interval at the boundary.`),
sub("Worked example 1: merge intervals"),
p(`The canonical problem: given a pile of intervals, fuse every group that overlaps into one. Sort by <code>start</code>, then sweep. Hold a "current" merged interval; for each next interval, ask the one simplified question — <em>does it start at or before the current one's end?</em> If yes, they overlap, so extend the current interval's end to the larger of the two ends (the next interval might end sooner <em>or</em> later — don't blindly overwrite). If no, the current interval is finished: push it to the output and make the next interval the new current.`),
svg("intervals_merge","Sorted by start, the sweep fuses [1,4]+[3,6] into [1,6] and [8,10]+[9,12] into [8,12]. The merged end is always max(current end, next end) — never just the next end, since the incoming interval can finish earlier."),
worked("Merge all overlapping intervals","Sort by start so overlaps are always adjacent. Carry one 'current' interval; extend it while the next overlaps, otherwise flush it and start fresh. The max on the end is the line people forget — the next interval can be nested entirely inside the current one.",
`vector<vector<int>> merge(vector<vector<int>>& intervals) {
    sort(intervals.begin(), intervals.end());   // by start (first element)
    vector<vector<int>> out;
    for (const auto& iv : intervals) {
        // no current, or current ends before this one starts -> disjoint
        if (out.empty() || out.back()[1] < iv[0]) {
            out.push_back(iv);                   // start a new merged block
        } else {
            out.back()[1] = max(out.back()[1], iv[1]);  // extend the end
        }
    }
    return out;
}`),
idea("Why adjacency is enough","After sorting by start, if interval i overlaps interval i+2, it must also overlap i+1 — because i+1 started no later than i+2 and (since it overlaps i) no earlier than i's start. So overlapping intervals form contiguous runs, and you never need to look back past the current merged block. That's the whole reason one linear sweep suffices instead of all-pairs comparison."),
sub("Worked example 2: insert a new interval"),
p(`Now a twist: you're handed a list that is <em>already</em> sorted and non-overlapping, plus one new interval to splice in. You could just append it and re-run merge, but there's a cleaner O(n) pass that exploits the existing sort. Walk the list once and bucket each existing interval into one of three phases relative to the new one:`),
ul([
  `<b>Entirely before</b> the new interval (<code>existing.end &lt; new.start</code>) — it can't overlap, so copy it straight to the output.`,
  `<b>Overlapping</b> the new interval — don't emit it yet; instead <em>absorb</em> it into the new interval by widening <code>new.start = min(...)</code> and <code>new.end = max(...)</code>. Keep doing this for the whole overlapping run.`,
  `<b>Entirely after</b> the new interval (<code>existing.start &gt; new.end</code>) — the merged new interval is now final, so push it once, then copy the rest verbatim.`,
]),
p(`Because the input was pre-sorted, these three phases occur in exactly that order — a block of "before," then a contiguous run of "overlapping," then a block of "after" — so a single forward pass handles all three with no sorting at all. This is the version interviewers like, because it shows you noticed the input was already ordered and didn't waste an O(n log n) sort.`),
worked("Insert and merge into a sorted, non-overlapping list","Three phases in order: copy everything that ends before the new one starts, swallow the overlapping run into the new interval, then drop the merged result and copy the tail. One linear pass, no sort needed — the input is already sorted.",
`vector<vector<int>> insert(vector<vector<int>>& intervals, vector<int> ni) {
    vector<vector<int>> out;
    int i = 0, n = intervals.size();
    // phase 1: intervals entirely before the new one
    while (i < n && intervals[i][1] < ni[0])
        out.push_back(intervals[i++]);
    // phase 2: absorb every interval that overlaps the new one
    while (i < n && intervals[i][0] <= ni[1]) {
        ni[0] = min(ni[0], intervals[i][0]);
        ni[1] = max(ni[1], intervals[i][1]);
        i++;
    }
    out.push_back(ni);                 // the fully merged new interval
    // phase 3: intervals entirely after
    while (i < n)
        out.push_back(intervals[i++]);
    return out;
}`),
pit("Don't emit the new interval too early",`The bug is pushing <code>ni</code> at the first overlap. You must keep widening it across the <em>entire</em> overlapping run and push it exactly once, after the run ends. Push it inside the loop and you'll emit a half-merged fragment, then more fragments — splitting one interval into several. The single <code>out.push_back(ni)</code> sits <em>between</em> the overlap loop and the tail loop for a reason.`),
sub("Worked example 3: non-overlapping intervals (scheduling)"),
p(`Here the sort key flips, and that flip is the whole lesson. The question: given a set of intervals, what's the <em>minimum</em> number to remove so the rest don't overlap? Equivalently — keep as many non-overlapping intervals as possible. This is the classic <b>activity-selection</b> problem, and the greedy answer is famous: <em>sort by <code>end</code> time, and always keep the interval that finishes earliest.</em>`),
p(`The intuition is worth internalizing because it's not obvious. When two intervals conflict, which should you keep? The one that <em>ends sooner</em> — because it leaves the most room on the number line for everything after it, and it can never be a worse choice than the one ending later (anything the early-finisher conflicts with, the late-finisher also conflicts with). So you sweep left to right tracking the end of the last interval you kept; if the next interval starts before that end, it overlaps and you discard it (count a removal); otherwise it's safe, so keep it and advance the boundary.`),
worked("Minimum removals to make intervals non-overlapping","Sort by END, not start. Greedily keep the earliest-finishing interval; whenever the next one starts before your kept boundary, it conflicts, so count it as a removal and skip it. Everything you don't remove is the largest non-overlapping set.",
`int eraseOverlapIntervals(vector<vector<int>>& intervals) {
    if (intervals.empty()) return 0;
    sort(intervals.begin(), intervals.end(),
         [](const vector<int>& a, const vector<int>& b) {
             return a[1] < b[1];          // sort by END time
         });
    int removed = 0;
    int prevEnd = intervals[0][1];        // boundary of the last kept interval
    for (int i = 1; i < (int)intervals.size(); i++) {
        if (intervals[i][0] < prevEnd) {  // starts before we're free -> conflict
            removed++;                    // drop the later-ending one (this one)
        } else {
            prevEnd = intervals[i][1];    // no conflict -> keep, advance boundary
        }
    }
    return removed;
}`),
pit("Merging sorts by start; scheduling sorts by end",`This is the single most common interval mistake. <b>Merging</b> overlaps needs sort-by-<code>start</code> so that overlapping intervals land next to each other. <b>Greedy scheduling</b> (max non-overlapping set, max meetings in one room) needs sort-by-<code>end</code> so that "keep the earliest finisher" is even expressible. Sort by the wrong key and the sweep still runs — it just returns a confidently wrong answer. Before you write the comparator, ask: am I fusing ranges (start) or selecting a conflict-free subset (end)?`),
sub("Awareness: the sweep line and meeting rooms"),
p(`One more idea worth recognizing even if you don't drill it: the <b>sweep line</b>, and its poster child "minimum meeting rooms." The question — what's the most intervals that are active <em>at the same instant</em>? — equals the minimum number of rooms you need, because each concurrently-active meeting demands its own room. The trick is to stop thinking in whole intervals and think in <em>events</em>: every interval contributes a <code>+1</code> at its start and a <code>-1</code> at its end. Sort all those event points by time and sweep through them, keeping a running counter; the <em>peak</em> the counter reaches is the maximum concurrency, i.e. the room count.`),
p(`A common equivalent implementation skips the explicit events: sort the starts and ends into two separate arrays and walk them together, or — the version most people reach for — push interval ends into a <em>min-heap</em>. When a new meeting starts, if the earliest end in the heap is already &#8804; the new start, that room freed up: pop it and reuse it; otherwise allocate a new room by pushing. The heap size at its largest is your answer. You don't need to write this cold today, but recognize "max things active at once" as a sweep-line / min-heap-of-ends problem so you can name it on the spot.`),
note("📌","Half-open intervals make endpoints painless",`Library and engine code often models a range as half-open <code>[start, end)</code> — the end is excluded. It's not arbitrary: with half-open intervals, <code>[1, 2)</code> and <code>[2, 3)</code> are adjacent but <em>not</em> overlapping, so the touching-endpoint ambiguity from earlier simply vanishes, and the overlap test cleanly becomes strict <code>a &lt; d &amp;&amp; c &lt; b</code>. If you have the freedom to choose the convention, half-open removes a whole class of off-by-one bugs.`),
sub("Recognizing the family in the interview"),
p(`The interval pattern is one of the easiest to <em>name</em> once you've seen it, and naming it is most of the battle. When you spot <code>[start, end]</code> pairs, say the move out loud: <em>"these are intervals, so step one is to sort — by start if I'm merging, by end if I'm scheduling — then one linear sweep with the overlap check."</em> That single sentence frames the entire solution and tells the interviewer you've recognized the structure, before you've written a line.`),
ul([
  `<b>Merge / consolidate</b> ranges, <b>insert</b> into a sorted set, or detect <b>any</b> overlap &#8594; sort by <code>start</code>, sweep, fuse on <code>next.start &lt;= cur.end</code>.`,
  `<b>Max non-overlapping subset</b> / min removals / most meetings in a room &#8594; sort by <code>end</code>, greedily keep the earliest finisher.`,
  `<b>Max concurrency</b> / minimum rooms &#8594; sweep line of +1/-1 events, or a min-heap of end times; the peak is the answer.`,
]),
pit("State the boundary convention up front",`Almost every interval bug traces back to an unstated assumption: closed vs half-open, do shared endpoints conflict, and is the input pre-sorted. Surface all three before coding. Confirm the comparator (<code>start</code> vs <code>end</code>), confirm whether <code>&lt;</code> or <code>&lt;=</code> is the overlap test for this problem, and confirm whether you can skip the sort because the data already arrived ordered. Two minutes of clarification saves a wrong answer on the boundary cases interviewers always test.`),
cx(`Merge / insert / scheduling: time <b>O(n log n)</b> — the sort dominates; the sweep after it is <b>O(n)</b>. Space <b>O(n)</b> for the output (O(1) extra beyond it). Insert-into-sorted is <b>O(n)</b> outright, since the input is already ordered and needs no sort. Sweep-line meeting rooms: <b>O(n log n)</b> for the sort or the heap operations.`),
{t:"probs",items:[["Merge Intervals","merge-intervals","med"],["Insert Interval","insert-interval","med"],["Non-overlapping Intervals","non-overlapping-intervals","med"]]}
]},
{group:"Data Structures & Algorithms",num:"14",id:"bits",color:"#5B5BD6",title:"Bit Manipulation",badge:"Pattern",blocks:[
cue(`<b>Spot it when:</b> the problem talks about <em>bits, parity, XOR, or powers of two</em>; or asks you to do arithmetic <em>without</em> <code>+</code>/<code>-</code>; or the constraint is "n &#8804; 20-ish" and you need to enumerate <em>every subset</em> of a small set. The other tell is space: when a <code>set&lt;int&gt;</code> of small values would do but you want it to be a single integer you can compare, hash, and pass around for free.`),
p(`If you ship a game engine you already think in bits &#8212; collision layers, input flags, packed vertex attributes, an <code>enum class</code> of feature toggles OR'd together. Interview "bit manipulation" is the same muscle, just dressed up as puzzles. The whole topic rests on one fact you already know: an integer is a fixed-width row of bits, and the bitwise operators let you read and rewrite any subset of those bits in a single O(1) machine instruction. Everything below is a consequence of that.`),
sub("Binary, and how negatives are stored"),
p(`A 32-bit <code>int</code> is 32 bits, each worth a power of two: bit <code>i</code> contributes <code>2&#8305;</code> when it's set. So <code>13</code> is <code>1101</code> &#8212; <code>8 + 4 + 1</code>. The rightmost bit (value <code>2&#8304; = 1</code>) is the <em>least-significant bit</em> (LSB, "bit 0"); the leftmost is the <em>most-significant bit</em> (MSB). When we draw a byte we put bit 7 on the left and bit 0 on the right, matching how you'd write the number.`),
p(`Negatives use <b>two's complement</b>, and understanding it kills a whole class of confusion. The top bit is the <em>sign bit</em>: for a signed type, if it's set the value is negative. To get <code>-n</code>, you <em>flip every bit and add one</em> &#8212; that's literally what the hardware does, and it's why <code>-n == ~n + 1</code>. The payoff: addition, subtraction, and comparison all work on the same bit patterns with no special-casing for sign, and there's exactly one zero. The cost: the range is asymmetric &#8212; a 32-bit <code>int</code> runs <code>-2&#8311;&#185;</code> to <code>2&#8311;&#185; - 1</code>, so <code>INT_MIN</code> has no positive twin (negating it overflows).`),
note("📐","Why -n == ~n + 1, concretely",`Take <code>n = 5</code> = <code>...00000101</code>. Flip every bit: <code>~5</code> = <code>...11111010</code> (that's <code>-6</code>). Add one: <code>...11111011</code> = <code>-5</code>. The "flip and add one" rule isn't a convention to memorize &#8212; it falls out of wanting <code>n + (-n) == 0</code> in fixed width, where the carry off the top is simply discarded. This identity is the engine behind the <code>n &amp; -n</code> trick later, so it's worth seeing once.`),
sub("The operators"),
p(`There are four bitwise operators and two shifts. They work bit-by-bit (or, for shifts, by sliding the whole row), and each is a single instruction:`),
ul([
  `<b><code>&amp;</code> (AND)</b> &#8212; output bit is 1 only where <em>both</em> inputs are 1. Use it to <em>test</em> or <em>keep</em> bits (masking).`,
  `<b><code>|</code> (OR)</b> &#8212; output bit is 1 where <em>either</em> input is 1. Use it to <em>turn bits on</em>.`,
  `<b><code>^</code> (XOR)</b> &#8212; output bit is 1 where the inputs <em>differ</em>. Use it to <em>flip</em> bits, and for the cancellation trick below.`,
  `<b><code>~</code> (NOT)</b> &#8212; flips every bit (unary). <code>~0</code> is all-ones.`,
  `<b><code>&lt;&lt;</code> (left shift)</b> &#8212; <code>x &lt;&lt; k</code> slides every bit up by <code>k</code> positions, filling the bottom with zeros. This <em>multiplies by 2&#7503;</em>: <code>1 &lt;&lt; 4</code> is <code>16</code>.`,
  `<b><code>&gt;&gt;</code> (right shift)</b> &#8212; slides bits down by <code>k</code>. For unsigned (and non-negative signed) values this is integer division by <code>2&#7503;</code>.`,
]),
svg("bits_mask","The same byte x run through three operations against one mask. AND keeps only the masked bits (everything else goes to zero); OR forces the masked bits on; XOR flips them. Pick the operator by what you want to do to the bits the mask selects: keep, set, or toggle."),
note("📌","Operator precedence will bite you",`The bitwise operators bind <em>looser</em> than <code>==</code> and the arithmetic operators &#8212; a historical wart in C and C++. So <code>x &amp; 1 == 0</code> parses as <code>x &amp; (1 == 0)</code> = <code>x &amp; 0</code> = <code>0</code>, which is never what you meant. <b>Parenthesize bitwise sub-expressions:</b> write <code>(x &amp; 1) == 0</code>. When in doubt, wrap it.`),
sub("XOR: the cancellation trick"),
p(`XOR has three properties that make it the star of interview bit problems: <code>a ^ a == 0</code> (a value cancels itself), <code>a ^ 0 == a</code> (zero is the identity), and it's <em>commutative and associative</em> (order doesn't matter). Put those together and a beautiful thing happens: if you XOR a whole pile of numbers together, every value that appears an <em>even</em> number of times cancels to zero, and whatever's left is the value that appeared an <em>odd</em> number of times.`),
p(`That's the entire idea behind "Single Number": every element appears twice except one. XOR them all, the pairs annihilate, and the lone element survives &#8212; in one pass, O(1) space, no hash set.`),
worked("Single Number via XOR","Fold the whole array with XOR. Pairs cancel (a ^ a = 0); the unpaired value is left standing because XOR with 0 is identity. No extra memory, one pass &#8212; strictly better than the hash-set solution an interviewer expects first.",
`int singleNumber(const vector<int>& nums) {
    int acc = 0;                      // 0 is the XOR identity
    for (int x : nums) acc ^= x;      // pairs cancel: a ^ a == 0
    return acc;                       // the lone odd-count value remains
}`),
idea("The XOR swap (a party trick, not production code)",`You can swap two ints with no temporary: <code>a ^= b; b ^= a; a ^= b;</code>. After step one <code>a</code> holds <code>a^b</code>; the next two lines use the cancellation to untangle them. It's a fun thing to be able to derive on a whiteboard, and it shows you <em>understand</em> XOR. But never ship it: it's slower than a <code>std::swap</code> (which the compiler turns into a register exchange), and it silently breaks if <code>a</code> and <code>b</code> are the <em>same</em> variable &#8212; you'd zero it out.`),
sub("Single-bit surgery: check, set, clear, toggle"),
p(`The workhorse idiom is a <em>mask</em> with exactly one bit on: <code>1 &lt;&lt; i</code> has a single 1 at position <code>i</code>. AND with it to read a bit, OR to set, XOR to flip, and AND-with-the-inverse to clear. These four are the alphabet of every bit problem &#8212; commit them to muscle memory:`),
code(`// Operate on bit i of x (i = 0 is the least-significant bit):
bool on   = (x >> i) & 1;     // CHECK: shift bit i down, isolate it
x |=  (1 << i);               // SET:    force bit i on
x &= ~(1 << i);               // CLEAR:  force bit i off (mask of all-1s except bit i)
x ^=  (1 << i);               // TOGGLE: flip bit i

int lowest = x & -x;          // ISOLATE lowest set bit (two's complement magic)
x &= (x - 1);                 // CLEAR   lowest set bit`),
note("📌","Read CHECK and CLEAR slowly",`<code>(x &gt;&gt; i) &amp; 1</code> works because shifting bit <code>i</code> down to position 0 and ANDing with <code>1</code> throws away everything else &#8212; you're left with just that bit, as a clean <code>0</code> or <code>1</code>. For CLEAR, <code>~(1 &lt;&lt; i)</code> is "all ones except bit <code>i</code>," so ANDing keeps every other bit untouched and zeroes only bit <code>i</code>. Most masking is just one of these two patterns wearing a costume.`),
sub("Power-of-two and the lowest set bit"),
p(`Here's where two's complement pays off in clean one-liners. A power of two has <em>exactly one</em> bit set. Subtracting one from such a number flips that bit off and turns every bit <em>below</em> it on &#8212; so <code>n</code> and <code>n - 1</code> share no bits, and <code>n &amp; (n - 1) == 0</code>. For anything that isn't a power of two (more than one bit set), that AND leaves the higher bits and is non-zero.`),
code(`bool isPowerOfTwo(int n) {
    return n > 0 && (n & (n - 1)) == 0;   // exactly one bit set
}`),
p(`The same <code>n &amp; (n - 1)</code> is a Swiss-army move: it <em>clears the lowest set bit</em>. Subtracting one flips the trailing zeros to ones and the lowest one to zero; ANDing with the original wipes that whole run out, leaving every higher bit intact. Its cousin <code>n &amp; -n</code> does the opposite &#8212; it <em>isolates</em> the lowest set bit (because <code>-n</code> is <code>~n + 1</code>, which agrees with <code>n</code> in exactly the lowest set bit and the zeros below it). Hold these two side by side: one removes the lowest 1, the other extracts it.`),
svg("bits_clearlow","Why n &amp; (n-1) clears the lowest set bit. For n = 12 (1100), the lowest 1 sits at bit 2. Subtracting one borrows through the trailing zeros, flipping them up and turning that lowest 1 off; ANDing the two rows keeps only the higher bits, giving 8 (1000) &#8212; exactly n with its lowest 1 erased."),
sub("Counting set bits"),
p(`"How many 1 bits?" (the <em>population count</em>) shows up constantly &#8212; as a sub-step in bitmask DP, in Hamming-distance problems, in "count bits for 0..n." The naive way checks all 32 positions. <b>Brian Kernighan's trick</b> is tighter: repeatedly do <code>n &amp;= (n - 1)</code> to strip off the lowest set bit, counting iterations. The loop runs once per set bit, not once per position &#8212; so a number with three 1s takes three iterations regardless of width.`),
worked("Count set bits (Kernighan)","Each n &= (n - 1) erases exactly one set bit (the lowest), so the loop body runs as many times as there are 1s. Faster than scanning all 32 positions when the value is sparse, and it's the canonical thing to write when asked.",
`int popcount(unsigned n) {
    int count = 0;
    while (n) {            // stop as soon as no bits remain
        n &= (n - 1);      // clear the lowest set bit
        ++count;           // ...and tally it
    }
    return count;
}`),
note("📌","Don't reinvent it in real code",`Interviewers like Kernighan, but production C++ has this built in. C++20 gives you <code>std::popcount(x)</code> from <code>&lt;bit&gt;</code> (requires an unsigned type), and GCC/Clang have long offered <code>__builtin_popcount</code> / <code>__builtin_popcountll</code>. These compile to a single <code>POPCNT</code> instruction on modern hardware. The same header has <code>std::countr_zero</code> (trailing zeros &#8212; the index of the lowest set bit), <code>std::countl_zero</code>, and <code>std::has_single_bit</code> (the power-of-two test). Know the hand-rolled version <em>and</em> the library name.`),
sub("An integer as a set"),
p(`This is the conceptual leap that turns bit tricks into a <em>pattern</em>. An <code>int</code> is 32 bits, so it can represent a subset of <code>{0, 1, &#8230;, 31}</code>: bit <code>i</code> set means "element <code>i</code> is in the set." A <code>long long</code> stretches that to 64 elements. Now every set operation becomes one bitwise op on a single integer &#8212; which is why bitmask states are so cheap to store, compare, and use as map keys:`),
ul([
  `<b>Membership</b>: <code>(mask &gt;&gt; i) &amp; 1</code> &#8212; is element <code>i</code> present?`,
  `<b>Add</b> element <code>i</code>: <code>mask |= (1 &lt;&lt; i)</code>.`,
  `<b>Remove</b> element <code>i</code>: <code>mask &amp;= ~(1 &lt;&lt; i)</code>.`,
  `<b>Union</b> of two sets: <code>a | b</code>. <b>Intersection</b>: <code>a &amp; b</code>. <b>Difference</b> a&#8722;b: <code>a &amp; ~b</code>.`,
  `<b>Size</b> of the set: the popcount of the mask. <b>Empty?</b> <code>mask == 0</code>.`,
]),
p(`Compared to a <code>std::set&lt;int&gt;</code> this is dramatically faster &#8212; no nodes, no hashing, no allocation, and the whole set fits in a register. The catch is the universe must be <em>small</em> (&#8804; 32 or 64 elements) and the elements must map to small indices. Interview constraints like "1 &#8804; n &#8804; 20" are practically a neon sign saying <em>"pack the state into a bitmask."</em>`),
sub("Enumerating subsets"),
p(`Because a subset <em>is</em> just an integer in <code>[0, 2&#8319;)</code>, you can enumerate <em>all</em> <code>2&#8319;</code> subsets of an <code>n</code>-element set by counting from <code>0</code> up to <code>2&#8319; - 1</code>. Each value of <code>s</code> is itself a subset; bit <code>i</code> of <code>s</code> tells you whether element <code>i</code> is in it. That single loop replaces a recursive subset-generation backtrack &#8212; same answer space, no call stack:`),
worked("Iterate every subset of n elements","s ranges over all 2^n bit patterns; for each, test bit i to see if element i is included. This is the iterative twin of the subsets backtracking template &#8212; reach for it when n is small and you want flat, allocation-free enumeration.",
`// Print every subset of {0, 1, ..., n-1}.  n must be small (<= ~20).
for (int s = 0; s < (1 << n); ++s) {       // each s is one subset
    for (int i = 0; i < n; ++i)
        if (s & (1 << i))                  // is element i in this subset?
            use(i);
    // ... s is fully built here ...
}`),
p(`A subtler tool: iterating only the <em>submasks</em> of a given mask <code>m</code> (the subsets of the elements <code>m</code> already contains). The idiom <code>for (int s = m; s; s = (s - 1) &amp; m)</code> walks every non-empty submask in descending order. The <code>(s - 1) &amp; m</code> step is the magic: <code>s - 1</code> borrows past the lowest set bit, and ANDing with <code>m</code> snaps the result back to bits that live in <code>m</code> &#8212; so you skip straight to the next valid submask without touching bits outside <code>m</code>.`),
code(`// Visit every submask of m (every subset of the bits m has set).
for (int s = m; s; s = (s - 1) & m) {
    // s is a non-empty subset of m's bits
}
// Total work across all m of width n is 3^n, not 4^n -- a classic count.`),
sub("Bitmask DP, in one breath"),
p(`The headline application of "integer as a set" is <b>bitmask dynamic programming</b>: when the DP <em>state</em> is "which elements have I used so far," you pack that subset into an integer and index a table by it. The Travelling Salesman problem is the canonical case &#8212; <code>dp[mask][i]</code> is the cheapest path that has visited exactly the cities in <code>mask</code> and currently sits at city <code>i</code>. Transitions add one city: <code>mask | (1 &lt;&lt; next)</code>. The whole table is <code>2&#8319; &#215; n</code>, which is why these problems always cap <code>n</code> around 15&#8211;20.`),
p(`You don't need to master TSP for most interviews, but recognizing the shape is the win: <em>"the state is a subset of a small set"</em> &#8594; bitmask DP. The provided hard problem below, "Shortest Path Visiting All Nodes," is exactly this &#8212; a BFS whose state is <code>(node, visited-mask)</code>, where the mask records which of the &#8804; 12 nodes you've already touched.`),
note("🧠","The framing that signals seniority",`When you spot a small universe, say the line out loud: "n is at most 20, so I'll represent the set of used elements as a bitmask in an <code>int</code> &#8212; membership is a shift-and-AND, adding an element is an OR, and I can use the mask directly as a DP/visited key." Naming the encoding and its O(1) operations up front is exactly the move that reads as "this person has done this before."`),
pit("Shifting by &#8805; the type width is undefined behavior",`Callback to the Undefined Behavior lesson: in C++, <code>x &lt;&lt; k</code> or <code>x &gt;&gt; k</code> where <code>k</code> is negative or <code>&#8805;</code> the bit-width of <code>x</code>'s type is <b>undefined behavior</b> &#8212; not "wraps to zero." For a 32-bit <code>int</code>, <code>1 &lt;&lt; 32</code> is UB, and on x86 it may even compute <code>1</code> because the CPU masks the shift count to 5 bits. Never shift by the full width; if you need "all bits," build it a safer way.`),
pit("1 &lt;&lt; 31 overflows a signed int",`<code>1</code> is a signed <code>int</code>, so <code>1 &lt;&lt; 31</code> shifts a 1 <em>into the sign bit</em> &#8212; signed overflow, which is UB. If you're masking a 32-bit value or need bit 31+, use an <em>unsigned</em> or wider literal: <code>1u &lt;&lt; 31</code>, or <code>1LL &lt;&lt; 40</code> for a 64-bit mask. This is the single most common bit bug in interviews: people write <code>1 &lt;&lt; i</code> for a 64-element set and silently lose every element past 31. Make the literal match the width you intend.`),
pit("Mind signed vs unsigned, especially on right shift",`Right-shifting a <em>negative</em> signed value is implementation-defined (in practice an arithmetic shift that copies the sign bit down) &#8212; so <code>-8 &gt;&gt; 1</code> is <em>not</em> a clean "divide by two" the way it is for unsigned. And mixing signed and unsigned in a bitwise expression triggers the usual conversions, which can turn a small negative into a huge unsigned value. When you're treating an integer as a bag of bits rather than a number, prefer <code>unsigned</code> / <code>uint32_t</code> / <code>uint64_t</code> so shifts and <code>~</code> behave predictably.`),
idea("The interview reflexes worth having pre-loaded",`Five patterns cover almost everything: (1) <em>cancellation</em> &#8212; XOR a stream to find the odd-one-out; (2) <em>single-bit masks</em> &#8212; <code>1 &lt;&lt; i</code> to check/set/clear/toggle; (3) <em>lowest-bit tricks</em> &#8212; <code>n &amp; (n-1)</code> clears it, <code>n &amp; -n</code> isolates it, and <code>n &amp; (n-1) == 0</code> tests power-of-two; (4) <em>popcount</em>, hand-rolled (Kernighan) or <code>std::popcount</code>; (5) <em>int-as-set</em> for subset enumeration and bitmask DP when the universe is &#8804; 20. Recognize which one the problem is wearing and the code is short.`),
cx(`Every operator &#8212; <code>&amp; | ^ ~ &lt;&lt; &gt;&gt;</code> &#8212; is <b>O(1)</b> on a machine word &#183; Kernighan popcount is <b>O(set bits)</b> &#183; enumerating all subsets is <b>O(2&#8319; &#183; n)</b> &#183; all submasks across a width-n universe is <b>O(3&#8319;)</b>`),
{t:"probs",items:[["Single Number","single-number","easy"],["Sum of Two Integers","sum-of-two-integers","med"],["Shortest Path Visiting All Nodes","shortest-path-visiting-all-nodes","hard"]]}
]},
{group:"Data Structures & Algorithms",num:"15",id:"math",color:"#0D9488",title:"Math & Number Theory",badge:"Pattern",blocks:[
cue(`<b>Spot it when:</b> the problem is about <em>divisibility, primes, remainders, or huge powers</em> &#8212; "is it prime," "count primes up to n," "greatest common divisor," "return the answer modulo 1e9+7," "compute <code>x</code> raised to <code>n</code>." These aren't really algorithm puzzles; they're <em>number-theory facts plus careful integer arithmetic</em>. The whole game is knowing the four or five classic tools and not letting <code>int</code> silently overflow underneath you.`),
p(`You ship real numeric code, so none of these ideas are new &#8212; what's new is that interview number-theory problems reward a handful of <em>named</em> techniques and punish one specific carelessness: integer overflow. This lesson collects the toolkit (GCD, primes &amp; the sieve, modular arithmetic, fast exponentiation) and then spends real time on the overflow traps, because that's where otherwise-correct solutions die on the big test cases.`),
sub("GCD and LCM &#8212; Euclid in three lines"),
p(`The greatest common divisor of <code>a</code> and <code>b</code> is the largest integer dividing both. Euclid's insight is one line: <code>gcd(a, b) = gcd(b, a % b)</code>, recursing until the remainder hits zero, at which point the other operand <em>is</em> the answer. The intuition: any common divisor of <code>a</code> and <code>b</code> also divides <code>a % b</code> (since <code>a % b = a - q&#183;b</code>), so replacing <code>a</code> with <code>a % b</code> never loses a common divisor &#8212; but the numbers shrink fast, so it terminates in <code>O(log(min(a,b)))</code> steps.`),
code(`int gcd(int a, int b) {
    while (b != 0) {           // Euclid: replace (a, b) with (b, a % b)
        int t = a % b;
        a = b;
        b = t;
    }
    return a;                  // when remainder is 0, a holds the gcd
}`),
note("📌","C++17 ships it &#8212; don't hand-roll unless asked","<code>&lt;numeric&gt;</code> gives you <code>std::gcd(a, b)</code> and <code>std::lcm(a, b)</code> since C++17. In real code, use them. In an interview, mention they exist (it signals you know the standard library), then write Euclid by hand if the interviewer wants to see the mechanism. Both are the right answer in their context."),
p(`The least common multiple follows from GCD: <code>lcm(a, b) = a / gcd(a, b) * b</code>. Read the ordering carefully &#8212; <b>divide before you multiply.</b> The mathematically equivalent <code>a * b / gcd(a, b)</code> computes <code>a * b</code> first, which can overflow even when the true <code>lcm</code> fits comfortably. Dividing <code>a</code> by the gcd first keeps the intermediate value small. This is a textbook example of the broader rule running through this whole lesson: <em>the order of integer operations matters because intermediates can overflow.</em>`),
code(`long long lcm(long long a, long long b) {
    return a / std::gcd(a, b) * b;   // divide FIRST, then multiply -> no overflow blowup
    // NOT a * b / std::gcd(a, b)    // a * b can overflow before the divide ever runs
}`),
sub("Primes: trial division, then the sieve"),
p(`To test whether a single <code>n</code> is prime, try dividing by every candidate up to <code>&#8730;n</code>. Why stop at the square root? If <code>n = p &#183; q</code> with <code>p &#8804; q</code>, then <code>p &#8804; &#8730;n</code> &#8212; so if no divisor exists at or below <code>&#8730;n</code>, none exists above it either. That single observation turns an <code>O(n)</code> scan into <code>O(&#8730;n)</code>.`),
code(`bool isPrime(long long n) {
    if (n < 2) return false;                    // 0 and 1 are not prime
    for (long long i = 2; i * i <= n; ++i)      // i * i <= n is the sqrt bound, no float
        if (n % i == 0) return false;           // found a divisor -> composite
    return true;
}`),
note("📌","<code>i * i &lt;= n</code> beats <code>i &lt;= sqrt(n)</code>","Writing the bound as <code>i * i &lt;= n</code> keeps everything in integer arithmetic &#8212; no <code>sqrt</code> call, no floating-point rounding that could let <code>i</code> stop one short and miss a divisor. Just make sure <code>i</code> is wide enough that <code>i * i</code> doesn't overflow; for <code>n</code> near <code>INT_MAX</code>, use <code>long long</code> as above."),
p(`When you need <em>all</em> primes up to <code>n</code> (or "how many primes below <code>n</code>"), don't test each number separately &#8212; that's <code>O(n&#8730;n)</code>. Use the <b>Sieve of Eratosthenes</b>: assume everything is prime, then walk the primes in order and strike out their multiples. Each composite gets crossed off by its prime factors; what's never struck is prime. The total work is <code>O(n log log n)</code> &#8212; effectively linear &#8212; because the multiples thin out as the primes grow.`),
svg("math_sieve","Walking 2,3,5,&#8230; and striking every multiple. 4 dies as a multiple of 2; 9 as a multiple of 3; 25 as a multiple of 5. Whatever survives the strikes is prime."),
worked("Sieve of Eratosthenes &#8212; count primes below n","Start striking each prime p from p*p (everything smaller was already struck by a smaller prime), and step by p. The is_prime[i] vector is the whole data structure. This is the direct, fast answer to LeetCode's Count Primes.",
`int countPrimes(int n) {
    if (n < 3) return 0;                         // no primes below 2
    std::vector<bool> is_prime(n, true);
    is_prime[0] = is_prime[1] = false;           // 0 and 1 are not prime
    for (int p = 2; (long long)p * p < n; ++p) { // only need to sieve up to sqrt(n)
        if (!is_prime[p]) continue;              // p already struck -> skip
        for (int m = p * p; m < n; m += p)       // start at p*p; smaller multiples already gone
            is_prime[m] = false;                 // strike every multiple of p
    }
    int count = 0;
    for (int i = 2; i < n; ++i)
        if (is_prime[i]) ++count;                // survivors are prime
    return count;
}`),
pit("Off-by-one at the sieve bound","Two boundary calls decide correctness. First, count primes <em>below</em> <code>n</code> means the array is sized <code>n</code> and you mark indices <code>0 &#8230; n-1</code> &#8212; mixing up &quot;below n&quot; vs &quot;up to and including n&quot; is the classic off-by-one here. Second, the outer loop only needs <code>p * p &lt; n</code>: once <code>p</code> exceeds <code>&#8730;n</code>, every remaining multiple <code>p * p</code> is already past the end, so iterating further is wasted work (and <code>p * p</code> can overflow <code>int</code> if you don't widen it)."),
sub("Modular arithmetic &#8212; why \"answer mod 1e9+7\""),
p(`Counting problems love to ask for "the number of ways, modulo 1e9+7." That modulus isn't decoration &#8212; it's there <em>because the true answer would overflow any fixed-width integer.</em> Instead of returning an astronomically large count, you return its remainder mod a large prime, and the problem is designed so you can keep everything reduced mod <code>m</code> at every step. The reason that works is the distributive laws of modular arithmetic:`),
ul([
  `<code>(a + b) % m = ((a % m) + (b % m)) % m</code> &#8212; you can reduce before <em>or</em> after adding.`,
  `<code>(a * b) % m = ((a % m) * (b % m)) % m</code> &#8212; same for multiplication.`,
  `<code>(a - b) % m</code> can go negative in C++ (the sign follows the dividend), so write <code>((a - b) % m + m) % m</code> to land back in <code>[0, m)</code>.`,
]),
p(`<code>1e9+7</code> specifically is a prime just under <code>2&#179;&#185;</code>, chosen so that the sum of two reduced values still fits in a 32-bit <code>int</code> &#8212; but their <em>product</em> does not, and that's the trap.`),
pit("The overflow that kills modular solutions: a*b before the mod","This is the single most common bug in modular problems. <code>(a * b) % m</code> where <code>a</code> and <code>b</code> are each near <code>1e9</code> computes a product near <code>10&#185;&#8312;</code> &#8212; which overflows a 32-bit <code>int</code> (max ~<code>2.1&#215;10&#8313;</code>) <em>and</em> would overflow even before the <code>% m</code> runs. Signed overflow is <b>undefined behavior</b> (callback to the UB lesson: the optimizer may assume it never happens), so you don't even get a reliable wrong answer. The fix is to widen one operand to <code>long long</code> <em>before</em> multiplying: <code>(long long)a * b % m</code>. The multiply then happens in 64-bit, which holds <code>10&#185;&#8312;</code> easily."),
code(`const long long MOD = 1'000'000'007;

long long add(long long a, long long b) { return (a + b) % MOD; }
long long mul(long long a, long long b) { return a * b % MOD; }   // a, b already < MOD -> product < 10^18, fits in long long
long long sub(long long a, long long b) { return ((a - b) % MOD + MOD) % MOD; }  // keep it non-negative`),
sub("Fast exponentiation &#8212; a&#8319; in O(log n)"),
p(`"Compute <code>x</code> to the <code>n</code>" by multiplying <code>x</code> by itself <code>n</code> times is <code>O(n)</code> &#8212; far too slow when <code>n</code> is <code>10&#8313;</code>, and it overflows immediately without a mod. <b>Binary exponentiation</b> does it in <code>O(log n)</code> by squaring. The trick is the binary expansion of the exponent: <code>a&#185;&#179; = a&#8312; &#183; a&#8308; &#183; a&#185;</code> because <code>13 = 1101&#8322; = 8 + 4 + 1</code>. So you walk the bits of <code>n</code> from low to high, keep squaring the base (<code>a, a&#178;, a&#8308;, a&#8312;, &#8230;</code>), and fold the current square into the result only where the bit is set.`),
svg("math_fastpow","13 in binary is 1101, i.e. 8+4+1. Square the base at each step; multiply it into the running result only on the set bits. Four squarings and three multiplies replace twelve multiplications."),
worked("modpow: (base^exp) mod m without overflow","Loop over the bits of exp. When the low bit is set, fold the current square into result; then square the base and shift. Every product is widened to long long before the mod, so nothing overflows. This is the workhorse behind modular combinatorics and modular inverses.",
`long long modpow(long long base, long long exp, long long mod) {
    long long result = 1;
    base %= mod;                                 // reduce once up front
    while (exp > 0) {
        if (exp & 1)                             // current bit set -> fold this power in
            result = result * base % mod;        // long long product, then reduce
        base = base * base % mod;                // square the base for the next bit
        exp >>= 1;                               // move to the next bit
    }
    return result;
}`),
p(`The exact same skeleton without the <code>% mod</code> solves LeetCode's <em>Pow(x, n)</em> for <code>double</code> &#8212; with one wrinkle: <code>n</code> can be negative, and negating it is where overflow strikes again.`),
worked("Pow(x, n) for double &#8212; mind the negative exponent","Same square-and-fold loop on a double. The catch: when n is negative you want x^(-n), but -INT_MIN overflows. Promote to long long BEFORE negating so n = -(long long)n is safe.",
`double myPow(double x, int n) {
    long long e = n;                 // widen first
    if (e < 0) { x = 1.0 / x; e = -e; }   // -e is safe in long long; -INT_MIN would NOT be safe in int
    double result = 1.0;
    while (e > 0) {
        if (e & 1) result *= x;      // fold in current square
        x *= x;                      // square the base
        e >>= 1;
    }
    return result;
}`),
sub("Integer overflow awareness &#8212; the through-line"),
p(`Every section above tripped over the same hazard, so make it explicit. In C++, <b>signed integer overflow is undefined behavior</b> &#8212; not "wraps around to a negative number," but genuinely UB the optimizer is allowed to assume never happens (callback to the Undefined Behavior lesson). Unsigned overflow <em>is</em> defined (modular wraparound), which is occasionally useful but easy to misuse. The defensive habits:`),
ul([
  `<b>Widen before you multiply.</b> <code>(long long)a * b</code>, not <code>(long long)(a * b)</code> &#8212; the cast must happen <em>before</em> the multiply, or the <code>int</code> product has already overflowed.`,
  `<b>Use the no-overflow midpoint.</b> <code>mid = lo + (hi - lo) / 2</code>, never <code>(lo + hi) / 2</code> &#8212; the same idiom you learned in Binary Search, for the same reason: <code>lo + hi</code> can overflow.`,
  `<b>Divide before multiplying</b> when a factor cancels &#8212; the <code>lcm</code> trick: <code>a / g * b</code>, not <code>a * b / g</code>.`,
  `<b>Reach for <code>long long</code> deliberately</b> when accumulating sums or counting up to large bounds; don't wait for the big test case to expose an <code>int</code> that was always too small.`,
]),
pit("INT_MIN is not symmetric &#8212; abs/negate can be UB","Two's-complement asymmetry: <code>INT_MIN</code> is <code>-2147483648</code> but <code>INT_MAX</code> is only <code>2147483647</code>, so <code>+2147483648</code> isn't representable. That makes <code>-INT_MIN</code> and <code>std::abs(INT_MIN)</code> <b>undefined behavior</b> &#8212; the positive value doesn't exist as an <code>int</code>. Any problem that negates a number (reverse-integer, the negative exponent in <em>Pow</em>, normalizing signs) must handle <code>INT_MIN</code> specially or widen to <code>long long</code> before negating. Interviewers probe this exact edge."),
pit("Integer division truncates toward zero","<code>7 / 2 == 3</code> and <code>-7 / 2 == -3</code> &#8212; C++ integer division truncates toward zero, and <code>%</code> takes the sign of the dividend (<code>-7 % 2 == -1</code>). When you need a ceiling, write <code>(a + b - 1) / b</code> for non-negative values (the same ceil-division idiom from the Binary Search / Koko example). When you need a remainder that's always non-negative (common in modular and hashing code), write <code>((x % m) + m) % m</code>."),
idea("Name the tool out loud","These problems are pattern-matched on the prompt: \"mod 1e9+7\" &#8594; keep everything reduced, widen before multiplying. \"x to the n\" or \"&#8230; mod m\" with huge n &#8594; binary exponentiation. \"primes up to n\" &#8594; sieve; \"is this one prime\" &#8594; trial division to &#8730;n. \"gcd / lcm / reduce a fraction\" &#8594; Euclid. Saying the name first turns a blank-page problem into filling in a template you already know cold."),
cx(`Euclid GCD <b>O(log min(a,b))</b> &#183; trial-division primality <b>O(&#8730;n)</b> &#183; Sieve of Eratosthenes <b>O(n log log n)</b> time, <b>O(n)</b> space &#183; binary exponentiation <b>O(log n)</b>`),
{t:"probs",items:[["Happy Number","happy-number","easy"],["Count Primes","count-primes","med"],["Max Points on a Line","max-points-on-a-line","hard"]]}
]},
{group:"Data Structures & Algorithms",num:"16",id:"greedy",color:"#16A34A",title:"Greedy",badge:"Pattern",blocks:[
cue(`<b>Spot it when:</b> the problem asks for a <em>best</em> outcome &#8212; max activities, min jumps, fewest coins, can-I-reach-the-end &#8212; and you can see a rule that picks the obviously-best choice <em>right now</em> without looking ahead: take the earliest-finishing meeting, jump as far as you can, hand the smallest cookie to the least greedy child. If a simple "always do X next" rule seems to solve it, you're looking at a greedy algorithm &#8212; but the catch is proving that rule is actually right.`),
p(`A <b>greedy algorithm</b> builds an answer one step at a time, and at every step it makes the choice that looks best <em>at that moment</em> &#8212; the local optimum &#8212; and then never reconsiders it. No backtracking, no table of subproblems, no second-guessing. You commit to each decision and move on. That's the entire mechanism, and it's why greedy solutions are usually short and fast: a single pass, often after a sort, with a couple of running variables.`),
p(`The whole difficulty of greedy is not writing it &#8212; the code is trivial. It's <em>knowing you're allowed to be greedy</em>. Committing to the locally-best move only produces the globally-best answer for a specific, lucky class of problems. For everything else, a choice that looks best now quietly paints you into a corner later, and the greedy answer is confidently wrong. So this lesson is really two skills: recognizing the handful of classic greedy shapes, and &#8212; the part that separates a real answer from a guess &#8212; being able to argue that greed is safe here.`),
note(`&#128221;`,"You have already seen greedy",`The Intervals lesson's <code>eraseOverlapIntervals</code> &#8212; "sort by <code>end</code>, always keep the earliest finisher" &#8212; <em>is</em> a greedy algorithm; we just didn't name the strategy. This lesson names it and gives you the tool to know <em>when</em> that move is provably correct, so you can reach for it on a problem you haven't seen before instead of only recognizing the ones you have.`),
sub("Why greedy is dangerous: the locally-best move can be globally wrong"),
p(`Here is the trap, made concrete, because internalizing it is worth more than any single algorithm. Suppose you're making change with coin denominations <code>{1, 3, 4}</code> and you want to make 6 with the fewest coins. The greedy rule "always take the largest coin that fits" grabs a 4, leaving 2, then two 1s: <b>three coins</b> (4 + 1 + 1). But the real optimum is <b>two coins</b> (3 + 3). Greedy took the locally-biggest bite and missed it. That largest-coin rule <em>does</em> work for real currency (US coins are designed so it does), which is exactly what makes the trap insidious &#8212; it looks right, it passes your hand-traced examples, and then a denomination set you didn't try breaks it.`),
p(`The general coin-change problem is therefore a <b>dynamic-programming</b> problem, not a greedy one &#8212; which is precisely the coin-change worked example from the DP lesson. That's the fault line between the two strategies, and it's worth saying out loud:`),
ul([
  `<b>Greedy</b> commits to one choice per step and never revisits it. It works <em>only</em> when the locally-optimal choice is provably part of a globally-optimal answer.`,
  `<b>Dynamic programming</b> keeps every promising option alive &#8212; it explores all the choices at each step and remembers the best of each subproblem, so a locally-worse move that pays off later is never thrown away.`,
  `<b>The decision rule:</b> if a locally-best choice can ever be globally wrong (like grabbing the biggest coin), you need DP's bookkeeping. If you can <em>prove</em> the locally-best choice is always safe, greedy gives you the same answer far faster.`,
]),
idea("Greedy is DP that got lucky","Think of greedy as the special case where you don't need the table: at every step there's a single choice you can prove is optimal, so you never have to remember the alternatives. When that proof exists, greedy collapses DP's O(n&#183;states) work into one O(n) (or O(n log n)) pass. When it doesn't, you fall back to DP. So the real question is never \"can I code this greedily\" &#8212; it's \"can I prove the greedy choice is safe.\""),
sub("Proving greedy is correct: the two arguments interviewers want"),
p(`You will not be handed a problem labeled "this one is greedy-safe." You have to make the case yourself, and there are two standard ways to do it. You don't need a formal proof in an interview &#8212; you need to <em>say the argument convincingly</em> for the specific problem, which signals you know greedy isn't a guess.`),
p(`<b>The exchange argument.</b> This is the workhorse. Assume some optimal solution exists that does <em>not</em> make your greedy choice. Show that you can swap your greedy choice into it &#8212; replacing whatever the optimal did at that step &#8212; <em>without making the solution any worse</em>. If every such swap is harmless, then there's an optimal solution that agrees with greedy at that step; repeat the argument and greedy matches optimal all the way down. Activity selection is the clean example: take the meeting that finishes earliest. If some optimal schedule used a later-finishing first meeting instead, swap in the earliest finisher &#8212; it frees the room at least as soon, so every later meeting that fit still fits. The swap never hurts, so keeping the earliest finisher is safe.`),
p(`<b>"Greedy stays ahead."</b> The other framing: show that after every step, the partial solution greedy has built is at least as good, by the relevant measure, as the partial solution of <em>any</em> other strategy at that same step. If greedy is never behind at any point, it can't be behind at the end. Jump Game fits this exactly &#8212; at each index, greedy's "farthest reachable so far" is provably &#8805; what any other choice of jumps could have reached by that index, so if <em>anyone</em> can reach the end, greedy's frontier reaches it too.`),
note(`&#129504;`,"The honest workflow under pressure",`When a greedy rule occurs to you, do two things before trusting it. <b>First, try to break it:</b> spend thirty seconds hunting a small counterexample (the <code>{1,3,4}</code> coins took one). If you find one, greedy is dead &#8212; reach for DP. <b>Second, if you can't break it, sketch the exchange argument:</b> "swapping my choice into any optimal solution doesn't make it worse, so my choice is safe." Counterexample-or-proof is the entire discipline. A greedy answer with neither is a coin flip you got away with.`),
sub("Classic instance 1: interval scheduling / activity selection"),
p(`The canonical greedy problem, and the one whose proof you should be able to recite. Given a set of intervals (meetings, jobs), select the <em>most</em> that don't overlap. The greedy rule: <em>sort by <code>end</code> time, then walk left to right keeping any interval that starts at or after the last kept interval's end.</em> Always taking the earliest finisher leaves the maximum room on the timeline for everything after it &#8212; that's the exchange argument from above. This is the same move as the Intervals lesson's <code>eraseOverlapIntervals</code> (which counts the ones you <em>drop</em> instead of the ones you keep &#8212; two sides of the identical greedy).`),
svg("greedy_activity","Activity selection: sorted by end time, greedily keep the earliest finisher and skip anything that starts before your current free time. Each kept interval frees the timeline as early as possible, which is exactly why the earliest-finisher rule is optimal &#8212; the exchange argument made visual."),
