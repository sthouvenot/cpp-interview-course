<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 10-Week C++ Interview Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F7FB;--ink:#1B1838;--ink-soft:#3a3660;--sidebar:#161235;--sidebar-2:#221a4a;
    --card:#FFFFFF;--line:#E7E8F2;--muted:#6f6b8c;--code-bg:#15122E;--code-line:#2a2550;
    --c-comment:#7C8AAE;--c-string:#5BE3B3;--c-num:#FFB86B;--c-key:#FF7CC0;--c-type:#7FB4FF;--c-text:#E9E7FB;
    --easy:#16A34A;--med:#D97706;--hard:#E11D48;--easy-bg:#E7F6ED;--med-bg:#FBF0DC;--hard-bg:#FBE4EA;
    --accent:#6366F1;--shadow:0 1px 2px rgba(20,16,50,.04),0 8px 24px -12px rgba(20,16,50,.18);--radius:18px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:auto}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
  code,pre{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
  .sidebar{width:288px;flex:0 0 288px;background:var(--sidebar);background-image:radial-gradient(120% 60% at 0% 0%,var(--sidebar-2),transparent 60%);color:#cfc9ee;position:sticky;top:0;height:100vh;overflow-y:auto;padding:24px 16px 30px;display:flex;flex-direction:column;gap:16px;z-index:50}
  .brand{display:flex;align-items:center;gap:11px;padding:0 6px;text-decoration:none}
  .brand .mark{width:38px;height:38px;border-radius:11px;flex:0 0 38px;background:linear-gradient(135deg,#FF7CC0,#7FB4FF 55%,#5BE3B3);display:grid;place-items:center;color:#161235;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:18px;box-shadow:0 6px 18px -6px rgba(127,180,255,.6)}
  .brand h1{font-family:"Space Grotesk",sans-serif;font-size:15.5px;line-height:1.2;margin:0;color:#fff;font-weight:600}
  .brand span{font-size:11.5px;color:#9d96c9}
  .progress{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:13px;margin:2px 4px 0}
  .ring{position:relative;width:46px;height:46px;flex:0 0 46px}
  .ring svg{transform:rotate(-90deg)}
  .ring .val{position:absolute;inset:0;display:grid;place-items:center;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:13px;color:#fff}
  .progress .lbl{font-size:12px;color:#a59ed0;line-height:1.35}
  .progress .lbl b{color:#fff;font-weight:600}
  nav{display:flex;flex-direction:column;gap:2px;margin-top:2px}
  nav .group{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#7a73a8;padding:13px 12px 5px;font-weight:600}
  nav a{display:flex;align-items:center;gap:10px;text-decoration:none;color:#c4bde9;padding:7px 12px;border-radius:10px;font-size:13px;font-weight:450;transition:background .15s,color .15s;position:relative}
  nav a .num{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:#6f68a0;min-width:18px;font-weight:500;transition:color .15s}
  nav a .dot{width:7px;height:7px;border-radius:50%;background:var(--ac,#6366F1);opacity:.5;flex:0 0 7px;transition:opacity .15s,transform .15s}
  nav a:hover{background:rgba(255,255,255,.05);color:#fff}
  nav a.active{background:linear-gradient(90deg,rgba(255,255,255,.09),rgba(255,255,255,.02));color:#fff;font-weight:500}
  nav a.active .dot{opacity:1;transform:scale(1.3)}
  nav a.active .num{color:#fff}
  nav a.active::before{content:"";position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--ac,#6366F1)}
  .side-foot{margin-top:auto;padding:14px 12px 0;font-size:11.5px;color:#7a73a8;line-height:1.5}
  main{flex:1;min-width:0;max-width:1000px;margin:0 auto;padding:0 clamp(20px,5vw,68px)}
  .topbar{display:none}
  #page{padding:6px 0 0;min-height:80vh}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .anim{animation:fade .34s ease}
  .hero{padding:62px 0 30px}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:9px}
  .eyebrow::before{content:"";width:26px;height:2px;background:var(--accent);border-radius:2px}
  .hero h2{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(34px,5.5vw,54px);line-height:1.04;letter-spacing:-.02em;margin:0 0 18px}
  .hero h2 em{font-style:normal;background:linear-gradient(115deg,#FF5D73,#8B5CF6 50%,#0EA5E9);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p.lead{font-size:18px;color:var(--ink-soft);max-width:62ch;margin:0 0 16px}
  .hero p.lead2{font-size:15px;color:var(--muted);max-width:60ch;margin:0 0 26px}
  .startrow{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px}
  .btn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-weight:600;font-size:14px;padding:12px 20px;border-radius:11px;transition:transform .12s,box-shadow .12s;cursor:pointer;border:none}
  .btn.primary{background:var(--ink);color:#fff;box-shadow:0 8px 22px -10px rgba(27,24,56,.7)}
  .btn.primary:hover{transform:translateY(-2px)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:#cdcde0;transform:translateY(-2px)}
  .planbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:36px}
  .planbar .pb{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 15px;box-shadow:var(--shadow);text-decoration:none;display:block;transition:transform .12s,border-color .12s}
  .planbar .pb:hover{transform:translateY(-3px);border-color:#cdcde0}
  .planbar .pb .wk{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.05em}
  .planbar .pb .ti{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;margin-top:5px;line-height:1.3;color:var(--ink)}
  .lesson-head{padding:46px 0 2px}
  .lh-meta{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .lh-week{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#fff;background:var(--accent);padding:5px 12px;border-radius:20px;font-weight:600}
  .lh-count{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  .lh-title{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(30px,5vw,46px);letter-spacing:-.02em;margin:0;line-height:1.04}
  .soonpill{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:10.5px;font-weight:600;letter-spacing:.04em;color:var(--muted);background:#fff;border:1px dashed #cfd0e2;border-radius:20px;padding:4px 12px;margin:16px 0 2px}
  .pager{display:flex;justify-content:space-between;gap:14px;margin:54px 0 72px;border-top:1px solid var(--line);padding-top:24px}
  .pager .pg{display:flex;flex-direction:column;gap:3px;text-decoration:none;padding:13px 18px;border:1px solid var(--line);border-radius:13px;background:#fff;max-width:47%;transition:transform .12s,border-color .12s,box-shadow .12s}
  .pager .pg:hover{transform:translateY(-2px);border-color:#cdcde0;box-shadow:var(--shadow)}
  .pager .pg span{font-size:11.5px;color:var(--muted);font-weight:600}
  .pager .pg b{font-family:"Space Grotesk",sans-serif;font-size:15px;color:var(--ink);line-height:1.2}
  .pager .pg.next{text-align:right;margin-left:auto;align-items:flex-end}
  .pager .pg.start{border-color:color-mix(in srgb,var(--accent) 40%,#fff);background:color-mix(in srgb,var(--accent) 7%,#fff)}
  .lesson{margin-top:12px}
  .lesson p{font-size:16.5px;color:var(--ink-soft);margin:0 0 18px;max-width:72ch}
  .lesson p code,.lesson li code{font-size:13.5px;background:#ECEDF6;color:#3a2f72;padding:2px 6px;border-radius:6px}
  .subhead{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:21px;color:var(--ink);margin:36px 0 13px;display:flex;align-items:center;gap:11px;letter-spacing:-.01em}
  .subhead::before{content:"";width:18px;height:3px;border-radius:3px;background:var(--accent);flex:0 0 18px}
  .lesson ul{margin:0 0 18px;padding-left:0;list-style:none;max-width:72ch}
  .lesson ul li{position:relative;padding-left:26px;margin-bottom:11px;font-size:16px;color:var(--ink-soft)}
  .lesson ul li::before{content:"";position:absolute;left:4px;top:10px;width:7px;height:7px;border-radius:2px;background:var(--accent);transform:rotate(45deg)}
  .lesson ul li b{color:var(--ink);font-family:"Space Grotesk",sans-serif;font-weight:600}
  .cue{display:flex;gap:13px;background:color-mix(in srgb,var(--accent) 9%,#fff);border:1px solid color-mix(in srgb,var(--accent) 22%,#fff);border-left:4px solid var(--accent);border-radius:13px;padding:15px 17px;margin:22px 0}
  .cue .ic{flex:0 0 auto;font-size:18px;line-height:1.3}
  .cue p{margin:0;font-size:15px;color:var(--ink);max-width:none}
  .cue p b{font-family:"Space Grotesk",sans-serif;font-weight:600}
  .note{display:flex;gap:13px;border-radius:13px;padding:15px 17px;margin:22px 0;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}
  .note .ic{flex:0 0 auto;font-size:18px;line-height:1.35}
  .note .nbody{font-size:15px;color:var(--ink-soft)}
  .note .nbody strong{font-family:"Space Grotesk",sans-serif;font-weight:600;color:var(--ink);display:block;margin-bottom:3px}
  .note.idea{background:linear-gradient(120deg,color-mix(in srgb,var(--accent) 12%,#fff),#fff);border-color:color-mix(in srgb,var(--accent) 25%,#fff)}
  .note.pit{background:#FFF6F7;border-color:#F6D5DC}
  .note.pit .nbody strong{color:var(--hard)}
  pre{margin:0;padding:14px 16px;background:var(--code-bg);overflow-x:auto;border-radius:12px}
  pre code{font-size:13px;line-height:1.6;color:var(--c-text);white-space:pre}
  .codeblock{margin:20px 0}
  .tok-c{color:var(--c-comment);font-style:italic}.tok-s{color:var(--c-string)}.tok-n{color:var(--c-num)}.tok-k{color:var(--c-key)}.tok-t{color:var(--c-type)}
  .worked{border:1px solid var(--line);border-radius:15px;overflow:hidden;margin:24px 0;box-shadow:var(--shadow);background:#fff}
  .worked .whead{padding:12px 16px;background:var(--accent);color:#fff;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;display:flex;align-items:center;gap:9px}
  .worked .whead .wt{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
  .worked .wexp{padding:14px 16px 4px;font-size:15px;color:var(--ink-soft)}
  .worked pre{border-radius:0;margin-top:8px}
  .svg-wrap{background:#fff;border:1px solid var(--line);border-radius:15px;padding:22px 22px 16px;margin:24px 0;box-shadow:var(--shadow)}
  .svg-wrap svg{display:block;width:100%;height:auto}
  .svg-wrap .cap{font-size:13px;color:var(--muted);margin-top:13px;text-align:center;line-height:1.45}
  .svg-wrap .cap b{color:var(--ink-soft)}
  .complexity{display:inline-flex;align-items:center;gap:9px;font-family:"JetBrains Mono",monospace;font-size:12.5px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 13px;margin:4px 0}
  .complexity b{color:var(--accent)}
  .probwrap{margin-top:28px}
  .probwrap .pl{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px}
  .probs{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  .prob{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:9px;transition:transform .13s,box-shadow .13s,border-color .13s;position:relative;overflow:hidden}
  .prob::after{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--db)}
  .prob:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#d8d8e8}
  .badge{align-self:flex-start;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-family:"JetBrains Mono",monospace}
  .badge.easy{color:var(--easy);background:var(--easy-bg)}.badge.med{color:var(--med);background:var(--med-bg)}.badge.hard{color:var(--hard);background:var(--hard-bg)}
  .prob .pname{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;line-height:1.25}
  .prob .go{margin-top:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;font-weight:500}
  .prob .chk{position:absolute;top:13px;right:13px;width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;transition:all .15s;z-index:2}
  .prob .chk:hover{border-color:var(--db)}
  .prob .chk.done{background:var(--db);border-color:var(--db)}
  .prob .chk svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .15s}
  .prob .chk.done svg{opacity:1}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:6px;margin:16px 0;box-shadow:var(--shadow);overflow:hidden}
  .pcard .ptitle{display:flex;align-items:center;gap:10px;padding:13px 14px 11px;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15.5px}
  .pcard .ptitle .pin{width:9px;height:9px;border-radius:3px;background:var(--accent)}
  .pitem{display:grid;grid-template-columns:minmax(150px,230px) 1fr;border-top:1px solid var(--line)}
  @media (max-width:680px){.pitem{grid-template-columns:1fr}}
  .pitem .plabel{padding:13px 16px;font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;background:#fbfbfe}
  .pitem pre{border-radius:0}
  .cheatgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:24px}
  @media (max-width:760px){.cheatgrid{grid-template-columns:1fr}}
  .ccard{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
  .ccard .chead{padding:13px 16px;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;color:#fff;background:var(--cc);display:flex;align-items:center;gap:9px}
  .crow{display:flex;align-items:center;gap:10px;padding:9px 12px 9px 16px;border-top:1px solid var(--line)}
  .crow:first-of-type{border-top:none}
  .crow .clabel{font-size:12px;color:var(--muted);flex:0 0 38%;line-height:1.3}
  .crow code{flex:1;font-size:12.5px;color:var(--ink);background:#f6f6fb;padding:6px 9px;border-radius:7px;overflow-x:auto;white-space:nowrap}
  .crow .copy{flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:all .13s}
  .crow .copy:hover{color:var(--cc);border-color:var(--cc)}.crow .copy svg{width:14px;height:14px}.crow .copy.copied{background:var(--cc);color:#fff;border-color:var(--cc)}
  .demo{background:#fff;border:1px solid var(--line);border-radius:15px;padding:20px;margin:24px 0;box-shadow:var(--shadow)}
  .demo .dlabel{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .cells{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
  .cell{width:46px;height:46px;border-radius:11px;background:#f2f2f8;border:1.5px solid var(--line);display:grid;place-items:center;font-family:"JetBrains Mono",monospace;font-weight:600;font-size:15px;color:var(--ink-soft);position:relative;transition:all .3s ease}
  .cell.win{background:color-mix(in srgb,var(--accent) 16%,#fff);border-color:var(--accent);color:var(--ink)}
  .cell.lp,.cell.rp{background:var(--ink);color:#fff;border-color:var(--ink);transform:translateY(-3px)}
  .cell .ptr{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;color:var(--ink)}
  .demo .readout{margin-top:30px;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink-soft);min-height:20px}
  .demo .readout b{color:var(--accent)}
  .demo .dctrl{display:flex;gap:9px;margin-top:16px}
  .demo .dctrl button{font-family:"Inter",sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink);transition:all .13s}
  .demo .dctrl button:hover{border-color:var(--accent);color:var(--accent)}
  .demo .dctrl button.run{background:var(--accent);color:#fff;border-color:var(--accent)}
  .demo .dctrl button.run:hover{filter:brightness(1.06);color:#fff}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}
  @media (max-width:900px){
    body{display:block}
    .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 40px rgba(0,0,0,.3)}
    .sidebar.open{transform:translateX(0)}
    .topbar{display:flex;align-items:center;gap:13px;position:sticky;top:0;background:rgba(246,247,251,.9);backdrop-filter:blur(10px);padding:13px 18px;border-bottom:1px solid var(--line);z-index:40}
    .topbar .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#FF7CC0,#7FB4FF 55%,#5BE3B3);display:grid;place-items:center;color:#161235;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px}
    .topbar b{font-family:"Space Grotesk",sans-serif;font-size:15px;flex:1}
    .hamb{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer}
    .hamb svg{width:20px;height:20px;stroke:var(--ink);stroke-width:2}
    main{margin:0;padding:0 20px}.hero{padding:30px 0 26px}.lesson-head{padding:26px 0 2px}.probs{grid-template-columns:1fr}
    .pager .pg{max-width:48%}
    .scrim{position:fixed;inset:0;background:rgba(20,16,40,.4);z-index:45;opacity:0;pointer-events:none;transition:opacity .2s}.scrim.show{opacity:1;pointer-events:auto}
  }
</style>
</head>
<body>
<div class="topbar"><div class="mark">{}</div><b>C++ Course</b><button class="hamb" id="hamb" aria-label="Open menu"><svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button></div>
<div class="scrim" id="scrim"></div>
<aside class="sidebar" id="sidebar">
  <a class="brand" href="#/"><div class="mark">{}</div><div><h1>The 10-Week<br>C++ Interview Course</h1><span>concepts &#8594; patterns, interleaved</span></div></a>
  <div class="progress"><div class="ring"><svg width="46" height="46" viewBox="0 0 46 46"><circle cx="23" cy="23" r="19" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="4"/><circle id="ringFill" cx="23" cy="23" r="19" fill="none" stroke="#5BE3B3" stroke-width="4" stroke-linecap="round" stroke-dasharray="119.4" stroke-dashoffset="119.4"/></svg><div class="val" id="ringVal">0%</div></div><div class="lbl"><b id="doneCount">0</b> of <b id="totalCount">0</b><br>problems solved</div></div>
  <nav id="nav"></nav>
  <div class="side-foot">Each lesson is its own page. Use the sidebar or the Next button at the bottom of every page.</div>
</aside>
<main><div id="page"></div></main>
<script>
const KW=new Set(["for","while","do","if","else","return","int","char","bool","void","auto","const","true","false","nullptr","new","delete","class","struct","public","private","protected","using","double","long","unsigned","static","virtual","template","typename","this","break","continue","size_t","constexpr","noexcept","override"]);
const TY=new Set(["vector","string","unordered_map","unordered_set","map","set","pair","stack","queue","priority_queue","deque","greater","less","ListNode","TreeNode","unique_ptr","shared_ptr","weak_ptr","thread","mutex","atomic","function","cout"]);
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function highlight(code){
  const re=/(\/\/[^\n]*)|("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|(\b\d+\.?\d*\b)|([A-Za-z_]\w*)|(\s+)|([^\sA-Za-z0-9_]+)/g;
  let out="",m;
  while((m=re.exec(code))){

SVG.mental_passing=`<svg viewBox="0 0 620 320" role="img" aria-label="Parameter passing decision table">
<text x="310" y="26" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="14" font-weight="600" fill="#1B1838">how to take a parameter &#8212; the five choices</text>
<g font-family="JetBrains Mono,monospace" font-size="11.5">
<rect x="20" y="42" width="200" height="44" rx="9" fill="#F0FBF5" stroke="#16A34A"/>
<text x="120" y="64" text-anchor="middle" fill="#0f7a36" font-weight="600">const T&amp;</text>
<text x="120" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="10.5" fill="#3c6b4f">read it, don't copy</text>
<rect x="232" y="42" width="368" height="44" rx="9" fill="#FBFBFE" stroke="#E7E8F2"/>
<text x="248" y="62" font-family="Inter,sans-serif" font-size="11.5" fill="#3a3660">DEFAULT for any container/large type you only read.</text>
<text x="248" y="78" font-family="Inter,sans-serif" font-size="10.5" fill="#6f6b8c">No copy, can't mutate the caller's object. Cost: zero.</text>
<rect x="20" y="96" width="200" height="44" rx="9" fill="#EEF0FF" stroke="#5B5BD6"/>
<text x="120" y="118" text-anchor="middle" fill="#4b3fc0" font-weight="600">T&amp;</text>
<text x="120" y="134" text-anchor="middle" font-family="Inter,sans-serif" font-size="10.5" fill="#5b4f86">mutate in place</text>
<rect x="232" y="96" width="368" height="44" rx="9" fill="#FBFBFE" stroke="#E7E8F2"/>
<text x="248" y="116" font-family="Inter,sans-serif" font-size="11.5" fill="#3a3660">You need to change the caller's object (out-param, sort).</text>
<text x="248" y="132" font-family="Inter,sans-serif" font-size="10.5" fill="#6f6b8c">No copy. Caller sees the edits. Can't bind a temporary.</text>
<rect x="20" y="150" width="200" height="44" rx="9" fill="#FFF7EC" stroke="#FF8A3D"/>
<text x="120" y="172" text-anchor="middle" fill="#c2660f" font-weight="600">T   (by value)</text>
<text x="120" y="188" text-anchor="middle" font-family="Inter,sans-serif" font-size="10.5" fill="#9c5a14">cheap, or need a copy</text>
<rect x="232" y="150" width="368" height="44" rx="9" fill="#FBFBFE" stroke="#E7E8F2"/>
<text x="248" y="170" font-family="Inter,sans-serif" font-size="11.5" fill="#3a3660">int/double/pointer, OR you want your own copy to mutate.</text>
<text x="248" y="186" font-family="Inter,sans-serif" font-size="10.5" fill="#6f6b8c">Copies. Free for small types, O(n) for containers.</text>

{group:"Orientation",num:"·",id:"how",color:"#6366F1",title:"How interviews actually work",blocks:[
  p(`A coding interview is not a test of how much computer science you remember. It's a 35-minute window where someone watches you take a vague problem, ask the right questions, pick an approach, write working code, and reason about whether it's correct and efficient — all while talking. The code is maybe half the score. The rest is the thinking they can hear.`),
  p(`That's good news for you. You ship real C++ in a game engine; you already debug, reason about performance, and write code under pressure. What's rusty is the narrow, artificial skill of mapping a word problem to one of a dozen reusable patterns and coding it cleanly on the spot. That skill is fully learnable, and it's exactly what this course drills.`),
  sub("The loop to run on every problem"),
  ul([
    `<b>Clarify first.</b> Restate the problem in your words. Ask about input size, types, duplicates, empty inputs, and sorted-ness. Confirm one tiny example by hand. This alone separates strong candidates — it shows you don't code on assumptions.`,
    `<b>Brute force out loud.</b> Say the obvious O(n²) or exponential approach before you write anything. It proves you understand the problem and gives you a correctness baseline to improve from.`,
    `<b>Find the pattern.</b> "It's sorted → two pointers or binary search." "I need fast lookups → a hash map." Recognizing the pattern is the whole game, and it's what the pattern lessons train.`,
    `<b>Code it, narrating.</b> Talk through each line. Silence reads as being stuck; narration reads as competence even when you pause to think.`,
    `<b>Test it yourself.</b> Walk a small example through your code, out loud, before you say "done." Catch your own bug and you look senior; let them catch it and you look careless.`,
  ]),
  idea("The one habit that matters most","Think before you type, and say what you're thinking. Interviewers can't grade silent brilliance — they grade the reasoning you externalize. Treat every problem as a conversation, not a quiz."),
  sub("How this course is built"),
  p(`Ten weeks, concepts and patterns interleaved. The order is deliberate: you'll learn a C++ idea, then immediately hit the patterns that use it. Pointers come <em>before</em> Two Pointers and linked lists; memory and ownership come <em>before</em> the data structures that lean on them. Don't skip the foundations — Big-O and the memory model are the lens you'll view every later problem through.`),
  p(`Each lesson is its own page. Move with the sidebar, or the Previous / Next buttons at the bottom of every page. For each pattern, read the lesson, do the Easy to feel the shape, the Medium to make it stick, and the Hard only when the Medium feels routine. Check problems off and watch the ring fill.`),
]},
{group:"Week 1 · Foundations",num:"∞",id:"bigo",color:"#0EA5E9",title:"Big-O & Complexity",badge:"Week 1 · Foundations",blocks:[
  cue(`Almost every interview ends with "what's the time and space complexity?" If you can't answer crisply, a correct solution still loses points. Worse, you can't <em>choose</em> between approaches without it. This is the vocabulary the whole field reasons in — and the one tool that tells you, before you run anything, whether a solution will survive a large input.`),
  p(`Big-O describes how the work an algorithm does <em>grows</em> as the input gets bigger. It deliberately ignores constant factors and hardware. We don't care that one machine is twice as fast or that one loop has a few extra instructions; we care about the <em>shape</em> of the growth — whether doubling the input doubles the work (linear), barely changes it (logarithmic), or quadruples it (quadratic). That shape is what decides whether your code finishes in milliseconds or melts on a large input.`),
  sub("What growth actually means"),
  p(`Forget the formalism for a second. The whole point of Big-O is a single question: <em>if I double the input, what happens to the running time?</em> That ratio is the entire personality of an algorithm. A linear algorithm doubles. A quadratic one quadruples. A logarithmic one adds one cheap step. An exponential one doubles in <em>cost</em> every time you add a single element. Here's what that feels like as <code>n</code> grows from 10 to a million:`),
  ul([
    `<b>O(1)</b> — 1 step, always. n=10 or n=1,000,000: still 1.`,
    `<b>O(log n)</b> — about 3, 10, then 20 steps. Going from a thousand to a million adds only ~10 steps. This barely notices your input.`,
    `<b>O(n)</b> — 10, then 1,000, then 1,000,000 steps. Doubling n doubles the work. Honest and predictable.`,
    `<b>O(n log n)</b> — ~33, then ~10,000, then ~20,000,000. A little worse than linear; still completely practical at a million.`,
    `<b>O(n&#178;)</b> — 100, then 1,000,000, then a <em>trillion</em>. A million-element input is already hopeless: that loop will not finish.`,
    `<b>O(2&#8319;)</b> — 1,024 at n=10, and at n=64 it exceeds the number of atoms estimated in the observable universe. Usable only for tiny n.`,
  ]),
  idea("The mental shortcut",`You don't multiply out operations in your head. You ask one thing: <em>"when the input doubles, does the work stay flat, double, or square?"</em> Flat is O(log n) or O(1), doubling is O(n), squaring is O(n&#178;). That single reflex covers most of what interviewers want to hear.`),
  svg("bigo","The same input size, wildly different costs. The gap between O(n) and O(n&#178;) is small for tiny inputs and catastrophic for large ones &#8212; which is exactly why interviewers push you from one to the other."),
  sub("The definition, made friendly"),
  p(`Formally, an algorithm is O(f(n)) if, beyond some input size, its running time is at most a constant multiple of f(n). The phrase that matters in that sentence is <em>at most a constant multiple</em>. It's an upper bound on growth, with constant factors deliberately allowed to vanish. That's why we follow two rules every single time: <b>drop the constants</b>, and <b>drop the lower-order terms</b>.`),
  p(`<em>Drop constants:</em> O(2n), O(500n), and O(n/3) are all just O(n). The factor depends on your machine, your compiler, and how you counted "an operation" &#8212; none of which says anything about how the algorithm <em>scales</em>. <em>Drop lower-order terms:</em> O(n&#178; + n) is just O(n&#178;), because once n is large the n&#178; term dwarfs the n. We keep only the single fastest-growing piece, because that piece eventually decides everything.`),
  svg("bigo_drop","Three terms of <code>3n&#178; + 50n + 200</code> plotted separately. The constant is flat, the linear term grows, but the quadratic term outruns both &#8212; so for large n the total <em>is</em> the n&#178; curve. That's why we throw the rest away and call it O(n&#178;)."),
  note("&#9888;&#65039;","Big-O is an upper bound, not the whole story",`Strictly, Big-O (O) is an upper bound, Big-Omega (&#937;) a lower bound, and Big-Theta (&#920;) a tight bound that's both. In interviews everyone says "Big-O" and means the tight bound &#8212; "this is O(n log n)" is understood as "it grows like n log n." You won't be docked for the informality, but knowing the distinction exists is a nice senior signal if sorting comes up.`),
  sub("The growth rates you must know on sight"),
  ul([
    `<b>O(1) &#8212; constant.</b> The work doesn't depend on input size. Array index, hash map lookup, pushing to a stack. The gold standard.`,
    `<b>O(log n) &#8212; logarithmic.</b> Each step throws away half the remaining data. Binary search, balanced-tree operations. Doubling n adds just one step &#8212; absurdly scalable.`,
    `<b>O(n) &#8212; linear.</b> You touch each element a constant number of times. A single loop over an array. Usually the target for "process every item" problems.`,
    `<b>O(n log n) &#8212; linearithmic.</b> The speed limit for comparison sorting (<code>sort()</code>), and where many "sort then sweep" solutions land.`,
    `<b>O(n&#178;) &#8212; quadratic.</b> A loop inside a loop &#8212; every pair. Fine for small n, a red flag for large n. Most pattern work is about escaping this.`,
    `<b>O(2&#8319;) / O(n!) &#8212; exponential / factorial.</b> Trying every subset or permutation. Backtracking lives here; you survive it only by pruning hard.`,
  ]),
  p(`It helps to attach each rate to a line of C++ you'd actually recognize on sight. Same loops, six different growth shapes:`),
  code(`v[i];                                  // O(1)    one indexed access, no scan
for (int x : v) sum += x;              // O(n)    one pass, touch each element once

while (lo < hi) {                      // O(log n) halve the range each step
    int mid = (lo + hi) / 2;
    if (v[mid] < target) lo = mid + 1;
    else                 hi = mid;
}

sort(v.begin(), v.end());              // O(n log n)  the comparison-sort speed limit

for (int i = 0; i < n; i++)            // O(n^2)   every pair: n choices of i
    for (int j = i + 1; j < n; j++)    //          times ~n choices of j
        consider(v[i], v[j]);

subsets(v, 0);                         // O(2^n)   each element in or out -> 2^n combos`),
  sub("How to actually read it off code"),
  p(`Counting complexity is mechanical once you internalize three rules. <b>Sequential steps add;</b> nested steps multiply. Two separate loops over the array are O(n) + O(n) = O(n). A loop inside a loop, both over the array, is O(n &#183; n) = O(n&#178;). <b>A loop that halves its range</b> each step contributes a log n factor. <b>Keep only the dominant term</b> at the end. Walk through the structure of the code, multiply nested loops, add sequential blocks, drop everything but the leader.`),
  worked("Reading complexity off nested loops","Two nested loops over the same array means every pair is visited &#8212; n choices for i times n for j. That's the classic O(n&#178;) you'll be asked to beat. Note the inner loop starts at i+1: it runs ~n/2 times on average, but constants drop, so it's still O(n&#178;).",
`vector<int> v = {...};            // size n
for (int i = 0; i < v.size(); i++) {       // runs n times
    for (int j = i + 1; j < v.size(); j++) // runs ~n times each
        if (v[i] + v[j] == target)         // O(1) work inside
            return {i, j};
}
// total: n * n = O(n^2) time, O(1) extra space`),
  worked("Sequential beats nested: sort then sweep","A sort followed by a single pass is O(n log n) + O(n). The two phases are sequential, so they ADD, and the n log n dominates &#8212; the final answer is O(n log n), not O(n&#178;). People misread this as nested because there's a loop after the sort; it isn't.",
`sort(v.begin(), v.end());          // O(n log n)
int dupes = 0;
for (int i = 1; i < v.size(); i++) // O(n) -- one sweep, sequential
    if (v[i] == v[i - 1]) dupes++;
// O(n log n) + O(n) = O(n log n) time, O(1) or O(n) space (depends on sort)`),
  worked("A halving loop is O(log n), and nesting one makes O(n log n)","An inner loop whose counter multiplies (or whose range halves) runs about log n times, not n times. Put that inside an O(n) outer loop and you get O(n log n) &#8212; the same shape as a sort, reached a different way.",
`for (int i = 0; i < n; i++)        // O(n) outer
    for (int j = 1; j < n; j *= 2) // O(log n): j doubles, ~log2(n) iterations
        work(i, j);
// total: n * log n = O(n log n)`),
  sub("Recursion: count the tree, not the lines"),
  p(`Recursion trips people up because the work isn't written as visible loops &#8212; it's hidden in the call tree. The trick is to count two things: how many calls happen, and how much each one does. For a single chain of recursion (factorial, walking a linked list recursively), there are n calls each doing O(1), so it's O(n) time and &#8212; this part is easy to forget &#8212; O(n) <em>space</em> for the call stack, because all n frames are live at once.`),
  p(`For branching recursion, sketch the call tree and add up the work per level. The canonical case is divide-and-conquer like merge sort: <code>T(n) = 2&#183;T(n/2) + O(n)</code> &#8212; two half-size subproblems plus O(n) to combine them. Each level of the tree does O(n) total work, and the tree is log&#8322;n levels deep (because halving repeatedly reaches 1 in log&#8322;n steps), so the whole thing is O(n) &#215; log n = O(n log n). You don't need the Master Theorem in an interview; you need to picture the tree.`),
  svg("bigo_rec","The recursion tree for <code>T(n) = 2T(n/2) + O(n)</code>. Each level's boxes sum to n units of work, and halving gives log&#8322;n levels &#8212; so the total is O(n log n). Sketching this tree out loud is exactly how you'd justify merge sort's complexity in the room."),
  note("&#128161;","Exponential recursion has a recurrence too",`Naive recursive Fibonacci is <code>T(n) = T(n-1) + T(n-2) + O(1)</code> &#8212; the tree branches in two and barely shrinks, giving roughly O(2&#8319;). Recognizing that this recurrence is exponential (and that memoizing collapses it to O(n)) is a textbook dynamic-programming setup you'll meet again in Week 8.`),
  sub("Don't forget space"),
  p(`Space complexity counts the <em>extra</em> memory you allocate as input grows &#8212; not the input itself. A hash map holding up to n entries is O(n) space. A few scalar variables are O(1), no matter how big n is. And the one people forget: <b>recursion costs O(depth) for the call stack</b>. A balanced tree recursion is O(log n) deep; a linked-list or skewed-tree recursion is O(n) deep and can literally blow the stack on a large input. Always account for the stack as part of your space answer.`),
  p(`Interviewers love the time-vs-space trade, so be ready to name it. Two Sum goes from O(n&#178;) time / O(1) space to O(n) time / O(n) space by spending memory on a hash map to buy speed. "I can make this faster by using O(n) extra space for a map" is exactly the sentence that shows you're reasoning about both axes on purpose, not by accident.`),
  sub("Amortized complexity &#8212; the one interviewers use to separate the field"),
  p(`Some operations are <em>usually</em> cheap but <em>occasionally</em> expensive, and amortized analysis describes their average cost across a whole sequence of calls. The textbook example is <code>vector::push_back</code>. A vector keeps a fixed-size buffer; most push_backs just drop the new element into an empty slot &#8212; O(1). But when the buffer fills up, the vector allocates a bigger one (typically <em>double</em> the size), copies every existing element across, and frees the old buffer &#8212; an O(n) operation. So a single push_back is, every so often, genuinely O(n).`),
  p(`Yet because the capacity <em>doubles</em> each time, those expensive resizes happen rarely and geometrically less often as the vector grows. Add up all the copying across n pushes and the total is bounded by about 2n &#8212; so the average cost per push_back works out to O(1). That's what "amortized O(1)" means: not every call is constant, but the average over a long run provably is. This is one of the most common C++ interview questions precisely because it separates people who memorized "push_back is O(1)" from people who understand <em>why</em>.`),
  worked("Why doubling gives amortized O(1)","The cost of all the copies across n pushes is 1 + 2 + 4 + ... + n &#8212; a geometric series that sums to less than 2n, not n&#178;. Spread that total over n pushes and each one costs O(1) on average. This is also why reserving up front matters: it skips every resize.",
`vector<int> v;
v.reserve(n);                  // pre-size the buffer ONCE: now zero resizes
for (int i = 0; i < n; i++)
    v.push_back(i);            // every push is a true O(1) -- no reallocation
// without reserve: still amortized O(1), but ~log2(n) resizes happen along the way

// the geometric sum behind it:
// 1 + 2 + 4 + ... + n  <  2n   -> total copying is O(n), so O(1) per push`),
  note("&#9878;&#65039;","Amortized vs average-case",`These two get confused constantly. <b>Amortized</b> is averaged over a sequence of operations and holds as a worst-case guarantee &#8212; push_back is amortized O(1) no matter what you do. <b>Average-case</b> depends on the input distribution &#8212; a hash map lookup is average-case O(1), but a pathological set of keys could in theory degrade it toward O(n). Naming the right one out loud signals real understanding.`),
  sub("Best, worst, and average &#8212; when they differ"),
  p(`A single algorithm can have different complexities depending on the input. Quicksort is O(n log n) on average but O(n&#178;) in the worst case (an already-sorted input with a naive pivot). A hash lookup is O(1) average, O(n) worst (everything collides into one bucket). When you state complexity, default to the <em>worst case</em> unless asked otherwise &#8212; that's the guarantee an interviewer cares about &#8212; but flag it if the average is meaningfully better and likely in practice. "Average O(1), worst case O(n) if the hashes collide" is a crisp, honest answer.`),
  pit("The trap that costs offers","Calling <code>.substr()</code>, copying a vector, or building a new string inside a loop quietly adds an O(n) factor you forgot to count. A loop that looks O(n) but copies an n-length string each iteration is secretly O(n&#178;). Hidden costs also hide inside innocent-looking STL calls &#8212; <code>s.find(...)</code>, inserting into the middle of a vector, or <code>string + string</code> in a loop. Always ask: what does each line <em>really</em> cost?"),
  pit("Counting a constant as a variable","Not every loop is O(n). A loop that runs a fixed number of times &#8212; over the 26 letters of the alphabet, or 32 bits of an int &#8212; is O(1) with respect to your input, no matter how large n gets. Conversely, an inner loop bounded by some <em>other</em> input m is O(m), giving O(n&#183;m) total, not O(n&#178;). Be precise about which quantity each loop actually depends on."),
  sub("Saying it in the room"),
  p(`Stating complexity out loud is a learnable reflex, and interviewers listen for it. The format is always the same: <em>"This is O(&#8230;) time and O(&#8230;) space, because &#8230;"</em> &#8212; the "because" is what earns the points, since it proves you derived it rather than guessed. Practice attaching that one sentence to every solution you write until it's automatic.`),
  note("&#128204;","Say it like this in the room",`"This runs in O(n log n) time because of the sort, and O(n) space for the hash map." Or: "It's O(n) time &#8212; one pass &#8212; and O(1) space; I'm only keeping a couple of pointers." One clean sentence, always with the reason. If you've improved an earlier approach, say the trade explicitly: "the brute force was O(n&#178;); I traded O(n) space for a hash map to get it to O(n)."`),
  note("&#10067;","The Big-O questions you'll actually be asked",`Have one-liners ready for the classics: <b>"What's the complexity of <code>push_back</code>?"</b> &#8212; amortized O(1), because the buffer doubles. <b>"Of looking up in an <code>unordered_map</code>?"</b> &#8212; O(1) average, O(n) worst on collisions. <b>"Of <code>std::sort</code>?"</b> &#8212; O(n log n). <b>"Of inserting into a <code>map</code> (red-black tree)?"</b> &#8212; O(log n). <b>"Can you do better than O(n&#178;)?"</b> &#8212; almost always the cue to reach for a hash map, two pointers, or sorting first.`),
  cx(`On sight: <b>O(1)</b> &#8226; <b>O(log n)</b> &#8226; <b>O(n)</b> &#8226; <b>O(n log n)</b> &#8226; <b>O(n&#178;)</b> &#8226; <b>O(2&#8319;)</b> &#8212; nested multiplies, sequential adds, keep the leader`)
]},
{group:"Week 1 · Foundations",num:"→*",id:"pointers",color:"#5B5BD6",title:"Pointers & Memory",badge:"Week 1 · C++ deep dive",blocks:[
  cue(`Pointers feel like the scary part of C++. They're not &#8212; a pointer is just a variable that stores a memory address. You need them for linked lists and trees, they're the foundation under references and smart pointers, and they're what makes "Two Pointers" click. We do this <em>before</em> all of that on purpose, and we go deep: by the end you should be able to whiteboard pointer arithmetic, <code>const</code> placement, and use-after-free without flinching.`),
  sub("The mental model: memory is a giant array of cells"),
  p(`Picture your program's memory as one enormous array of byte-sized cells, each with a numeric index called its <em>address</em>. Every variable you declare is just a named region of those cells. When you write <code>int x = 42;</code>, the compiler reserves four consecutive bytes somewhere, labels that location <code>x</code>, and writes <code>42</code> into it. Normally you refer to <code>x</code> by name and never think about the address. A pointer flips that around: it's a variable whose <em>value is an address</em> &#8212; it doesn't hold <code>42</code>, it holds "the location where the 42 lives."`),
  p(`Hold that picture &#8212; boxes (variables) sitting at numbered addresses, and pointers as arrows from one box to another &#8212; and almost every pointer bug and trick becomes something you can <em>see</em> rather than memorize.`),
  sub("The two operators: &amp; and *"),
  p(`Two operators are the whole game. <code>&amp;</code> (address-of) gives you the address of a variable. <code>*</code> (dereference) takes an address and gives you the value living there. They're inverses: <code>*(&amp;x)</code> is just <code>x</code> again.`),
  code(`int x = 42;
int* p = &x;     // p holds the ADDRESS of x   (int* reads as "pointer to int")
cout << *p;      // dereference: follow the address -> prints 42
*p = 100;        // write THROUGH the pointer  -> x is now 100
cout << p;       // prints the address itself, e.g. 0x7ffe...a4`),
  svg("pointer","A pointer stores an address (left) that refers to where the real variable lives (right). <code>&amp;x</code> gets that address; <code>*p</code> follows it back to the value. Picture boxes and arrows and pointers stop being mysterious."),
  p(`One source of early confusion: the <code>*</code> symbol does two different jobs. In a <em>declaration</em>, <code>int* p</code> means "p is a pointer." In an <em>expression</em>, <code>*p</code> means "dereference p." Same character, two roles &#8212; once you notice which context you're in, it reads cleanly.`),
  sub("Declaration syntax: int* p vs int *p, and the one-line trap"),
  p(`<code>int* p</code> and <code>int *p</code> and <code>int * p</code> are <em>identical</em> to the compiler &#8212; whitespace around the <code>*</code> is cosmetic. The <code>int*</code> style groups the star with the type ("pointer-to-int p"); the <code>int *p</code> style groups it with the name. Pick one and be consistent; this course uses <code>int* p</code>. But there is a real gotcha hiding behind that choice:`),
  code(`int* a, b;     // SURPRISE: a is int*, but b is a plain int
int *a, *b;    // both pointers -- the star binds to the NAME, not the type
int *a, b, *c; // a and c are pointers, b is an int`),
  pit(`The star binds to the name, not the type`,`In a multi-variable declaration the <code>*</code> applies only to the identifier it sits next to. <code>int* a, b;</code> reads to a human like "two int pointers," but <code>b</code> is an ordinary <code>int</code>. This is exactly why many style guides say <b>declare one pointer per line</b> &#8212; it sidesteps the ambiguity entirely. If an interviewer writes <code>int* a, b;</code> on the whiteboard and asks what <code>b</code> is, the answer is <code>int</code>.`),
  sub("nullptr and the #1 pointer crash"),
  p(`A pointer can point at nothing &#8212; that's <code>nullptr</code> (prefer it over the old <code>NULL</code> or a bare <code>0</code>; <code>nullptr</code> is properly typed and won't be mistaken for an integer in overload resolution). Dereferencing a null pointer (or any invalid one) is undefined behavior, almost always a crash (a "segfault"). The single most common pointer bug in interviews is dereferencing null. The discipline is simple and you should make it automatic: before you ever write <code>*p</code> or <code>p-&gt;something</code>, be sure <code>p</code> isn't null.`),
  code(`ListNode* node = nullptr;
if (node != nullptr) {       // guard first
    use(node->val);          // now it's safe to follow the pointer
}`),
  note(`&#129504;`,`An uninitialized pointer is worse than null`,`A null pointer at least crashes <em>predictably</em>. A pointer you declared but never assigned (<code>int* p;</code> then <code>*p = 5;</code>) holds whatever garbage was in that stack slot &#8212; it might point at random valid-looking memory and corrupt something far away, producing a bug that shows up nowhere near its cause. Always initialize pointers, to <code>nullptr</code> if you have nothing else yet.`),
  sub("Pointer arithmetic and the array/pointer duality"),
  p(`Here is the fact that ties arrays and pointers together: an array name decays into a pointer to its first element, and indexing is <em>defined</em> in terms of pointer arithmetic. <code>a[i]</code> is literally <code>*(a + i)</code>. Adding <code>1</code> to a pointer does not add one byte &#8212; it advances by one whole element, <code>sizeof(element)</code> bytes. The pointer's type is what sets that stride.`),
  code(`int a[4] = {10, 20, 30, 40};
int* p = a;          // a decays to &a[0]
cout << *p;          // 10
cout << *(p + 2);    // 30   -- p+2 skips two ints, i.e. 8 bytes
cout << a[2];        // 30   -- same thing: a[2] == *(a + 2)
cout << p[2];        // 30   -- a pointer can be indexed too

// the duality even makes this legal (and cursed):
cout << 2[a];        // 30   -- because 2[a] == *(2 + a) == *(a + 2)`),
  svg("pointers_arith","An array name is a pointer to its first element, and <code>a[i]</code> is shorthand for <code>*(a + i)</code>. Each step of pointer arithmetic moves by one whole element &#8212; the element type sets the byte stride, which is why the same <code>+1</code> means 4 bytes for <code>int*</code> and 8 for <code>double*</code>."),
  p(`This is also why a raw array passed to a function "loses its size": the parameter is really a pointer, so <code>sizeof</code> inside the function gives the size of a pointer, not the array. It's the single biggest reason interview and production code reaches for <code>std::vector</code> and <code>std::array</code> instead of raw C arrays.`),
  sub("const and pointers: read right-to-left"),
  p(`<code>const</code> next to a pointer trips people up because there are two different things it could be locking: the thing pointed at, or the pointer itself. The reliable way to parse any declaration is to <em>read it right-to-left from the variable name</em>, treating <code>const</code> as binding to whatever is immediately to its left (or, if nothing is to its left, to its right).`),
  code(`int x = 1, y = 2;

const int* p   = &x;   // "pointer to const int": can't change *p, can repoint p
int* const q   = &x;   // "const pointer to int": can change *q, can't repoint q
const int* const r = &x; // both locked: can't change *r and can't repoint r

p = &y;     // OK   -- repointing the pointer is allowed
*p = 9;     // ERROR -- the int it points at is const through p
q = &y;     // ERROR -- q itself is const
*q = 9;     // OK   -- the int is writable through q`),
  svg("pointers_const","Where <code>const</code> sits decides what is frozen. <code>const int*</code> protects the pointed-to value (you may still repoint); <code>int* const</code> freezes the pointer (you may still write through it); <code>const int* const</code> freezes both. Read right-to-left from the name and it is unambiguous every time."),
  note(`&#128221;`,`Why const int* is everywhere`,`<code>const int*</code> (pointer-to-const) is the common one: it's how a function says "I'll read through this pointer but never modify what it points at." It's the pointer cousin of passing <code>const vector&lt;int&gt;&amp;</code>. Reach for it on any pointer parameter you only read from &#8212; it documents intent and lets the caller pass pointers to const data.`),
  sub("void* and double pointers, briefly"),
  p(`A <code>void*</code> is a "pointer to anything" &#8212; an address with the type stripped off. You can't dereference it (the compiler doesn't know the element size) until you cast it back to a real type. It shows up in C-style APIs, <code>memcpy</code>, and type-erased callbacks. In modern C++ you rarely need it; templates and <code>std::any</code> usually express the same idea with type safety. Know what it is so it doesn't surprise you, then prefer not to write it.`),
  p(`A <em>pointer to a pointer</em> (<code>int**</code>) is exactly what it sounds like: a variable holding the address of a pointer. Each <code>*</code> follows one arrow. You meet it when a function needs to modify the caller's <em>pointer</em> (not just the pointed-to value) &#8212; for example, allocating a node and storing it into the caller's <code>head</code> &#8212; and in arrays-of-pointers like the classic <code>int main(int argc, char** argv)</code>.`),
  code(`int x = 42;
int*  p  = &x;     // p points at x
int** pp = &p;     // pp points at p

cout << *pp;       // prints p (an address)
cout << **pp;      // prints 42 -- follow two arrows`),
  svg("pointers_double","A double pointer is a chain of addresses: <code>pp</code> holds the address of <code>p</code>, which holds the address of <code>x</code>. Each <code>*</code> peels off one level &#8212; <code>*pp</code> is <code>p</code>, <code>**pp</code> is the <code>42</code>. The same indirection is why modifying a caller's pointer needs a pointer-to-pointer (or a reference-to-pointer)."),
  note(`&#128161;`,`The idiomatic modern alternative`,`You'll see <code>int**</code> in C and older C++ for "let the function change my pointer." In modern C++ the cleaner spelling is a <em>reference to a pointer</em>: <code>void push(ListNode*&amp; head)</code> reads better than <code>void push(ListNode** head)</code> and drops a layer of <code>*</code> at every use. Recognize both; write the reference version.`),
  sub("Stack vs heap: where memory comes from"),
  p(`Local variables live on the <em>stack</em>: created automatically when a function runs, destroyed automatically when it returns. Fast and effortless, but their lifetime is tied to the scope they're in. The <em>heap</em> is a large pool you allocate from explicitly with <code>new</code>, and whatever you put there lives until you <code>delete</code> it. You reach for the heap when an object must outlive the function that created it &#8212; like the nodes of a linked list or tree, which have to persist after the function that built them returns.`),
  svg("heap","Stack memory is automatic and scope-bound; heap memory is manual and lives until you free it. Data structures live on the heap because their nodes must outlast the function that created them."),
  code(`int* p = new int(5);      // allocate one int on the heap
// ... use *p ...
delete p;                 // free a single object

int* arr = new int[10];   // allocate an array on the heap
delete[] arr;             // arrays need delete[], not delete`),
  pit(`Match new with delete, new[] with delete[]`,`Using <code>delete</code> on memory you got from <code>new[]</code> (or vice versa) is undefined behavior, even though it often "looks" fine. This bookkeeping is exactly the kind of thing humans forget under interview pressure &#8212; which is the whole motivation for smart pointers, where the right cleanup is chosen for you. We cover those in the RAII &amp; Smart Pointers lesson; for now, every <code>new</code> you write should have a matching <code>delete</code> you can point to.`),
  sub("Leaks, dangling pointers, and use-after-free"),
  p(`Two failure modes account for most heap bugs. A <b>memory leak</b> is allocating with <code>new</code> and never <code>delete</code>-ing &#8212; the memory is never reclaimed and a long-running program bloats until it dies. A <b>dangling pointer</b> is a pointer that still holds an address whose memory has already been freed or gone out of scope; using it is <em>use-after-free</em>, classic undefined behavior. The nastiest version is returning the address of a local variable:`),
  worked("A dangling-pointer bug and its fix","The local <code>result</code> lives on the stack frame of <code>makeBad</code>. The instant the function returns, that frame is gone and the returned pointer dangles &#8212; it points at memory that's been reclaimed and may now hold anything. The fix is to give the value a lifetime that outlives the call: return by value, or allocate on the heap (and, in real code, hand back a smart pointer so it's freed automatically).",
`int* makeBad() {
    int result = 99;
    return &result;        // BUG: &result dangles the moment we return
}                          // 'result' is destroyed here

// Fix 1 -- return by value; the caller gets its own copy:
int makeGood() {
    int result = 99;
    return result;         // safe: a value, not an address into a dead frame
}

// Fix 2 -- if it truly must outlive the call, allocate on the heap.
// In modern C++ you'd return unique_ptr<int> so cleanup is automatic.
int* makeOnHeap() {
    return new int(99);    // caller owns it and must delete it
}`),
  pit("Set freed pointers to nullptr","After <code>delete p;</code>, <code>p</code> still holds the old (now invalid) address &#8212; it's dangling. A second <code>delete p;</code> is a double-free (undefined behavior), and any later <code>*p</code> is use-after-free. Assigning <code>p = nullptr;</code> right after <code>delete</code> turns a silent corruption into a loud, predictable null-deref crash, and makes a second delete a harmless no-op. Better still, let a smart pointer own it and never write the <code>delete</code> at all."),
  sub("Pointers vs references &#8212; binding, reseating, idiom"),
  p(`A <em>reference</em> (<code>int&amp; r = x;</code>) is an alias &#8212; a second name for an existing variable. It must bind to a valid object the moment it's created, it can't be null, and it can't be <em>reseated</em> to refer to something else afterward (assigning to a reference assigns to the referent, it doesn't repoint the reference). A <em>pointer</em> is a variable that holds an address: it can be null, can start uninitialized, and you can repoint it at different objects over time.`),
  ul([
    `<b>Can it be null / absent?</b> Pointer yes, reference no. If "no object" is a legal state, you need a pointer (or <code>std::optional</code>).`,
    `<b>Will you reseat it?</b> Walking a linked list means repointing <code>cur</code> each step &#8212; that <em>requires</em> a pointer. A reference can't be moved.`,
    `<b>Just aliasing one known object?</b> Reach for a reference &#8212; function parameters you won't reassign, range-based <code>for</code> loops, returning access to a member. It's cleaner and can't be null.`,
  ]),
  idea(`The one-line rule`,`Use a <em>reference</em> when you always have exactly one valid object and won't repoint it; use a <em>pointer</em> when the target may be absent (null) or you need to move it around. References are for "this <em>is</em> that object"; pointers are for "this <em>locates</em> an object, possibly none, possibly a different one later."`),
  sub("Using pointers to modify or \"return\" through parameters"),
  p(`Because C++ passes by value by default, a function can't change a caller's variable just by taking it as a parameter &#8212; it gets a copy. Passing a <em>pointer</em> (or reference) hands the function the caller's actual location, so writes land on the original. This is how you "return" more than one value, or modify in place.`),
  worked("Swap through pointers","The textbook demonstration of why pointers matter. Pass the addresses of two variables; dereference to read and write the originals. A by-value version would only swap the function's private copies and the caller would see nothing change. (In real C++ you'd take <code>int&amp;</code> parameters &#8212; same mechanism, cleaner syntax &#8212; but the pointer version makes the indirection explicit.)",
`void swap(int* a, int* b) {
    int tmp = *a;     // read through a
    *a = *b;          // write the caller's first variable
    *b = tmp;         // write the caller's second variable
}

int x = 1, y = 2;
swap(&x, &y);         // pass ADDRESSES, not values
// now x == 2, y == 1`),
  worked("Modify in place through a pointer parameter","A second common shape: the function reaches through the pointer to mutate the caller's data directly, returning nothing. The pointer is the channel that lets the change escape the function.",
`// Double every element of a C-style array in place.
void doubleAll(int* arr, int n) {
    for (int i = 0; i < n; i++)
        arr[i] *= 2;          // arr[i] == *(arr + i); writes the caller's array
}

int data[4] = {1, 2, 3, 4};
doubleAll(data, 4);           // 'data' decays to a pointer to its first element
// data is now {2, 4, 6, 8}`),
  sub("The arrow operator (you'll type this constantly)"),
  p(`When a pointer points at a struct or class, <code>p-&gt;member</code> is shorthand for <code>(*p).member</code> &#8212; dereference, then access the field. The parentheses matter: <code>*p.member</code> would parse as <code>*(p.member)</code>, which is wrong, so the <code>-&gt;</code> arrow exists to make the common case clean. In linked-list and tree problems, <code>node-&gt;val</code>, <code>node-&gt;next</code>, and <code>node-&gt;left</code> are everywhere. It's just "follow the pointer, then grab the field."`),
  worked("Walking a linked list","A linked list is just nodes connected by pointers. Traversing one is the canonical pointer loop: look at the node you're pointing at, then move the pointer to the next node, until you fall off the end (null). Notice how every piece of this lesson shows up at once &#8212; a reseatable pointer, the null check, and the arrow operator.",
`// struct ListNode { int val; ListNode* next; };
int sumList(ListNode* head) {
    int total = 0;
    ListNode* cur = head;          // a pointer we'll advance (reseatable!)
    while (cur != nullptr) {        // stop when we run off the end
        total += cur->val;          // read the current node's field
        cur = cur->next;            // move the pointer forward
    }
    return total;
}`),
  sub("The bridge to smart pointers"),
  p(`Everything painful above &#8212; remembering to <code>delete</code>, matching <code>new[]</code> with <code>delete[]</code>, nulling dangling pointers, avoiding double-frees &#8212; is manual bookkeeping the compiler could do for you. That's the entire pitch of <em>smart pointers</em> (<code>unique_ptr</code>, <code>shared_ptr</code>), which own a heap allocation and free it automatically when they go out of scope. In modern C++ you almost never write a raw <code>new</code>/<code>delete</code> in application code; raw pointers survive as <em>non-owning</em> "I'm just looking at this" handles. We build that up properly in the RAII &amp; Smart Pointers lesson &#8212; this lesson is the raw-pointer foundation it stands on.`),
  sub("What interviewers actually ask about pointers"),
  p(`Pointer questions in interviews cluster into a handful of predictable shapes. None of them are about exotic syntax &#8212; they're about whether you understand lifetime and indirection well enough not to write a crash.`),
  ul([
    `<b>"What's the difference between a pointer and a reference?"</b> &#8212; the null/reseat/binding answer above. Have it crisp; it's almost a guaranteed warm-up.`,
    `<b>Read or write a <code>const</code> pointer declaration.</b> "What can I change here?" Right-to-left parsing gets you the answer every time.`,
    `<b>Spot the bug.</b> Returning the address of a local, using after free, leaking, or the <code>m[key]</code>-style accidental mutation. They want you to <em>see</em> the dangling lifetime.`,
    `<b>Linked-list and tree traversal.</b> The reseatable-pointer loop with a null guard &#8212; the bread and butter of Weeks 4&#8211;5, and the reason this lesson comes first.`,
    `<b>"How would you avoid managing this memory by hand?"</b> &#8212; the smart-pointer answer. Saying "I'd use <code>unique_ptr</code> so it frees automatically" signals modern-C++ fluency.`,
  ]),
  idea("The whole model in one picture",`A pointer is an address; <code>&amp;</code> gets an address, <code>*</code> follows one, and each extra <code>*</code> follows one more arrow. Picture variables as boxes sitting at addresses and pointers as arrows between them. Lifetime is the other half: a pointer is only as valid as the thing it points at is alive. Hold both ideas &#8212; indirection and lifetime &#8212; and linked lists, trees, <code>const</code> puzzles, and use-after-free bugs all become things you can see instead of memorize.`),
  cx(`Dereference / pointer arithmetic <b>O(1)</b> &#8212; pointers are about indirection and lifetime, not asymptotic cost`)
]},
{group:"Week 1 · Foundations",num:"=",id:"mental",color:"#8B5CF6",title:"Value vs Reference Semantics",badge:"Week 1 · C++ deep dive",blocks:[
  cue(`The previous lesson covered pointers &#8212; indirection and addresses. This one covers the other half of the C++ mental model: <em>copying</em>. Knowing exactly when C++ duplicates your data is what stops the language from surprising you, stops you from writing accidental O(n) work, and gives you a vocabulary interviewers listen for. Get this one habit right and half of "is your C++ idiomatic?" is already answered.`),
  p(`Unlike Python or JavaScript, C++ variables hold <em>values</em>, not references, by default. In Python, <code>b = a</code> just makes <code>b</code> a second name for the same list; mutating through one is visible through the other. In C++, <code>b = a</code> for a vector makes <code>b</code> a full, independent copy &#8212; a brand-new array with every element duplicated. Change <code>b</code> and <code>a</code> is untouched. That single difference is the root of nearly every "why didn't my change show up?" and every "why is this so slow?" surprise a Python-trained engineer hits in C++.`),
  sub("What a copy actually is"),
  p(`A <code>vector&lt;int&gt;</code> is really two things: a tiny <em>handle</em> on the stack (three words &#8212; a pointer to the data, a size, and a capacity) and a separate <em>buffer</em> on the heap holding the elements. When you copy a vector, C++ does a <em>deep copy</em>: it allocates a fresh buffer and copies every element across, then points the new handle at it. The two vectors now own two independent arrays. That's why the copy costs O(n) &#8212; the work is proportional to how many elements there are.`),
  svg("mental_deepcopy",`<code>b = a</code> duplicates the heap buffer, not just the handle. <code>a</code> and <code>b</code> end up owning two separate arrays at two different addresses &#8212; changing one never touches the other. The deep copy is the O(n) cost hiding behind one innocent <code>=</code>.`),
  note("&#128161;","Compare this to a reference",`A reference is the opposite: <code>vector&lt;int&gt;&amp; r = a;</code> creates <em>no</em> new buffer and copies <em>nothing</em>. <code>r</code> is just a second name for the same handle, pointing at the same heap array. Writing through <code>r</code> writes through <code>a</code>. A copy is "make me my own array"; a reference is "let me touch yours."`),
  sub("Value vs reference vs pointer, side by side"),
  p(`Three ways to name data, three different contracts. This is the trio interviewers expect you to distinguish cleanly:`),
  code(`vector<int> a = {5, 8, 2, 9};

vector<int>  b = a;   // VALUE: deep copy. b is its own array. O(n).
vector<int>& r = a;   // REFERENCE: alias. Same array. No copy. Can't be null, can't reseat.
vector<int>* p = &a;  // POINTER: holds a's address. Can be null, can be repointed. Use *p / p->.`),
  ul([
    `<b>Value</b> &#8212; an independent copy. Safe (nobody else can change it under you), but you pay O(n) to make it for a container.`,
    `<b>Reference</b> &#8212; an alias for an existing object. Zero cost, but it <em>must</em> bind to a real object at creation, can never be null, and can never be re-bound to something else.`,
    `<b>Pointer</b> &#8212; a variable holding an address. The flexible one: it can be null, can be reassigned to point elsewhere, and is how you walk a linked list or tree. The price of that flexibility is you must check it for null before dereferencing.`,
  ]),
  idea("The mental shortcut",`Value = "my own." Reference = "yours, renamed." Pointer = "an address I can move around and that might point at nothing." Pick the weakest one that does the job: prefer references over pointers whenever the object always exists and you won't reseat.`),
  sub("Passing into functions: the default that bites"),
  p(`Function parameters follow the exact same rules, and pass-by-value is the default. When you write <code>void f(vector&lt;int&gt; v)</code>, calling <code>f(big)</code> deep-copies <code>big</code> into <code>v</code> &#8212; a silent O(n) allocation and element-copy on every call. The function then operates on its private duplicate, which is also why mutating <code>v</code> inside <code>f</code> leaves the caller's vector untouched. Two surprises (slow, and "my changes vanished") from one root cause.`),
  svg("copyref","Left: passing a container by value duplicates the whole thing &#8212; O(n) wasted work the caller never asked for. Right: a <code>const&amp;</code> parameter points at the original, copying nothing. The <code>&amp;</code> is the entire difference."),
  worked("The accidental copy, and the one-character fix","Both functions read the vector and return its sum &#8212; identical behavior. But the first deep-copies the whole vector on every call (O(n) time and a heap allocation), and the second copies nothing. On a million-element vector called in a loop, that difference is the gap between instant and visibly slow. The fix is literally one <code>const&amp;</code>.",
`long sumSlow(vector<int> v) {          // by value: deep-copies v on entry
    long total = 0;                     // (a fresh heap buffer + n copies)
    for (int x : v) total += x;
    return total;
}

long sumFast(const vector<int>& v) {   // const ref: binds to the original, no copy
    long total = 0;                     // const promises we won't modify it
    for (int x : v) total += x;
    return total;
}
// sumFast is the idiomatic default for "read a container."`),
  sub("The full decision table"),
  p(`Five ways to take a parameter, each a different answer to two questions: <em>do I need a copy?</em> and <em>do I need to change the caller's object?</em> Memorize the defaults; reason about the edges.`),
  svg("mental_passing",`The five parameter forms and when to reach for each. <code>const T&amp;</code> is your default for anything bigger than a pointer that you only read. Pass by value only for cheap types or when you genuinely want your own copy to mutate.`),
  ul([
    `<b><code>const T&amp;</code> &#8212; read-only, no copy.</b> The default for vectors, strings, maps, and any large object you only inspect. Costs nothing and can't accidentally mutate the caller.`,
    `<b><code>T&amp;</code> &#8212; mutate in place.</b> Use when the function's job is to change the caller's object: an out-parameter, an in-place sort, "fill this buffer." No copy; the caller sees the edits.`,
    `<b><code>T</code> (by value) &#8212; cheap types or "I need my own."</b> For <code>int</code>, <code>double</code>, a pointer, an iterator &#8212; copying is free, so don't bother with a reference. Also correct when you deliberately want a private copy to modify without touching the caller's.`,
    `<b><code>T&amp;&amp;</code> &#8212; an rvalue reference, take ownership.</b> A "sink" parameter: you intend to keep the argument (store it in a member). Binds to temporaries and moved-from objects so you can <em>steal</em> their buffer instead of copying. The deep dive is the Move Semantics lesson.`,
    `<b><code>T*</code> &#8212; a pointer, maybe absent.</b> Use when the argument is optional (can be <code>nullptr</code>) or you'll walk/reseat it &#8212; the natural choice for linked-list and tree nodes. Caller must guard against null.`,
  ]),
  note("&#128221;","Why not just always pass by value and trust the compiler?",`For small, trivially-copyable types (<code>int</code>, <code>double</code>, a raw pointer, a <code>std::string_view</code>), do pass by value &#8212; a reference would just add an indirection for no benefit. The <code>const&amp;</code> rule is specifically about types whose copy is non-trivial: containers, strings, big structs. When you're unsure how heavy a type is, <code>const&amp;</code> is the safe default that never makes things worse.`),
  sub("What b = a actually invokes"),
  p(`Two operations sit behind that humble <code>=</code>, and naming them is interview gold. <code>vector&lt;int&gt; b = a;</code> calls the <em>copy constructor</em> &#8212; build a new object as a copy of an existing one. <code>b = a;</code> when <code>b</code> already exists calls the <em>copy assignment operator</em> &#8212; throw away <code>b</code>'s current contents and overwrite them with a copy of <code>a</code>. For a vector, both deep-copy the buffer; the difference is only whether <code>b</code> was being created or already had data to discard.`),
  p(`For your own classes the compiler generates these member-by-member for free, which is exactly right when your members are values (an <code>int</code>, a <code>vector</code>) &#8212; copying the object copies each member. It goes wrong the moment a member is a <em>raw owning pointer</em>: the default copy duplicates the pointer value, so two objects now point at the same heap block, and both will try to <code>delete</code> it. That's the classic double-free, and it's the reason the smart-pointer and Rule-of-Zero ideas in the RAII lesson exist &#8212; let members that manage their own copying (like <code>vector</code> and <code>unique_ptr</code>) do the work, and you never write these by hand.`),
  pit("The shallow-copy trap",`If a class owns a resource through a raw pointer and you let the default copy happen, you get a <em>shallow</em> copy: both objects share one buffer, then both free it &#8212; double-free, use-after-free, corruption. The cure is almost never "write a careful copy constructor"; it's "stop owning through raw pointers." Hold a <code>vector</code>, <code>string</code>, or <code>unique_ptr</code> instead and correct copying (or a deleted copy) comes for free.`),
  sub("Return by value is cheap now"),
  p(`A natural worry: if copies are O(n), isn't <em>returning</em> a big vector from a function ruinous? It used to be. Today it's free in practice. The compiler elides the copy entirely (RVO &#8212; return value optimization, mandatory for temporaries since C++17), or, failing that, <em>moves</em> the vector out &#8212; stealing its heap buffer instead of copying it. So <code>vector&lt;int&gt; build()</code> returning a freshly built vector is the idiomatic, fast style. Write the clear code; the language stopped charging you for it.`),
  note("&#128161;","Forward reference",`<em>Why</em> the move is O(1) &#8212; how stealing a buffer works, what <code>std::move</code> really does, and when an rvalue reference binds &#8212; is the whole Move Semantics lesson. For now just trust the rule: return big objects by value, and don't contort your code to avoid it.`),
  svg("move","Copy (left) duplicates the heap buffer &#8212; two arrays, O(n). Move (right) steals the pointer &#8212; one buffer changes hands, O(1). Returning a local by value uses the right-hand path, which is why return-by-value is cheap."),
  sub("References in the loop forms"),
  p(`The range-based <code>for</code> is where copy-vs-reference bites people most, because the cost is invisible until you profile. <code>for (int x : v)</code> copies each element into <code>x</code> &#8212; fine for <code>int</code>, quietly wasteful for <code>string</code> or <code>vector</code>. <code>for (auto&amp; x : v)</code> binds <code>x</code> to the real element: no copy, and you can mutate in place. <code>for (const auto&amp; x : v)</code> is the read-only version &#8212; no copy, no accidental writes. Reach for one of the reference forms by default with non-trivial element types.`),
  worked("Mutating in place with auto&","To double every value in a vector, the loop variable must <em>be</em> the element, not a copy of it. <code>auto&amp;</code> binds to the real element so the write lands in the vector. With a plain <code>auto</code> (or <code>int</code>) you'd double a throwaway copy each iteration and the vector would come out unchanged &#8212; a genuinely common bug.",
`void doubleAll(vector<int>& v) {       // T&: we intend to modify the caller's vector
    for (auto& x : v)                   // auto&: x IS each element, not a copy
        x *= 2;                         // writes straight into v
}

// for (auto x : v) x *= 2;  // BUG: doubles a copy, v is untouched
// for (const auto& x : v)   // read-only: no copy, but you couldn't write x`),
  sub("auto deduces the value &#8212; it drops & and const"),
  p(`One <code>auto</code> gotcha worth burning in: bare <code>auto</code> always deduces a <em>value</em> type, stripping references and top-level <code>const</code>. So <code>auto x = v[0];</code> copies the element even though <code>v[0]</code> is a reference into the vector. If you wanted to alias it, you must say so: <code>auto&amp; x = v[0];</code> to bind, or <code>const auto&amp; x = v[0];</code> to bind read-only. The same applies in structured bindings &#8212; <code>auto [k, val]</code> copies each pair, <code>auto&amp; [k, val]</code> aliases it.`),
  code(`auto       x  = v[0];   // COPY of the element (auto drops the reference)
auto&      r  = v[0];   // alias: writes to r hit the vector
const auto& cr = v[0];  // read-only alias, no copy

for (auto& [key, val] : m)   // alias each entry -> can modify val in place
    val++;                    // bumps the real value in the map`),
  p(`Structured bindings (<code>auto [a, b] = pair;</code>) unpack a pair, tuple, or struct into named variables, and pair beautifully with iterating a map: <code>for (auto&amp; [key, val] : m)</code> reads far cleaner than <code>it-&gt;first</code> / <code>it-&gt;second</code>. Combined with <code>auto</code> for iterators &#8212; <code>auto it = m.find(key)</code> instead of spelling out <code>unordered_map&lt;int,int&gt;::iterator</code> &#8212; this is why modern C++ reads so much lighter than the textbook version.`),
  note("&#128221;","References as members (briefly)",`You <em>can</em> make a reference a class member, but it's usually a trap: a reference member must be bound in the constructor's init list, can never be reseated, and makes the class non-assignable. When you want "this object refers to another that lives elsewhere," a pointer (or <code>std::reference_wrapper</code>) is almost always the better tool because it can be reseated and copied. Keep value members for things you own; use pointers for things you merely observe.`),
  sub("Const-correctness as a habit"),
  p(`<code>const</code> isn't decoration &#8212; it's a promise the compiler enforces, and it's how you make "read-only" a checkable fact instead of a comment. Mark a parameter <code>const&amp;</code> and any accidental write is a compile error, not a runtime surprise. Mark a member function <code>const</code> and it can be called on const objects and promises not to mutate the instance. The payoff compounds: const-correct code documents intent, prevents whole categories of bugs, and lets you pass things by <code>const&amp;</code> all the way down. Make it the default and add mutability only where you need it.`),
  idea("The whole model in one line",`C++ copies by default; an <code>&amp;</code> says "same object, don't copy"; <code>const</code> says "and I won't change it." Once you can predict where copies happen, the language stops surprising you &#8212; and you stop writing accidental O(n) work.`),
  sub("Saying it out loud in the interview"),
  p(`This lesson is unusually high-leverage for interviews because the right move is a <em>verbal reflex</em>, not a trick. When you reach for a function that takes a container, say it: "I'll take this by const reference to avoid a copy." When you write a range-for over strings, narrate "<code>const auto&amp;</code> so we don't copy each one." When you return a vector you built, mention "return by value is fine here &#8212; RVO or a move makes it cheap." None of these change your answer; all of them signal that you think about copies the way a working C++ engineer does.`),
