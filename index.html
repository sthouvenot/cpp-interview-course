worked("Maximum non-overlapping activities","Sort by END time so 'earliest finisher' is the first element of each run. Carry the end of the last kept activity; take the next one only if it starts on or after that. The count of kept activities is the largest possible conflict-free set. This is activity selection in its 'keep' form; eraseOverlapIntervals is the same loop counting removals.",
`int maxActivities(vector<vector<int>>& intervals) {
    if (intervals.empty()) return 0;
    sort(intervals.begin(), intervals.end(),
         [](const vector<int>& a, const vector<int>& b) {
             return a[1] < b[1];               // sort by END time
         });
    int kept = 1;                              // always keep the first (earliest finisher)
    int prevEnd = intervals[0][1];             // when the room frees up
    for (int i = 1; i < (int)intervals.size(); i++) {
        if (intervals[i][0] >= prevEnd) {      // starts after we're free -> no conflict
            kept++;                            // greedily take it
            prevEnd = intervals[i][1];         // advance the boundary
        }
        // else: it overlaps -> skip it, never reconsider
    }
    return kept;
}`),
pit("Sorting by the wrong key silently breaks it","Activity selection needs sort-by-<code>end</code>; sort by <code>start</code> (or by duration, a tempting wrong guess) and the earliest-finisher invariant evaporates &#8212; the loop still runs and returns a confidently wrong count. The sort key <em>is</em> the algorithm here. Before writing the comparator, state which quantity makes your greedy choice well-defined, and sort by exactly that. Mixing up start-vs-end is the single most common greedy/interval bug."),
sub("Classic instance 2: Jump Game (greedy reachability in one pass)"),
p(`You're given an array where <code>nums[i]</code> is the maximum jump length from index <code>i</code>; starting at index 0, can you reach the last index? The naive instinct is to try every jump length from every cell &#8212; exponential, or a DP over "is cell <code>i</code> reachable." But there's a greedy one-pass insight that kills it: <em>track a single number, the farthest index reachable so far.</em> Sweep left to right; at each index <code>i</code> that you can actually reach, extend the frontier to <code>max(frontier, i + nums[i])</code>. If the frontier ever falls behind the current index, you're stranded &#8212; you can't even step onto <code>i</code>, so the answer is no. If the frontier ever reaches the last index, the answer is yes.`),
p(`Why is this greedy choice safe? It's "greedy stays ahead": <code>reach</code> is, at every index, the farthest any sequence of jumps could possibly get you by that point &#8212; we never throw away reachability, we only ever take the max. So if the destination is reachable by <em>any</em> route, <code>reach</code> reaches it too. We never had to know <em>which</em> jumps; tracking the frontier is enough.`),
svg("greedy_jump","Jump Game in one pass: reach holds the farthest index reachable so far, growing by max(reach, i + nums[i]) at each cell you can stand on. As long as reach keeps up with i you can keep moving; the moment it clears the last index you're done. If reach ever lags behind i, you're stranded."),
worked("Jump Game: can you reach the last index?","One pass, one variable. reach = farthest index reachable so far. If i ever exceeds reach, you can't even stand on i, so you're stuck -> false. The instant reach covers the last index, you're guaranteed home -> true. No DP table, no trying individual jump lengths: O(n) time, O(1) space.",
`bool canJump(const vector<int>& nums) {
    int reach = 0;                             // farthest index reachable so far
    int n = nums.size();
    for (int i = 0; i < n; i++) {
        if (i > reach) return false;           // stranded: can't even reach i
        reach = max(reach, i + nums[i]);       // greedily extend the frontier
        if (reach >= n - 1) return true;       // frontier already covers the goal
    }
    return true;                               // single-element array, etc.
}`),
idea("The same frontier counts minimum jumps","Jump Game II ('fewest jumps to the end') is the same frontier idea with one more variable: track the end of the <em>current</em> jump's range, and every time <code>i</code> reaches it, you're forced to take a jump &#8212; so increment the jump count and extend the range to the farthest you saw. Still one greedy pass, still O(n). Recognizing that reachability and min-jumps share a frontier is the kind of connection that makes a greedy problem feel obvious instead of clever."),
sub("Classic instance 3: Gas Station (the unique start after the last deficit)"),
p(`A circular route of stations: <code>gas[i]</code> is the fuel you pick up at station <code>i</code>, <code>cost[i]</code> is the fuel to drive from <code>i</code> to <code>i+1</code>. Find a starting station you can drive the full loop from, or report it's impossible. Two greedy facts crack it. <b>Feasibility:</b> if total gas &#8805; total cost, a valid start <em>exists</em> (and is unique if you want one answer); if total is negative, no start works, period. <b>Where:</b> sweep once tracking a running tank; whenever the tank goes negative at station <code>i</code>, <em>no</em> station from your last candidate start through <code>i</code> can be the answer &#8212; so the next viable start is <code>i + 1</code>. Reset the tank and keep going. The answer is the station right after the <em>last</em> place you ran a deficit.`),
p(`The greedy leap is that "if you ran out somewhere between <code>start</code> and <code>i</code>, then no station in that whole stretch could have made it either." That's an exchange-style argument: any earlier candidate had even less fuel reaching <code>i</code> than <code>start</code> did (it had to pay the costs to <em>get</em> to <code>start</code> first), so if <code>start</code> failed, they all fail &#8212; you can skip the entire stretch in one move instead of re-trying each. That's what turns an O(n&#178;) "try every start" into a single O(n) pass.`),
worked("Gas Station: one pass to the unique start","total tracks overall feasibility (>= 0 means an answer exists). tank tracks the run from the current candidate start; the moment it dips below zero, every station from start..i is disqualified, so the only remaining candidate is i+1 and tank resets. Because a valid start is guaranteed to exist when total >= 0, the last candidate you set is the answer.",
`int canCompleteCircuit(const vector<int>& gas, const vector<int>& cost) {
    int total = 0;        // sum of (gas - cost) over the whole loop: feasibility
    int tank = 0;         // running tank from the current candidate start
    int start = 0;        // current candidate starting station
    for (int i = 0; i < (int)gas.size(); i++) {
        int diff = gas[i] - cost[i];
        total += diff;
        tank  += diff;
        if (tank < 0) {   // can't reach i+1 from 'start' -> none of start..i can
            start = i + 1; // next viable candidate is just past the failure
            tank  = 0;     // start fresh from there
        }
    }
    return total >= 0 ? start : -1;   // feasible iff total >= 0; then 'start' is it
}`),
sub("Classic instance 4: two-pointer greedy (Assign Cookies)"),
p(`Some greedy problems pair the strategy with the Two Pointers pattern: sort both inputs, then walk a pointer up each, greedily matching as you go. <b>Assign Cookies</b> is the model. Each child has a greed factor <code>g[i]</code> (the smallest cookie that satisfies them); each cookie has a size <code>s[j]</code>. Maximize the number of satisfied children. Greedy rule: sort both, then give the <em>smallest</em> cookie that can satisfy the <em>least-greedy remaining</em> child. Don't waste a big cookie on a child a small one would have pleased &#8212; that's the exchange argument again (swapping in the smallest sufficient cookie never satisfies fewer children).`),
worked("Assign Cookies: sort both, march two pointers","Sort children by greed and cookies by size. Pointer i walks children, j walks cookies. If the current cookie satisfies the current child (s[j] >= g[i]), match them and advance both; otherwise the cookie was too small for even the least-greedy unserved child, so discard it and advance j only. The number of children advanced past is the answer.",
`int findContentChildren(vector<int>& g, vector<int>& s) {
    sort(g.begin(), g.end());                  // children by greed, ascending
    sort(s.begin(), s.end());                  // cookies by size, ascending
    int i = 0, j = 0;                          // i -> children, j -> cookies
    while (i < (int)g.size() && j < (int)s.size()) {
        if (s[j] >= g[i]) i++;                 // smallest sufficient cookie -> satisfy child
        j++;                                   // either way, this cookie is used up
    }
    return i;                                  // children satisfied
}`),
note(`&#128202;`,"Sort-then-sweep is the greedy signature",`Three of the four classics here open with a sort. That's not a coincidence: sorting is how you <em>make the greedy choice well-defined</em> &#8212; "earliest finisher," "least-greedy child," "smallest sufficient cookie" only mean something once the data is ordered by the right key. When a greedy rule is on the tip of your tongue, the first question is almost always "sorted by what?" Get that key right and the sweep after it is four lines.`),
sub("The pitfalls that sink greedy solutions"),
pit("Assuming greedy works without proving it (the #1 trap)","This is the mistake that fails real interviews. A greedy rule that looks right and isn't &#8212; largest-coin change on <code>{1,3,4}</code>, picking intervals by duration, taking the highest-value item in 0/1 knapsack &#8212; will pass the examples you hand-traced and then break on a case you didn't. Never submit a greedy answer you haven't either <em>proven</em> safe (exchange argument) or <em>failed to break</em> after a genuine hunt for a counterexample. \"It seems to work on my examples\" is not a reason; it's how you get a confidently wrong solution."),
pit("Reaching for greedy when the problem actually needs DP","If a locally-optimal choice can be globally suboptimal, greedy is the wrong tool and no amount of cleverness in the rule will save it &#8212; you need DP's habit of keeping every option alive. The tells that you've crossed the line: future choices depend on the <em>combination</em> of earlier ones (0/1 knapsack &#8212; whether to take an item depends on capacity left, which depends on all prior takes), or a worse-looking move now enables a much better one later. When the greedy choice and the optimal choice can diverge, stop and build the DP table (callback to the DP lesson)."),
pit("Sorting by the wrong key, or forgetting to sort","Most greedy bugs are sort bugs. The algorithm's correctness rides entirely on ordering by the quantity that makes the greedy choice valid &#8212; <code>end</code> for scheduling, greed/size for cookies. Sort by start instead of end, by value instead of value-per-weight, or forget the sort entirely, and the sweep runs cleanly and returns nonsense. Pin down the sort key from the proof: whatever quantity your exchange argument compares is the key you sort on."),
idea("The interview narration that lands","Say the strategy and the justification together: \"This looks greedy &#8212; the rule is take the earliest finisher / extend the farthest reach. Let me check it's safe: swapping my choice into any optimal solution doesn't make it worse [or: I tried to find a counterexample and couldn't], so I'll commit to it.\" Naming the greedy choice AND voicing the exchange argument (or the counterexample hunt) in one breath is the difference between looking like you guessed and looking like you proved it. The proof is the skill; the loop is bookkeeping."),
cx(`Usually <b>O(n)</b> for a pure one-pass greedy (Jump Game, Gas Station), or <b>O(n log n)</b> when a sort sets up the choice (activity selection, Assign Cookies) &#8212; the sort dominates and the sweep is <b>O(n)</b>. Space is typically <b>O(1)</b> beyond the input, or <b>O(n)</b> if the sort isn't in place. The win over DP is real: a provably-safe greedy turns an O(n&#183;states) table into a single pass.`),
{t:"probs",items:[["Assign Cookies","assign-cookies","easy"],["Jump Game","jump-game","med"],["Candy","candy","hard"]]}
]},
{group:"Data Structures & Algorithms",num:"17",id:"dsu",color:"#0EA5E9",title:"Union-Find (DSU)",badge:"Pattern",blocks:[
cue(`<b>Spot it when:</b> the problem is about <em>grouping</em> &#8212; "are these two in the same group?", "merge these two groups", "how many groups are there?" &#8212; and the groups <em>grow as you go</em>, usually because edges or equivalences arrive one at a time. Tell-tale phrasing: <em>connected, same component, redundant edge, friend circles, accounts merge, equivalent</em>. If a plain BFS/DFS would force you to re-traverse the whole graph every time a new edge shows up, reach for Union-Find instead.`),
p(`<b>Union-Find</b> &#8212; also called a <b>disjoint-set union (DSU)</b> &#8212; is a tiny, almost embarrassingly small structure that answers two questions about a partition of <code>n</code> items into non-overlapping groups, both in <em>effectively constant time</em>: "are <code>x</code> and <code>y</code> in the same group?" and "merge the groups of <code>x</code> and <code>y</code>." That's the entire interface &#8212; <code>find</code> and <code>union</code> &#8212; and yet it's the cleanest tool for a whole family of connectivity problems that graph traversal handles clumsily.`),
p(`The reason it earns its place next to BFS/DFS is <em>incrementality</em>. A graph traversal answers "is everything connected?" by walking the whole graph once, which is great when the graph is fixed. But when edges <em>stream in</em> &#8212; add an edge, ask "are these two connected now?", add another, ask again &#8212; re-running BFS from scratch on every query is O(V + E) per query. DSU updates its answer as each edge arrives and answers each query in near-O(1). That "maintain connectivity online" ability is the thing a plain traversal can't do cheaply, and it's exactly what these problems test.`),
sub("The representation: a parent[] array, sets identified by their root"),
p(`The whole structure is one array: <code>vector&lt;int&gt; parent</code>, where <code>parent[x]</code> is "the node <code>x</code> points to." Follow those pointers and you climb a little tree; the node at the top &#8212; the one that points to itself, <code>parent[r] == r</code> &#8212; is the <b>root</b>, and the root <em>is</em> the identity of the set. Two items are in the same set if and only if they climb to the <em>same root</em>. There's no separate "set object"; a set is just "everyone who reaches root <code>r</code>."`),
p(`At the start every item is its own group, so every node is its own root: <code>parent[i] = i</code> for all <code>i</code>. As you union things, roots get linked under other roots, and the forest of one-node trees coalesces into fewer, larger trees. The shape of those trees is bookkeeping you'll work hard to keep <em>shallow</em> &#8212; because the cost of every operation is the cost of climbing to a root, and a tall, stringy tree is the enemy.`),
code(`struct DSU {
    vector<int> parent;                 // parent[x] = the node x points to
    DSU(int n) : parent(n) {
        for (int i = 0; i < n; i++)
            parent[i] = i;              // everyone starts as their own root
    }
};`),
sub("find(x): climb to the root, then flatten the path"),
p(`<b>find(x)</b> answers "which set is <code>x</code> in?" by returning the root of <code>x</code>'s tree. The naive version just walks up: while <code>x</code> isn't its own parent, step to <code>parent[x]</code>; return where you land. The cost of that walk is the <em>depth</em> of <code>x</code> &#8212; which is why we care so much about keeping trees short.`),
p(`The optimization that makes <code>find</code> cheap is <b>path compression</b>: while you're climbing anyway, re-point every node you pass <em>directly</em> at the root. The walk happens once; afterward, every node on that path is one hop from the root, so the next <code>find</code> on any of them is flat. It's a self-improving cache &#8212; the structure pays down its own depth as a side effect of being queried.`),
svg("dsu_compress","Before find(3) the set is a degenerate chain: reaching the root 0 from node 3 takes three hops. Path compression re-points 1, 2, and 3 straight at 0 during that single climb, so every later find on them is a single hop. The walk you had to do anyway flattens the tree for free."),
code(`int find(int x) {
    if (parent[x] != x)
        parent[x] = find(parent[x]);    // recurse to root, then point x AT it
    return parent[x];                   // x now hangs directly off the root
}`),
note("📌","Why &quot;point at the root&quot; and not &quot;move one step up&quot;",`The recursive form above sets <code>parent[x]</code> to the <em>final</em> root returned from deeper in the recursion, so <em>every</em> node on the path gets re-parented to the root in one pass &#8212; full compression. A common weaker variant is <em>path halving</em> (<code>parent[x] = parent[parent[x]]</code> in a loop), which compresses half as aggressively but avoids recursion and the call stack. Both give the same near-constant amortized bound; the recursive full-compression version is the one to write on a whiteboard because it reads as plain intent.`),
sub("union(x, y): link the roots, smaller tree under larger"),
p(`<b>union(x, y)</b> merges the two sets. You don't touch <code>x</code> and <code>y</code> directly &#8212; you find <em>their roots</em> and point one root at the other. If the two roots are already equal, they're already one set and there's nothing to do (this "nothing to do" case is itself useful &#8212; hold that thought for cycle detection). Linking is one assignment: <code>parent[rootA] = rootB</code>.`),
p(`But <em>which</em> root goes under which matters enormously. Attach carelessly and you can build exactly the tall chain that path compression exists to undo. The fix is <b>union by size</b> (or by rank): always hang the <em>smaller</em> tree under the <em>larger</em> tree's root. A node's depth only increases when the tree it's in gets hung under another &#8212; so by always re-parenting the smaller side, you minimize how many nodes get deepened, and tree height stays logarithmic even before compression helps.`),
svg("dsu_union","unite(a, x) merges a size-4 tree and a size-2 tree. Union by size hangs the smaller tree's root (x, the purple one) under the larger tree's root (a), so only x and y get one level deeper. Doing it the other way &#8212; the big tree under the small root &#8212; would have deepened four nodes for nothing."),
p(`<b>Rank vs size:</b> <em>size</em> tracks how many nodes are in each tree; <em>rank</em> tracks an upper bound on tree height. Both work and both give the same asymptotic guarantee; size is a hair more intuitive ("more nodes = keep it as the parent") and is what most people reach for. Pick one and be consistent. A nice touch: have <code>unite</code> <em>return a bool</em> &#8212; <code>true</code> if it actually merged two distinct sets, <code>false</code> if they were already together. That return value is the hook half these problems hang on.`),
worked("The full DSU class (compression + union by size)","This is the whole structure you'd write in an interview: a parent array, a size array, find with path compression, and unite that links smaller-under-larger and returns whether a merge happened. Memorize this shape; everything below is just calling it.",
`struct DSU {
    vector<int> parent, size;
    int groups;                              // live count of distinct sets

    DSU(int n) : parent(n), size(n, 1), groups(n) {
        for (int i = 0; i < n; i++)
            parent[i] = i;                   // n singletons, n groups
    }

    int find(int x) {                        // root of x's set, with compression
        if (parent[x] != x)
            parent[x] = find(parent[x]);     // re-point x straight at the root
        return parent[x];
    }

    bool unite(int x, int y) {               // returns true iff a real merge happened
        int rx = find(x), ry = find(y);
        if (rx == ry) return false;          // already same set -> no-op
        if (size[rx] < size[ry]) swap(rx, ry);   // rx is the BIGGER root
        parent[ry] = rx;                     // hang smaller (ry) under bigger (rx)
        size[rx] += size[ry];                // bigger tree absorbs the smaller
        groups--;                            // two sets became one
        return true;
    }

    bool connected(int x, int y) { return find(x) == find(y); }
};`),
note("📌","The complexity claim: near-O(&#945;(n)), effectively constant",`With <em>both</em> path compression and union by size/rank, a sequence of <code>m</code> operations on <code>n</code> items runs in <b>O(m &#945;(n))</b>, where &#945; is the <em>inverse Ackermann function</em>. &#945;(n) grows so glacially that for any <code>n</code> you could ever allocate &#8212; atoms-in-the-universe <code>n</code> &#8212; it's at most 4. So per-operation cost is treated as <b>amortized constant</b> in practice. The catch is the word <em>both</em>: drop either optimization and the bound degrades. With neither, <code>find</code> on a degenerate chain is O(n).`),
sub("Killer use 1 — counting connected components incrementally"),
p(`This is the most direct payoff. You want "how many separate groups remain?" as edges get added. Start a counter at <code>n</code> (every item alone). Every time <code>unite</code> <em>actually merges</em> two distinct sets &#8212; i.e. returns <code>true</code> &#8212; decrement it. That's it: the counter is always the current component count, maintained in near-O(1) per edge. The DSU above already tracks this in <code>groups</code>.`),
worked("Number of Provinces (count components)","isConnected[i][j] == 1 means city i and j are directly linked. Union every such pair; the surviving group count is the number of provinces. No traversal, no visited array &#8212; just merge and read the counter.",
`int findCircleNum(const vector<vector<int>>& isConnected) {
    int n = isConnected.size();
    DSU dsu(n);
    for (int i = 0; i < n; i++)
        for (int j = i + 1; j < n; j++)      // upper triangle is enough
            if (isConnected[i][j] == 1)
                dsu.unite(i, j);             // merge the two cities' provinces
    return dsu.groups;                       // distinct sets = provinces
}`),
sub("Killer use 2 — cycle detection in an undirected graph"),
p(`Here's where the <code>bool</code> return earns its keep. Process the edges of an undirected graph one at a time, uniting each edge's endpoints. If <code>unite(u, v)</code> finds <code>u</code> and <code>v</code> <em>already in the same set</em> &#8212; returns <code>false</code> &#8212; then there was already a path between them, and this edge <code>u&#8211;v</code> closes a <b>cycle</b>. The first such edge is the redundant one. No DFS, no back-edge bookkeeping; the "already connected" case <em>is</em> the cycle test.`),
worked("Redundant Connection (the edge that closes a cycle)","A tree on n nodes has exactly n-1 edges; one extra edge was added, creating a single cycle. Union the edges in order; the first edge whose endpoints are already connected is the culprit to return.",
`vector<int> findRedundantConnection(const vector<vector<int>>& edges) {
    DSU dsu(edges.size() + 1);               // nodes are 1-indexed -> size n+1
    for (const auto& e : edges) {
        if (!dsu.unite(e[0], e[1]))          // already same set -> this edge made a cycle
            return e;                        // the redundant connection
    }
    return {};                               // (problem guarantees one exists)
}`),
note("📌","1-indexed nodes: size the array n+1, not n","Problems like <em>Redundant Connection</em> label nodes <code>1..n</code>, not <code>0..n-1</code>. If you build a DSU of size <code>n</code> you'll index <code>parent[n]</code> out of bounds the moment a node labelled <code>n</code> shows up &#8212; undefined behavior, not a clean crash. Allocate <code>n + 1</code> slots and ignore index 0, or normalize the labels to zero-based up front. Decide which at the top and write it down; this off-by-one is the single most common DSU bug after forgetting compression."),
sub("Killer use 3 — Kruskal's MST (greedy, cycle-skipping)"),
p(`Union-Find is the engine inside <b>Kruskal's minimum spanning tree</b>. The algorithm: sort all edges by weight ascending, then walk them cheapest-first and <code>unite</code> each edge's endpoints &#8212; <em>unless</em> they're already in the same set, in which case adding the edge would form a cycle, so you skip it. Take an edge exactly when <code>unite</code> returns <code>true</code>. After processing, the accepted edges form the MST. DSU is what makes the "would this edge form a cycle?" check O(&#945;(n)) instead of a graph search per edge.`),
code(`// Kruskal's MST: greedily take the cheapest edge that doesn't close a cycle.
long long kruskal(int n, vector<array<int,3>>& edges) {  // each edge = {w, u, v}
    sort(edges.begin(), edges.end());        // cheapest weight first
    DSU dsu(n);
    long long total = 0;
    for (auto& [w, u, v] : edges)
        if (dsu.unite(u, v))                 // true == u,v were separate -> safe to add
            total += w;                      // edge joins the tree; skip it otherwise
    return total;                            // weight of the minimum spanning tree
}`),
idea("The fourth use: grid and equivalence grouping",`Anytime a problem says "these are the same / equivalent / interchangeable," DSU groups them. Equations like <code>a == b, b == c</code> then a query "<code>a == c</code>?" &#8212; union the equals, then <code>connected(a, c)</code>. Grids count too: treat each cell as a node and <code>unite</code> adjacent same-colored cells to count islands or regions (a flood-fill alternative). The mental trigger is the same every time: <em>I'm partitioning things into equivalence classes and querying membership &#8212; that's DSU.</em>`),
sub("Common pitfalls"),
pit("Skipping path compression and/or union by size",`The two optimizations aren't optional polish &#8212; they're what makes the structure fast. With <em>neither</em>, a sequence of unions can build a single linked-list-shaped tree of depth <code>n</code>, and every <code>find</code> walks the whole thing: O(n) per op, O(n&#178;) overall. You'll pass the small tests and time out on the big one. Always write both; they're four extra lines combined.`),
pit("Reading parent[x] directly instead of calling find(x)",`Only <em>roots</em> are canonical set identifiers. <code>parent[x]</code> is just x's immediate pointer &#8212; one step up a possibly-tall tree, not the set's identity. Comparing <code>parent[a] == parent[b]</code> or unioning on raw parents gives wrong answers and corrupts the structure. To ask "same set?" you must compare <code>find(a) == find(b)</code>; to merge, you must link the <em>roots</em> <code>find(a)</code> and <code>find(b)</code>.`),
pit("Off-by-one: 0-indexed vs 1-indexed node ids",`Mismatching the DSU's size to the problem's labelling is a classic. 1-indexed nodes (<code>1..n</code>) need a DSU of size <code>n + 1</code>; an <code>m&#215;n</code> grid flattened to <code>row * cols + col</code> needs <code>rows * cols</code> slots. Get this wrong and you either index out of bounds (UB) or quietly leave a phantom node 0 in its own group, inflating your component count by one.`),
pit("Uniting by hanging the larger tree under the smaller root",`If you ignore size/rank and always do <code>parent[find(x)] = find(y)</code> in a fixed direction, you can repeatedly attach big trees under tiny ones, deepening many nodes each time and rebuilding the degenerate chain you were trying to avoid. The rule is one-directional: <em>smaller (or lower-rank) root goes under the larger</em>. The <code>if (size[rx] &lt; size[ry]) swap(rx, ry);</code> line in the class is doing exactly this &#8212; don't drop it.`),
idea("The interview framing",`Say the recipe out loud before coding: <em>"This is a grouping problem &#8212; I'll use Union-Find. parent array, find with path compression, union by size, and unite returns whether it actually merged. I'll count components by starting at n and decrementing on each real merge"</em> (or <em>"detect the cycle by watching for unite to return false"</em>). Stating the structure, both optimizations, the &#945;(n) bound, and which return value drives the answer &#8212; in one breath &#8212; is exactly the fluency signal interviewers want.`),
cx(`With path compression <em>and</em> union by size/rank, <code>find</code> and <code>union</code> are <b>O(&#945;(n))</b> amortized &#8212; inverse Ackermann, effectively constant (&#8804; 4 for any real <code>n</code>). Space is <b>O(n)</b> for the parent (and size) arrays. Building a DSU is O(n); Kruskal's is dominated by the edge sort at <b>O(E log E)</b>.`),
{t:"probs",items:[["Number of Provinces","number-of-provinces","med"],["Redundant Connection","redundant-connection","med"],["Couples Holding Hands","couples-holding-hands","hard"]]}
]},
{group:"C++ Deep Dives",num:"◇",id:"polymorphism",color:"#7C3AED",title:"Polymorphism & the Object Model",badge:"C++ deep dive",blocks:[
cue(`Two questions you will almost certainly be asked: "What is a virtual function and how does it work under the hood?" and "Why does a base class need a virtual destructor?" Both are really one question about the C++ <em>object model</em> &#8212; what a polymorphic object actually looks like in memory and what happens when you call through a base pointer. This chapter builds that model from the ground up, then turns it into answers you can deliver without hesitating. It leans hard on RAII (virtual destructors) and Pointers (calling through a base pointer), so those lessons are the prerequisites.`),
p(`<em>Polymorphism</em> means "many forms": one piece of code that works with many concrete types through a shared interface. C++ gives you two flavors, and the interview cares that you know they're different. <b>Static (compile-time) polymorphism</b> &#8212; templates and overloading &#8212; the compiler picks the exact function at compile time, so there's zero runtime cost. <b>Dynamic (runtime) polymorphism</b> &#8212; virtual functions &#8212; the <em>actual</em> type isn't known until runtime, so the call is resolved then, through a level of indirection. This chapter is mostly about the second kind, because that's where the object model, the vtable, and all the classic pitfalls live.`),
sub("The setup: a base pointer calling a derived override"),
p(`Here's the entire mechanism in one shape. You have a base class with a <code>virtual</code> function, and derived classes that <code>override</code> it. You hold a derived object through a <em>base</em> pointer or reference, call the virtual function, and the <em>derived</em> version runs &#8212; even though the static type of the pointer is "base." That's dynamic dispatch: the call goes to the object's real type, decided at runtime, not to whatever the pointer's declared type suggests.`),
code(`struct Shape {
    virtual double area() const = 0;   // pure virtual -> Shape is abstract
    virtual ~Shape() = default;        // virtual dtor (see below -- this is mandatory)
};

struct Circle : Shape {
    double r;
    explicit Circle(double r) : r(r) {}
    double area() const override { return 3.14159 * r * r; }   // override keyword
};

struct Rectangle : Shape {
    double w, h;
    Rectangle(double w, double h) : w(w), h(h) {}
    double area() const override { return w * h; }
};

void printArea(const Shape& s) {       // takes ANY Shape, by reference
    std::cout << s.area() << '\\n';     // dynamic dispatch -> the real type's area()
}`),
p(`<code>printArea</code> is the payoff. It was compiled once, knowing nothing about <code>Circle</code> or <code>Rectangle</code>, yet it calls the right <code>area()</code> for whatever you hand it. Add a <code>Triangle</code> next year and <code>printArea</code> works on it unchanged. That open-ended extensibility &#8212; new types slotting into old code &#8212; is the reason runtime polymorphism exists.`),
note(`&#128221;`,`The trigger: a base reference or pointer`,`Dynamic dispatch only happens when you call a virtual function <em>through a pointer or reference</em> to a base. Call it on a concrete object by value (<code>Circle c; c.area();</code>) and the compiler already knows the type, so it dispatches statically &#8212; no vtable lookup. The indirection is the price of not knowing the type until runtime; when the type <em>is</em> known, you don't pay it.`),
sub("Under the hood: the vptr and the vtable"),
p(`This is the part interviewers probe, and it's genuinely simple once you see the layout. When a class has any virtual function, the compiler does two things. First, it builds <b>one vtable per class</b> &#8212; a static, read-only array of function pointers, one slot per virtual function, filled in with that class's overrides. <code>Circle</code>'s vtable points its <code>area</code> slot at <code>Circle::area</code>; <code>Rectangle</code>'s points the same slot at <code>Rectangle::area</code>. There is exactly one vtable per class, shared by every object of that class.`),
p(`Second, the compiler adds a hidden pointer &#8212; the <b>vptr</b> &#8212; as an invisible first member of every object. The constructor sets each object's vptr to point at <em>its</em> class's vtable. So a <code>Circle</code> object's vptr points at the Circle vtable; a <code>Rectangle</code> object's vptr points at the Rectangle vtable. The object carries, in its own bytes, the answer to "what am I really?"`),
svg("polymorphism_vtable","Every polymorphic object starts with a hidden vptr (set by its constructor) pointing at its class's vtable &#8212; a shared array of function pointers. A virtual call reads the vptr, indexes the fixed slot, and jumps. Two object types, two vtables, same slot index."),
p(`Now the call. <code>p-&gt;area()</code> where <code>p</code> is a <code>Shape*</code> compiles to roughly: "follow <code>p</code>'s vptr to the vtable, load the pointer in the <code>area</code> slot (a fixed, known index), and jump to it." Two pointer dereferences and an indirect jump. The <em>index</em> is decided at compile time (it's always slot 0 for <code>area</code>); the <em>target</em> is decided at runtime by whichever vtable the vptr happens to point at. That single indirection is the whole of dynamic dispatch &#8212; no type tags, no <code>if/else</code> ladder, no string comparison. Just "read the object's vptr and jump through it."`),
note(`&#129504;`,`Say this and the interviewer relaxes`,`"Each polymorphic class has one vtable of function pointers. Each object stores a hidden vptr to its class's vtable, set in the constructor. A virtual call is an indirect jump: dereference the vptr, index the known slot, call. The slot index is fixed at compile time; the target is chosen at runtime by the object's actual type." That's the mechanism, stated completely, in four sentences.`),
sub("Virtual destructors: the non-negotiable one"),
p(`Here's the rule that, if you forget it, leaks memory or worse: <b>if a class is meant to be deleted through a base pointer, its destructor must be <code>virtual</code>.</b> Walk through why. You <code>delete</code> a <code>Shape*</code> that actually points at a <code>Circle</code>. If <code>~Shape</code> is <em>not</em> virtual, the call is dispatched statically &#8212; the compiler sees a <code>Shape*</code> and calls <code>~Shape</code> only. <code>~Circle</code> never runs. The <code>Circle</code> part of the object &#8212; its members, anything it owned &#8212; is never destroyed. That's a leak at best; with members that own resources, it's a real bug. The standard calls deleting through a base pointer with a non-virtual destructor <b>undefined behavior</b>, full stop.`),
p(`Make the destructor virtual and it goes in the vtable like any other virtual function. Now <code>delete p</code> dispatches to <code>~Circle</code> first (which then chains to <code>~Shape</code> automatically, base-after-derived, the way destructors always run). The whole object is destroyed. This is the same RAII story from the smart-pointers lesson, one level up: the destructor has to actually <em>be the derived one</em> for RAII members to clean themselves up.`),
worked("Why the missing virtual dtor leaks","Both versions delete a derived object through a base pointer. With a non-virtual base destructor, only <code>~Base</code> runs &#8212; the <code>Derived</code> part, including its owned <code>buffer</code>, is never destroyed. One <code>virtual</code> keyword fixes it: the destructor enters the vtable, so <code>delete</code> dispatches to <code>~Derived</code> first, then chains up to <code>~Base</code>.",
`struct BadBase {
    ~BadBase() { }                       // NOT virtual -- the bug
};
struct BadDerived : BadBase {
    std::unique_ptr<int[]> buffer = std::make_unique<int[]>(1000);
};

BadBase* p = new BadDerived();
delete p;        // calls ~BadBase only -> ~BadDerived never runs -> buffer LEAKS
                 // (formally: undefined behavior)

// --- the fix: one keyword ---
struct Base {
    virtual ~Base() = default;           // virtual -> goes in the vtable
};
struct Derived : Base {
    std::unique_ptr<int[]> buffer = std::make_unique<int[]>(1000);
};

Base* q = new Derived();
delete q;        // dispatches to ~Derived (frees buffer), then chains to ~Base. Correct.`),
note(`&#128221;`,`The shortcut: unique_ptr to base needs it too`,`This isn't just about hand-written <code>delete</code>. <code>std::unique_ptr&lt;Shape&gt; s = std::make_unique&lt;Circle&gt;(2.0);</code> calls <code>delete</code> on a <code>Shape*</code> when it goes out of scope &#8212; so it has the exact same requirement. If <code>Shape</code> lacks a virtual destructor, the <code>Circle</code> part leaks even through a smart pointer. <b>A polymorphic base class needs a virtual destructor; the smart pointer doesn't save you from this one.</b>`),
sub("Pure virtual functions, abstract classes, interfaces"),
p(`<code>virtual double area() const = 0;</code> &#8212; the <code>= 0</code> makes it a <b>pure virtual</b> function: a declaration with no (required) definition that every concrete derived class <em>must</em> override. A class with at least one pure virtual function is <b>abstract</b>: you cannot instantiate it (<code>Shape s;</code> won't compile), only derive from it and hold it through a pointer or reference. That's exactly right for <code>Shape</code> &#8212; "a shape" with no specific kind has no area, so the base should refuse to exist on its own.`),
p(`An <b>interface</b>, in C++, is just an abstract class where <em>every</em> function is pure virtual and there's no data &#8212; the equivalent of Java's <code>interface</code> or a Go interface, built out of the same virtual machinery. It's a pure contract: "anything claiming to be a <code>Drawable</code> must provide <code>draw()</code>." There's no <code>interface</code> keyword; the pattern is the feature.`),
code(`struct Drawable {                 // an interface: all pure virtual, no data
    virtual void draw() const = 0;
    virtual ~Drawable() = default;   // still need the virtual dtor
};

struct Sprite : Drawable {
    void draw() const override { /* blit pixels */ }
};

// Drawable d;                       // ERROR: cannot instantiate an abstract class
std::vector<std::unique_ptr<Drawable>> scene;   // but you CAN hold them polymorphically
scene.push_back(std::make_unique<Sprite>());`),
sub("override and final: cheap insurance"),
p(`<code>override</code> looks like a comment but it's a compile-time assertion: "this function really does override a virtual function in a base." If it doesn't &#8212; you misspelled the name, got the signature subtly wrong, forgot a <code>const</code> &#8212; the compiler errors instead of silently creating a <em>new, unrelated</em> function that never gets called. This bug is nastier than it sounds, because without <code>override</code> the code compiles fine and just dispatches to the base version forever. Put <code>override</code> on every override; it costs nothing and catches a whole class of silent dispatch bugs.`),
worked("override turns a silent bug into a compile error","The signature is wrong &#8212; the base <code>render</code> is <code>const</code>, the derived one isn't &#8212; so it does not override; it's a brand-new function. Without <code>override</code> this compiles, and every <code>Base&amp;</code> call quietly runs <code>Base::render</code>. With <code>override</code>, the compiler rejects it and you fix the signature.",
`struct Widget {
    virtual void render() const { /* base */ }
};

struct Button : Widget {
    void render() { /* ... */ }              // NOT const -> does NOT override!
    // Silent bug: this is a new function. Base& calls still hit Widget::render.

    void render() const override { /* ... */ }  // with 'override', mismatch = compile error
};`),
p(`<code>final</code> is the complement: <code>void render() const final;</code> forbids any further derived class from overriding it, and <code>struct Leaf final : Base</code> forbids deriving from <code>Leaf</code> at all. Beyond expressing intent, <code>final</code> can help the optimizer <em>devirtualize</em> &#8212; if a call is on a <code>final</code> type, the compiler knows the exact target and can skip the vtable, even inline it. Worth a sentence when the topic of virtual-call cost comes up.`),
sub("Object slicing: the by-value trap"),
p(`This is the pitfall that bites people who understand everything above. Polymorphism works through pointers and references because they leave the object where it is &#8212; vptr intact, full derived object untouched. The moment you copy a derived object <em>into a base-typed value</em>, you <b>slice</b> it: only the base subobject is copied, the derived members are dropped on the floor, and the destination's vptr is the <em>base's</em> vptr. The result is a genuine <code>Base</code>, not a <code>Derived</code> wearing a base label &#8212; so virtual calls on it dispatch to <code>Base</code>.`),
svg("polymorphism_slice","Hold a derived object by reference (left) and the whole object survives &#8212; vptr intact, virtual calls reach the override. Copy it into a base-sized value (right) and the derived part is sliced off and the vptr is reset to the base, so virtual dispatch quietly stops working."),
worked("Slicing happens on copy-into-base","Pass by reference and <code>area()</code> dispatches to <code>Circle</code>. Pass (or assign) by value into a <code>Shape</code> and the <code>Circle</code> part is sliced away: the parameter is a plain <code>Shape</code> with the base vptr, so the virtual call resolves to <code>Shape</code> (here, it wouldn't even compile, because <code>Shape</code> is abstract &#8212; but with a concrete base it compiles and silently does the wrong thing). The rule: pass polymorphic types by <code>const&amp;</code> or by pointer, never by value.",
`void byRef(const Shape& s)  { std::cout << s.area(); }   // OK: dispatches to real type
// void byVal(Shape s)      { ... }                      // would SLICE the argument

Circle c{2.0};
byRef(c);                      // -> Circle::area, correct

// Assignment slices too:
struct Animal { virtual std::string speak() const { return "..."; } virtual ~Animal()=default; };
struct Dog : Animal { std::string speak() const override { return "woof"; } };

Dog d;
Animal a = d;                  // SLICE: copies only the Animal part, vptr = Animal's
std::cout << a.speak();        // "..." -- NOT "woof". The Dog-ness is gone.

const Animal& ref = d;         // no slice
std::cout << ref.speak();      // "woof" -- dispatches to Dog`),
note(`&#128161;`,`Why containers of base values slice`,`<code>std::vector&lt;Shape&gt;</code> stores <code>Shape</code> <em>values</em>, so pushing a <code>Circle</code> slices it &#8212; and it can't even hold an abstract base. To store polymorphic objects in a container you store <em>pointers</em>: <code>vector&lt;unique_ptr&lt;Shape&gt;&gt;</code> (owning) or <code>vector&lt;Shape*&gt;</code> (non-owning). This is the same ownership-by-pointer rule from the RAII lesson, now forced on you by polymorphism.`),
sub("RTTI: typeid and dynamic_cast"),
p(`Most of the time you call virtual functions and never ask "what type is this, really?" &#8212; that's the whole point of dispatch. But occasionally you genuinely need to recover the concrete type from a base pointer: you have a <code>Shape*</code> and you need the one specific thing only a <code>Circle</code> can do. That's a <b>downcast</b>, and the safe tool is <code>dynamic_cast</code>, part of C++'s <em>RTTI</em> (Run-Time Type Information &#8212; the type metadata the compiler attaches to polymorphic classes, reachable via the vtable).`),
p(`<code>dynamic_cast&lt;Circle*&gt;(p)</code> asks at runtime, "does <code>p</code> actually point at a <code>Circle</code> (or something derived from one)?" If yes, you get a usable <code>Circle*</code>; <b>if no, you get <code>nullptr</code></b> &#8212; so you check and branch. The reference form <code>dynamic_cast&lt;Circle&amp;&gt;(ref)</code> can't return null, so on failure it <b>throws <code>std::bad_cast</code></b> instead. That null-vs-throw split is a favorite interview detail: pointers fail to <code>nullptr</code>, references fail by throwing.`),
worked("A safe downcast with the null check","<code>dynamic_cast</code> on a pointer returns null when the object isn't the type you asked for, so the canonical form is the cast-and-check inside an <code>if</code>. <code>static_cast</code> here would be a lie &#8212; it would hand back a <code>Circle*</code> with no runtime check, and using it on a non-Circle is undefined behavior.",
`void describe(const Shape& s) {
    std::cout << "area = " << s.area() << '\\n';        // works for every Shape

    // Need something only a Circle has? Ask safely:
    if (const auto* c = dynamic_cast<const Circle*>(&s)) {
        std::cout << "radius = " << c->r << '\\n';      // runs only if s really is a Circle
    }
    // else: not a Circle; c was nullptr; we simply skip the Circle-only branch
}

// Reference form fails differently:
try {
    const Circle& c = dynamic_cast<const Circle&>(s);  // throws std::bad_cast if not a Circle
    use(c);
} catch (const std::bad_cast&) { /* handle wrong type */ }`),
pit("Reaching for dynamic_cast is often a design smell","A chain of <code>if (dynamic_cast&lt;A*&gt;) ... else if (dynamic_cast&lt;B*&gt;) ...</code> is usually a virtual function trying to be born. If you're switching on the concrete type to decide behavior, that behavior probably wants to be a <code>virtual</code> method the types override &#8212; then the dispatch is the vtable's job and the casts disappear. <code>dynamic_cast</code> earns its place for genuine \"is this the special case?\" queries, not as a substitute for designing the interface."),
sub("The real cost of virtual, and when engines avoid it"),
p(`Virtual is cheap but not free, and naming the costs precisely is what separates a senior answer. A virtual call is an <b>indirect call through a function pointer</b>, and that has three concrete downsides versus a direct call. First, the target isn't known at compile time, so the call <b>can't be inlined</b> &#8212; and lost inlining often costs more than the indirection itself, because it blocks the optimizer from seeing through the call. Second, it touches the <b>vptr</b>, an extra memory read that can be a <b>cache miss</b> if the object isn't hot. Third, the indirect jump can <b>stall the branch predictor</b> when the target varies. One virtual call is nanoseconds; a virtual call in a loop over a million objects, fighting the cache and the inliner every iteration, is a measurable hit.`),
p(`That's why a game engine deliberately <em>avoids</em> virtual in hot loops. The classic offender is an array of <code>unique_ptr&lt;Entity&gt;</code> with a <code>virtual update()</code>: every iteration chases a pointer to a heap object (cache miss), reads its vptr (another miss), and makes an un-inlinable indirect call. <b>Data-oriented design</b> flips it &#8212; store the data for each system in flat, contiguous arrays (a "structure of arrays") and run a tight non-virtual loop over each. The CPU streams through cache-friendly memory and the inliner does its job. The polymorphism moves <em>up</em>, to the level of "which system processes this array," not "what is each individual object."`),
idea("Composition and static dispatch over inheritance","Two related moves an engine reaches for. <b>Prefer composition to deep inheritance</b>: an entity that <em>has-a</em> set of components (a <code>Transform</code>, a <code>Sprite</code>, a <code>Collider</code>) is more flexible and more cache-friendly than a tall <code>GameObject &#8594; Character &#8594; Enemy &#8594; Boss</code> hierarchy of virtual overrides &#8212; this is the core of the entity-component pattern. And <b>prefer static dispatch where the type is known</b>: templates, overloading, or <code>std::variant</code> + <code>std::visit</code> give you polymorphism the compiler resolves at compile time, with full inlining and no vtable. Use virtual when the set of types is open and runtime-decided; use static dispatch when it's closed and known."),
sub("CRTP: polymorphism without the vtable"),
p(`Worth knowing the name even if you only touch it briefly. <b>CRTP</b> &#8212; the Curiously Recurring Template Pattern &#8212; is compile-time polymorphism: a base class templated on its own derived type, <code>struct Circle : Shape&lt;Circle&gt;</code>. The base can call into the derived type's methods (via a <code>static_cast</code> to <code>Derived*</code>) with the exact target resolved at compile time &#8212; so you get override-like customization with <b>no vptr, no vtable, no indirect call, and full inlining</b>. The trade-off is that it's static: the type must be known at compile time, so you lose the open-ended runtime extensibility that real virtual gives you. It's the tool when you want the polymorphism shape but can't afford the dispatch cost. The full mechanics belong to the Templates deep dive; here, just be able to name it as "static polymorphism via CRTP" when the cost of virtual comes up.`),
sub("Pitfalls to name before they name them"),
pit("Missing virtual destructor","If a class will ever be deleted through a base pointer (including by a <code>unique_ptr&lt;Base&gt;</code> or <code>shared_ptr&lt;Base&gt;</code>), its destructor must be <code>virtual</code>. Otherwise only the base destructor runs, the derived part leaks, and it's formally undefined behavior. The fix is one keyword: <code>virtual ~Base() = default;</code>. Conversely, if a class is <em>not</em> a polymorphic base, don't add a virtual destructor &#8212; it forces a vptr onto every object for nothing."),
pit("Object slicing on copy-by-value","Copying or passing a derived object into a base-typed <em>value</em> drops the derived part and resets the vptr to the base, so virtual dispatch silently stops working. Pass polymorphic types by <code>const&amp;</code> or by pointer, and store them in containers as <code>unique_ptr&lt;Base&gt;</code>, never as <code>Base</code> values."),
pit("Calling a virtual function from a constructor or destructor","During <code>Base</code>'s constructor, the object <em>is not yet</em> a <code>Derived</code> &#8212; the vptr still points at <code>Base</code>'s vtable, because the derived part hasn't been built. So a virtual call made from a base constructor (or destructor, where it's symmetric &#8212; the derived part is already gone) dispatches to the <b>current</b> type, not the most-derived one. It looks like it should call the override; it doesn't. Don't call virtual functions during construction or destruction; if you need type-specific setup, do it after the object is fully built (e.g. a separate <code>init()</code>)."),
cx(`A virtual call is O(1) &#8212; one extra indirection (vptr &#8594; vtable slot &#8594; jump) versus a direct call. The cost isn't the cycle count; it's the lost inlining, the vptr cache miss, and the branch-predictor stall, which is why hot loops avoid it. Per-object space cost: one vptr (one pointer) per polymorphic object, plus one shared vtable per class.`),
idea("Say it like this in the interview","\"Runtime polymorphism is a base pointer or reference calling a derived override, resolved at runtime. The mechanism: each polymorphic class has one vtable of function pointers, and each object stores a hidden vptr to its class's vtable, set in the constructor &#8212; a virtual call is an indirect jump through that vptr at a fixed slot index. A polymorphic base needs a <code>virtual</code> destructor, or deleting through the base pointer only runs the base destructor and leaks the derived part &#8212; that's undefined behavior. Pure virtual <code>= 0</code> makes the class abstract; an all-pure-virtual class is an interface. I put <code>override</code> on every override so signature mismatches are compile errors. The trap is object slicing &#8212; copying a derived object into a base value drops the derived part &#8212; so I pass polymorphic types by <code>const&amp;</code> or pointer. For a safe downcast I use <code>dynamic_cast</code>: null on failure for pointers, throws for references. And virtual isn't free &#8212; an un-inlinable indirect call plus a vptr cache miss &#8212; so in hot loops I avoid it, preferring data-oriented layouts, composition, or static dispatch like templates and CRTP.\" That arc &#8212; mechanism, virtual dtor, abstract/interface, override, slicing, dynamic_cast, cost &#8212; covers the whole topic and every standard follow-up.")
]},
{group:"C++ Deep Dives",num:"⇄",id:"typesystem",color:"#6366F1",title:"Casts, const & the Type System",badge:"C++ deep dive",blocks:[
  cue(`You already know what a cast is &#8212; you write them in engine code every day. What interviews probe is whether you reach for the <em>right</em> one and can say why. C++ gives you four named casts, each a different promise to the compiler, and a fifth C-style form that quietly does whatever it takes. This lesson sorts them out, then deepens the <code>const</code> story from the Pointers and Value-vs-Reference lessons and the <code>auto</code>/<code>decltype</code> deduction rules that trip people up. The payoff: you stop guessing which cast to type, and you can defend every one out loud.`),
  p(`Casting is just telling the compiler "treat this value as a different type." The danger is that "different type" covers a huge range &#8212; from a totally safe <code>int</code>&#8594;<code>long</code> widening, to a reinterpret-the-bits-and-pray reach across unrelated pointer types. C++ deliberately splits that range into four <em>named</em> casts so the danger is visible in the source. The name you type <em>is</em> the documentation: a reader (and a <code>grep</code>) can see exactly which kind of risk you took. That's the whole reason the named casts exist and the C-style <code>(T)x</code> is discouraged &#8212; one hides the risk, the others announce it.`),
  svg("typesystem_casts","The four named casts, ordered safe to dangerous &#8212; and the punchline at the bottom: a C-style <code>(T)x</code> is silently <em>any</em> of them, whichever the compiler can make compile. The color is the safety: green you reach for freely, red you reach for almost never."),
  sub("static_cast — the everyday, compile-time cast"),
  p(`<code>static_cast&lt;T&gt;</code> is the one you'll type most. It performs conversions the compiler can verify are <em>meaningful</em> at compile time: numeric conversions (<code>int</code>&#8594;<code>double</code>, <code>double</code>&#8594;<code>int</code> truncating, <code>long</code>&#8594;<code>int</code> narrowing), conversions between related class types, an explicit <code>enum</code>&#8594;<code>int</code>, and converting a <code>void*</code> back to the exact pointer type it came from. It will also do an up-cast (derived&#8594;base, always safe) or a down-cast (base&#8594;derived) &#8212; but the down-cast comes with <em>no runtime check</em>. You are asserting "I know this base pointer really points at a Derived"; if you're wrong, you get undefined behavior.`),
  code(`double pi = 3.99;
int n = static_cast<int>(pi);          // 3 -- explicit, intentional truncation

int total = 7, parts = 2;
double avg = static_cast<double>(total) / parts;  // 3.5, not integer 3

void* raw = operator new(sizeof(int)); // raw storage
int* p = static_cast<int*>(raw);       // void* back to the exact type: fine

Base* b = getBase();
Derived* d = static_cast<Derived*>(b); // down-cast: NO runtime check.
                                       // UB if b isn't actually a Derived.`),
  note("&#128161;","Why an explicit cast at all, if the conversion is legal?",`<code>int n = pi;</code> compiles too (with a narrowing warning). Writing <code>static_cast&lt;int&gt;(pi)</code> instead says <em>"yes, I meant to truncate"</em> &#8212; it silences the warning <em>because you acknowledged it</em>, and it leaves a searchable marker at the lossy spot. The cast isn't changing what happens; it's recording that the loss was deliberate. That's the same "make intent checkable" habit as const-correctness, applied to conversions.`),
  sub("dynamic_cast — the safe, runtime-checked downcast"),
  p(`When you genuinely don't know whether a base pointer points at a particular derived type, <code>static_cast</code> is the wrong tool &#8212; it can't check, so a wrong guess is UB. <code>dynamic_cast&lt;T*&gt;</code> is the right one: it consults the object's runtime type information and only succeeds if the object really is (or derives from) <code>T</code>. The cost is a runtime lookup; the payoff is safety. This is the cast that makes "is this generic <code>Entity*</code> actually a <code>Projectile</code>?" answerable safely at runtime. (It's the same tool the Polymorphism lesson covers from the object-model side.)`),
  p(`One precondition: <code>dynamic_cast</code> only works across a <em>polymorphic</em> hierarchy &#8212; the base class must have at least one <code>virtual</code> function (usually a <code>virtual</code> destructor). That virtual-ness is what gives each object a hidden type tag (the vtable pointer) for the cast to inspect. On a non-polymorphic type it won't even compile. And the failure behavior depends on what you're casting:`),
  ul([
    `<b>Pointer form</b> &#8212; on failure it returns <code>nullptr</code>. So the idiom is cast-then-check: <code>if (auto* d = dynamic_cast&lt;Derived*&gt;(b)) { use d }</code>. The <code>nullptr</code> branch is your "it wasn't that type" path.`,
    `<b>Reference form</b> &#8212; a reference can't be null, so there's nothing to return on failure. Instead it <em>throws</em> <code>std::bad_cast</code>. Use the reference form only when failure is genuinely exceptional and you're prepared to catch it.`,
  ]),
  worked("dynamic_cast vs static_cast on the same downcast","Same intent &#8212; turn a Base* into a Derived* &#8212; but two different contracts. <code>static_cast</code> trusts you and is free; <code>dynamic_cast</code> verifies and costs a lookup. Reach for <code>dynamic_cast</code> precisely when you can't prove the type yourself; reach for <code>static_cast</code> when you already can (and want the speed).",
`struct Shape { virtual ~Shape() = default; };   // virtual -> polymorphic
struct Circle : Shape { double r; };

double areaIfCircle(Shape* s) {
    // We don't KNOW it's a Circle, so check at runtime:
    if (auto* c = dynamic_cast<Circle*>(s))      // nullptr if not a Circle
        return 3.14159 * c->r * c->r;
    return 0.0;                                   // it was some other Shape

    // static_cast<Circle*>(s) here would compile and run, but if s
    // pointed at a Square it would read garbage as 'r' -> UB.
}`),
  note("&#128221;","Needing dynamic_cast a lot is a design smell",`A scattering of <code>dynamic_cast</code>s asking "which subclass is this?" is often a sign a <code>virtual</code> function wants to exist instead &#8212; let each derived type override <code>area()</code> and call <code>s-&gt;area()</code> with no cast at all. <code>dynamic_cast</code> is the right tool for the occasional "is this the one special type I need to handle?" check, not a substitute for polymorphism. Saying that distinction out loud is a senior signal.`),
  sub("const_cast — add or strip const, nothing else"),
  p(`<code>const_cast&lt;T&gt;</code> is the only cast that can add or remove <code>const</code> (or <code>volatile</code>) qualifiers &#8212; and it can do <em>nothing else</em>; it can't change the underlying type. You'll mostly see it stripping <code>const</code> off a pointer or reference to pass into an older or third-party API that takes a non-const parameter but doesn't actually modify the argument. That use is legitimate. The trap is the other one:`),
  pit("Writing through a stripped const can be undefined behavior",`Stripping <code>const</code> and then <em>reading</em> is fine. Stripping it and then <em>writing</em> is only fine if the object underneath was <em>not originally declared const</em>. If you <code>const_cast</code> away const on something that truly is a <code>const</code> object and then modify it, that's undefined behavior &#8212; the compiler may have placed it in read-only memory or constant-folded reads of it. <code>const_cast</code> changes your <em>view</em> of the object; it does not change what the object actually is.`),
  code(`void legacyApi(char* s);               // old API, doesn't modify s but isn't const-correct

void callIt(const std::string& text) {
    // We KNOW legacyApi only reads; strip const to satisfy its signature:
    legacyApi(const_cast<char*>(text.c_str()));   // OK: no write happens
}

const int k = 42;
int* p = const_cast<int*>(&k);
*p = 99;                                // UNDEFINED BEHAVIOR: k was truly const`),
  note("&#128221;","const_cast is a confession, not a tool",`Reaching for <code>const_cast</code> usually means a <code>const</code>-correctness mistake exists <em>somewhere</em> &#8212; a function that should have taken <code>const&amp;</code> didn't. The clean fix is to make the API const-correct. When you can't (it's not your code), <code>const_cast</code> is the escape hatch &#8212; but treat each one as something to justify in review, not a default move. If you're stripping const so you can <em>write</em>, stop: you almost certainly have a real bug.`),
  sub("reinterpret_cast — raw bits, no safety net"),
  p(`<code>reinterpret_cast&lt;T&gt;</code> is the sledgehammer: it tells the compiler "take these bits and pretend they're a <code>T</code>," with essentially no conversion logic and no checks. It's for reinterpreting raw pointer types &#8212; <code>char*</code>&#8594;<code>uint32_t*</code>, a pointer to/from an integer, hardware-register and serialization code. It does no pointer adjustment (unlike a base/derived <code>static_cast</code>, which can shift the address for multiple inheritance), so misusing it across a class hierarchy silently corrupts. As a game-engine dev you've used it for legit low-level work; the interview point is knowing it's the <em>last</em> resort, named precisely so it's easy to find and audit.`),
  pit("reinterpret_cast and strict aliasing",`The deeper hazard: C++'s <em>strict aliasing</em> rule says the compiler may assume two pointers of unrelated types never refer to the same memory. So reading an object through a <code>reinterpret_cast</code>ed pointer of a different type (e.g. viewing a <code>float</code>'s storage as an <code>int</code>) is undefined behavior, and the optimizer is allowed to reorder or discard your accesses. The standard-blessed way to reinterpret bytes is <code>std::bit_cast&lt;T&gt;(x)</code> (C++20) or a <code>memcpy</code> into the target type &#8212; not a pointer reinterpret. <code>char*</code>/<code>std::byte*</code> are the one exception the rule allows to alias anything.`),
  code(`float f = 1.5f;

// WRONG: strict-aliasing UB -- reading f's bytes through an int*
int bad = *reinterpret_cast<int*>(&f);

// RIGHT: copy the bytes into an int, no aliasing violation
int bits;
std::memcpy(&bits, &f, sizeof bits);   // or std::bit_cast<int>(f) in C++20`),
  sub("Why C-style casts (Type)x are discouraged"),
  p(`A C-style cast <code>(Derived*)b</code> looks innocent, and that's exactly the problem. Under the hood the compiler tries, in order, <code>const_cast</code>, then <code>static_cast</code>, then <code>static_cast</code>-plus-<code>const_cast</code>, then <code>reinterpret_cast</code>, then that plus <code>const_cast</code> &#8212; and picks the first combination that <em>compiles</em>. So a single <code>(T)x</code> can quietly perform a <code>reinterpret_cast</code> when you only meant a <code>static_cast</code>, casting away const along the way, with zero indication in the source. You lose intent, you lose the ability to <code>grep</code> for the dangerous casts, and you lose the compiler's help catching the cases where <em>no</em> safe cast was possible.`),
  ul([
    `<b>Intent is invisible</b> &#8212; you can't tell a deliberate truncation from an accidental bit-reinterpretation by reading <code>(int)x</code>.`,
    `<b>It's the most powerful cast, always</b> &#8212; it'll reach for <code>reinterpret_cast</code> if that's what it takes, so it never refuses the way a too-weak named cast would have warned you.`,
    `<b>It's not searchable</b> &#8212; <code>grep reinterpret_cast</code> finds your risky casts; nothing finds the C-style ones hiding as <code>(T)x</code>.`,
  ]),
  pit("The C-style cast that's secretly a reinterpret_cast",`<code>(int*)somePtr</code> where <code>somePtr</code> is an unrelated pointer type compiles fine and does a <code>reinterpret_cast</code> &#8212; the single most dangerous cast &#8212; with no syntactic warning that anything risky happened. Write <code>static_cast</code> instead and the compiler will <em>reject</em> the unrelated-pointer conversion, forcing you to either fix the types or type <code>reinterpret_cast</code> explicitly and own it. The named cast failing to compile is a feature: it caught a mistake the C-style cast would have waved through.`),
  idea("The cast decision in one breath",`Numeric or related-type conversion you can prove is right &#8594; <code>static_cast</code>. Downcast you can't prove, in a polymorphic hierarchy &#8594; <code>dynamic_cast</code> (check for <code>nullptr</code>). Only adding/removing const for a const-incorrect API &#8594; <code>const_cast</code> (and never write through one that was truly const). Raw bit reinterpretation at the hardware/serialization layer &#8594; <code>reinterpret_cast</code>, knowing the strict-aliasing rules. Never the C-style <code>(T)x</code> &#8212; it hides which of those four it actually did.`),
  sub("Const-correctness, deepened"),
  p(`The Pointers lesson distinguished <code>const int*</code> (pointer to const data) from <code>int* const</code> (const pointer), and the Value-vs-Reference lesson made <code>const&amp;</code> your default parameter. This section pushes <code>const</code> from "a parameter annotation" to "a property of your whole design." <code>const</code> isn't a hint &#8212; it's a compiler-enforced promise, and the more of your interfaces carry it, the more bugs become compile errors instead of runtime surprises.`),
  sub("const member functions: what they promise"),
  p(`A <code>const</code> after a member function's parameter list &#8212; <code>int size() const</code> &#8212; is a promise that calling it won't modify the object. Inside such a function <code>this</code> is a pointer to const, so the compiler rejects any write to a member. The payoff lands at the call site: <em>you can only call <code>const</code> member functions on a <code>const</code> object</em>. So if you ever want to pass an object as <code>const&amp;</code> (and you do, constantly), every method you call on it through that reference must be <code>const</code>. One missing <code>const</code> on an accessor poisons the whole const-correct chain above it.`),
  pit("The direction that actually bites: non-const methods on a const object",`It's easy to state it backwards, so pin it down: a <code>const</code> object can only call <code>const</code> member functions. The error you'll hit is calling a <em>non-const</em> method through a <code>const</code> reference &#8212; e.g. a <code>getValue()</code> you forgot to mark <code>const</code>, called inside a function taking <code>const Widget&amp;</code>. The fix is almost always to add the missing <code>const</code> to the accessor, not to drop the <code>const</code> from the parameter. Mark every method that doesn't mutate as <code>const</code> from the start and this class of error disappears.`),
  worked("A const-correct accessor and a const/non-const operator[] pair","Two ideas at once. First, <code>size()</code> is <code>const</code> because reading the size never mutates the buffer &#8212; so it's callable on a <code>const Vec&amp;</code>. Second, <code>operator[]</code> is <em>overloaded on constness</em>: the non-const version hands back a mutable reference so callers can assign; the const version returns a <code>const&amp;</code> so a const object stays read-only. The compiler picks the right one based on whether the object is const.",
`class Vec {
    int* data;
    size_t n;
public:
    size_t size() const { return n; }          // const: promises no mutation

    // non-const object -> writable element
    int& operator[](size_t i)       { return data[i]; }
    // const object -> read-only element
    const int& operator[](size_t i) const { return data[i]; }
};

void demo(Vec& v, const Vec& cv) {
    v[0] = 9;          // calls the non-const [] -> assignable
    int x = cv[0];     // calls the const []     -> read-only, fine
    // cv[0] = 9;      // ERROR: returns const int&, can't assign
    cv.size();         // OK: size() is const, callable on a const object
}`),
  note("&#128161;","Why two operator[] overloads instead of one",`A single <code>int&amp; operator[]</code> can't be called on a <code>const Vec</code> (it's non-const), and a single <code>const int&amp; operator[] const</code> would forbid <em>writing</em> through a non-const Vec. You genuinely need both so that mutability propagates: a mutable container yields mutable elements, a const container yields const elements. This const/non-const overload pair is exactly how <code>std::vector</code>, <code>std::string</code>, and friends are written.`),
  sub("mutable: the deliberate exception"),
  p(`Occasionally a member <em>should</em> change inside a <code>const</code> function without breaking the promise &#8212; a cached computed value, a mutex you lock, a hit-counter. Mark that member <code>mutable</code> and it stays writable even through a <code>const</code> <code>this</code>. The promise <code>const</code> makes is about <em>logical</em> constness (the object's observable value is unchanged), and <code>mutable</code> is how you carve out an implementation detail that doesn't affect it. Use it sparingly and only for genuinely incidental state &#8212; abusing it to mutate real data through a <code>const</code> method is lying to every caller.`),
  code(`class Cache {
    mutable bool computed = false;     // bookkeeping, not logical state
    mutable int  cached = 0;
    int input;
public:
    int value() const {                // const: callers see no value change
        if (!computed) {               // but we may fill the cache...
            cached = expensive(input); // ...legal because both are 'mutable'
            computed = true;
        }
        return cached;
    }
};`),
  sub("auto deduction strips references and top-level const"),
  p(`The Value-vs-Reference lesson flagged this; here's the rule stated sharply so you never get caught. Bare <code>auto</code> deduces by <em>value</em>: it drops the reference and the top-level <code>const</code> from the initializer, giving you a fresh, mutable copy. That's why <code>auto x = v[0];</code> copies the element even though <code>operator[]</code> returned an <code>int&amp;</code>, and why <code>auto y = cv[0];</code> gives you a mutable <code>int</code> even though the source was <code>const int&amp;</code>. If you want the alias, you ask for it explicitly with <code>auto&amp;</code> or <code>const auto&amp;</code>.`),
  svg("typesystem_deduce","<code>auto</code> takes the value and throws away the <code>&amp;</code> and the top-level <code>const</code> &#8212; you get an independent, mutable copy. <code>decltype</code> keeps the declared type exactly, references and const included. When you wanted the reference from <code>auto</code>, spell it: <code>const auto&amp;</code>."),
  code(`const int  k = 7;
const int& r = k;

auto        a = r;     // int          -- & and const both stripped; a is a copy
auto&       b = r;     // const int&   -- you asked for a reference; const stays
const auto& c = r;     // const int&   -- read-only alias, no copy
auto*       p = &k;    // const int*   -- top-level const of the POINTER drops,
                       //                 but the pointee stays const`),
  note("&#128221;","Top-level vs low-level const &#8212; what exactly gets stripped",`<code>auto</code> drops only the <em>top-level</em> const (the constness of the variable itself) and the reference. It does <em>not</em> strip const that's part of what a pointer points <em>at</em>: deducing from a <code>const int*</code> still gives a <code>const int*</code>, because the pointee's const is "low-level," baked into the type. So <code>auto</code> on a pointer copies the pointer (fine, pointers are cheap) but faithfully keeps "points to const." This is the same top-level/low-level distinction as <code>int* const</code> vs <code>const int*</code> from the Pointers lesson.`),
  sub("decltype preserves the exact declared type"),
  p(`Where <code>auto</code> normalizes a type down to a value, <code>decltype</code> reports the type <em>exactly as declared</em> &#8212; references, const, and all. <code>decltype(r)</code> on the <code>const int& r</code> above is <code>const int&amp;</code>, not <code>int</code>. This is what you reach for in generic code when you need the return type to mirror whatever an expression really is &#8212; a wrapper that returns "the same kind of reference my callee returned" wants <code>decltype</code>, not <code>auto</code>, or it would silently turn a returned reference into a copy.`),
  p(`There's a wrinkle worth knowing: <code>decltype</code> of a plain <em>name</em> like <code>decltype(x)</code> gives the declared type of <code>x</code>, but <code>decltype</code> of a more complex <em>expression</em> &#8212; including a name in extra parentheses, <code>decltype((x))</code> &#8212; yields an lvalue reference, <code>int&amp;</code>. That parenthesis-sensitivity is a famous gotcha. And <code>decltype(auto)</code> as a return type means "deduce like <code>decltype</code> would," i.e. preserve references and const, instead of the value-collapsing behavior of bare <code>auto</code> &#8212; the tool for perfect-forwarding a return value.`),
  worked("auto vs decltype on the same expression","One initializer, three deductions. <code>auto</code> collapses to a value (you lose the reference and const). <code>decltype(name)</code> reproduces the declared type. <code>decltype((name))</code> &#8212; note the double parens &#8212; reports an lvalue reference because the expression is an lvalue. Knowing these three apart is exactly the kind of precise answer the type-system question is fishing for.",
`std::vector<int> v = {10, 20, 30};
const int& first = v[0];

auto            a = first;   // int        -- value copy; & and const dropped
decltype(first) d = first;   // const int& -- exact declared type: alias, read-only
decltype(v[0])  e = v[0];    // int&       -- operator[] returns int&, preserved

int y = 5;
decltype(y)   m = y;         // int   -- declared type of the name y
decltype((y)) n = y;         // int&  -- (y) is an lvalue expression -> reference!`),
  note("&#128221;","decltype(auto) in one line",`Use <code>decltype(auto)</code> as a function's return type when you want to return <em>exactly</em> what an inner expression yields &#8212; reference-ness and const intact &#8212; rather than a copy. <code>decltype(auto) frontOf(C&amp; c) { return c.front(); }</code> hands back the real reference; writing <code>auto</code> there would have copied. It's the forwarding-return counterpart to the <code>auto&amp;</code> discipline at the call site.`),
  sub("const propagates through your design"),
  p(`Pull the threads together: <code>const</code> isn't a local choice, it's a property that flows. A function takes a parameter <code>const&amp;</code> &#8594; so it may only call <code>const</code> methods on it &#8594; so those methods must be marked <code>const</code> &#8594; and if they return pieces of the object, they should return <code>const&amp;</code> so the read-only-ness keeps flowing. Start const-correct at the leaves (mark every non-mutating method <code>const</code>) and the property composes all the way up; skip it anywhere and the chain breaks, forcing either a cascade of non-const signatures or a <code>const_cast</code> band-aid. Const-correctness is cheapest when it's there from the first line.`),
  cx(`Named casts are <b>O(1)</b> at runtime &#8212; except <code>dynamic_cast</code>, which pays a small RTTI lookup &#8226; <code>static_cast</code> down-casts and <code>const_cast</code>/<code>reinterpret_cast</code> are compile-time-only reinterpretations &#8226; <code>const</code>, <code>auto</code>, and <code>decltype</code> are purely compile-time &#8212; zero runtime cost`),
  sub("Saying it out loud in the interview"),
  p(`This topic rewards precision over cleverness. If you're asked "what casts does C++ have and when do you use each," the strong answer names all four, pairs each with its one job, and volunteers the danger of the C-style cast unprompted. If <code>const</code> comes up, the strong answer connects const member functions, <code>const&amp;</code> parameters, and the const/non-const <code>operator[]</code> overload into one story about a promise the compiler enforces. And if <code>auto</code> vs <code>decltype</code> comes up, the crisp distinction &#8212; "<code>auto</code> deduces a value and strips reference and top-level const; <code>decltype</code> preserves the declared type exactly" &#8212; is most of the answer.`),
