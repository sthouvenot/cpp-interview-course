`#include <climits>
#include <iostream>

// The overflow check the optimizer silently removes:
void willOverflow(int x) {
    // "x + 1 < x" is only possible via signed overflow == UB,
    // so the optimizer proves it can never be true and deletes the branch.
    if (x + 1 < x)
        std::cout << "overflow!\n";   // -O2: this line is removed entirely
}

// Reading an uninitialized variable is UB, not "a random bool":
bool maybe() {
    bool flag;                        // never initialized
    if (flag) return true;            // UB: the optimizer may assume either way
    return false;                     // debug and release can disagree here
}

int main() {
    willOverflow(INT_MAX);            // you expect "overflow!"; -O2 prints nothing
}`),
  sub("The discipline: make UB loud instead of silent"),
  p(`You cannot rely on UB being caught for you, but you can <em>recruit tools to catch it</em>. The professional habit is to run your test builds under instrumentation that turns silent UB into a loud, located failure:`),
  ul([
    `<b>Sanitizers</b> &#8212; compile with <code>-fsanitize=address</code> (ASan) to catch out-of-bounds and use-after-free with a stack trace, and <code>-fsanitize=undefined</code> (UBSan) to catch signed overflow, null dereference, bad shifts, and more. They cost runtime, so you run them in CI and dev builds, not in shipping.`,
    `<b><code>-Wall -Wextra</code></b> &#8212; the compiler already warns about many UB sources (uninitialized reads, comparisons that can't be true) if you let it. Treat warnings as errors (<code>-Werror</code>) so they can't accumulate.`,
    `<b>Valgrind</b> &#8212; a slower, no-recompile memory checker that catches leaks, invalid reads/writes, and use-after-free. ASan is faster and usually preferred now, but Valgrind needs no instrumentation build.`,
  ]),
  pit("\"But it works\" is not evidence the code is correct","The single most dangerous sentence around UB. Code that triggers UB and happens to produce the right answer today is still broken &#8212; you're relying on an outcome the standard never promised, and the next compiler version, optimization flag, or unrelated edit can change it without warning. UB is also not portable: a result you observed on one compiler or platform tells you nothing about another. If a sanitizer or warning flags it, it's a bug, no matter what the program printed."),
  sub("Part two — The build model: source to executable"),
  p(`Switch hats. The other half of this lesson is the pipeline interviewers love to walk you through, because it explains a whole class of errors that have nothing to do with your algorithm. A C++ program isn't compiled in one shot; it goes through three distinct stages, and knowing which stage an error came from tells you almost immediately how to fix it.`),
  svg("ub_pipeline","The three stages. The <b>preprocessor</b> expands every <code>#include</code> (literally pasting the header's text in) and every macro, producing one self-contained chunk of C++ per source file &#8212; a <em>translation unit</em>. The <b>compiler</b> turns each translation unit into an <em>object file</em> independently, knowing nothing about the others. The <b>linker</b> then stitches the object files together, resolves every symbol one references but another defines, pulls in any libraries, and emits the executable."),
  ul([
    `<b>Preprocessor.</b> A pure text transform that runs before any C++ is understood. <code>#include &lt;vector&gt;</code> is literally "copy-paste the entire contents of &lt;vector&gt; here"; macros expand; <code>#ifdef</code> blocks are kept or dropped. The output is one big stream of C++ text with no directives left.`,
    `<b>Compiler.</b> Takes one <b>translation unit</b> &#8212; a single <code>.cpp</code> file <em>plus everything it included</em>, after preprocessing &#8212; and compiles it, alone, into an <b>object file</b> (<code>.o</code> / <code>.obj</code>). Each TU is compiled in total isolation; the compiler has no idea what's in the other <code>.cpp</code> files. This is why a function you <em>call</em> here only needs to be <em>declared</em> here.`,
    `<b>Linker.</b> Collects all the object files, matches every <em>use</em> of a symbol (a function, a global) to its one <em>definition</em> somewhere, links in any static/dynamic libraries, and produces the final executable. The linker works in symbols, not source &#8212; it never sees your code, only names and addresses.`,
  ]),
  note(`&#128221;`,`Translation unit = one .cpp after preprocessing`,`This term comes up constantly, so pin it down: a <b>translation unit</b> is exactly one <code>.cpp</code> file together with the full text of every header it pulled in, as it looks after the preprocessor runs. The compiler's whole world is a single TU at a time. "Each TU is compiled independently" is the sentence that explains declarations, the One Definition Rule, header guards, and the compiler-vs-linker error split all at once &#8212; it's worth being able to say it cleanly.`),
  sub("Declaration vs definition, and the One Definition Rule"),
  p(`Because each TU is compiled alone, C++ splits "telling the compiler a thing exists" from "providing the thing." A <b>declaration</b> introduces a name and its type &#8212; enough for the compiler to type-check uses of it. A <b>definition</b> actually provides the body or storage. The rule of thumb: <b>you may declare a thing as many times as you like, but you must define it exactly once.</b>`),
  code(`int add(int, int);          // DECLARATION: "this function exists, here's its type"
extern int counter;          // DECLARATION of a global defined elsewhere
struct Widget;               // DECLARATION (forward) of a type

int add(int a, int b) {      // DEFINITION: provides the body
    return a + b;
}
int counter = 0;             // DEFINITION: provides the storage`),
  p(`The <b>One Definition Rule</b> (ODR) is the formalization: every function, variable, type, or template used in the program must have <em>exactly one</em> definition across the whole program. Declare freely; define once. Violating the ODR &#8212; two definitions of the same non-inline function, the same global defined in two TUs &#8212; is its own flavor of UB, though in practice the linker usually catches it and complains about a "multiple definition."`),
  sub("Header guards / #pragma once: why a header included twice breaks"),
  p(`Headers are where ODR violations sneak in, because <code>#include</code> is dumb text pasting. If <code>a.h</code> includes <code>types.h</code>, and your <code>.cpp</code> also includes <code>types.h</code>, the preprocessor pastes <code>types.h</code> <em>twice</em> into the same TU. Any <code>struct</code> or non-inline definition in there is now defined twice in one translation unit &#8212; a compile error, before the linker even runs. <b>Header guards</b> (or the simpler <code>#pragma once</code>) make a header paste its contents at most once per TU:`),
  worked("A header with an include guard, used across two translation units","The guard macro makes <code>shape.h</code> expand only once per TU no matter how many times it's included &#8212; the second <code>#include</code> sees <code>SHAPE_H</code> already defined and skips the body. Notice the split: the header <em>declares</em> <code>area</code> (so any TU that includes it can call it) and the function is <em>defined</em> once, in <code>shape.cpp</code>. Both <code>shape.cpp</code> and <code>main.cpp</code> are their own translation units; the linker joins them.",
`// ---- shape.h ----
#ifndef SHAPE_H          // include guard: if not yet seen...
#define SHAPE_H          // ...mark it seen, and expand the body once

struct Circle { double r; };
double area(const Circle& c);   // DECLARATION only

#endif  // SHAPE_H       // #pragma once does the same job in one line

// ---- shape.cpp  (translation unit #1) ----
#include "shape.h"
#include <numbers>
double area(const Circle& c) {            // the one DEFINITION
    return std::numbers::pi * c.r * c.r;
}

// ---- main.cpp  (translation unit #2) ----
#include "shape.h"                          // gets the DECLARATION, can call area()
int main() {
    Circle c{2.0};
    return static_cast<int>(area(c));       // linker connects this call to shape.o
}`),
  sub("Linkage: who can see a symbol across TUs"),
  p(`<b>Linkage</b> answers "can the linker match a name in one TU to a definition in another?" It's the mechanism behind both hiding helpers and sharing definitions:`),
  ul([
    `<b>External linkage</b> (the default for free functions and globals) &#8212; the symbol is visible to other TUs; the linker can resolve a use in one TU against a definition in another. This is what lets <code>main.cpp</code> call <code>area</code> defined in <code>shape.cpp</code>.`,
    `<b>Internal linkage</b> &#8212; the symbol is private to its own TU; other TUs can't see it, and each TU may have its own. You opt in with <code>static</code> at file scope, or (the modern preference) an <b>anonymous namespace</b>. Use it for file-local helpers so they don't collide with same-named helpers elsewhere.`,
    `<b><code>inline</code></b> &#8212; the keyword's real job today isn't "inline this call," it's "this definition may appear in <em>every</em> TU that includes the header, and they're all the same one definition &#8212; don't treat that as an ODR violation." That's how you can legally put a function or (since C++17) an <b>inline variable</b> body directly in a header.`,
  ]),
  code(`// In some .cpp file:
static int helper() { return 7; }   // internal linkage: private to THIS TU
namespace { int scratch = 0; }      // anonymous namespace: also TU-private

// In a header, so the definition can sit in every includer safely:
inline int square(int x) { return x * x; }   // inline function, header-defined
inline int kStartHp = 100;                    // inline variable (C++17): one shared global`),
  sub("Static vs dynamic libraries"),
  p(`The last piece the linker handles is libraries &#8212; precompiled code you link against instead of recompiling. Two flavors, and the difference is <em>when</em> the code joins your program:`),
  ul([
    `<b>Static library</b> (<code>.a</code> on Unix, <code>.lib</code> on Windows) &#8212; a bundle of object files. At link time the linker copies the parts you use <em>into</em> your executable. Result: a bigger, self-contained binary with no external dependency at runtime; updating the library means relinking.`,
    `<b>Dynamic / shared library</b> (<code>.so</code> on Unix, <code>.dll</code> on Windows) &#8212; not baked in. Your executable records "I need <code>libfoo</code>," and the OS <em>loads it at runtime</em>. Result: a smaller binary, the library shared across processes, and you can ship a library update without relinking the app &#8212; at the cost of having to ship/find the right <code>.so</code>/<code>.dll</code> (the "DLL hell" failure mode).`,
  ]),
  sub("The payoff: compiler errors vs linker errors are different beasts"),
  p(`Here's why the pipeline is worth knowing cold &#8212; it tells you, from the <em>shape</em> of an error, where to look. A <b>compiler error</b> is a single-TU problem: a syntax mistake, a type mismatch, an undeclared name. The compiler is looking at one translation unit and something in it doesn't make sense on its own. A <b>linker error</b> is a cross-TU symbol problem: every TU compiled fine, but when the linker tried to wire them together, a symbol had <em>no</em> definition or <em>two</em>.`),
  worked("\"Undefined reference\" vs \"multiple definition\"","Two errors that confuse people because they happen <em>after</em> a clean compile. The top case compiles every TU successfully &#8212; <code>main.cpp</code> only needed the <em>declaration</em> of <code>compute</code> &#8212; but no TU ever <em>defined</em> it, so the linker has a use with nothing to resolve it to: <code>undefined reference</code>. The bottom case is the opposite: a non-inline function defined in a header, included by two TUs, so the linker finds the same symbol defined <em>twice</em>: <code>multiple definition</code>. The fixes are the ODR mechanics from above.",
`// ===== undefined reference: declared and called, never defined =====
// math.h
int compute(int n);                 // DECLARATION only

// main.cpp
#include "math.h"
int main() { return compute(3); }   // compiles fine: declaration is enough
// ...but NO .cpp ever defines compute()  ->  LINKER:
//   undefined reference to 'compute(int)'
// Fix: provide exactly one definition in some .cpp.

// ===== multiple definition: a non-inline body in a header =====
// util.h  (no guard would also cause trouble, but this is the real ODR sin)
int twice(int x) { return x + x; }  // DEFINITION sitting in a header (BAD)

// a.cpp:  #include "util.h"          -> defines twice() here
// b.cpp:  #include "util.h"          -> defines twice() AGAIN
//   LINKER: multiple definition of 'twice(int)'
// Fix: mark it 'inline' in the header, or declare in .h and define in one .cpp.`),
  note(`&#128221;`,`Read the error's vocabulary`,`The words tell you the stage. <b>"undefined reference to X" / "unresolved external symbol X"</b> &#8594; <em>linker</em>, X was used but never defined &#8212; you forgot to define it, forgot to compile/link the <code>.cpp</code> that defines it, or forgot to link a library. <b>"multiple definition of X" / "X already defined"</b> &#8594; <em>linker</em>, X has two definitions &#8212; usually a non-inline body in a header. <b>"X was not declared in this scope" / "expected ';'"</b> &#8594; <em>compiler</em>, a single-TU problem &#8212; a typo, a missing <code>#include</code> of the declaring header, or bad syntax.`),
  sub("Pitfalls to name before they bite"),
  pit("Relying on UB because \"it works\"","The cardinal sin. A program that triggers UB and produces the right answer is still wrong &#8212; you're depending on luck the standard never promised. The next optimization level, compiler upgrade, or nearby edit can silently change it. Run sanitizers; if ASan/UBSan flags it, fix it regardless of what the output looked like."),
  pit("Defining a non-inline function in a header","Put a plain function body in a <code>.h</code> and include it from two TUs, and the linker sees two definitions of the same symbol &#8212; <code>multiple definition</code> at link time, an ODR violation. Either <em>declare</em> in the header and <em>define</em> in one <code>.cpp</code>, or mark the header definition <code>inline</code> (which exists precisely to permit one definition per TU)."),
  pit("A header with no include guard","Without <code>#ifndef</code>/<code>#define</code> or <code>#pragma once</code>, a header pulled in twice within one TU pastes its types and definitions twice &#8212; a <em>compile</em> error this time (redefinition), before the linker runs. Every header gets a guard, always; it's not optional hygiene."),
  pit("Assuming UB is portable","Observing a particular result from UB on your compiler/platform proves nothing about any other. UB has no defined outcome, so there's nothing to be portable. Don't reach for the analogy \"it does X on my box, so X is the behavior\" &#8212; with UB there is no behavior to rely on, only the absence of a guarantee."),
  cx(`UB &#8594; <b>no guarantees at all</b> (debug may differ from release) · build is three stages: <b>preprocess</b> (text) &#8594; <b>compile</b> (per-TU &#8594; object file) &#8594; <b>link</b> (resolve symbols &#8594; executable) · compiler error = <b>one TU</b>, linker error = <b>cross-TU symbol</b>`),
  idea("Say it like this",`"Undefined behavior means the standard imposes no requirements on the program &#8212; out-of-bounds access, use-after-free, signed overflow, an uninitialized read, a data race. The danger is that the optimizer is allowed to <em>assume</em> UB never happens and optimize on that assumption, so code can pass a debug build and silently break under <code>-O2</code> &#8212; the real 'works on my machine.' I keep it out with sanitizers, <code>-Wall -Werror</code>, and RAII so there's no manual lifetime to get wrong; and I'm careful that 'undefined' is stronger than merely 'unspecified' or 'implementation-defined.' On the build side: the preprocessor pastes includes and expands macros into one translation unit per <code>.cpp</code>; the compiler turns each TU independently into an object file, which is why a call only needs a declaration; the linker then resolves symbols across object files and libraries into the executable. That split is why a compiler error &#8212; a syntax or undeclared-name problem &#8212; is a single-TU issue, while an 'undefined reference' or 'multiple definition' is a cross-TU symbol problem governed by the One Definition Rule, header guards, and linkage."`)
]},
{group:"C++ Deep Dives",num:"!",id:"exceptions",color:"#DC2626",title:"Exceptions & Error Handling",badge:"C++ deep dive",blocks:[
  cue(`Two questions an interviewer reaches for once they know you're a systems person: "what actually happens when you <code>throw</code>?" and "your shop disables exceptions &#8212; so what do you use instead?" This lesson answers both. The mechanism ties straight back to RAII (destructors running during stack unwinding is <em>why</em> cleanup is automatic on the error path), and the alternatives &#8212; error codes, <code>std::optional</code>, <code>std::expected</code> &#8212; are exactly what game, embedded, and HFT codebases reach for. Get this cold and you can hold the whole conversation, including the part where you explain why your team turned exceptions off.`),
  p(`An exception is C++'s channel for reporting a failure that the current function can't sensibly handle itself, separated from its normal return value. You <code>throw</code> an object at the point the problem is detected; somewhere up the call chain a <code>catch</code> handles it; and everything in between is torn down cleanly on the way. The "torn down cleanly" part is the whole reason the feature is safe to use, and it's the part most people can't explain &#8212; so we'll start there.`),
  sub("The mechanism: throw, unwind, catch"),
  p(`When you <code>throw</code>, control does not return to the caller normally. Instead the runtime begins <b>stack unwinding</b>: it walks <em>up</em> the call stack, frame by frame, looking for a <code>try</code> block whose <code>catch</code> can handle the thrown type. As it leaves each frame on the way up, it runs the <b>destructor of every local object</b> in that frame &#8212; in reverse order of construction, exactly as if that scope had ended normally. It keeps popping frames until it finds a matching handler; the handler runs, and execution continues after its <code>try/catch</code>. If it unwinds all the way out of <code>main</code> without finding a handler, <code>std::terminate</code> is called and the program dies.`),
  svg("exceptions_unwind","A throw deep in <code>decode()</code> unwinds upward. Each frame's local objects &#8212; a file handle, a lock, a buffer &#8212; have their destructors run as that frame is popped, so resources are released even though nobody wrote cleanup code. The search stops at <code>main</code>'s matching <code>catch</code>; with no handler anywhere, the program would <code>std::terminate</code>."),
  p(`Read that diagram against the RAII lesson and the connection should click. <b>Destructors running during unwinding is the entire reason RAII makes the error path safe.</b> A <code>lock_guard</code> unlocks, an <code>fstream</code> closes, a <code>unique_ptr</code> frees &#8212; not because <code>throw</code> knows about them, but because unwinding runs every local destructor it passes, and those classes put their cleanup in a destructor. You wrote no <code>try</code>, no <code>finally</code>, no <code>delete</code>, and the code is still leak-free when something throws three frames down. That is the payoff RAII promised, viewed from the throwing side.`),
  sub("Syntax: try, catch, throw"),
  p(`The shape is small. You wrap the risky region in <code>try</code>, list one or more <code>catch</code> clauses after it, and <code>throw</code> an object from wherever the failure is detected (often deep inside a function the <code>try</code> called). Catch clauses are tried top to bottom; the first one whose type matches wins, so order from most-derived to most-general.`),
  code(`try {
    auto cfg = loadConfig(path);        // may throw deep inside
    apply(cfg);
}
catch (const std::out_of_range& e) {    // most specific first
    log("bad index: ", e.what());
}
catch (const std::exception& e) {       // base class: catches the rest
    log("failed: ", e.what());          // .what() -> a C-string description
}`),
  sub("Catch by const reference (not by value)"),
  p(`Catch by <code>const&amp;</code> &#8212; <code>catch (const std::exception&amp;)</code> &#8212; essentially always. Two reasons, and the second is the one interviewers probe. First, a reference avoids copying the exception object. Second, and more important: catching a polymorphic exception <em>by value</em> <b>slices</b> it. This is the exact object-slicing trap from the Polymorphism lesson: if a function throws a derived <code>FileError</code> and you write <code>catch (std::exception e)</code> by value, the copy keeps only the <code>std::exception</code> base subobject &#8212; the derived part, including any overridden <code>what()</code> and extra fields, is sliced away. Catch by reference and the handler sees the real dynamic type, virtual dispatch intact.`),
  pit("Catching by value slices the exception","<code>catch (std::exception e)</code> copies the thrown object into a <code>std::exception</code>-shaped slot, discarding everything the derived type added &#8212; same slicing bug as passing a derived object to a by-value base parameter (Polymorphism lesson). You lose the specific type, the custom <code>what()</code> message, and any payload. Always <code>catch (const std::exception&amp;)</code>. The only time you catch by value is the rare <code>catch (...)</code> wildcard, which takes no object at all."),
  sub("The std::exception hierarchy"),
  p(`The standard library gives you a ready-made class tree rooted at <code>std::exception</code>, whose one job is a virtual <code>what()</code> returning a description string. Throw types derived from it so a single <code>catch (const std::exception&amp;)</code> can mop up anything, while more specific clauses above it handle particular cases. The everyday branches:`),
  ul([
    `<b><code>std::logic_error</code></b> &#8212; a bug in your program's logic that ideally a test would have caught: <code>std::invalid_argument</code>, <code>std::out_of_range</code> (what <code>vector::at()</code> throws), <code>std::length_error</code>.`,
    `<b><code>std::runtime_error</code></b> &#8212; a failure only detectable at run time, from the environment rather than your logic: <code>std::system_error</code>, and the kind of thing you'd wrap an I/O or network failure in.`,
    `<b><code>std::bad_alloc</code></b> &#8212; thrown by <code>new</code> when allocation fails; <b><code>std::bad_cast</code></b> from a failed <code>dynamic_cast</code> to a reference.`,
  ]),
  p(`Define your own by deriving from one of these and passing a message up to the base, so it slots into the same <code>catch</code> hierarchy: <code>struct ConfigError : std::runtime_error { using std::runtime_error::runtime_error; };</code>. You <em>can</em> throw any type at all &#8212; <code>throw 42;</code> is legal &#8212; but throwing something outside the <code>std::exception</code> tree just means callers can't catch it generically, so don't.`),
  sub("Rethrow with a bare throw"),
  p(`Inside a <code>catch</code>, a bare <code>throw;</code> &#8212; no operand &#8212; <b>rethrows the current exception unchanged</b>, preserving its real dynamic type so an outer handler still sees the original. Use it to do something locally (log, release a resource, add context) and then let the failure keep propagating. Writing <code>throw e;</code> instead would re-throw a <em>copy</em> of <code>e</code>, which slices it back down to the static type of <code>e</code> &#8212; the same slicing trap again. So: <code>throw;</code> to pass it along, never <code>throw e;</code>.`),
  code(`catch (const std::exception& e) {
    metrics.bump("load_failure");   // do something at this level...
    throw;                          // ...then rethrow the SAME object, type intact
    // throw e;                     // WRONG: rethrows a sliced copy
}`),
  sub("Exception-safety guarantees: the canonical ladder"),
  p(`"Is your code exception-safe?" isn't yes/no &#8212; it's a question about <em>which guarantee</em> a given operation provides if it throws partway through. There are four well-known rungs, strongest to weakest, and being able to name them and say which one a function offers is exactly what a senior interview is checking.`),
  svg("exceptions_ladder","The four guarantees, strongest on top. <b>nothrow</b>: cannot fail. <b>strong</b>: throws &#8594; full rollback, as if never called. <b>basic</b>: no leaks and invariants hold, but state may have moved. <b>none</b>: no promises. Aim as high on the ladder as the operation allows, and document which rung each function sits on."),
  ul([
    `<b>nothrow (no-throw).</b> The operation simply cannot throw &#8212; it always succeeds. This is what <code>noexcept</code> declares. Swap, destructors, and moving scalars live here, and a lot of machinery (see <code>noexcept</code> below) depends on certain operations being on this rung.`,
    `<b>strong.</b> All-or-nothing: if it throws, the program's observable state is exactly what it was before the call &#8212; a full rollback. The classic way to get it is <b>copy-and-swap</b>: do the risky work on a <em>copy</em>, and only once that has fully succeeded swap it into place with a <code>noexcept</code> swap. The throw can only happen during the copy, when the original is still untouched.`,
    `<b>basic.</b> If it throws, nothing leaks and every object is still in a valid, usable state (invariants hold) &#8212; but state <em>may</em> have changed; the operation might be half-applied. This is the realistic default for a lot of mutating code, and it's perfectly respectable.`,
    `<b>none.</b> No guarantee &#8212; a throw can leak, corrupt invariants, or leave dangling state. This is what raw, RAII-free resource handling gives you, and it's the rung to design away from.`,
  ]),
  worked("The strong guarantee via copy-and-swap","setItems wants to be all-or-nothing: if building the new state throws, the object must look exactly as it did before. The trick is to do everything that can throw on a local copy first, then commit with a swap that cannot throw. If transform() throws, fresh is destroyed by its own destructor (basic RAII) and items_ was never touched &#8212; strong guarantee, for free.",
`class Catalog {
    std::vector<Item> items_;
public:
    void setItems(const std::vector<Raw>& input) {
        std::vector<Item> fresh;            // work on a COPY / temp
        fresh.reserve(input.size());
        for (const auto& r : input)
            fresh.push_back(transform(r));  // may throw -> items_ still untouched

        items_.swap(fresh);                 // commit: vector::swap is noexcept
    }                                       // if we threw above, fresh dies cleanly,
};                                          // and items_ is exactly as it started`),
  sub("noexcept: declaring a function won't throw"),
  p(`Mark a function <code>noexcept</code> to promise it never lets an exception escape. It's not just documentation: it's a compile-time fact other code can rely on, and breaking the promise is fatal &#8212; if a <code>noexcept</code> function does throw, the runtime calls <code>std::terminate</code> immediately rather than unwinding. So <code>noexcept</code> is a commitment, used where the operation genuinely can't fail (swap, destructors &#8212; which are implicitly <code>noexcept</code> &#8212; and most moves).`),
  p(`The concrete payoff is the one from the Move Semantics lesson, now explained from the exception-safety side. When a <code>std::vector</code> grows and reallocates, it must relocate existing elements into the new buffer. It will only <em>move</em> them if their move constructor is <code>noexcept</code>; otherwise it falls back to <em>copying</em>. Why? To preserve its own <b>strong guarantee</b>: if a move threw halfway through relocation, some elements would already be gutted with no way to roll back &#8212; the vector would be wrecked. A <code>noexcept</code> move can't throw, so the vector can relocate by moving safely. A non-<code>noexcept</code> move quietly turns every reallocation into O(n) copies. One keyword, and a whole class of growth got an order of magnitude slower.`),
  pit("A non-noexcept move constructor silently forces vector to copy","If your type's move constructor isn't <code>noexcept</code>, <code>std::vector</code> can't trust it during reallocation and falls back to copying every element on each grow &#8212; turning cheap O(1)-per-element moves into full O(n) copies, with no error and no warning, just a quiet performance cliff. Mark hand-written move operations <code>noexcept</code>; the Rule-of-Zero path (hold <code>vector</code>/<code>string</code>/<code>unique_ptr</code> members) gets you <code>noexcept</code> moves for free."),
  sub("RAII is the foundation — that's why there's no finally"),
  p(`Languages with exceptions but without deterministic destructors need a <code>try/finally</code> (or <code>using</code>, or <code>defer</code>) so you can run cleanup on the way out. <b>C++ has no <code>finally</code>, on purpose</b>, because it doesn't need one: every resource is owned by an object whose destructor frees it, and unwinding runs that destructor for you. Where another language writes <code>try { ... } finally { file.close(); lock.release(); }</code>, idiomatic C++ writes nothing &#8212; the <code>fstream</code> and the <code>lock_guard</code> close and unlock themselves as they leave scope. So in real C++ you write very few <code>try</code> blocks: typically just a handful near the top of the program (or at an API boundary) to report failures, not scattered cleanup blocks at every allocation.`),
  worked("RAII vs a raw resource on the throw path","The same function twice. The raw version leaks the buffer if process() throws: the delete[] is skipped as the stack unwinds past it. The RAII version can't leak — buf is a local whose destructor runs during unwinding, freeing the buffer no matter how the function exits. Same lesson as the RAII chapter, now framed around the throw: own every resource with an object and the error path takes care of itself.",
`// LEAKS on the throw path: the resource isn't owned by an RAII object
void raw(const Input& in) {
    char* buffer = new char[in.size];
    process(in, buffer);     // throws -> the delete[] below is never reached
    delete[] buffer;         // skipped during unwinding -> LEAK
}

// SAFE on every path: the buffer is owned by a local
void safe(const Input& in) {
    std::vector<char> buf(in.size);   // or std::make_unique<char[]>(in.size)
    process(in, buf.data());          // throws -> buf's dtor runs while unwinding
}                                     // buffer freed automatically, leak-free`),
  sub("Why many game / embedded / HFT shops disable exceptions"),
  p(`Plenty of serious C++ codebases compile with <code>-fno-exceptions</code> and ban <code>throw</code> outright. This isn't ignorance of the feature &#8212; it's a deliberate trade, and being able to articulate it is a strong signal in a systems interview. The reasons cluster:`),
  ul([
    `<b>Binary size and tables.</b> Exceptions need unwinding metadata &#8212; per-function tables describing how to destroy locals while unwinding. On a memory-constrained console or microcontroller, that footprint is real budget you'd rather spend elsewhere.`,
    `<b>Cost and unpredictability of the throw path.</b> The happy path is essentially free, but an actual throw is slow and, worse, its cost is hard to bound. A hard-real-time loop (a frame at 16.6&#8201;ms, an HFT order path measured in nanoseconds) can't tolerate an occasional unwinding spike it can't predict.`,
    `<b>Toolchain limits.</b> Some console and embedded toolchains have weak, oddly-behaved, or outright unsupported exception support, so the whole studio standardizes on "off" to stay portable across targets.`,
    `<b>A preference for explicit control flow.</b> These cultures value being able to <em>see</em> every error path in the source. An error code or a returned <code>expected</code> is right there in the call site; a <code>throw</code> three layers down is an invisible exit you have to know about. For code that's audited line by line, explicit wins.`,
  ]),
  note(`&#128221;`,`"Exceptions off" doesn't mean "errors ignored"`,`Disabling exceptions is a decision about the <em>mechanism</em> for reporting failure, not about whether you handle failure. RAII still works (destructors still run on normal scope exit and on early <code>return</code>; you just don't get unwinding from a <code>throw</code>). What changes is that fallible operations now report errors <em>in their return value</em>, and callers must check. The next section is the toolkit those shops use instead.`),
  sub("The alternatives: error codes, optional, expected, variant"),
  p(`When you can't (or won't) throw, you put the failure in the return value and make the caller deal with it. The modern toolkit, roughly in order of expressiveness:`),
  ul([
    `<b>Integer / enum error codes.</b> The C tradition: return <code>0</code>/an <code>enum class Error</code> for success-or-which-failure, and pass the real result out through a pointer/reference parameter. Simple, zero-overhead, universally supported &#8212; but easy to forget to check, and it splits the result from the status.`,
    `<b><code>std::optional&lt;T&gt;</code>.</b> "A <code>T</code>, or nothing." Perfect when the only failure mode is "no value" and you don't need to say <em>why</em> &#8212; a lookup that may miss, a parse that may not match. Check it like a pointer; <code>*opt</code> / <code>opt.value()</code> to read.`,
    `<b><code>std::expected&lt;T, E&gt;</code> (C++23).</b> The direct answer to "I need a value <em>or</em> a reason it failed, without exceptions." It holds either a <code>T</code> (success) or an <code>E</code> (your error type). This is the type those codebases were hand-rolling for years; the standard finally blessed it.`,
    `<b><code>std::variant&lt;A, B, ...&gt;</code>.</b> The general "one of several types" sum type underneath <code>optional</code>/<code>expected</code>; reach for it when the result is genuinely several alternatives, not just value-or-error.`,
    `<b>Assertions (<code>assert</code> / contracts).</b> For <em>programmer</em> errors &#8212; broken preconditions that should never happen &#8212; an assertion that aborts in debug is the right tool, not an exception. Exceptions are for conditions you expect to handle; a violated invariant is a bug to fix, so fail loud and early.`,
  ]),
  worked("The no-exceptions return styles, side by side","Three ways to report 'this parse can fail' without throwing. optional says yes/no; expected says yes-or-here's-why; the error-code form is the C-style baseline. In an exceptions-off codebase, the call site has to inspect the result before using it -- which is exactly the explicit control flow those shops want.",
`// optional: a value, or nothing (no reason given)
std::optional<int> parseInt(std::string_view s) {
    int out;
    auto [ptr, ec] = std::from_chars(s.data(), s.data() + s.size(), out);
    if (ec != std::errc{}) return std::nullopt;   // failure -> empty
    return out;                                    // success -> the value
}

// expected (C++23): a value, OR a typed error explaining the failure
std::expected<Config, ConfigError> loadConfig(std::string_view path) {
    auto text = readFile(path);
    if (!text) return std::unexpected(ConfigError::NotFound);
    return parse(*text);                            // returns Config on success
}

// caller side: inspect, then use -- the error path is visible in the source
if (auto cfg = loadConfig("game.cfg"))
    apply(*cfg);
else
    handle(cfg.error());                           // we get the ConfigError back`),
  sub("When exceptions ARE the right tool"),
  p(`The flip side: when exceptions are <em>on</em>, there are cases they fit better than any return-value scheme. Knowing where they shine keeps your answer balanced instead of dogmatic.`),
  ul([
    `<b>Constructors that can fail.</b> A constructor has <em>no return value</em>, so it has no way to signal "I couldn't build a valid object" except to throw. Throwing from a constructor is the idiomatic failure report &#8212; and it's safe, because a partially-constructed object's already-built members are destroyed during unwinding. (The factory-function alternative returns <code>optional</code>/<code>expected</code>, which is what exceptions-off shops do instead.)`,
    `<b>Genuinely exceptional, rare conditions.</b> Failures that are unexpected and infrequent &#8212; out of memory, a corrupt file, a dropped connection &#8212; are a good fit, because you pay the throw cost only on the rare bad path while keeping the common path clean. Exceptions are a poor fit for failures that happen all the time (a cache miss, a parse that routinely fails) &#8212; that's <code>optional</code>/<code>expected</code> territory.`,
    `<b>Library / API boundaries.</b> A library that can't know how its callers want to handle errors can throw a typed exception and let each caller catch at whatever level makes sense, rather than threading an error code up through every layer by hand.`,
  ]),
  sub("Never throw from a destructor"),
  p(`The one rule that's close to absolute: <b>a destructor must not let an exception escape</b>. The reason is the unwinding mechanism itself. If a destructor throws <em>while the stack is already unwinding from another exception</em>, the runtime now has two exceptions in flight and no coherent way to proceed &#8212; so it gives up and calls <code>std::terminate</code>. Your process dies, no handler runs. Since destructors run constantly during unwinding, a throwing destructor is a live grenade. If a destructor does something that can fail (flushing a buffer, closing a socket), catch and swallow or log the error inside the destructor &#8212; never let it propagate out. Destructors are implicitly <code>noexcept</code> for exactly this reason.`),
  pit("Throwing from a destructor calls std::terminate","If a second exception is thrown while one is already unwinding the stack, C++ has no way to handle both and calls <code>std::terminate</code> &#8212; instant, handler-less death. Because destructors fire during unwinding, a destructor that throws is the textbook way to trigger this. Wrap any fallible cleanup inside the destructor in its own <code>try/catch</code> and absorb the error there; a destructor should always exit normally."),
  cx(`Happy path with exceptions enabled: <b>~zero cost</b> (no overhead until something throws) &#183; the throw + unwind path: <b>slow and hard to bound</b> &#183; error codes / <code>optional</code> / <code>expected</code>: a predictable check on <em>every</em> call &#8212; the trade those who disable exceptions are buying.`),
  idea("Say it like this",`"<code>throw</code> starts stack unwinding: the runtime walks up the call stack looking for a matching <code>catch</code>, and as it leaves each frame it runs every local's destructor &#8212; which is exactly why RAII makes the error path leak-free and why C++ needs no <code>finally</code>. I catch by <code>const&amp;</code> to avoid slicing the exception, derive my exception types from <code>std::exception</code>, and rethrow with a bare <code>throw;</code> to keep the dynamic type. I think in terms of the safety ladder &#8212; nothrow, strong, basic, none &#8212; and reach for copy-and-swap when I need the strong guarantee. I mark moves and swaps <code>noexcept</code> so <code>std::vector</code> can move instead of copy on reallocation. And I know when <em>not</em> to use them: game and embedded and HFT code often builds with <code>-fno-exceptions</code> for binary size, predictable latency, and explicit control flow, and reports errors with codes, <code>std::optional</code>, or <code>std::expected</code> instead. Exceptions earn their place in constructors, at rare failure points, and at library boundaries &#8212; and you never throw from a destructor, or you get <code>std::terminate</code>."`)
]},
{group:"C++ Deep Dives",num:"λ",id:"lambdas",color:"#9333EA",title:"Lambdas & std::function",badge:"C++ deep dive",blocks:[
cue(`<b>You've already used these everywhere</b> &#8212; the comparator in <code>sort(v.begin(), v.end(), [](auto a, auto b){ return a &gt; b; })</code>, the visitor in the islands DFS, the predicate in <code>find_if</code>. Interviewers reach for lambdas constantly, then probe the part underneath: <em>what does <code>[&amp;]</code> actually capture, and when does it blow up?</em> This lesson makes the thing you've been using by feel precise enough to explain.`),
  p(`A lambda looks like new syntax, but it isn't a new <em>kind</em> of thing. The single idea that unlocks the whole topic: <b>a lambda is syntactic sugar for an anonymous function object</b> &#8212; a struct with an <code>operator()</code>. When you write a lambda, the compiler generates a hidden struct, turns the captured variables into its data members, and turns the body into its <code>operator()</code>. Everything that's confusing about lambdas &#8212; captures, <code>mutable</code>, why each one has a weird unnamable type, why <code>std::function</code> exists &#8212; falls straight out of "it's just a struct." Hold onto that and the rest is detail.`),
  sub("The anatomy: [captures](params) -> ret { body }"),
  p(`A lambda has four parts, and only the first two come up much. <code>[captures]</code> lists the surrounding variables the lambda needs to remember &#8212; this is the part with all the subtlety. <code>(params)</code> is an ordinary parameter list, exactly like a function's. <code>-&gt; ret</code> is an optional explicit return type; you almost never write it, because the compiler deduces the return type from the <code>return</code> statements (the same <code>auto</code> deduction from the Templates lesson). <code>{ body }</code> is the code that runs when you call it.`),
  code(`int n = 5;

auto add   = [n](int x) -> int { return x + n; };  // all four parts spelled out
auto add2  = [n](int x) { return x + n; };          // return type deduced (int)
auto greet = []{ std::cout << "hi"; };              // no captures, no params

add(10);     // 15 — calls operator() with x = 10
greet();     // "hi"`),
  p(`The captures are what separate a lambda from a plain function. <code>greet</code> captures nothing, so it's barely more than a free function. <code>add</code> captures <code>n</code>, so it has to <em>remember</em> a value from the enclosing scope between the moment it's created and the moment it's called &#8212; and a function can't remember anything. That memory is the whole reason the compiler builds a struct: the captured variables become its members, and the bundle of "code + remembered state" is what's properly called a <b>closure</b>.`),
  svg("lambdas_desugar","A lambda with a capture desugars into a hidden struct: the captured variable n becomes a data member, and the body becomes operator(). The lambda object you store (add) is one instance of that generated type — code plus the state it closed over."),
  sub("It's just a functor — the equivalent hand-written struct"),
  p(`The fastest way to make this concrete is to write the struct by hand and put it next to the lambda. They compile to essentially the same thing; the lambda is the compiler doing the boilerplate for you. Once you've seen the pair, captures stop being magic &#8212; they're obviously just constructor arguments stored as fields.`),
  worked("The lambda and the functor it desugars to, side by side","Both versions hold an n and add it to their argument. The lambda's [n] capture is the functor's member plus the constructor that initializes it; the lambda's body is the functor's operator(). This is literally what the compiler generates — including operator() being const by default, which is why a by-value capture is read-only inside the body unless you say mutable.",
`int n = 5;

// --- the lambda ---
auto add = [n](int x) { return x + n; };

// --- the equivalent functor the compiler writes for you ---
struct AddN {
    int n;                                       // the captured variable, as a member
    int operator()(int x) const { return x + n; }// the body, as a const call operator
};
AddN add2{5};                                    // capture == constructing with n = 5

add(10);     // 15
add2(10);    // 15 — identical`),
  sub("Capture modes: the part interviewers probe hardest"),
  p(`The capture list controls <em>how</em> each remembered variable is stored in that hidden struct &#8212; as a copy, or as a reference. This is the highest-value section because it's where the bugs live and where the questions concentrate. The two defaults:`),
  ul([
    `<b><code>[=]</code> &#8212; capture by value.</b> Each used variable is <em>copied</em> into the closure: a snapshot taken at the moment the lambda is created. Later changes to the original don't show up inside the lambda, and the lambda is safe to outlive the original because it owns its own copies.`,
    `<b><code>[&amp;]</code> &#8212; capture by reference.</b> Each used variable is stored as a <em>reference</em> (an alias) to the original. The lambda sees later changes, and changes it makes are visible outside &#8212; but it holds no copy, only an address, so the original must outlive the lambda or you're reading freed memory.`,
  ]),
  p(`You're rarely all-or-nothing. You can name exactly which variables to capture and how: <code>[x, &amp;y]</code> captures <code>x</code> by value and <code>y</code> by reference. You can set a default and override one: <code>[&amp;, x]</code> means "everything by reference, but <code>x</code> by value," and <code>[=, &amp;out]</code> means "everything by value, but <code>out</code> by reference." Naming specific captures is usually clearer than a blanket default &#8212; it documents exactly what the closure touches, which is also how you avoid accidentally capturing something by reference that you didn't mean to.`),
  svg("lambdas_capture","By value ([=]) the lambda owns a snapshot copy taken at creation — it's frozen and safe to outlive the original. By reference ([&]) the lambda holds only an address into the original's storage, so if the original dies first, the lambda reads freed memory. Same dangling-reference family as iterator invalidation and returning a reference to a local."),
  sub("Capturing this — and capturing *this"),
  p(`Inside a member function, a lambda often needs the object's data members. Writing <code>[this]</code> captures the <code>this</code> <em>pointer</em> &#8212; so the lambda can read and write the object's members, but it holds a raw pointer and dangles the instant the object is destroyed. <code>[*this]</code> (C++17) instead captures a <em>copy of the whole object</em> into the closure, which is the safe choice when the lambda will outlive the object &#8212; an async callback, say. The distinction matters: <code>[=]</code> inside a member function captures <code>this</code> by pointer too, not the members by value, which surprises people.`),
  code(`struct Widget {
    int id = 42;
    auto makeReader() {
        return [this] { return id; };   // captures the THIS POINTER (id read via this)
    }                                    // dangles if the Widget dies before the lambda runs
    auto makeSafe() {
        return [*this] { return id; };  // captures a COPY of the whole Widget — safe to outlive
    }
};`),
  sub("Init-capture: new variables, and capture by move"),
  p(`Sometimes you want a closure member that isn't just a copy of an existing variable &#8212; you want to compute it, rename it, or (crucially) <em>move</em> something into the lambda. <b>Init-capture</b> (C++14), also called generalized capture, lets you introduce a new closure member with an initializer: <code>[n = compute()]</code> creates a member <code>n</code> initialized from <code>compute()</code>. The left side is a brand-new name living in the closure; the right side is any expression.`),
  p(`The killer use is <b>capture by move</b>. A move-only type like <code>std::unique_ptr</code> can't be captured by <code>[=]</code> &#8212; that would copy it, and it isn't copyable. Init-capture is how you get ownership <em>into</em> the lambda: <code>[p = std::move(ptr)]</code> move-constructs the closure's <code>p</code> from <code>ptr</code>, transferring the pointer (straight from the Move Semantics lesson). After this, the lambda owns the resource; the original <code>ptr</code> is null.`),
  worked("Moving a unique_ptr into a lambda with init-capture","[p = std::move(data)] move-constructs a closure member p from data — the unique_ptr's buffer is transferred into the lambda, no copy (a unique_ptr can't be copied anyway). The lambda now owns the resource and can be stored, returned, or run later; the original data is left null. This is the standard way to hand an owned resource to a deferred callback.",
`auto data = std::make_unique<std::vector<int>>(1'000'000);

// Move the unique_ptr INTO the closure — the lambda now owns the vector:
auto task = [p = std::move(data)]() {
    return p->size();           // p is the closure's own member, moved-from 'data'
};
// data is now null; 'task' owns the buffer and can be stored or run later.
task();                          // 1000000`),
  sub("mutable: by-value captures are read-only by default"),
  p(`Recall the desugared functor: its <code>operator()</code> was <code>const</code>. That's the default, and it has a consequence people trip on &#8212; <em>a by-value captured variable is read-only inside the lambda body</em>. Trying to modify it doesn't change the original (it's a copy, after all) <em>and</em> won't even compile, because you can't mutate a member from a <code>const</code> method. Marking the lambda <code>mutable</code> drops the <code>const</code> on <code>operator()</code>, letting the body modify its own captured copies. It still only touches the copies &#8212; the originals outside are untouched either way.`),
  code(`int count = 0;

auto a = [count]      { return ++count; };  // ERROR: count is read-only (const operator())
auto b = [count]() mutable { return ++count; };  // OK: mutates the closure's OWN copy

b();   // 1
b();   // 2  — the closure remembers its copy across calls
// 'count' out here is still 0 — b only ever touched its private copy`),
  note("&#128221;","mutable changes the copy, not the original",`<code>mutable</code> is easy to misread as "let the lambda change the outside variable." It doesn't &#8212; that's what <code>[&amp;]</code> is for. <code>mutable</code> only lets a by-value capture modify <em>its own copy</em> inside the body, which is occasionally what you want for a small piece of per-call state (like the running counter above). If you actually need to affect the original, capture it by reference instead.`),
  sub("Generic lambdas: auto parameters are a template"),
  p(`Since C++14 a lambda parameter can be <code>auto</code>: <code>[](auto a, auto b){ return a &lt; b; }</code>. This is a <b>generic lambda</b>, and it's exactly the Templates lesson in miniature &#8212; the compiler makes <code>operator()</code> a <em>template</em>, so the lambda works for any argument types that support the operations in the body. One comparator works for <code>int</code>, <code>double</code>, <code>std::string</code>, your own type. It's the same compile-time, duck-typed genericity as a function template, just spelled with <code>auto</code> instead of <code>template&lt;class T&gt;</code>.`),
  code(`// One generic comparator, instantiated per type at the call site:
auto less = [](const auto& a, const auto& b) { return a < b; };

std::sort(ints.begin(),    ints.end(),    less);  // operator()<int>
std::sort(strings.begin(), strings.end(), less);  // operator()<std::string>`),
  sub("Lambdas as STL comparators and predicates"),
  p(`This is where lambdas earn their keep day to day, and the reason they appear all over the course's worked code. Most of <code>&lt;algorithm&gt;</code> takes a callable &#8212; a comparator that says "is a before b?", or a predicate that says "does this element match?" &#8212; and a lambda is the natural way to spell one inline, right where it's used, without a named helper function cluttering the file. Three you'll write constantly:`),
  code(`std::vector<int> v = {5, 2, 8, 1, 9, 3};

// 1) sort with a custom comparator — descending:
std::sort(v.begin(), v.end(), [](int a, int b) { return a > b; });

// 2) find_if with a predicate — first element > 4:
auto it = std::find_if(v.begin(), v.end(), [](int x) { return x > 4; });

// 3) a priority_queue ordered by a captured rule (min-heap of pairs by .second):
auto cmp = [](const auto& a, const auto& b) { return a.second > b.second; };
std::priority_queue<std::pair<int,int>,
                    std::vector<std::pair<int,int>>,
                    decltype(cmp)> pq(cmp);`),
  note("&#128221;","The priority_queue comparator is the fiddly one",`<code>std::sort</code> takes the comparator as a runtime argument, so a bare lambda just works. <code>std::priority_queue</code> takes the comparator as a <em>template type parameter</em>, so you have to name the lambda's type with <code>decltype(cmp)</code> and pass the instance to the constructor (because each lambda has its own unnamable type &#8212; see the next section). It's a small ceremony worth recognizing, since the priority_queue comparator is a recurring interview stumble (it's the engine under the Heaps lesson).`),
  sub("Every lambda has its own unnamable type"),
  p(`Here's the fact that motivates the rest of the lesson. <b>Each lambda expression has its own unique, compiler-generated type</b> &#8212; that hidden struct &#8212; and you can't write the type's name, because it doesn't have one you can spell. Two lambdas with <em>identical</em> bodies are still two different types. That's fine when you store a lambda in <code>auto x = ...</code> (the compiler knows the type even though you can't name it), but it becomes a problem the moment you need a <em>named</em> type: a class member, a function parameter that isn't a template, or a container holding several different callables. You can't write <code>SomeLambdaType</code> in a declaration, because there's no such name.`),
  sub("std::function: type erasure for callables"),
  p(`<code>std::function&lt;int(int)&gt;</code> is the fix. It's a polymorphic wrapper that can hold <em>any</em> callable matching a given signature &#8212; a lambda, a function pointer, a functor, a member function &#8212; behind one nameable type. The technique is called <b>type erasure</b>: <code>std::function</code> erases the specific type of whatever you put in, exposing only "a thing you can call with an <code>int</code> that returns an <code>int</code>." That's exactly what lets you store heterogeneous callables together, or declare a callback member without making the whole class a template.`),
  worked("Storing different callables in one vector<std::function>","Each lambda below has a distinct, unnamable type — so a vector<that type> is impossible to declare. std::function<int(int)> erases the differences: all three lambdas (and the plain function) share the one wrapper type, so they sit in one container and you can call them in a loop. This is the canonical reason to reach for std::function.",
`int triple(int x) { return x * 3; }      // a plain function

int bias = 100;
std::vector<std::function<int(int)>> ops;

ops.push_back([](int x){ return x + 1; });        // one lambda type...
ops.push_back([](int x){ return x * x; });        // ...a different lambda type...
ops.push_back([bias](int x){ return x + bias; }); // ...and one that captures...
ops.push_back(triple);                            // ...and a plain function pointer.

for (auto& f : ops)
    std::cout << f(10) << ' ';                     // 11 100 110 30`),
  note("&#128161;","A captureless lambda converts to a plain function pointer",`One handy special case: a lambda that captures <em>nothing</em> has no state to carry, so it implicitly converts to an ordinary function pointer &#8212; <code>int(*fp)(int) = [](int x){ return x*2; };</code> compiles. The moment it captures anything, it has state and that conversion is gone (you need <code>std::function</code> or a template). It's why C-style callback APIs that take a function pointer accept captureless lambdas but reject capturing ones.`),
  sub("The cost of std::function — and when to skip it"),
  p(`<code>std::function</code> isn't free, and this trade-off is the interview payoff because it's the <em>same</em> compile-time-vs-runtime decision as templates-vs-virtual from the Templates lesson. Wrapping a callable in <code>std::function</code> may <b>heap-allocate</b> (to store a capturing lambda that doesn't fit its small-buffer optimization) and always calls through an <b>indirect</b> jump &#8212; the call can't be inlined, because the wrapper hides which function it's really holding. That's real overhead on a hot path.`),
  p(`The alternative is to pass the lambda as a <em>template parameter</em> instead of erasing it: a function template like <code>template&lt;class F&gt; void each(F f)</code> takes the lambda by its real type, so the compiler knows exactly which <code>operator()</code> to call and <em>inlines</em> it &#8212; zero overhead, same as hand-written code. That's how <code>std::sort</code> and the rest of <code>&lt;algorithm&gt;</code> take their comparators: as template parameters, so the comparison inlines into the sort. The rule of thumb mirrors the Templates lesson exactly: <em>reach for a template parameter when you can resolve the callable at compile time (the inlinable, zero-cost path), and reach for <code>std::function</code> only when you genuinely need to store or pass a callable behind one runtime type</em> &#8212; a member, a heterogeneous container, an across-an-ABI-boundary callback.`),
  code(`// Zero-overhead: F is the lambda's real type, so f(x) inlines into the loop.
template<class F>
void forEach(const std::vector<int>& v, F f) { for (int x : v) f(x); }

// Type-erased: holds any int(int) behind one runtime type — but indirect, maybe heap.
void run(const std::function<int(int)>& f);   // can't inline f; pays the wrapper cost

// Inside a class, you usually need the named type — std::function is the practical choice:
struct Button { std::function<void()> onClick; };   // can't be 'auto' or a raw lambda type`),
  sub("The central pitfall: the dangling capture-by-reference"),
  p(`If you remember one hazard from this lesson, make it this one &#8212; it's the same dangling-reference family as iterator invalidation and returning a reference to a local (the Pointers and STL lessons), wearing a lambda costume. A <code>[&amp;]</code> lambda holds <em>references</em> to its captured variables, not copies. If the lambda outlives those variables &#8212; it's stored, returned, or queued, and runs after the enclosing scope ends &#8212; every captured reference now points at freed memory, and using it is undefined behavior.`),
  worked("Returning a lambda that captured a local by reference — a dangling read","make_adder returns a lambda capturing the local n by reference. The instant make_adder returns, n's stack slot is reclaimed, so the returned lambda's reference dangles — calling it reads freed memory (UB), exactly like returning the address of a local. The fix is to capture n by value, [n], so the closure owns its own copy and is safe to outlive the function.",
`// BUG — captures the local n by reference, then outlives it:
auto make_adder(int n) {
    return [&n](int x) { return x + n; };   // &n refers to a local about to die
}                                            // n's stack frame is gone on return
auto add = make_adder(5);
add(10);                                     // UB: reads freed memory where n was

// FIX — capture by value so the closure owns its own copy:
auto make_adder_ok(int n) {
    return [n](int x) { return x + n; };    // [n] copies n into the closure — safe
}`),
  pit("[&] is the trap; default to [=] (or name captures) for anything that escapes its scope",`The rule that prevents the bug: a lambda that's <em>called immediately and locally</em> (like a <code>sort</code> comparator) is fine with <code>[&amp;]</code> &#8212; nothing outlives anything. But any lambda that <em>escapes</em> its scope &#8212; returned, stored in a member, pushed onto a callback list, handed to another thread &#8212; must not hold references to locals. Capture those by value (<code>[=]</code> or named, or by move for owned resources), so the closure carries its own state. When in doubt about lifetime, copy.`),
  pit("[=] copies can be quietly expensive, and [this] is a raw pointer","Two subtler edges. First, <code>[=]</code> copies <em>each</em> captured variable &#8212; capture a big <code>std::vector</code> or <code>std::string</code> by value and you've paid a deep copy you may not have noticed, so name captures or capture a view when the data is large. Second, <code>[this]</code> (and <code>[=]</code> inside a member function) captures a <em>raw pointer</em> to the object, not its data; if the object is destroyed before the lambda runs, that pointer dangles just like any other. Use <code>[*this]</code> to capture a copy of the object when the lambda may outlive it."),
  cx(`A lambda is a struct &#8212; constructing and calling it is <b>free</b>; passed as a template parameter the call <b>inlines</b> (zero overhead, like <code>std::sort</code>'s comparator). Wrapping in <code>std::function</code> costs a possible <b>heap allocation</b> + an <b>indirect call</b> &#8212; the same compile-time-vs-runtime trade as templates vs virtual.`),
  idea("Say it like this",`"A lambda is syntactic sugar for an anonymous functor &#8212; the compiler generates a hidden struct whose members are the captured variables and whose <code>operator()</code> is the body, so a lambda is a <em>closure</em>: code plus the state it captured. Captures are the crux: <code>[=]</code> copies a snapshot into the closure (safe to outlive the original), <code>[&amp;]</code> stores references (sees changes, but dangles if the original dies first) &#8212; and init-capture <code>[p = std::move(ptr)]</code> is how you move a <code>unique_ptr</code> in. By-value captures are <code>const</code> in the body unless I mark the lambda <code>mutable</code>; <code>auto</code> parameters make it a generic, template-like lambda. Each lambda has its own unnamable type, so to store mixed callables behind one type I wrap them in <code>std::function</code> &#8212; type erasure, at the cost of a possible heap allocation and an indirect call, versus passing the lambda as a template parameter which inlines. The one trap I watch for is a <code>[&amp;]</code> lambda that escapes its scope &#8212; that's a dangling reference, same as returning the address of a local, so anything that's stored or returned I capture by value."`)
]},
{group:"C++ Deep Dives",num:"✦",id:"essentials",color:"#0891B2",title:"C++ Language Essentials",badge:"C++ deep dive",blocks:[
cue(`This chapter gathers the high-frequency "small" C++ questions &#8212; the ones that aren't a whole topic on their own but show up constantly and quietly separate the candidates who <em>use</em> C++ from the ones who <em>know</em> it. Five of them: scoped enums, operator overloading, the four meanings of <code>static</code>, the initialization minefield, and object layout. None is hard once you've seen it; all of them have a trap an interviewer can spring if you're hand-wavy. You ship engine code, so most of this is muscle memory &#8212; the goal here is to attach <em>precise words</em> to what you already do, so the answers come out clean and confident.`),
p(`Each section is self-contained &#8212; read them in any order. Several lean on earlier deep dives: linkage and the build model from the <em>Undefined Behavior</em> lesson, strict aliasing and <code>const</code> from the <em>Type System</em> lesson, and the construct-then-destruct discipline from <em>RAII</em>. Where a callback helps, it's noted.`),

sub("1 · Enums: prefer enum class"),
p(`A plain <code>enum</code> is the C-style one: it dumps its enumerators into the <em>enclosing</em> scope and they implicitly convert to <code>int</code>. Both of those are footguns. The scope leak means two enums can't share an enumerator name &#8212; declare <code>enum Color { Red, ... }</code> and <code>enum Fruit { Apple, ... }</code> and you can never have <code>Red</code> in one and, say, an <code>Apple</code>-style <code>Red</code>-named value in the other without a clash. The implicit-to-<code>int</code> conversion means <code>Color</code> and <code>Fruit</code> values silently compare equal, get added together, and index arrays &#8212; nonsense the compiler happily accepts.`),
p(`A <b>scoped enum</b> &#8212; <code>enum class</code>, since C++11 &#8212; fixes both. Its enumerators are scoped to the enum's name (<code>Color::Red</code>, never a bare <code>Red</code>), so there's no name leakage and no clashes. And it does <em>not</em> implicitly convert to <code>int</code>: to get the underlying number you must say <code>static_cast&lt;int&gt;(c)</code> explicitly. That sounds like friction, but it's the good kind &#8212; it stops the accidental <code>if (color == fruit)</code> bugs at compile time. You can also pin the <b>underlying type</b>: <code>enum class E : uint8_t { ... }</code> guarantees a one-byte representation, which matters for packed structs, network protocols, and save formats. <b>Default to <code>enum class</code>;</b> reach for a plain <code>enum</code> only when you genuinely want the implicit int (e.g. a set of bit-flag constants you OR together).`),
code(`enum class Color : uint8_t { Red, Green, Blue };   // scoped, 1 byte, no int leak

Color c = Color::Red;                  // must qualify -> Color::Red
// int n = c;                          // ERROR: no implicit conversion
int n = static_cast<int>(c);           // 0 -- you must ask explicitly

// if (c == 0) ...                     // ERROR: Color is not an int (good!)
if (c == Color::Red) { /* ... */ }     // compare enum to enum, as intended

// --- plain enum, for contrast ---
enum Old { On, Off };                  // On and Off leak into THIS scope
int bad = On + Off;                    // compiles -- implicit int, usually a bug`),
note(`&#128221;`,`When a plain enum still earns its place`,`Bit-flag sets are the honest exception: <code>enum Flags { Visible = 1, Solid = 2, Static = 4 };</code> wants the implicit <code>int</code> so <code>Visible | Solid</code> just works. With <code>enum class</code> you'd have to overload <code>operator|</code> yourself (or <code>static_cast</code> every combine), which is sometimes worth it for type safety and sometimes overkill. Know the trade-off so you can defend either choice &#8212; "plain enum here because it's a flag set I OR together" is a fine answer.`),

sub("2 · Operator overloading"),
p(`Operator overloading lets your type plug into the syntax built-in types already use: <code>a + b</code>, <code>a == b</code>, <code>v[i]</code>, <code>cout &lt;&lt; a</code>. It's not decoration &#8212; it's often <em>required</em> to use your type with the standard library. The two that earn their keep first are <b><code>operator==</code></b> and <b><code>operator&lt;</code></b>: a type needs <code>operator&lt;</code> (a strict weak ordering) to be a <code>std::map</code>/<code>std::set</code> key or to be <code>std::sort</code>ed, and <code>operator==</code> to be found, deduplicated, or used as a <code>std::unordered_*</code> key (alongside a hash). Define those and your type behaves like a value the library understands.`),
p(`There's a member-vs-free-function choice. A <b>member</b> operator has the left operand as <code>this</code> &#8212; natural for asymmetric, mutating, or access operators like <code>operator[]</code>, <code>operator=</code>, <code>operator+=</code>. A <b>free (non-member) function</b> is the right home for <em>symmetric</em> operators like <code>operator+</code> and <code>operator==</code>: as a free function, both operands are ordinary parameters, so an implicit conversion can apply to <em>either</em> side (<code>2 + money</code> works, not just <code>money + 2</code>). A member <code>operator+</code> can only convert the right operand, which quietly breaks symmetry. And <code>operator&lt;&lt;</code> for streaming <em>must</em> be free: its left operand is the <code>std::ostream</code>, which isn't your class, so you couldn't make it a member of <code>ostream</code> even if you wanted to.`),
worked("A small value type with the comparison operators","A <code>Money</code> type that's safe to sort and to use as a map key. <code>operator==</code> and <code>operator&lt;</code> are free functions taking <code>const&amp;</code> &#8212; symmetric, no copies. <code>operator+</code> returns a <em>new value</em> (by value, never a reference to a local), and <code>operator+=</code> is a member because it mutates the left operand. Note how the comparisons read like plain English once defined.",
`struct Money {
    long cents = 0;
};

// symmetric comparisons -> free functions, const& params
bool operator==(const Money& a, const Money& b) { return a.cents == b.cents; }
bool operator<(const Money& a, const Money& b)  { return a.cents < b.cents; }

// symmetric arithmetic -> free function, returns a NEW value (by value!)
Money operator+(const Money& a, const Money& b) { return Money{a.cents + b.cents}; }

// mutating -> member; returns *this by reference for chaining
struct Wallet {
    Money balance;
    Wallet& operator+=(const Money& m) { balance = balance + m; return *this; }
};

std::set<Money> prices;                 // works: Money has operator<
std::sort(items.begin(), items.end());  // works: uses operator< on Money`),
p(`Since <b>C++20</b> there's a shortcut that removes most of this boilerplate: the <b>three-way comparison operator</b>, <code>operator&lt;=&gt;</code> (the "spaceship"). Default it &#8212; <code>auto operator&lt;=&gt;(const T&amp;) const = default;</code> &#8212; and the compiler generates <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, and <code>&gt;=</code> for you by comparing members in declaration order. Pair it with a defaulted <code>operator==</code> (which <code>&lt;=&gt;</code> does <em>not</em> generate &#8212; equality is separate so it can be optimized) and your type is fully ordered and comparable in two lines. This is the modern default for a plain value type; reach for hand-written operators only when the ordering isn't just "compare the members in order."`),
code(`struct Version {
    int major, minor, patch;
    auto operator<=>(const Version&) const = default;  // gives < > <= >= for free
    bool operator==(const Version&) const = default;   // == is separate; default it too
};
// Now Version is sortable, usable as a map key, and == comparable -- all member-wise.

Version a{1, 4, 0}, b{1, 5, 0};
bool older = a < b;                     // true -- compares major, then minor, then patch`),
pit("Two operator-overloading traps interviewers love","First: <b>returning a reference where you need a value.</b> <code>operator+</code> must return a <em>new</em> object by value &#8212; returning <code>T&amp;</code> to a local is a dangling reference, and returning <code>*this</code> would mutate the left operand instead of producing a sum. (Move semantics make the by-value return cheap, so there's no cost reason to cheat.) Second: <b>making a symmetric operator a member.</b> A member <code>operator==</code> or <code>operator+</code> only lets the compiler convert the <em>right</em> operand, so <code>money + 2</code> compiles but <code>2 + money</code> doesn't &#8212; an asymmetry that surprises callers. Symmetric operators want to be free functions (or in C++20, a defaulted <code>&lt;=&gt;</code>/<code>==</code> member, which the language treats symmetrically anyway)."),

sub("3 · The four meanings of static"),
p(`<code>static</code> is the most overloaded keyword in C++ &#8212; it means four genuinely different things depending on where you write it. Interviewers ask precisely because mixing them up signals shaky fundamentals. Here are all four, by context.`),
svg("essentials_static","One keyword, four jobs, decided by where it appears: at file scope it's internal linkage; on a local variable it's a single lazily-initialized instance that persists; on a data member it's one copy shared by the whole class; on a member function it's a function with no <code>this</code>."),
p(`<b>(a) At file scope &#8212; internal linkage.</b> A <code>static</code> function or variable at namespace scope is private to its <em>translation unit</em>: other <code>.cpp</code> files can't see it, and the linker won't collide its name with an identically-named symbol elsewhere. This is the linkage story from the <em>Undefined Behavior &amp; Build Model</em> lesson &#8212; <code>static</code> (or an unnamed namespace) is how you keep a helper truly local and avoid ODR clashes across files.`),
p(`<b>(b) A local <code>static</code> variable &#8212; one instance, lazily initialized, persists across calls.</b> Declared inside a function, a <code>static</code> local is constructed <em>once</em>, on first reaching its declaration, and survives until program exit &#8212; it is <em>not</em> recreated each call. Crucially, since C++11 that first-time initialization is <b>thread-safe</b>: the runtime guarantees exactly one thread runs the initializer while others wait. That makes the local-static the backbone of the <b>construct-on-first-use</b> idiom, which also fixes the <em>static initialization order fiasco</em>.`),
worked("A local static counter, and the construct-on-first-use fix","Top: a <code>static</code> local that counts calls &#8212; initialized once, retains its value. Bottom: the order fiasco. Two <em>global</em> statics in different translation units have <b>undefined</b> initialization order, so a global that uses another global during startup may read it before it's built. Wrapping the object in a function makes it a <em>local</em> static &#8212; built on first use, guaranteed ready before anyone touches it.",
`int nextId() {
    static int counter = 0;     // built ONCE, on first call; persists after
    return ++counter;           // 1, 2, 3, ... across separate calls
}

// --- the static init order fiasco ---
// In a.cpp:  Config globalConfig;            // order of these two across TUs
// In b.cpp:  Logger  globalLogger(globalConfig);  // is UNDEFINED -> maybe reads
//                                                 // globalConfig before it exists

// fix: construct-on-first-use -- a function-local static is built on first call
Config& config() {
    static Config instance;     // created the first time config() runs, then reused
    return instance;            // every caller gets the same, fully-built object
}`),
note(`&#128221;`,`Don't rely on cross-TU static init order &#8212; ever`,`The order in which <em>global/namespace-scope</em> statics across different translation units are initialized is unspecified by the standard. So a global whose constructor reads another global from a different <code>.cpp</code> is a startup-crash waiting to happen. The construct-on-first-use idiom (a function returning a reference to a function-<em>local</em> static) sidesteps it entirely: the dependency is built the first time it's needed, in the right order by construction. This is the idiom behind most hand-rolled singletons.`),
p(`<b>(c) A <code>static</code> data member &#8212; one shared instance for the whole class.</b> A non-static member exists once <em>per object</em>; a <code>static</code> data member exists <em>once for the entire class</em>, shared by every instance (and accessible as <code>ClassName::member</code> with no object at all). Classically you declare it in the class and <em>define</em> it once out-of-line in a <code>.cpp</code> &#8212; but since <b>C++17</b> you can mark it <code>static inline</code> and initialize it right in the header, no separate definition needed. Use it for class-wide state: an instance counter, a shared default, a registry.`),
p(`<b>(d) A <code>static</code> member function &#8212; no <code>this</code>.</b> It belongs to the class but has no object: it can't touch non-static members (there's no instance to touch) and you call it as <code>ClassName::func()</code>. It's the right shape for factory functions, helpers that logically group under the class, and anything you'd pass as a plain function pointer (no hidden <code>this</code> parameter to get in the way).`),
code(`struct Widget {
    static inline int liveCount = 0;        // (c) one shared counter, C++17 inline init
    int id;

    Widget()  { id = ++liveCount; }
    ~Widget() { --liveCount; }

    static int howMany() { return liveCount; }  // (d) no this; reads the shared member
    // static int bad() { return id; }          // ERROR: no object -> no 'id'
};

Widget a, b, c;
int n = Widget::howMany();                  // 3 -- called on the class, not an instance`),

sub("4 · Initialization: braces, order, and the vexing parse"),
p(`C++ has more ways to initialize an object than any language has a right to, and a few of them are traps. The modern advice is to prefer <b>brace (uniform) initialization</b> &#8212; <code>T x{...}</code> &#8212; for two concrete reasons. First, braces <b>forbid narrowing conversions</b>: <code>int x{3.5};</code> won't compile (a <code>double</code> &#8594; <code>int</code> loses data), whereas <code>int x(3.5);</code> silently truncates to 3. That's a real bug caught for free. Second, braces work uniformly across scalars, aggregates, and containers, so you can default-init members consistently.`),
pit("The vector{N} vs vector(N) gotcha","Braces have one sharp edge: if a type has an <code>std::initializer_list</code> constructor, braces <em>strongly prefer</em> it. So <code>std::vector&lt;int&gt; v{3};</code> is a vector with <b>one element, the value 3</b> &#8212; the initializer-list constructor wins. But <code>std::vector&lt;int&gt; v(3);</code> with parens is a vector of <b>three zeros</b> &#8212; the (size) constructor. Same with <code>{3, 4}</code> (two elements) vs <code>(3, 4)</code>. This bites everyone once. Rule of thumb: use parens when you mean a <em>count/size</em> argument, braces when you mean <em>contents</em>."),
