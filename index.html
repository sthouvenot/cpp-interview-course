  pit("The local check is not enough",`The BST rule isn't "each node beats its kids" &#8212; it's that <em>every</em> node in the left subtree is smaller and <em>every</em> node in the right subtree is larger. Consider root 10, with right child 15, whose left child is 6. Locally each parent-child pair looks fine (15 &gt; 10, and 6 &lt; 15). But 6 sits in 10's <em>right</em> subtree while being smaller than 10, so the tree is not a valid BST. The local check misses it because 6 and 10 are never directly compared. You need each node validated against a range inherited from <em>all</em> its ancestors, not just its parent.`),
  p(`The fix carries a valid <code>(min, max)</code> range down the recursion. The root may be anything; as you recurse left, the current node becomes the new <em>upper</em> bound (everything left of it must be smaller); as you recurse right, it becomes the new <em>lower</em> bound. A node is valid only if it falls strictly inside the window it inherited &#8212; which encodes the constraints of every ancestor, not just the parent.`),
  worked("Validate BST with min/max bounds","Each call carries the open interval the node must live in. Going left tightens the max to the current value; going right tightens the min. Using nullable bounds (or LONG_MIN/LONG_MAX) sidesteps overflow when a node's value sits at the int extremes. O(n) time, O(h) stack.",
`bool valid(TreeNode* node, long lo, long hi) {
    if (!node) return true;                       // empty subtree is valid
    if (node->val <= lo || node->val >= hi)
        return false;                             // outside inherited window
    return valid(node->left,  lo, node->val)      // left: new upper bound
        && valid(node->right, node->val, hi);     // right: new lower bound
}

bool isValidBST(TreeNode* root) {
    return valid(root, LONG_MIN, LONG_MAX);       // root: no bounds yet
}`),
  idea("The in-order shortcut",`There's a slicker validation: do an <em>in-order</em> traversal and check the values come out strictly increasing. It works for the exact reason from the diagram &#8212; in-order of a valid BST is sorted, so the first time you see a value that isn't greater than the previous one, the BST property is broken. Mention both approaches in an interview: the min/max recursion shows you understand the ancestor constraints, and the in-order check shows you remember the sorted-traversal fact. Either is O(n).`),
  sub("Putting it together"),
  ul([
    `<b>Decide DFS or BFS first.</b> Subtree structure &#8594; DFS. Levels or distance &#8594; BFS. Say which and why before you write code.`,
    `<b>For DFS, answer two questions.</b> What's the answer for null (base case), and how do I combine my children's answers into mine? The template handles the rest.`,
    `<b>For BFS, snapshot the level size.</b> Freezing <code>q.size()</code> per iteration is what separates "current level" from "everything below."`,
    `<b>For BSTs, exploit the order.</b> Search/insert by comparison is O(h); in-order yields sorted values; validation needs ancestor bounds, not local checks.`,
    `<b>State the space cost honestly.</b> "O(h) &#8212; O(log n) balanced, O(n) skewed" is the line that shows you understand recursion's hidden bill.`,
  ]),
  cx(`Traversal (DFS or BFS): <b>O(n)</b> time. DFS space <b>O(h)</b> &#183; BST search/insert <b>O(h)</b> &#8212; <b>O(log n)</b> balanced, <b>O(n)</b> skewed.`),
  {t:"probs",items:[["Invert Binary Tree","invert-binary-tree","easy"],["Validate BST","validate-binary-search-tree","med"],["Serialize & Deserialize Tree","serialize-and-deserialize-binary-tree","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"08",id:"tries",color:"#A855F7",title:"Tries",badge:"Week 5 · Pattern",blocks:[
  cue(`<b>Spot it when:</b> prefix lookups, autocomplete, a spell-checker, or scanning a big dictionary of words fast &#8212; especially the tell-tale phrase <em>"starts with."</em> If a hash set of whole words could answer "is this an exact word?" but can't answer "how many words begin with <code>ca</code>?", you want a trie.`),
  p(`A trie &#8212; a <em>prefix tree</em> &#8212; is a tree where each <em>edge</em> is a single character, so the path from the root down to a node spells out a prefix. Words that share a prefix share that path: <code>cat</code>, <code>car</code>, and <code>card</code> all walk the same <code>c &#8594; a</code> steps before diverging. Nothing is stored at a node except its outgoing edges and a single boolean &#8212; the letters live on the edges, not in the nodes.`),
  svg("tries_tree","Four words in one trie. The shared 'ca' path is walked once and reused by cat, car, and card. Green nodes have isEnd=true: a complete word ends there. Notice 'car' is a real word even though the path continues on to 'card'."),
  p(`The payoff is the cost model. Inserting, finding a full word, and testing a prefix are each <b>O(L)</b> in the length of the query word &#8212; and crucially that is <em>independent of how many words the trie holds</em>. A dictionary of ten words and a dictionary of ten million words both answer "does <code>card</code> start a stored word?" in the same four steps. That constant-per-character cost, with no rehashing and no comparison against other entries, is exactly why autocomplete feels instant as you type.`),
  sub("The shape of a node"),
  p(`Every node carries two things: a way to reach its children keyed by the next character, and an <code>isEnd</code> (often called <code>isWord</code>) flag marking whether a complete word terminates at this node. For a lowercase-only alphabet the children are usually a fixed <code>array&lt;TrieNode*,26&gt;</code>, where the letter itself is the index via <code>c - 'a'</code> &#8212; the same array-as-hashmap trick from the Arrays &amp; Hashing lesson. The letter is the index, so there is no hashing and no collision: looking up a child is a single array read.`),
  svg("tries_node","One node holds 26 child slots indexed directly by letter (children['c'-'a']) plus an isEnd boolean. Most slots are null; only letters that actually continue a word point anywhere. This is the array-as-hashmap idea again: the character is the index."),
  code(`struct TrieNode {
    array<TrieNode*, 26> kids{};   // {} zero-inits all 26 slots to nullptr
    bool isEnd = false;            // does a complete word end at THIS node?
};`),
  note("🧠","The one idea that makes every trie problem click",`Walking the trie is just <em>following one character at a time</em>. To process a word you start at the root and, for each letter, step into <code>kids[c - 'a']</code> &#8212; creating that child when you insert, or bailing out when it is null on a lookup. Insert, search, and startsWith are <em>the same walk</em>; they differ only in what they do when a child is missing (create vs. fail) and what they check at the end (<code>isEnd</code> vs. nothing). Get the walk in your head and the three methods write themselves.`),
  sub("Building the full Trie class"),
  p(`The canonical interview problem ("Implement Trie") asks for exactly three operations: <code>insert(word)</code>, <code>search(word)</code> for a whole word, and <code>startsWith(prefix)</code>. Notice how <code>search</code> and <code>startsWith</code> share their entire body except the last line &#8212; both walk down following each character; <code>search</code> additionally insists the final node is marked <code>isEnd</code>, while <code>startsWith</code> only cares that the path <em>exists</em>.`),
  worked("Implement Trie (prefix tree)","insert grows the path, creating nodes as needed and marking the last one. search and startsWith share a helper that walks to the node for a string (or returns nullptr if the path breaks). The only difference: a full word must also be flagged isEnd.",
`class Trie {
    struct Node {
        array<Node*, 26> kids{};            // null until a letter is added
        bool isEnd = false;
    };
    Node* root = new Node();

    // walk the path for s; return the node it lands on, or nullptr
    Node* walk(const string& s) const {
        Node* cur = root;
        for (char c : s) {
            cur = cur->kids[c - 'a'];        // step one letter down
            if (!cur) return nullptr;        // path breaks -> not present
        }
        return cur;
    }
public:
    void insert(const string& word) {
        Node* cur = root;
        for (char c : word) {
            Node*& slot = cur->kids[c - 'a'];
            if (!slot) slot = new Node();    // create the edge if missing
            cur = slot;
        }
        cur->isEnd = true;                   // mark the final node a word-end
    }
    bool search(const string& word) const {
        Node* n = walk(word);
        return n && n->isEnd;                // path exists AND a word ends here
    }
    bool startsWith(const string& prefix) const {
        return walk(prefix) != nullptr;      // path exists -> good enough
    }
};`),
  idea("Why startsWith is the whole point",`A plain <code>unordered_set&lt;string&gt;</code> already answers <code>search</code> in O(L) on average &#8212; so if exact-word lookup were all you needed, you would not bother with a trie. The trie earns its keep on <code>startsWith</code>: a hash set would have to scan <em>every</em> stored word to answer "does anything begin with <code>ca</code>?", but the trie answers it by walking two edges. Whenever a problem leans on prefixes, that is your signal to reach for this structure instead of a set or map.`),
  pit("Forgetting isEnd makes \"app\" match when you only inserted \"apple\"",`The single most common trie bug. If you only check that the path exists and skip the <code>isEnd</code> flag, then after inserting just <code>apple</code> your <code>search("app")</code> returns true &#8212; because the <code>a &#8594; p &#8594; p</code> path really is present, it just was not the end of a word. <code>isEnd</code> is the entire difference between "this is a stored word" and "this is merely a prefix of one." Set it on insert; check it on search; ignore it on startsWith.`),
  sub("Wildcard search: when '.' matches anything"),
  p(`The follow-up problem ("Add and Search Word") adds a twist: the query may contain <code>.</code> as a wildcard that matches <em>any single character</em>. For an ordinary letter the walk is unchanged &#8212; step into that one child. But at a <code>.</code> you cannot pick a single edge, so you must try <em>all</em> of them: branch into every non-null child and recurse on the rest of the pattern. The instant a query can fan out across multiple children, an iterative walk turns into a depth-first search.`),
  worked("Add and Search Word ('.' wildcard)","A normal char follows one edge. A '.' branches: recurse into every existing child with the rest of the pattern, and succeed if any branch does. The index i tracks how far into the pattern we are; at the end we still require isEnd.",
`class WordDictionary {
    struct Node { array<Node*,26> kids{}; bool isEnd=false; };
    Node* root = new Node();

    bool dfs(const string& w, int i, Node* node) const {
        if (!node) return false;
        if (i == (int)w.size()) return node->isEnd;   // consumed pattern
        char c = w[i];
        if (c == '.') {                               // wildcard: try all
            for (Node* child : node->kids)
                if (dfs(w, i + 1, child)) return true;
            return false;                             // no child matched
        }
        return dfs(w, i + 1, node->kids[c - 'a']);    // ordinary letter
    }
public:
    void addWord(const string& word) {
        Node* cur = root;
        for (char c : word) {
            Node*& slot = cur->kids[c - 'a'];
            if (!slot) slot = new Node();
            cur = slot;
        }
        cur->isEnd = true;
    }
    bool search(const string& word) const { return dfs(word, 0, root); }
};`),
  note("📌","Worst case of the wildcard search",`A query of all dots, like <code>"....."</code>, forces the DFS to explore every path of that length &#8212; up to 26 branches at each of L levels. So the pathological bound is O(26&#737;), exponential in the number of wildcards. In practice queries have few dots and the real branching factor is tiny (most slots are null, and a null child returns immediately), so it stays fast &#8212; but if an interviewer asks for the worst case, that exponential is the honest answer.`),
  sub("Combining a trie with grid DFS"),
  p(`The hard application ("Word Search II") asks you to find which of many words appear in a 2-D letter grid, where a word snakes through adjacent cells. The naive approach &#8212; run a separate grid search for each word &#8212; rescans the board over and over. The trie collapses all that shared work: build one trie of <em>all</em> the target words, then DFS the grid once, descending the trie in lockstep with the path you are tracing. The moment your current cell has no matching child in the trie, you prune that whole branch immediately &#8212; you never wander down letter sequences that no target word could become.`),
  ul([
    `<b>Build once.</b> Insert every target word into a single trie up front.`,
    `<b>DFS the grid, carry a trie node.</b> From each cell, you are at some trie node; only step to a neighbor whose letter is a live child of that node.`,
    `<b>Collect on isEnd.</b> When the current trie node is <code>isEnd</code>, you have spelled a full target word &#8212; record it (and clear its flag to avoid duplicates).`,
    `<b>Prune dead-ends.</b> No matching child means no target word continues this way, so you abandon the branch instantly. That pruning is the entire reason the trie wins here.`,
  ]),
  idea("The shape of the win",`Word Search II is really "two structures cooperating": the grid DFS supplies <em>where you can move</em>, and the trie supplies <em>whether moving there is worthwhile</em>. The trie turns a per-word search into a single shared traversal whose cost is driven by the grid, not by how many words you are hunting. If you can articulate "I put the dictionary in a trie so the board DFS prunes against all words at once," you have shown the interviewer the key insight even before writing the loop.`),
  sub("array[26] vs. a hash map of children"),
  p(`The child container is a real design decision worth naming out loud. A fixed <code>array&lt;TrieNode*,26&gt;</code> gives the fastest possible child lookup &#8212; a single indexed read with no hashing &#8212; but it spends 26 pointer slots <em>per node</em> whether or not they are used, which is wasteful on sparse data or large alphabets. An <code>unordered_map&lt;char,TrieNode*&gt;</code> stores only the children that exist, so it is far leaner for Unicode, mixed case, or sparse tries, at the cost of a hash per step and worse cache behavior.`),
  ul([
    `<b>array[26] (or [128]):</b> fastest, simplest, cache-friendly. Best when the alphabet is small and fixed (lowercase a&#8211;z) &#8212; which is most interview problems. Default to this.`,
    `<b>unordered_map&lt;char,TrieNode*&gt;:</b> memory-proportional to actual children. Reach for it with large or unknown alphabets, sparse data, or when most slots would sit empty.`,
  ]),
  note("📌","The interview default",`For a LeetCode-style lowercase problem, just use the array &#8212; it is shorter to write and faster to run, and reviewers expect it. Mention the map only as the trade-off: "I'll use a 26-slot array since the alphabet is fixed; for a larger or sparse alphabet I'd switch the children to an <code>unordered_map&lt;char,TrieNode*&gt;</code> to avoid wasting 26 slots per node." Naming the alternative shows you understand the space cost without over-engineering the answer.`),
  pit("c - 'a' off-by-one and out-of-range characters",`The index trick <code>c - 'a'</code> assumes <code>c</code> really is a lowercase letter, giving 0..25. Feed it an uppercase letter, a digit, or a space and you index out of bounds &#8212; silent memory corruption, not a clean error. If the problem promises lowercase you are fine; if it does not, validate the character or switch to the map. The same care applies to building a child: index with the wrong base (<code>c - '0'</code>, say) and the whole structure is quietly mis-wired.`),
  pit("Leaking every node you allocate",`Each <code>new Node()</code> here is never freed &#8212; fine for a single LeetCode submission that exits immediately, but a leak in real code. Callback to the RAII lesson: production code makes children <code>array&lt;unique_ptr&lt;TrieNode&gt;,26&gt;</code> (or a <code>map</code> of <code>unique_ptr</code>), so destroying the root recursively frees the entire tree for free, with no manual <code>delete</code> walk. The raw-pointer version is an interview shortcut; the owning-pointer version is what you would actually ship.`),
  idea("How to narrate it in the room",`Say the recognition cue, then the structure: "This is prefix-driven, so I'll use a trie &#8212; each node has 26 child slots and an <code>isEnd</code> flag. Insert, search, and startsWith are all the same character-by-character walk; they're O(L) in the word length, independent of how many words I've stored." Front-loading that the cost does not depend on dictionary size is the line that signals you actually understand <em>why</em> the trie is the right tool, not just that it is.`),
  cx(`insert / search / startsWith all <b>O(L)</b> in the query length (independent of word count) &#183; space <b>O(total characters &#215; alphabet)</b> &#8212; up to 26 child slots per node`),
  {t:"probs",items:[["Implement Trie","implement-trie-prefix-tree","med"],["Add & Search Word","design-add-and-search-words-data-structure","med"],["Word Search II","word-search-ii","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"09",id:"heaps",color:"#EC4899",title:"Heaps / Priority Queue",badge:"Week 6 · Pattern",blocks:[
  cue(`<b>Spot it when:</b> you need the <em>top K</em> of something, the <em>K-th largest / smallest</em>, a <em>streaming median</em>, or you keep reaching for "give me the current min/max, then the next one, then the next." The tell is a <em>partial</em> order: you never need the whole thing sorted, only the extreme element &#8212; over and over, often as data streams in.`),
  p(`A heap is the data structure for "I only care about the most extreme element, repeatedly." It gives you the min (or the max) in O(1), and lets you remove it or insert a new value in O(log n). That's strictly cheaper than keeping the whole collection sorted, and the saving is the entire point: sorting buys you a <em>total</em> order you usually don't need. A heap buys you just enough order to know what's on top &#8212; and nothing more.`),
  p(`Concretely, a binary heap is a <em>complete</em> binary tree (every level full except possibly the last, which fills left to right) obeying the <em>heap property</em>: in a <b>min-heap</b> every parent is &#8804; its children, so the global minimum sits at the root; in a <b>max-heap</b> every parent is &#8805; its children, so the maximum is at the root. Note what the property does <em>not</em> say: siblings are unordered, and a node deep on the left can be larger than a node shallow on the right. The order is purely vertical, parent-to-child. That looseness is exactly why a heap is cheap to maintain.`),
  sub("The array trick: a tree with no pointers"),
  p(`Here's the part that makes heaps fast and memory-friendly, and the thing interviewers love to hear you explain. Because the tree is always <em>complete</em>, you don't need any node objects or pointers at all &#8212; you can pack it into a flat array, level by level, left to right. The root is index 0, then its two children, then their four children, and so on. The shape is fixed, so position <em>is</em> the structure.`),
  svg("heaps_array","A min-heap as a tree on the left, the very same nodes as a flat array on the right. The root (the minimum) is index 0; each node's children and parent are found by arithmetic, so the tree needs no pointers at all."),
  p(`That layout lets you navigate the "tree" with pure arithmetic. For the node at index <code>i</code>: its left child is at <code>2i+1</code>, its right child is at <code>2i+2</code>, and its parent is at <code>(i-1)/2</code> (integer division). No allocations, no pointer chasing, perfect cache locality &#8212; as a game-engine dev you'll appreciate that a "tree" here is really just a contiguous <code>vector</code> you index into. This is also why heaps don't fragment memory the way a pointer-based tree does.`),
  note("📌","Why the heap property is enough",`A sorted array gives you a total order: you know exactly where every element ranks. A heap gives you far less &#8212; only that the root is the extreme and each parent beats its kids &#8212; but that's <em>precisely</em> what "give me the next min/max" needs. Paying for a full sort when you only consume the top few elements is the waste a heap exists to avoid. Right tool, right amount of order.`),
  sub("push and pop: sift up, sift down"),
  p(`Both mutations work by adding/removing at the array's <em>edge</em> and then restoring the heap property with a single walk up or down a path &#8212; never touching the whole tree. To <b>push</b>: append the new value to the end of the array (keeping the tree complete), then <em>sift up</em> &#8212; while it's smaller than its parent (in a min-heap), swap them. It bubbles up until it finds its level. The path from a leaf to the root is the tree's height, <code>log n</code>, so push is O(log n).`),
  p(`To <b>pop</b> the root (the min): move the <em>last</em> element into the root slot, shrink the array by one (still complete), then <em>sift down</em> &#8212; repeatedly swap the value with its <em>smaller</em> child until both children are &#8805; it. Again you walk one root-to-leaf path, so pop is O(log n). Reading the <b>top</b> is just <code>array[0]</code>, O(1) &#8212; you never pay unless you actually remove. That O(1) peek plus O(log n) update is the whole performance story.`),
  worked("A min-heap by hand (the mechanics)","You'll almost always use std::priority_queue, but writing the two sifts once makes the cost model click. Notice both operations only ever follow a single path up or down the tree &#8212; that path is the height, log n.",
`class MinHeap {
    vector<int> h;                               // the complete tree, packed flat
    void siftUp(int i) {
        while (i > 0) {
            int parent = (i - 1) / 2;
            if (h[i] >= h[parent]) break;        // heap property holds -> stop
            swap(h[i], h[parent]);               // smaller than parent -> rise
            i = parent;
        }
    }
    void siftDown(int i) {
        int n = h.size();
        while (true) {
            int l = 2*i + 1, r = 2*i + 2, small = i;
            if (l < n && h[l] < h[small]) small = l;
            if (r < n && h[r] < h[small]) small = r;
            if (small == i) break;               // both children >= i -> done
            swap(h[i], h[small]);                // sink past the smaller child
            i = small;
        }
    }
public:
    void push(int x) { h.push_back(x); siftUp(h.size() - 1); }
    int  top() const { return h[0]; }            // the min, O(1)
    void pop() {
        h[0] = h.back(); h.pop_back();           // last element fills the root
        if (!h.empty()) siftDown(0);             // restore from the top
    }
    bool empty() const { return h.empty(); }
};`),
  note("📌","Building a heap from an array is O(n), not O(n log n)",`If you already have all the data, don't push n times (that's O(n log n)). Instead <em>heapify</em>: place everything in the array as-is, then sift-down every non-leaf node from the bottom up. It looks like n &#215; log n, but most nodes are near the bottom with tiny subtrees, and the sum works out to <b>O(n)</b>. <code>std::make_heap</code> does this, and <code>priority_queue</code>'s range constructor uses it. Worth a sentence in an interview when you're handed a full array up front.`),
  sub("std::priority_queue — and the comparator gotcha"),
  p(`In practice you reach for <code>std::priority_queue</code>, the STL heap adapter. The one thing to burn into memory: <b>it is a MAX-heap by default</b> &#8212; <code>top()</code> gives you the <em>largest</em> element. That surprises people who expect "queue" to mean smallest-first. To get a min-heap you supply the comparator <code>greater&lt;int&gt;</code>, which means writing out the full template: <code>priority_queue&lt;int, vector&lt;int&gt;, greater&lt;int&gt;&gt;</code>.`),
  code(`#include <queue>

priority_queue<int> maxHeap;                 // DEFAULT is a MAX-heap
maxHeap.push(5); maxHeap.push(9);
int big = maxHeap.top();                      // 9  (largest), O(1)
maxHeap.pop();                                // removes 9; returns void, like stack

// min-heap: spell out the type and pass greater<>
priority_queue<int, vector<int>, greater<int>> minHeap;
minHeap.push(5); minHeap.push(9);
int small = minHeap.top();                     // 5  (smallest)

// build from existing data in O(n) via the range constructor (heapify):
vector<int> data = {7, 2, 9, 4};
priority_queue<int> pq(data.begin(), data.end());`),
  pit("greater<> gives you a MIN-heap — yes, it feels backwards",`The comparator is the "is a before b in priority?" relation, and <code>priority_queue</code> puts the element that is <em>least</em> preferred by that order on top. With the default <code>less&lt;&gt;</code> the largest ends up on top (max-heap); with <code>greater&lt;&gt;</code> the <em>smallest</em> ends up on top (min-heap). It reads inverted every time. The reliable move: don't reason it out under pressure &#8212; memorize "<code>greater&lt;&gt;</code> &#8594; min-heap" as a fact, and double-check with one tiny example before you trust it. Also note <code>top()</code> + <code>pop()</code> are two steps, exactly like <code>std::stack</code>: <code>pop()</code> returns <code>void</code>.`),
  sub("The signature trick: top-K with a size-K heap"),
  p(`This is the move that turns "heap" into an interview pattern. To find the K largest (or the K-th largest) out of <code>n</code> elements, you do <em>not</em> sort all <code>n</code>. You keep a heap holding only the best K seen so far, and let everything else fall out as you stream through. Here's the counterintuitive twist worth pausing on: <b>for the K LARGEST, you use a MIN-heap of size K.</b>`),
  p(`Why a min-heap for the <em>largest</em>? Because the job of the heap is to make eviction cheap. The <em>smallest</em> of your current K-best sits at the min-heap's top, ready to be kicked out the instant something bigger arrives. For each new element: if the heap has fewer than K, push it; otherwise, if the new value beats the top (the weakest of your champions), pop the top and push the newcomer. After one pass the heap holds exactly the K largest, and its top is the K-th largest. Each of <code>n</code> elements costs at most O(log K), so the whole thing is <b>O(n log K)</b> &#8212; better than O(n log n) sorting whenever K is small, and it works on a stream you can't sort because it never ends.`),
  worked("Kth largest in a stream (min-heap of size K)","Keep a min-heap capped at size k. Its top is always the k-th largest seen so far. When a new value arrives that beats the weakest champion, evict the top and admit the newcomer. O(log k) per add.",
`class KthLargest {
    int k;
    priority_queue<int, vector<int>, greater<int>> minHeap;  // size <= k
public:
    KthLargest(int k, const vector<int>& nums) : k(k) {
        for (int x : nums) add(x);
    }
    int add(int val) {
        minHeap.push(val);
        if ((int)minHeap.size() > k)
            minHeap.pop();                       // drop the smallest -> keep top k
        return minHeap.top();                    // the k-th largest, O(1)
    }
};`),
  idea("The mirror you should keep straight",`K <em>largest</em> &#8594; <b>min</b>-heap of size K (the smallest champion is on top, first to be evicted). K <em>smallest</em> &#8594; <b>max</b>-heap of size K (the largest champion is on top, first to go). Pick the heap whose top is the element you'd most want to <em>throw away</em>. Using the wrong direction here is the single most common heap bug in interviews &#8212; say the direction and <em>why</em> out loud before you code, and you'll catch yourself.`),
  sub("Custom comparators for richer elements"),
  p(`Real problems rarely heap on bare <code>int</code>s &#8212; you order points by distance, tasks by deadline, edges by weight. <code>priority_queue</code> takes any element type plus a comparator. For pairs the default ordering compares <code>.first</code> then <code>.second</code>, which is often all you need (pack the priority into <code>first</code>). For anything custom, pass a lambda or functor. Below, "K closest points to origin": you want the K <em>smallest</em> distances, so by the mirror rule you keep a <b>max</b>-heap of size K, evicting the farthest point whenever a closer one shows up.`),
  worked("K closest points to origin (max-heap of size K)","Want the k SMALLEST distances, so keep a max-heap capped at k: the farthest of your current best sits on top, ready to be evicted. Compare squared distance (no sqrt needed). O(n log k), and only k points ever live in memory.",
`vector<vector<int>> kClosest(const vector<vector<int>>& points, int k) {
    // ordering by squared distance; greater dist == lower priority -> max-heap on top
    auto cmp = [](const vector<int>& a, const vector<int>& b) {
        return a[0]*a[0] + a[1]*a[1] < b[0]*b[0] + b[1]*b[1];  // a "less" -> b on top
    };
    priority_queue<vector<int>, vector<vector<int>>, decltype(cmp)> maxHeap(cmp);
    for (const auto& p : points) {
        maxHeap.push(p);
        if ((int)maxHeap.size() > k)
            maxHeap.pop();                       // evict the farthest -> keep k closest
    }
    vector<vector<int>> result;
    while (!maxHeap.empty()) {                    // drain what's left: the k closest
        result.push_back(maxHeap.top());
        maxHeap.pop();
    }
    return result;
}`),
  note("📌","Reading the comparator without second-guessing",`A <code>priority_queue</code> comparator returns true when its first arg has <em>lower</em> priority &#8212; i.e. should sit <em>below</em> the other and surface <em>later</em>. So returning "a's distance &lt; b's distance" means smaller distances are low-priority and the <em>largest</em> distance bubbles to the top: a max-heap by distance. It's the same inverted logic as <code>greater&lt;&gt;</code>. When in doubt, ask "what do I want on top to evict?" &#8212; here, the farthest &#8212; and write the comparator so that element wins the top slot.`),
  sub("Two heaps: the streaming-median pattern"),
  p(`The hard-tier classic: numbers arrive one at a time and after each you must report the <em>median</em> of everything seen so far. Re-sorting per query is O(n log n) each &#8212; hopeless on a stream. The elegant answer is <b>two heaps</b> that split the data at the median. A <em>max-heap</em> holds the lower half, so its top is the largest of the small numbers. A <em>min-heap</em> holds the upper half, so its top is the smallest of the big numbers. The median is sitting right where those two halves meet &#8212; at one or both of the tops.`),
  svg("heaps_median","Two heaps facing each other: a max-heap holds the lower half (its top is the biggest small value) and a min-heap holds the upper half (its top is the smallest big value). Kept balanced in size, the median is always at the tops."),
  p(`The whole trick is keeping the halves <em>balanced</em>: the two heaps differ in size by at most one. If they're equal, the median is the average of the two tops; if one is larger, its top <em>is</em> the median. Each insertion is a push plus at most one rebalancing transfer between heaps &#8212; all O(log n) &#8212; and the median query is then an O(1) read of one or two tops. This "split at the boundary, keep both sides balanced, read the frontier" idea generalizes well beyond medians.`),
  worked("Find median from a data stream (two heaps + rebalance)","lo is a max-heap (lower half), hi is a min-heap (upper half). Push to lo, shove its top over to hi, then rebalance sizes so lo is never smaller than hi. The median is lo's top, or the average of both tops. O(log n) per add, O(1) per query.",
`class MedianFinder {
    priority_queue<int> lo;                                   // max-heap: lower half
    priority_queue<int, vector<int>, greater<int>> hi;        // min-heap: upper half
public:
    void addNum(int num) {
        lo.push(num);                            // 1. always land in the lower half
        hi.push(lo.top()); lo.pop();             // 2. push its max up to the high side
        if (hi.size() > lo.size()) {             // 3. rebalance: keep lo >= hi in size
            lo.push(hi.top()); hi.pop();
        }
    }
    double findMedian() {
        if (lo.size() > hi.size()) return lo.top();           // odd count -> lo's top
        return (lo.top() + hi.top()) / 2.0;                   // even -> average of tops
    }
};`),
  idea("Why this beats sorting, in one line",`Sorting gives a total order you immediately throw away after reading one element. The two-heaps trick maintains only the order that matters &#8212; the boundary between the halves &#8212; at O(log n) per update and O(1) per query. Whenever the answer depends on a <em>frontier</em> of a stream (a median, a running K-th value, the next event by time) rather than the full ranking, heaps are the tool, and "I'd keep two heaps balanced around the median" is a senior-sounding opener.`),
  sub("When a heap beats sorting"),
  ul([
    `<b>Streaming / unbounded data.</b> You can't sort a stream that never ends; a heap absorbs each element in O(log n) and always knows the current extreme.`,
    `<b>You only need the top few.</b> Top-K, K-th largest, "the closest N" &#8212; a size-K heap is O(n log K), beating a full O(n log n) sort when K &#8814; n.`,
    `<b>Repeated extract-min/max.</b> Dijkstra, Prim's MST, event simulation, task schedulers, Huffman coding &#8212; anything that loops "grab the smallest, process, maybe add more."`,
    `<b>A moving frontier.</b> Running median, merging K sorted lists by always pulling the smallest head &#8212; partial order at the boundary is all you need.`,
  ]),
  pit("A heap is NOT sorted — only the top is ordered",`The most common misread. Iterating a <code>priority_queue</code> (or its backing array) does <em>not</em> give you sorted output; the heap property only guarantees the <em>root</em> is the extreme. The siblings and deeper nodes are in no particular order. If you need everything in order, you must <em>pop one at a time</em> &#8212; which, done n times, is exactly heapsort at O(n log n). Don't assume the array is sorted just because the front element is.`),
  pit("Wrong heap direction for top-K",`Reaching for a max-heap to find the K <em>largest</em> feels natural and is the classic trap: a max-of-everything heap is O(n log n) and stores all n elements. The size-K answer flips it &#8212; min-heap for K largest, max-heap for K smallest &#8212; so only K elements are ever resident and each add is O(log K). If you catch yourself building an n-sized heap to read just K elements off the top, stop and invert.`),
  cx(`<code>top</code> <b>O(1)</b> &#183; <code>push</code> / <code>pop</code> <b>O(log n)</b> &#183; build-from-array (heapify) <b>O(n)</b> &#183; top-K with a size-K heap <b>O(n log K)</b> time, <b>O(K)</b> space`),
  {t:"probs",items:[["Kth Largest in a Stream","kth-largest-element-in-a-stream","easy"],["K Closest Points to Origin","k-closest-points-to-origin","med"],["Find Median from Data Stream","find-median-from-data-stream","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"10",id:"backtrack",color:"#F43F5E",title:"Backtracking",badge:"Week 6 · Pattern",blocks:[
  cue(`<b>Spot it when:</b> the problem says <em>"generate all"</em> &#8212; all subsets, all combinations, all permutations &#8212; or <em>"find every way to do X,"</em> or <em>"is there any arrangement that satisfies these constraints?"</em> (N-Queens, sudoku, word search). The tell is that you can't compute the answer with a formula or a single pass; you have to actually <em>try possibilities</em>, and each choice opens up a fresh set of follow-on choices.`),
  p(`Backtracking is a <em>guided exhaustive search</em>. You build a solution one choice at a time; after each choice you recurse to extend it further; and when a branch is exhausted you <b>undo the last choice</b> and try the next option. That undo is the move that gives the pattern its name &#8212; you walk forward into a partial solution, hit a dead end or a complete answer, then back up exactly one step and take a different fork. It is brute force with a brain: you still explore the whole space in principle, but you abandon hopeless branches the moment you can prove they're hopeless.`),
  p(`If you ship real C++ you already have the mental model, you just call it something else: it's depth-first search with explicit state that you mutate on the way down and restore on the way up &#8212; the same shape as a transform stack you push before recursing into a scene node and pop afterward. Backtracking is DFS over a tree of <em>decisions</em>, and the &#8220;pop&#8221; is non-negotiable for the same reason it is in a render traversal: leave it out and one branch's state bleeds into its siblings.`),
  sub("The decision tree is the whole picture"),
  p(`Draw the search as a tree and everything clicks. Every <b>node</b> is a partial solution (&#8220;so far I've chosen these elements&#8221;). Every <b>edge</b> is one decision (&#8220;include the next element / skip it&#8221;, or &#8220;place the queen in column 3&#8221;). The <b>root</b> is the empty partial solution; the <b>leaves</b> are complete solutions (or dead ends). Running the algorithm <em>is</em> a depth-first walk over that tree: descend an edge to make a choice, recurse, and when you return, step back up that edge &#8212; the un-choose.`),
  svg("backtrack_tree","The subsets-of-[1,2,3] decision tree. Each of the three levels decides one element: the left edge skips it, the right edge takes it. Three binary decisions give 2&#179; = 8 leaves, and the eight leaves are exactly the eight subsets. Recording a complete solution means writing down the path when you reach a leaf."),
  p(`Seeing the tree tells you two things at once. First, <em>how big the search is</em>: the number of leaves is the size of the answer space, and it's almost always exponential &#8212; 2&#8319; for include/exclude problems, n! for orderings. Second, <em>where to cut</em>: if you can look at a node and prove no leaf beneath it can ever be valid, you delete that whole subtree instead of walking it. That deletion &#8212; <b>pruning</b> &#8212; is what turns an exponential blow-up into something that finishes.`),
  sub("The universal template"),
  p(`Almost every backtracking solution is the same four-part skeleton. Memorize this shape and most problems become a matter of filling in the blanks:`),
  ul([
    `<b>Base case</b> &#8212; the partial solution is complete (right length, target hit, board full). Record a copy of it and return.`,
    `<b>Choose</b> &#8212; make one decision: push an element onto the path, mark a cell used, place a queen.`,
    `<b>Recurse</b> &#8212; descend with that choice in place to extend the solution further.`,
    `<b>Un-choose</b> &#8212; undo that exact decision (pop the element, unmark the cell) so the next loop iteration starts from a clean slate.`,
  ]),
  code(`void backtrack(State& path, /* what's left to decide */) {
    if (isComplete(path)) {            // BASE CASE
        results.push_back(path);       // record a COPY of the finished solution
        return;
    }
    for (auto choice : optionsFrom(path)) {
        if (!isValid(choice)) continue;  // PRUNE: skip doomed branches early
        path.push_back(choice);          // CHOOSE
        backtrack(path, /* advanced */); // RECURSE deeper
        path.pop_back();                 // UN-CHOOSE: restore for the next sibling
    }
}`),
  svg("backtrack_undo","The choose / recurse / un-choose cycle operating on one shared path. You push a choice, recurse into the subtree it opens, then pop it to restore the path before the loop tries the next sibling. The pop is the entire pattern: skip it and the choice leaks sideways into every later branch."),
  note("📌","Why one shared, mutated path &#8212; not a fresh copy each call","You could pass the path <em>by value</em> so every recursive call gets its own copy; it'd be correct and you'd never need to un-choose. But that copy costs <b>O(path length)</b> at every single node, and there are exponentially many nodes &#8212; you'd pay an O(n) tax billions of times. The idiomatic version keeps <em>one</em> path as a reference (<code>vector&lt;int&gt;&amp; path</code>), mutates it on the way down, and restores it on the way up. The push/pop pair is O(1). That's why the un-choose exists: it's the price of not copying."),
  sub("Shape 1 &#8212; Subsets (the cleanest template)"),
  p(`Subsets is the purest backtracking problem because every element gets exactly one binary decision: <em>in or out</em>. There's no ordering to worry about and no target to hit &#8212; you just walk the include/exclude tree from the diagram, and <em>every node is itself a valid subset</em>, so you record the path at every step rather than only at the leaves. An <code>index</code> parameter tracks how deep you are; when it reaches the end, that branch is fully decided.`),
  worked("All subsets","Two recursive calls per element &#8212; one that takes nums[i], one that skips it &#8212; mirroring the two edges out of each node. We record the path on entry (so we capture the empty set and every partial set), then for each remaining element: choose it, recurse, un-choose. Note results takes a copy of path; path itself keeps mutating.",
`void dfs(const vector<int>& nums, int start,
         vector<int>& path, vector<vector<int>>& results) {
    results.push_back(path);              // every node is a valid subset -> record it
    for (int i = start; i < nums.size(); i++) {
        path.push_back(nums[i]);          // CHOOSE: include nums[i]
        dfs(nums, i + 1, path, results);  // RECURSE on the elements after i
        path.pop_back();                  // UN-CHOOSE: drop it, try the next i
    }
}

vector<vector<int>> subsets(const vector<int>& nums) {
    vector<vector<int>> results;
    vector<int> path;
    dfs(nums, 0, path, results);
    return results;
}`),
  idea("The start index is doing real work","Passing <code>i + 1</code> (not <code>start + 1</code>) into the recursion is what stops you from ever looking back at an earlier element. That single rule guarantees each subset is generated <em>once</em>, in sorted order, with no permuted duplicates like {1,2} and {2,1}. The same <code>start</code> discipline reappears in combinations below &#8212; it's the standard way to say &#8220;only consider elements from here forward.&#8221;"),
  sub("Shape 2 &#8212; Combinations &amp; combination sum (start index + pruning)"),
  p(`Combinations are subsets with a constraint &#8212; pick exactly <em>k</em> of <em>n</em>, or pick any number that <em>sum to a target</em>. The <code>start</code> index is the hero again: because order doesn't matter for a combination, you only ever extend forward from the last index you took, which kills the {2,1}-vs-{1,2} duplication for free. The twist in <em>combination sum</em> is <em>reuse</em>: if the same number may be used multiple times, you recurse with <code>i</code> instead of <code>i + 1</code> so the current element stays available.`),
  p(`This is also where pruning earns its keep. Sort the candidates first; then inside the loop, the moment the running sum would exceed the target you can <code>break</code> &#8212; not <code>continue</code>. Because the array is sorted, every later candidate is even larger, so if <em>this</em> one overshoots, all of them do, and the entire rest of the loop is a dead subtree you skip outright. That one <code>break</code> can chop the search by orders of magnitude.`),
  worked("Combination Sum (reuse allowed, with pruning)","Sort so we can prune. We recurse with i (not i + 1) so each number can be reused. The pruning is the break: once target - nums[i] < 0, this candidate and every larger one overshoot, so we abandon the whole tail. remain hitting exactly 0 is a complete solution; going negative is already cut off by the break.",
`void dfs(const vector<int>& nums, int start, int remain,
         vector<int>& path, vector<vector<int>>& results) {
    if (remain == 0) {                    // BASE CASE: exact target hit
        results.push_back(path);
        return;
    }
    for (int i = start; i < nums.size(); i++) {
        if (nums[i] > remain) break;      // PRUNE: sorted, so all later i overshoot too
        path.push_back(nums[i]);          // CHOOSE
        dfs(nums, i, remain - nums[i],    // RECURSE with i -> reuse nums[i] allowed
            path, results);
        path.pop_back();                  // UN-CHOOSE
    }
}

vector<vector<int>> combinationSum(vector<int> nums, int target) {
    sort(nums.begin(), nums.end());       // enables the break-prune
    vector<vector<int>> results;
    vector<int> path;
    dfs(nums, 0, target, path, results);
    return results;
}`),
  note("📌","Reuse vs no-reuse is a one-character change","Recurse with <code>i</code> and the current element stays in play &#8212; you can pick it again (combination sum). Recurse with <code>i + 1</code> and you move strictly past it &#8212; each element used at most once (subsets, &#8220;pick k&#8221;, combination-sum-II). Same loop, same prune, one digit different. Knowing which you need is the entire distinction between two whole problem families."),
  sub("Shape 3 &#8212; Permutations &amp; N-Queens (tracking used state)"),
  p(`Permutations break the start-index trick on purpose: here <em>order matters</em>, so {1,2,3} and {3,2,1} are different answers and you must be able to reach back to elements you skipped. You can't use a forward-only <code>start</code>; instead you carry a <code>used[]</code> array (or a visited set / a bitmask) that marks which elements are already in the current path. Each level loops over <em>all</em> elements, skipping the used ones &#8212; and the un-choose now has to clear the <code>used</code> flag as well as pop the path.`),
  worked("Permutations (used[] array)","Every level considers every element and skips the ones already placed. The choose/un-choose is now a pair of mutations: set used[i] + push, then pop + clear used[i]. When the path is full we've placed all n elements in some order, so record it. n! leaves, because the first level has n choices, the next n-1, and so on.",
`void dfs(const vector<int>& nums, vector<bool>& used,
         vector<int>& path, vector<vector<int>>& results) {
    if (path.size() == nums.size()) {     // BASE CASE: a full ordering
        results.push_back(path);
        return;
    }
    for (int i = 0; i < nums.size(); i++) {
        if (used[i]) continue;            // already in the current permutation
        used[i] = true; path.push_back(nums[i]);   // CHOOSE
        dfs(nums, used, path, results);            // RECURSE
        path.pop_back(); used[i] = false;          // UN-CHOOSE: pop AND unmark
    }
}

vector<vector<int>> permute(const vector<int>& nums) {
    vector<vector<int>> results;
    vector<int> path;
    vector<bool> used(nums.size(), false);
    dfs(nums, used, path, results);
    return results;
}`),
  note("👑","N-Queens is the same skeleton with smarter pruning","Place one queen per row, recursing row by row. The &#8220;used&#8221; state is three boolean sets &#8212; columns taken, and the two diagonal directions (a cell's <code>row + col</code> identifies one diagonal, <code>row - col</code> the other). Before placing, you check those three; if the square is attacked you <code>continue</code>. That constraint check is the pruning, and it's brutal: it discards the vast majority of the n&#8319; raw placements before you ever recurse, which is the only reason an 8-, 12-, even 14-queens board solves instantly. The choose/recurse/un-choose loop underneath is identical to permutations."),
  sub("Pruning is the whole game"),
  p(`Bear down on this, because it's what separates a solution that runs from one that times out. The raw decision tree is exponential and there is no asymptotic trick that changes that &#8212; you cannot make &#8220;generate all permutations&#8221; sub-factorial, because there <em>are</em> n! of them. What you <em>can</em> do is refuse to walk subtrees that can't contain a valid leaf. Every prune deletes an entire exponential sub-tree for the cost of one cheap test. The earlier and cheaper the test, the more you save:`),
  ul([
    `<b>Sort + break.</b> Order the candidates so that once one choice violates a monotone bound (sum exceeds target, value too large), every later sibling does too &#8212; then <code>break</code> the loop, not <code>continue</code>.`,
    `<b>Constraint checks.</b> N-Queens column/diagonal sets, sudoku row/col/box validity &#8212; test the move <em>before</em> recursing so you never descend into an already-broken board.`,
    `<b>Feasibility / remaining-budget bounds.</b> If even the best-case completion of this branch can't beat your target or fit the remaining slots, abandon it now.`,
  ]),
  sub("Avoiding duplicate results"),
  p(`When the input contains <em>repeated values</em>, the naive tree produces duplicate solutions &#8212; [1,2] generated twice because there were two indistinguishable 1's. The fix is a small, very common idiom: <b>sort first, then skip equal siblings at the same tree level.</b> Within one loop, if a candidate equals the previous candidate <em>and</em> that previous one wasn't the choice you just made on this level, skip it &#8212; otherwise you'd explore an identical subtree twice.`),
  code(`sort(nums.begin(), nums.end());
for (int i = start; i < nums.size(); i++) {
    if (i > start && nums[i] == nums[i - 1]) continue;  // skip duplicate SIBLINGS
    path.push_back(nums[i]);
    dfs(nums, i + 1, path, results);
    path.pop_back();
}`),
  idea("Read the i > start guard carefully","The condition is <code>i &gt; start &amp;&amp; nums[i] == nums[i-1]</code>, not just <code>nums[i] == nums[i-1]</code>. The <code>i &gt; start</code> part is essential: it permits the <em>first</em> occurrence of a repeated value to be chosen (so {1,1} is still reachable when there are two 1's), and only suppresses the <em>second-and-later</em> copies as siblings of the same parent. Drop the guard and you'd wrongly forbid legitimate repeats inside one combination."),
  pit("Forgetting to un-choose","The number-one backtracking bug. If you <code>push_back</code> but never <code>pop_back</code>, the choice leaks out of its subtree and pollutes every sibling and cousin branch &#8212; results come back too long, full of stray elements, and you'll stare at it for ages. The discipline: every mutation on the way down gets a matching reversal on the way up, in the <em>opposite</em> order. If you set a <code>used</code> flag <em>and</em> pushed, you must clear the flag <em>and</em> pop."),
  pit("Recording a reference instead of a copy","<code>results.push_back(path)</code> works because it copies the vector. If you instead stored a pointer or reference to the shared <code>path</code> (or moved it), every &#8220;saved&#8221; solution would alias the <em>same</em> mutating buffer, and by the end they'd all read identical (and wrong). When the recording line runs, you want a snapshot frozen in time &#8212; a value copy &#8212; not a live view of a vector you're about to mutate again."),
  pit("Mishandling duplicates &#8212; wrong level or wrong dedupe","Two classic slips: deduping by the wrong rule (using a per-call <code>set</code> when sort + skip-sibling is cleaner, or vice-versa), and forgetting the <code>i &gt; start</code> half of the guard so you also kill valid repeats. Decide up front whether reuse is allowed and whether the input has duplicates &#8212; those two questions fully determine which template you're writing."),
  note("🧠","Saying it out loud in the interview","Name the structure before you write a line: &#8220;This is generate-all, so it's backtracking &#8212; I'll do choose / recurse / un-choose over a decision tree.&#8221; Then state your two policy decisions: &#8220;elements reused or not&#8221; (i vs i+1) and &#8220;duplicates in the input&#8221; (sort + skip siblings). Then name your prune. Interviewers are listening for exactly that decomposition &#8212; template, policy, prune &#8212; and once you've said it, the code is mechanical."),
  cx(`Time is <b>exponential</b> by nature &#8212; <b>O(2&#8319; &#183; n)</b> for subsets, <b>O(n! &#183; n)</b> for permutations (the &#215;n is copying each finished path) &#8212; because the output itself is that large. Recursion depth and the shared path make space <b>O(n)</b> beyond the results. Pruning doesn't change the worst-case asymptotics; it's what makes the <em>typical</em> case finish, by deleting whole subtrees the bound can't change.`),
  {t:"probs",items:[["Subsets","subsets","med"],["Combination Sum","combination-sum","med"],["N-Queens","n-queens","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"11",id:"graphs",color:"#0EA5E9",title:"Graphs",badge:"Week 7 · Pattern",blocks:[
cue(`<b>Spot it when:</b> the input is a network of things connected to other things &#8212; cities and roads, people and friendships, web pages and links, course prerequisites &#8212; or a grid where cells touch their neighbors. The giveaway words are <em>connected</em>, <em>reachable</em>, <em>shortest</em>, <em>cycle</em>, <em>component</em>, and <em>"do X before Y."</em> The moment a problem is about <em>relationships between items</em> rather than the items in a line, you're in graph territory.`),
p(`A graph is the most general data structure there is: just <b>nodes</b> (also called vertices) and <b>edges</b> that connect pairs of them. Trees and linked lists are graphs with extra rules; an array of "who's next to whom" is a graph. Almost every graph interview problem reduces to the same two-step recipe &#8212; <em>pick a representation, then run a traversal</em> &#8212; so once those two moves are reflexive, the whole category gets a lot less scary.`),
p(`Three properties describe any graph, and naming them early in an interview shows you know what you're looking at. <b>Directed vs undirected:</b> does an edge go both ways (friendship) or just one (a one-way street, a "follows" relationship)? <b>Weighted vs unweighted:</b> does each edge carry a cost &#8212; a distance, a time, a price &#8212; or is every hop equal? <b>Cyclic vs acyclic:</b> can you follow edges and end up back where you started? These three questions decide which algorithm you reach for; answer them first.`),
sub("Representation: adjacency list vs matrix"),
p(`Before you can traverse a graph you have to store it, and the choice of storage is the first real decision. The workhorse is the <b>adjacency list</b>: for each node, keep the list of its direct neighbors. In C++ that's a <code>vector&lt;vector&lt;int&gt;&gt;</code> when nodes are numbered <code>0..n-1</code>, or an <code>unordered_map&lt;T, vector&lt;T&gt;&gt;</code> when they're labelled with strings or arbitrary values. To visit a node's neighbors you just walk its list.`),
svg("graphs_adjlist","An undirected graph and its adjacency list. Node 1 connects to 0, 2, and 3, so adj[1] = {0, 2, 3}. For an undirected edge you add it in both directions; for a directed edge, only one."),
p(`The alternative is an <b>adjacency matrix</b>: an <code>n&#215;n</code> grid where <code>m[i][j]</code> is <code>1</code> (or the edge weight) if an edge exists, else <code>0</code>. It answers "is there an edge from i to j?" in O(1), which is occasionally what you need. But it always costs O(V&#178;) space whether the graph is dense or nearly empty, and iterating one node's neighbors means scanning a whole row of mostly zeros. For the sparse graphs that dominate interviews &#8212; where each node has only a handful of edges &#8212; the adjacency list wins on both memory and traversal speed.`),
note("📌","Which one, and when",`Default to the <b>adjacency list</b>. It's O(V + E) space and lets a traversal touch each edge exactly once. Reach for the <b>matrix</b> only when the graph is dense (E approaches V&#178;), when you need constant-time "is there an edge?" lookups, or when the problem literally hands you a matrix already. In a real game engine you've already made this trade a hundred times &#8212; a navmesh adjacency list vs a tile-based grid &#8212; it's the same instinct here.`),
sub("Grids are graphs in disguise"),
p(`This is the single most useful reframe in the whole topic, because a huge fraction of "graph" interview problems never mention the word graph &#8212; they hand you a 2D grid. The trick: <em>every cell is a node, and its edges are its neighbors.</em> Usually that means the four orthogonal neighbors (up, down, left, right); sometimes eight if diagonals count. You don't build an adjacency list at all &#8212; the grid <em>is</em> the adjacency structure, and you compute neighbors on the fly with a direction table.`),
code(`// the standard 4-direction trick: pair each dr with the matching dc
int dr[] = {-1, 1, 0, 0};        // up, down, stay, stay
int dc[] = {0, 0, -1, 1};        // stay, stay, left, right

for (int d = 0; d < 4; d++) {
    int nr = r + dr[d];          // neighbor row
    int nc = c + dc[d];          // neighbor col
    if (nr < 0 || nr >= rows) continue;   // off the top/bottom -> skip
    if (nc < 0 || nc >= cols) continue;   // off the sides -> skip
    // (nr, nc) is a valid neighbor cell -> treat it like an edge
}`),
p(`Internalize this little loop. "Islands," "rotting oranges," "flood fill," "shortest path in a maze," "surrounded regions" &#8212; they're all the same grid-as-graph traversal with different bookkeeping. Once you see the cells-as-nodes mapping, you write the same BFS or DFS you'd write for any graph.`),
sub("BFS — breadth-first, the queue, shortest paths"),
p(`<b>Breadth-first search</b> explores the graph in <em>rings</em>: first the source, then everything one hop away, then everything two hops away, and so on. You manage this with a <b>queue</b> (<code>std::queue</code>): dequeue a node, enqueue all its unvisited neighbors, repeat until the queue empties. Because you finish an entire "level" before touching the next one, the first time BFS reaches a node it has reached it by the <em>fewest possible hops</em>.`),
svg("graphs_bfs","BFS fans out from the source in concentric frontiers. Everything at level 1 is one edge away; level 2 is two edges away. The level a node is discovered on equals its shortest-path distance from the source &#8212; which is exactly why BFS solves unweighted shortest path."),
p(`That last sentence is the whole reason BFS matters: <b>in an unweighted graph, BFS finds the shortest path.</b> Every edge counts as one step, the rings grow by exactly one step each, so the level at which a node first appears <em>is</em> its minimum distance from the source. If an interviewer says "fewest moves," "shortest sequence," "minimum number of steps" on an unweighted graph or grid, BFS is the answer almost every time. (If the edges have <em>weights</em>, BFS breaks &#8212; that's Dijkstra's job, below.)`),
note("📌","Mark visited at enqueue time, not dequeue time",`This is the BFS subtlety interviewers probe for. You must mark a node <code>visited</code> the moment you <em>enqueue</em> it &#8212; not when you later dequeue it. If you wait until dequeue, the same node can be enqueued many times before it's first processed (every neighbor that sees it adds another copy), which bloats the queue and can flip the algorithm from O(V + E) toward exponential. The rule: <em>a node enters the queue exactly once, and you flip its visited flag at that instant.</em>`),
worked("Shortest path in an unweighted grid (BFS)","The canonical BFS: a queue of cells plus a distance, marking visited at enqueue. The first time we pop the target, its stored distance is the shortest. Note the visited mark happens right as we push the neighbor &#8212; never after popping.",
`int shortestPath(const vector<vector<int>>& grid,
                 pair<int,int> start, pair<int,int> goal) {
    int rows = grid.size(), cols = grid[0].size();
    vector<vector<bool>> visited(rows, vector<bool>(cols, false));
    queue<tuple<int,int,int>> q;             // {row, col, distance}

    auto [sr, sc] = start;
    q.push({sr, sc, 0});
    visited[sr][sc] = true;                  // mark AT enqueue, not dequeue

    int dr[] = {-1, 1, 0, 0}, dc[] = {0, 0, -1, 1};
    while (!q.empty()) {
        auto [r, c, dist] = q.front(); q.pop();
        if (make_pair(r, c) == goal) return dist;   // first hit = shortest
        for (int d = 0; d < 4; d++) {
            int nr = r + dr[d], nc = c + dc[d];
            if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
            if (visited[nr][nc] || grid[nr][nc] == 1) continue;  // wall or seen
            visited[nr][nc] = true;          // mark the instant we enqueue
            q.push({nr, nc, dist + 1});
        }
    }
    return -1;                               // goal unreachable
}`),
sub("DFS — depth-first, recursion or a stack, connectivity"),
p(`<b>Depth-first search</b> does the opposite of BFS: instead of fanning out evenly, it plunges down one path as far as it can go, then backtracks and tries the next branch. You can write it two ways. The natural form is <em>recursion</em> &#8212; visit a node, then recurse into each unvisited neighbor &#8212; which leans on the call stack you met in the Stack lesson. The explicit form swaps the call stack for your own <code>std::stack</code> and loops. Same traversal, different bookkeeping.`),
p(`DFS is the tool for <em>connectivity</em> questions: is everything reachable from here? How many separate <b>connected components</b> are there? Which cells form one blob? Because DFS commits fully to a region before moving on, it naturally "floods" a connected area &#8212; which is exactly what flood fill and island-counting need. BFS could do these too (any traversal that visits everything reachable works), but DFS is usually the shorter code for "explore this whole region."`),
worked("Number of Islands (grid DFS / flood fill)","Walk every cell; each time we find unvisited land, that's a new island, and a DFS sinks the entire connected blob so we never count it twice. We mark visited by overwriting the cell to '0' in place &#8212; the classic flood-fill trick that saves a separate visited array.",
`int numIslands(vector<vector<char>>& grid) {
    int rows = grid.size(), cols = grid[0].size(), count = 0;

    function<void(int,int)> sink = [&](int r, int c) {
        if (r < 0 || r >= rows || c < 0 || c >= cols) return; // off-grid
        if (grid[r][c] != '1') return;       // water or already-sunk land
        grid[r][c] = '0';                     // mark visited by sinking it
        sink(r - 1, c); sink(r + 1, c);       // flood the 4 neighbors
        sink(r, c - 1); sink(r, c + 1);
    };

    for (int r = 0; r < rows; r++)
        for (int c = 0; c < cols; c++)
            if (grid[r][c] == '1') {          // fresh, unvisited land
                count++;                      // a brand-new island
                sink(r, c);                   // remove its whole body
            }
    return count;
}`),
idea("Why the visited set is non-negotiable",`Both BFS and DFS <em>must</em> track which nodes they've already seen, because real graphs have cycles &#8212; follow the edges and you loop back. Without a <code>visited</code> set you revisit nodes forever (infinite loop) or, on a branchy graph, re-explore the same subtrees exponentially. The visited check is what bounds the work to O(V + E): each node is processed once, each edge inspected a constant number of times. In the islands solution above, overwriting <code>'1'</code> to <code>'0'</code> <em>is</em> the visited set &#8212; a sunk cell can never be re-entered.`),
sub("Topological sort — ordering by dependencies"),
p(`Some graphs encode <em>"this must happen before that"</em>: course prerequisites, build targets, task schedules, package installs. A directed edge <code>A &#8594; B</code> means "A before B." A <b>topological sort</b> produces a linear ordering of all nodes that respects every such edge &#8212; a valid order to do the work. It only exists if the graph is a <b>DAG</b> (directed acyclic graph); a <em>cycle</em> means a circular dependency ("A needs B, B needs A"), and then no valid order exists at all. Detecting that cycle is itself the answer to a whole class of problems &#8212; <em>Course Schedule</em> is exactly "is this a DAG?"`),
p(`The cleanest approach is <b>Kahn's algorithm</b>, which is just BFS driven by <em>in-degrees</em>. The in-degree of a node is how many edges point <em>into</em> it &#8212; how many prerequisites it still has unsatisfied. Start by enqueueing every node with in-degree 0 (no prerequisites). Each time you pop one, "complete" it: decrement the in-degree of each node it points to, and enqueue any that just hit zero. If you manage to output all <code>n</code> nodes this way, you found a valid order; if you get stuck with nodes still un-output, those nodes form a cycle.`),
worked("Course Schedule (cycle detection via Kahn's BFS)","Build the graph and in-degree array from the prerequisite pairs, queue everything with no prerequisites, then peel nodes off layer by layer. If we manage to finish all n courses, there's no cycle; if some never reach in-degree 0, they're stuck in a dependency loop.",
`bool canFinish(int n, const vector<vector<int>>& prereqs) {
    vector<vector<int>> adj(n);              // adj[a] = courses that need a first
    vector<int> indeg(n, 0);                 // indeg[b] = how many prereqs b has
    for (const auto& p : prereqs) {          // p = {course, prereq}: prereq -> course
        adj[p[1]].push_back(p[0]);
        indeg[p[0]]++;
    }

    queue<int> q;
    for (int i = 0; i < n; i++)
        if (indeg[i] == 0) q.push(i);        // start with the no-prereq courses

    int done = 0;
    while (!q.empty()) {
        int course = q.front(); q.pop();
        done++;                              // this course is now satisfiable
        for (int next : adj[course])
            if (--indeg[next] == 0)          // one prereq cleared; all cleared?
                q.push(next);                // -> it's ready, queue it
    }
    return done == n;                        // finished all -> no cycle -> valid
}`),
note("📌","The DFS alternative: post-order",`Topological sort can also be done with DFS: run DFS, and as each node <em>finishes</em> (all its descendants explored), push it onto a list; the <em>reverse</em> of that finish order is a valid topological ordering. To detect cycles this way you track nodes currently <em>on the recursion stack</em> &#8212; revisiting one of those means a back-edge, i.e. a cycle. Kahn's is usually easier to reason about under interview pressure (no recursion-color bookkeeping), but knowing both, and that they're equivalent, is the senior-level answer.`),
sub("Awareness level: Dijkstra and Union-Find"),
p(`Two more tools are worth recognizing by name even if you don't implement them cold. <b>Dijkstra's algorithm</b> is BFS's weighted cousin: when edges carry positive costs and you want the cheapest path, you replace the plain queue with a <b>min-heap</b> (<code>priority_queue</code>) so you always expand the closest-so-far node next. The mental tag: <em>"unweighted shortest path &#8594; BFS; weighted shortest path &#8594; Dijkstra with a heap."</em>`),
p(`<b>Union-Find</b> (a disjoint-set union, or DSU) is a tiny structure for the question "are these two nodes in the same connected group?" answered nearly in O(1). You <code>union</code> two nodes to merge their groups and <code>find</code> a node's group representative; with path compression it's almost constant time. It shines for incremental connectivity &#8212; counting components as edges are added, detecting whether adding an edge closes a cycle (Kruskal's MST, "redundant connection"). You don't need it for the three problems below, but when a problem is purely "group these and ask who's connected," DSU is often the cleanest tool.`),
sub("Common pitfalls"),
pit("No visited set &#8594; infinite loop or exponential blowup",`The number-one graph bug. Any graph with a cycle will trap an unguarded traversal forever; even an acyclic-but-branchy graph re-explores shared subtrees exponentially. Always have a <code>visited</code> structure &#8212; a <code>vector&lt;bool&gt;</code>, an <code>unordered_set</code>, or an in-place marker like sinking grid cells to <code>'0'</code> &#8212; and check it before you recurse or enqueue.`),
pit("BFS: marking visited at dequeue instead of enqueue",`If you mark a node visited only when you pop it, every neighbor that sees it will push another copy first. The queue fills with duplicates, you do redundant work, and the clean O(V + E) bound is gone. Flip the visited flag at the <em>moment you enqueue</em>, so each node enters the queue exactly once.`),
pit("Off-by-one / out-of-bounds on grid neighbors",`The four-direction loop is where boundary bugs live. Check <code>nr/nc</code> against <code>[0, rows)</code> and <code>[0, cols)</code> <em>before</em> indexing the grid &#8212; an unchecked <code>grid[nr][nc]</code> at the edge is undefined behavior, not a clean error. Order matters: bounds-check first, <em>then</em> look at the cell's contents.`),
pit("Deep DFS recursion blows the call stack",`Callback to the Stack lesson: recursion <em>is</em> the call stack, and a DFS on a graph with hundreds of thousands of nodes (a long grid corridor, a degenerate chain) can overflow it and crash. On large inputs, convert the recursive DFS to an iterative one with an explicit <code>std::stack</code> &#8212; same traversal, but the stack lives on the heap where it can grow. Or use BFS, whose queue has the same protection.`),
idea("The interview framing",`Narrate the recipe out loud: <em>"This is a graph &#8212; nodes are the cells, edges are the four neighbors. I want the fewest steps, so I'll BFS from the source, marking visited at enqueue, and the first time I reach the goal that distance is the answer; it's O(V + E)."</em> Stating the representation, the traversal choice with its reason, the visited discipline, and the complexity &#8212; in one breath, before writing code &#8212; is exactly what reads as fluency to an interviewer.`),
cx(`Both BFS and DFS visit every node once and every edge a constant number of times, so a traversal is <b>O(V + E)</b> time. Space is <b>O(V)</b> for the visited set plus the queue or recursion stack. An adjacency list is <b>O(V + E)</b> space; a matrix is <b>O(V&#178;)</b>.`),
{t:"probs",items:[["Number of Islands","number-of-islands","med"],["Course Schedule","course-schedule","med"],["Word Ladder","word-ladder","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"12",id:"dp",color:"#84CC16",title:"Dynamic Programming",badge:"Week 8 · Pattern",blocks:[
  cue(`<b>Spot it when:</b> the question asks for a <em>min / max / longest / count of ways</em>, you make a <em>choice at each step</em> (take it or skip it, this coin or that one), and a brute-force solution would keep recomputing the same smaller problem. That last tell is the real one: if your recursion solves <code>f(3)</code> over and over, you're looking at dynamic programming.`),
  p(`Dynamic programming sounds intimidating and isn't. Strip the name away and it's one idea: <em>solve each smaller subproblem exactly once, remember the answer, and build the big answer out of the small ones.</em> No clever data structure, no trick &#8212; just recursion with a memory. The reason it has a reputation is that the hard part isn't the code (the loop is usually four lines); it's <em>defining the subproblem</em>. Get the definition right and the rest is mechanical. This is the topic most worth slowing down on, because the payoff is recognizing a whole family of problems as the same problem.`),
  sub("The two preconditions: when DP even applies"),
  p(`DP works on a problem only when two things are true. First, <b>overlapping subproblems</b>: the same smaller problem comes up again and again as you break the big one down. (If every subproblem were distinct, caching would buy you nothing &#8212; that's plain divide-and-conquer, like merge sort.) Second, <b>optimal substructure</b>: the best answer to the whole is built out of the best answers to its parts. The cheapest way to make 11 cents is one coin plus the cheapest way to make the remaining amount &#8212; the optimal big answer reuses optimal small answers. When both hold, you can compute each subproblem once and combine.`),
  ul([
    `<b>Overlapping subproblems</b> &#8594; caching pays off. The naive recursion revisits the same inputs; storing them collapses exponential work to polynomial.`,
    `<b>Optimal substructure</b> &#8594; the recurrence is valid. You can express the answer for size <code>n</code> in terms of answers for smaller sizes, and combining optimal parts gives an optimal whole.`,
    `<b>Missing either?</b> It's not DP. No overlap means divide-and-conquer; no optimal substructure (the parts interfere) means you may need a different technique entirely.`,
  ]),
  sub("The recipe: four questions, in order"),
  p(`Every DP problem yields to the same four-step ritual. Interviewers want to <em>hear</em> you walk through it &#8212; narrating these steps out loud is half the signal. The order matters: each answer constrains the next.`),
  ul([
    `<b>1. Define the subproblem in one sentence.</b> "<code>dp[i]</code> = the best answer using the first <code>i</code> items," or "<code>dp[i]</code> = the best answer <em>ending at</em> index <code>i</code>." If you can't say it in one clean sentence, stop &#8212; a fuzzy definition is the #1 cause of a wrong solution.`,
    `<b>2. Find the recurrence.</b> How is <code>dp[i]</code> built from earlier <code>dp</code> values? Almost always it's a <em>choice</em>: take this item or skip it, use this coin or don't &#8212; take the min/max/sum over the options.`,
    `<b>3. Set the base cases.</b> The smallest inputs you can answer with no recursion: <code>dp[0]</code>, an empty string, amount zero. Get these wrong and the whole table is poisoned.`,
    `<b>4. Decide the iteration order.</b> Fill the table so that every value a cell needs is already computed when you reach it. For 1D that's usually just left-to-right; for 2D it's row-by-row.`,
  ]),
  note(`&#128205;`,"Subproblem definition is the whole game",`If you take one thing from this lesson: <b>nail the subproblem sentence before writing any code.</b> "<code>dp[amount]</code> = the minimum number of coins that sum to exactly <code>amount</code>" is a good definition &#8212; precise, one number per state, obviously composable. "<code>dp[i]</code> = something about the array up to <code>i</code>" is a bad one, because "something" hides the bug. Nearly every failed DP attempt traces back to a definition that was ambiguous or didn't actually compose. Spend your time here.`),
  sub("Memoization vs tabulation: same idea, two directions"),
  p(`Once you have a recurrence, there are two ways to realize it, and they compute identical values &#8212; just in opposite order. <b>Memoization</b> (top-down) is the natural one: write the plain recursion exactly as the recurrence reads, then add a cache so each input is computed once. <b>Tabulation</b> (bottom-up) flips it: start from the base cases and fill a table iteratively until you reach the answer. Top-down is easier to <em>derive</em> (it's just your recursion plus a map); bottom-up is usually faster and avoids deep call stacks, and it's what unlocks the space optimizations below.`),
  ul([
    `<b>Memoization (top-down).</b> Recurse as the recurrence dictates; before doing work, check a cache; after computing, store the result. You only ever fill the subproblems you actually reach.`,
    `<b>Tabulation (bottom-up).</b> Allocate the table, seed the base cases, loop in dependency order filling each cell from earlier ones. You fill every cell, but with no recursion overhead.`,
    `<b>Which to use?</b> Reach for memoization first in an interview &#8212; it's the most direct translation of your recurrence and the hardest to get wrong. Convert to tabulation if you need the speed or the space trick.`,
  ]),
  sub("Always start from the brute force"),
  p(`Here's the workflow that never fails you under pressure: <b>write the plain recursive brute force first, confirm it's correct, then add a cache.</b> Don't try to invent the table directly &#8212; that's where people freeze. The brute force <em>is</em> the recurrence written as code; once it's right, memoizing is a two-line edit. And the contrast between the two makes the payoff vivid. Take Fibonacci, the canonical example. The naive recursion recomputes the same values an exponential number of times:`),
  code(`// Naive: correct, but recomputes everything. O(2^n) time.
long long fib(int n) {
    if (n <= 1) return n;                 // base cases
    return fib(n - 1) + fib(n - 2);       // the recurrence
}`),
  p(`Recall the recursion-tree picture from the Big-O lesson: this tree branches two ways at every level and is <code>n</code> deep, so it has on the order of <code>2&#8319;</code> nodes &#8212; and most of them recompute a value that was already computed elsewhere in the tree. <code>fib(50)</code> launches over a billion calls. The diagram below shows the overlap: <code>fib(3)</code> shows up twice, <code>fib(2)</code> three times, all redone from scratch.`),
  svg("dp_memo","The recursion tree for fib(5). The same subproblems recur all over the tree &#8212; fib(3) twice, fib(2) three times &#8212; and naive recursion redoes each one. A memo computes each value exactly once, collapsing O(2^n) to O(n)."),
  worked("Climbing Stairs / Fibonacci: brute force &#8594; memo &#8594; O(1) space","The same recurrence, three ways. Climbing Stairs is literally Fibonacci: the ways to reach step n = ways to reach n-1 (take 1 step) + ways to reach n-2 (take 2). First memoize the brute force; then notice you only ever read the last two values, so you can throw the whole array away.",
`// (1) Top-down memo: the brute force plus a cache. O(n) time, O(n) space.
long long climbMemo(int n, vector<long long>& memo) {
    if (n <= 2) return n;                  // 1 way to step 1, 2 ways to step 2
    if (memo[n] != -1) return memo[n];     // already solved -> reuse
    memo[n] = climbMemo(n - 1, memo) + climbMemo(n - 2, memo);
    return memo[n];
}

// (2) Bottom-up table: same values, filled iteratively. O(n) time, O(n) space.
int climbTable(int n) {
    if (n <= 2) return n;
    vector<int> dp(n + 1);
    dp[1] = 1; dp[2] = 2;                  // base cases
    for (int i = 3; i <= n; i++)
        dp[i] = dp[i - 1] + dp[i - 2];     // each step from the two before it
    return dp[n];
}

// (3) Rolling variables: only the last two values are ever needed. O(1) space.
int climbOptimal(int n) {
    if (n <= 2) return n;
