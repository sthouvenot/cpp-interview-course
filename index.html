  idea("Say it like this",`"C++ has four named casts so the risk is visible in the source. <code>static_cast</code> for related-type and numeric conversions I can prove are right, including down-casts with no runtime check. <code>dynamic_cast</code> for a down-cast I <em>can't</em> prove, in a polymorphic hierarchy &#8212; it's runtime-checked, returning <code>nullptr</code> for pointers or throwing <code>std::bad_cast</code> for references. <code>const_cast</code> only to add or strip const for a const-incorrect API &#8212; and writing through one that was originally const is undefined behavior. <code>reinterpret_cast</code> for raw bit reinterpretation at the hardware layer, mindful of strict aliasing. I avoid C-style <code>(T)x</code> because it silently tries all of these and picks whatever compiles, hiding intent. On const: a <code>const</code> member function promises not to mutate and is the only kind callable on a <code>const</code> object, which is why I mark every non-mutating method <code>const</code> and overload <code>operator[]</code> on constness. And <code>auto</code> deduces a value &#8212; it drops references and top-level const, so I write <code>auto&amp;</code> or <code>const auto&amp;</code> when I want the alias &#8212; whereas <code>decltype</code> preserves the exact declared type, which is what generic forwarding code needs."`)
]},
{group:"C++ Deep Dives",num:"‖",id:"concurrency",color:"#06B6D4",title:"Concurrency & Multithreading",badge:"C++ deep dive",blocks:[
  cue(`Concurrency is the C++ topic where a game-engine background is pure advantage &#8212; you've shipped job systems and worried about cache lines, so you already <em>feel</em> what the standard library is formalizing. The interview job is to put precise vocabulary on that instinct: what a data race actually is (undefined behavior, not just a wrong number), when an <code>atomic</code> is enough and when you need a <code>mutex</code>, how deadlock arises and how lock ordering kills it, and why two counters on one cache line can quietly halve your throughput. Get those cold and the whole multithreading question set is yours.`),
  p(`Threads exist for two reasons, and it's worth separating them. The first is <b>parallelism</b>: a modern CPU has many cores, and a single thread uses exactly one of them. To turn an 8-core machine's worth of silicon into 8&#215; throughput &#8212; updating thousands of entities, baking lightmaps, running physics islands &#8212; you split the work across threads that run <em>genuinely at the same time</em>. The second is <b>concurrency for latency hiding</b>: even on one core, while one thread blocks on I/O (a disk read, a network packet, a stream load), another can do useful work instead of the program sitting idle. Parallelism is about using more cores; concurrency is about not stalling. Threads serve both.`),
  p(`The catch is that the moment two threads touch the same memory, you've left the comfortable world where the program does one thing at a time. Reads and writes from different threads can interleave in any order the hardware and compiler choose, and unless you've explicitly <em>synchronized</em> them, the result is not just unpredictable &#8212; it's undefined. Most of this lesson is about the small set of tools C++ gives you to impose order: <code>mutex</code>, <code>condition_variable</code>, <code>atomic</code>, and the memory model underneath them.`),
  sub("std::thread — spawning and joining"),
  p(`A <code>std::thread</code> starts running the instant you construct it, given any callable &#8212; a function pointer, a lambda, a functor &#8212; plus its arguments. From that point on, the new thread and the one that spawned it run independently. The one rule you must never forget: before a <code>std::thread</code> object is destroyed, you must <b>join</b> it (block until it finishes) or <b>detach</b> it (cut it loose to run on its own). Destroy a still-<em>joinable</em> thread and the runtime calls <code>std::terminate</code> &#8212; your whole process dies on the spot. This is deliberate: the language refuses to silently leak a running thread or silently kill one mid-work, so it forces you to state your intent.`),
  code(`#include <thread>

void work(int id) { /* ... runs on its own thread ... */ }

std::thread t(work, 7);     // starts immediately, passes 7 as the argument
// ... the spawning thread keeps going in parallel ...
t.join();                   // block here until t finishes (the usual choice)
// t.detach();              // alternative: let it run unsupervised, no join needed
// if t is destroyed while still joinable -> std::terminate()`),
  note(`&#128221;`,`join vs detach &#8212; and why RAII threads exist`,`<b>join</b> is what you want almost always: it makes the parent wait for the child, so the child's results are ready and its lifetime is bounded. <b>detach</b> says "I never need to wait for this" &#8212; fire-and-forget &#8212; but now the thread may outlive the data it captured by reference, which is its own footgun. Because forgetting to join is so easy (an early <code>return</code> or a thrown exception skips your <code>t.join()</code>), C++20 added <code>std::jthread</code>: an RAII thread that <em>joins itself in its destructor</em>. That's the RAII lesson applied to threads &#8212; tie the join to scope exit so it can't-not-happen.`),
  sub("The data race — the bug at the center of everything"),
  p(`Here's the precise definition, because interviewers want the precise definition. A <b>data race</b> occurs when two threads access the same memory location, <em>at least one access is a write</em>, and there's <em>no synchronization</em> ordering them. In C++ a data race is <b>undefined behavior</b> &#8212; full stop. This is the single most important sentence in the topic. It does not mean "you get a slightly wrong number." It means the standard places no constraints on what your program does: it may produce garbage, it may crash, it may work for a year and then corrupt memory in production, and the optimizer is allowed to assume races never happen and rewrite your code accordingly.`),
  p(`The canonical example is two threads each incrementing one shared <code>int</code>. <code>counter++</code> looks atomic but isn't &#8212; it's three steps: read the value into a register, add one, write it back. Let two threads run that on the same variable and their three-step sequences interleave. Both read 41, both compute 42, both write 42 &#8212; two increments, but the counter only moved by one. An update was <em>lost</em>. Run it a million times and the final total is some unpredictable number well below two million.`),
  svg("concurrency_race","Left: two threads run the read-modify-write of <code>counter++</code> and their steps interleave &#8212; both read 41, both write 42, so one of the two increments vanishes. This isn't merely a wrong count; an unsynchronized write is undefined behavior. Right: a mutex forces the whole read-modify-write to happen as one indivisible turn, so B starts from the value A actually wrote."),
  worked("The race, and the mutex that fixes it","The top function has a genuine data race: two threads write <code>counter</code> with no synchronization, so the result is both wrong and undefined. The fix wraps the increment in a critical section guarded by a <code>std::mutex</code>. <code>lock_guard</code> is RAII: it locks on construction and unlocks in its destructor, so the lock is released at the closing brace &#8212; on every path, including an exception thrown inside the section.",
`#include <mutex>
#include <thread>

long counter = 0;

// BROKEN: data race -> undefined behavior, lost updates
void raceVersion() {
    for (int i = 0; i < 100000; ++i)
        ++counter;              // unsynchronized read-modify-write on shared memory
}

std::mutex m;

// CORRECT: the increment is a critical section, one thread at a time
void safeVersion() {
    for (int i = 0; i < 100000; ++i) {
        std::lock_guard<std::mutex> lk(m);   // locks here (RAII)
        ++counter;                            // exactly one thread inside at a time
    }                                         // lk's dtor unlocks m here, always
}`),
  p(`Notice the shape: <code>lock_guard</code> is the exact same RAII idea as a smart pointer, just applied to a lock instead of memory. You never call <code>m.unlock()</code> by hand &#8212; leaving the scope releases it, so the "returned early and forgot to unlock &#8594; deadlock" bug simply can't happen. When you need to lock and unlock at finer granularity (or hand the lock to a <code>condition_variable</code>, below), reach for <code>std::unique_lock</code> instead &#8212; same RAII guarantee, but it can be unlocked, relocked, and moved.`),
  note(`&#128221;`,`A mutex protects a critical section, not "a variable"`,`The mental model that keeps you out of trouble: a mutex doesn't guard data, it guards <em>code</em>. Everything you do while holding the lock happens with no other lock-holder interleaving &#8212; that's the critical section. The discipline is "every access to this shared state, read or write, takes the same lock." A reader that skips the lock because "I'm only reading" still races with a writer. One lock, every access, no exceptions.`),
  sub("Deadlock — when locking goes wrong"),
  p(`Locks solve races but introduce a new failure mode: <b>deadlock</b>. The classic recipe needs two locks and two threads. Thread A locks mutex 1 and then tries to lock mutex 2; Thread B, at the same moment, locks mutex 2 and then tries to lock mutex 1. Now A is blocked waiting for 2 (which B holds) and B is blocked waiting for 1 (which A holds). Each is waiting for a resource the other won't release until it finishes &#8212; which it never will. The threads are frozen forever, the program hangs, and there's no crash to point you at the cause.`),
  svg("concurrency_deadlock","Left: A holds Lock 1 and wants Lock 2; B holds Lock 2 and wants Lock 1. The hold-and-wait arrows form a cycle, and a cycle is exactly a deadlock &#8212; neither thread can advance. Right: if every thread always acquires Lock 1 before Lock 2, there's no way to form the cycle, so the deadlock is structurally impossible."),
  p(`The root cause is always the same: threads acquire multiple locks in <em>inconsistent orders</em>, which lets a wait-cycle form. There are two clean fixes, and naming both is a strong answer:`),
  ul([
    `<b>Consistent lock ordering.</b> Pick a global order for your locks and have <em>every</em> thread acquire them in that order. If everyone grabs Lock 1 before Lock 2, no thread can hold 2 while waiting for 1, so the cycle can't form. This is the discipline that scales to large codebases.`,
    `<b>Take them atomically.</b> When you genuinely need two locks at once, don't acquire them one at a time &#8212; use <code>std::scoped_lock</code> (C++17), which locks all the mutexes you hand it using a deadlock-avoidance algorithm and unlocks them all (RAII) at scope exit. <code>std::lock(m1, m2)</code> is the pre-17 equivalent. Either way, there's no in-between state where you hold one and wait for the other.`,
  ]),
  worked("Deadlock, and the scoped_lock fix","The top pair of functions deadlocks under the wrong timing: <code>transfer</code> locks <code>a</code> then <code>b</code>, while a concurrent reverse transfer locks <code>b</code> then <code>a</code> &#8212; opposite orders, so they can form a cycle and freeze. The fix grabs both mutexes in one <code>scoped_lock</code>, which takes them atomically with deadlock avoidance, so order no longer matters and no cycle can form.",
`#include <mutex>

std::mutex mA, mB;

// BROKEN: inconsistent lock order -> possible deadlock
void transfer() {
    std::lock_guard<std::mutex> l1(mA);   // locks mA first...
    std::lock_guard<std::mutex> l2(mB);   // ...then mB
    // ... another thread doing the reverse locks mB then mA -> deadlock
}

// CORRECT: take both at once, atomically, deadlock-free
void transferSafe() {
    std::scoped_lock lk(mA, mB);          // locks BOTH with deadlock avoidance
    // ... critical section touching both ...
}                                          // both unlocked here (RAII)`),
  sub("std::condition_variable — producer / consumer"),
  p(`Mutexes give you mutual exclusion, but they don't let one thread <em>wait for a condition</em> to become true without burning the CPU. The naive approach &#8212; loop checking a flag while holding nothing useful &#8212; is a "busy-wait" that pins a core spinning. A <b>condition variable</b> is the tool for "sleep until something I care about happens, then wake up." The textbook use is a producer/consumer queue: producers push work and notify; consumers wait until the queue is non-empty, then pop.`),
  p(`Three rules make condition variables correct, and all three come up in interviews. First, you always pair the cv with a <code>mutex</code> and wait under a <code>unique_lock</code> &#8212; the cv atomically releases the lock while sleeping and re-acquires it on wake, so there's no gap for a missed update. Second, you wait on a <b>predicate in a loop</b>, not a bare wake-up: <code>cv.wait(lk, []{ return !queue.empty(); })</code>. This is non-negotiable because of <em>spurious wakeups</em> &#8212; a thread can return from <code>wait</code> without anyone notifying it, so you must re-check the actual condition and go back to sleep if it's still false. Third, the producer calls <code>notify_one</code> (wake one waiter) or <code>notify_all</code> (wake all) after changing the shared state.`),
  worked("A producer/consumer queue","The consumer waits on a predicate &#8212; <code>wait</code> sleeps, releasing the lock, and only returns when <code>!q.empty()</code> is genuinely true, so spurious wakeups are handled for free by the loop the predicate form hides. The producer pushes under the lock and notifies.",
`#include <queue>
#include <mutex>
#include <condition_variable>

std::queue<int> q;
std::mutex m;
std::condition_variable cv;

void producer(int item) {
    {
        std::lock_guard<std::mutex> lk(m);
        q.push(item);                       // mutate shared state under the lock
    }
    cv.notify_one();                        // wake one waiting consumer
}

int consumer() {
    std::unique_lock<std::mutex> lk(m);     // unique_lock: cv can release/reacquire it
    cv.wait(lk, []{ return !q.empty(); });  // sleep until predicate true (loops internally)
    int item = q.front();                   // guaranteed non-empty here
    q.pop();
    return item;
}                                            // lock released at scope exit`),
  pit("Always wait on a predicate, never a bare wait()","A plain <code>cv.wait(lk)</code> with no predicate is a bug magnet. Two ways it bites: a <em>spurious wakeup</em> returns from <code>wait</code> with the condition still false, and a <em>lost wakeup</em> happens if the producer notifies in the window before the consumer started waiting. The predicate overload &#8212; <code>cv.wait(lk, pred)</code> &#8212; fixes both: it checks the predicate before sleeping and re-checks after every wake, looping until it's actually true. If you ever write the no-predicate form, you must wrap it in your own <code>while (!condition) cv.wait(lk);</code> by hand."),
  sub("std::atomic — lock-free for simple shared state"),
  p(`A mutex is the right tool when a critical section spans several operations that must stay consistent together. But for a <em>single</em> shared value &#8212; a counter, a flag, a pointer swap &#8212; taking a lock is overkill. <code>std::atomic&lt;T&gt;</code> makes individual operations on <code>T</code> <b>indivisible</b>: an <code>atomic&lt;int&gt;</code>'s <code>++</code> is a single uninterruptible read-modify-write, so the lost-update race from earlier simply can't occur. On common platforms these compile to dedicated hardware instructions (a <code>lock xadd</code>, a compare-and-swap) with no OS-level lock involved &#8212; that's what "lock-free" means, and it's why an atomic counter is much faster than a mutex-guarded one under contention.`),
  worked("An atomic counter — no mutex needed","Replacing <code>long counter</code> with <code>std::atomic&lt;long&gt;</code> makes <code>++counter</code> a single indivisible operation, so two threads hammering it never lose an update &#8212; no lock, no critical section, no deadlock risk. <code>fetch_add</code> is the explicit spelling of the same thing and returns the previous value. This is the right tool precisely because the invariant is a single variable.",
`#include <atomic>
#include <thread>

std::atomic<long> counter{0};

void bump() {
    for (int i = 0; i < 100000; ++i)
        ++counter;              // indivisible: no lost updates, no lock
        // counter.fetch_add(1); // equivalent, returns the old value
}

std::atomic<bool> ready{false}; // atomic flags are the other common use
// thread 1: ready = true;  thread 2: while (!ready) { /* spin or yield */ }`),
  note(`&#128161;`,`Atomic suffices for one location; a mutex for an invariant across several`,`The decision rule worth memorizing: an <code>atomic</code> protects <em>one</em> memory location, so it's perfect for a counter or a flag. The moment your invariant spans <em>multiple</em> variables that must change together &#8212; "push to the queue <em>and</em> bump its size," "update the pointer <em>and</em> the length" &#8212; an atomic on each piece isn't enough, because another thread can observe the half-updated state between your two atomic ops. That's a <b>compound invariant</b>, and it needs a mutex so the whole update is one critical section. "One value &#8594; atomic; multiple values that move together &#8594; mutex" answers most "which do I use?" questions.`),
  sub("The C++ memory model (awareness level)"),
  p(`Underneath atomics sits the C++ memory model, and you should know it exists even if you never tune it. The issue: compilers and CPUs aggressively <em>reorder</em> memory operations for speed, and on a single thread that's invisible. Across threads it's very visible &#8212; one thread can see another's writes land in a surprising order. Atomics don't just make operations indivisible; they also establish <b>happens-before</b> ordering, which is the guarantee that if thread A writes <code>x</code> then publishes a flag, a thread B that sees the flag is also guaranteed to see the <code>x</code> write.`),
  p(`By default every atomic operation is <b>sequentially consistent</b> (<code>memory_order_seq_cst</code>) &#8212; the strongest, most intuitive ordering: all threads agree on a single global order of atomic operations. That's the right default and what you should reach for. The weaker orderings &#8212; <code>memory_order_relaxed</code>, <code>acquire</code>, <code>release</code> &#8212; let experts trade ordering guarantees for speed in hot lock-free code, but they're a sharp tool: easy to get subtly wrong, hard to test. The interview-correct stance is "I default to sequential consistency and only reach for acquire/release or relaxed with a specific, measured reason and careful reasoning about happens-before."`),
  sub("False sharing — the game-engine performance trap"),
  p(`This is the one where your cache instincts pay off, and it's a great answer to "name a concurrency <em>performance</em> bug, not a correctness one." Cores don't share memory a byte at a time; they share it in <b>cache lines</b>, typically 64 bytes. When a core writes to a line, the cache-coherency protocol invalidates that line in every other core's cache. <b>False sharing</b> happens when two threads update two <em>different, unrelated</em> variables that happen to sit on the <em>same</em> cache line: each write invalidates the other core's copy, so the line ping-pongs between cores on the memory bus even though the threads never actually touch the same data. The program is correct but crawls.`),
  p(`The fix is to pad or align the hot per-thread data so each lands on its own cache line. <code>alignas(64)</code> on the type, or padding bytes between the fields, separates them. The standard even exposes <code>std::hardware_destructive_interference_size</code> as the portable "cache line size" to align to. In an engine you'll see this with per-worker counters or per-thread accumulators packed into an array &#8212; spread them out and a stalled kernel suddenly scales.`),
  worked("Two atomics, one cache line vs. padded","The top struct packs two per-thread counters adjacently, so they share a cache line: thread 0 incrementing <code>a</code> and thread 1 incrementing <code>b</code> fight over the same line and the loop runs far slower than it should &#8212; false sharing. The bottom struct aligns each counter to its own cache line, so the cores stop fighting and throughput scales with cores. Same correctness, very different speed.",
`#include <atomic>
#include <new>   // std::hardware_destructive_interference_size

// SLOW: a and b share a cache line -> false sharing, the line ping-pongs
struct Bad {
    std::atomic<long> a{0};
    std::atomic<long> b{0};     // ~8 bytes after a: same 64-byte line
};

// FAST: each counter sits alone on its own cache line
struct Good {
    alignas(64) std::atomic<long> a{0};
    alignas(64) std::atomic<long> b{0};   // forced onto a separate line
};
// thread 0 hammers .a, thread 1 hammers .b -> no shared line, no contention`),
  sub("std::async, futures, and thread pools (brief)"),
  p(`You don't always manage threads by hand. <code>std::async</code> launches a callable that may run on another thread and hands you a <code>std::future&lt;T&gt;</code> &#8212; a handle to the not-yet-computed result; calling <code>.get()</code> blocks until it's ready and returns the value (or rethrows an exception the task threw). It's the simplest way to fire off "compute this elsewhere, collect it later." The honest caveat: <code>std::async</code> may or may not actually spawn a thread depending on the launch policy, and spawning a fresh OS thread per task is expensive.`),
  p(`That's why real systems &#8212; and every game engine &#8212; use a <b>thread pool</b>: a fixed set of worker threads (usually about one per core) that pull tasks off a shared queue, which is exactly the producer/consumer pattern from earlier. You pay the thread-creation cost once at startup, then dispatch millions of small jobs onto the pool with no per-task thread overhead. If asked to "design a job system," that's the shape: a pool of workers consuming a concurrent queue, with futures (or a completion counter) to know when work is done.`),
  sub("Pitfalls to name before they name them"),
  pit("A data race is undefined behavior, not just a wrong number","This is the one to say out loud. An unsynchronized write to shared memory doesn't merely give you an off-by-some count &#8212; it's UB, so the compiler may assume it never happens and miscompile around it, and the program may crash, corrupt unrelated memory, or appear to work until it doesn't. \"It usually gives the right answer\" is not safety. Synchronize every shared access (mutex or atomic) or it's a bug, full stop."),
  pit("Forgetting to join or detach calls std::terminate","Destroying a still-joinable <code>std::thread</code> kills the process via <code>std::terminate</code>. An early return or a thrown exception that skips your <code>t.join()</code> is enough to trigger it. Use <code>std::jthread</code> (RAII auto-join) or make sure every path joins/detaches &#8212; this is the RAII discipline applied to thread lifetime."),
  pit("Deadlock from inconsistent lock order","Whenever a thread holds two locks, every thread must acquire them in the same global order, or a wait-cycle can freeze them all. Enforce a consistent order, or take multiple locks atomically with <code>std::scoped_lock</code>. And hold locks for as <em>short</em> a time as possible &#8212; a lock held across slow work (I/O, a long computation) serializes every other thread behind it and destroys the scalability you spun up threads to get."),
  pit("volatile is NOT thread-safe","A classic trap. <code>volatile</code> tells the compiler \"don't optimize away reads/writes to this\" &#8212; it's for memory-mapped hardware registers, not threads. It gives you <em>no</em> atomicity and <em>no</em> ordering guarantees between threads, so <code>volatile int</code> shared across threads is still a data race and still UB. The C++ tool for cross-thread shared state is <code>std::atomic</code>, never <code>volatile</code>. Saying this distinction crisply is a reliable signal you actually understand the memory model."),
  cx(`Uncontended <code>atomic</code> op <b>~a few ns</b> (lock-free) · <code>mutex</code> lock/unlock <b>more</b>, and worse under contention · a thread blocked on a held lock or a cv is <b>O(1) CPU</b> (it sleeps, doesn't spin) · false sharing turns cheap atomic writes into bus-bound <b>cache-line ping-pong</b>`),
  idea("The crisp interview answer",`"Threads let me use multiple cores and hide I/O latency, but the moment two threads touch the same memory with at least one write and no synchronization, that's a data race &#8212; which is undefined behavior, not just a wrong value. To fix it I put shared access in a critical section with a <code>std::mutex</code>, taken via a RAII <code>lock_guard</code> so it always unlocks, even on an exception. For a single shared counter or flag I use <code>std::atomic</code> instead &#8212; lock-free and faster &#8212; reaching for a mutex only when an invariant spans several variables that must change together. Multiple locks risk deadlock from inconsistent ordering, so I either lock in a consistent global order or grab them atomically with <code>std::scoped_lock</code>. For 'wait until ready' I use a <code>condition_variable</code>, always waiting on a predicate in a loop to handle spurious wakeups. I default atomics to sequential consistency. And on the performance side I watch for false sharing &#8212; unrelated atomics on one cache line ping-ponging between cores &#8212; which I fix by aligning hot data to its own cache line with <code>alignas</code>. One thing I'm always precise about: <code>volatile</code> is not a threading tool; <code>std::atomic</code> is."`)
]},
{group:"C++ Deep Dives",num:"≣",id:"stl",color:"#DB2777",title:"The STL in Depth",badge:"C++ deep dive",blocks:[
  cue(`Two questions show up in almost every C++ screen: "which container would you use here, and why?" and "what's iterator invalidation?" Both live in this lesson. You already use the STL every day; the goal here is to make the <em>reasoning</em> explicit &#8212; to turn "I'd use a vector" into "I'd use a vector because it's contiguous and I only append and index," and to know exactly which lines of code quietly invalidate your iterators.`),
  p(`The Standard Template Library is three pieces that snap together: <b>containers</b> hold your data, <b>algorithms</b> do work on data, and <b>iterators</b> are the glue between them. The whole design rests on one elegant decoupling: algorithms don't know what container they're running on, and containers don't know what algorithms will run on them. They meet in the middle through iterators. That's why <code>std::sort</code> works on a <code>vector</code>, a <code>deque</code>, and a raw array without being rewritten for each &#8212; it never sees the container at all, only a pair of iterators marking "begin here, stop there."`),
  p(`We'll take the three pieces in turn &#8212; containers and how to pick one, iterators and why they're the hinge the design turns on, then the <code>&lt;algorithm&gt;</code> toolbox &#8212; and finish on the bugs that actually cost people offers: iterator invalidation, <code>operator[]</code> silently inserting, and a few idioms (erase-remove, <code>emplace_back</code>, <code>string_view</code>) that read as fluency in the room.`),
  sub("Part 1: containers — the families, and which to pick"),
  p(`There are a lot of containers, but they cluster into four families, and almost every choice you'll make is "the default from the right family." The families differ in how they lay data out in memory, and that layout dictates which operations are cheap. This is the same memory-layout reasoning from the Arrays &amp; Hashing and Big-O lessons, applied across the whole library.`),
  sub("Sequence containers — elements in a row"),
  ul([
    `<b><code>std::vector</code> &#8212; the default, full stop.</b> A single contiguous heap buffer (the exact array from the Arrays lesson). O(1) random access by index, amortized O(1) <code>push_back</code>, and the best cache behavior of any container because the elements are physically adjacent. Insert/erase in the middle is O(n) (everything shifts). Reach for it first and only switch when you have a concrete reason.`,
    `<b><code>std::deque</code> &#8212; fast at both ends.</b> A double-ended queue: O(1) <code>push_front</code> <em>and</em> <code>push_back</code>, plus O(1) indexing. It's a sequence of fixed-size chunks rather than one buffer, so it loses a little cache locality and you can't assume contiguous storage. Use it when you genuinely add/remove at both ends &#8212; it's also the default engine under <code>std::queue</code> and <code>std::stack</code>.`,
    `<b><code>std::list</code> &#8212; doubly-linked, rarely the answer.</b> O(1) insert/erase/splice <em>anywhere</em> given an iterator, and iterators stay valid across edits. But every node is a separate heap allocation with no locality, so iteration is cache-hostile and slow, and there's no indexing &#8212; <code>list[i]</code> doesn't exist. In practice a <code>vector</code> beats it even for "lots of middle inserts" until n is large, because pointer-chasing memory is so much slower than a contiguous walk. Name it when the question is about O(1) splicing; default away from it otherwise.`,
    `<b><code>std::array&lt;T, N&gt;</code> &#8212; fixed-size, on the stack.</b> A compile-time-sized array with the STL interface (so algorithms accept it). No heap allocation, no resizing. Use it when the size is known at compile time and small.`,
  ]),
  sub("Associative containers — lookups by key"),
  p(`Two families, and choosing between them is the single most common container decision in interviews &#8212; it's the ordered-vs-unordered call from the Arrays lesson, made concrete.`),
  ul([
    `<b>Ordered: <code>std::map</code> / <code>std::set</code></b> &#8212; a balanced binary search tree (red-black tree). Every operation &#8212; insert, find, erase &#8212; is <b>O(log n)</b>, the keys stay <em>sorted</em>, and you get ordered iteration plus range queries: <code>lower_bound</code>/<code>upper_bound</code> find the first key &#8805; or &gt; a value in O(log n). Use these when you need order or floor/ceiling lookups.`,
    `<b>Unordered: <code>unordered_map</code> / <code>unordered_set</code></b> &#8212; a hash table. <b>O(1) average</b>, <b>O(n) worst case</b> on pathological collisions, and <em>no</em> ordering at all. This is the default for counting, seen-sets, and grouping &#8212; raw speed when you don't need sorted keys. Picking <code>map</code> when you don't need order costs you a log factor for nothing.`,
  ]),
  sub("Container adapters — a restricted view over another container"),
  p(`These aren't new data structures; they're thin wrappers that expose only a specific interface on top of an underlying container (you met all three in their own lessons). They exist to make intent obvious in the code.`),
  ul([
    `<b><code>std::stack</code></b> &#8212; LIFO. <code>push</code>/<code>pop</code>/<code>top</code> only. Backed by a <code>deque</code> by default.`,
    `<b><code>std::queue</code></b> &#8212; FIFO. <code>push</code>/<code>pop</code>/<code>front</code>. Also <code>deque</code>-backed &#8212; the workhorse of BFS.`,
    `<b><code>std::priority_queue</code></b> &#8212; a binary heap. O(log n) push/pop, O(1) peek at the top &#8212; a <em>max</em>-heap by default (<code>std::less</code>), or a min-heap if you pass <code>std::greater</code> as the comparator. Backed by a <code>vector</code>. The Heaps lesson is all about this one.`,
  ]),
  svg("stl_pick","Walk the three questions top-down: need a key lookup? then sorted vs not picks map vs unordered_map. No key lookup? then both-ends vs not picks deque vs vector. The honest default at the bottom-right is vector — reach past it only when one of these questions says you must."),
  sub("The complexity table to have memorized"),
  p(`If you remember one thing from this section, make it this. Interviewers ask "what's the complexity of inserting into X?" constantly, and a crisp answer signals you actually understand the structures rather than treating them as magic boxes.`),
  ul([
    `<b><code>vector</code></b> &#8212; index/back-push <b>O(1)</b> (push amortized) · middle insert/erase <b>O(n)</b> · find <b>O(n)</b>`,
    `<b><code>deque</code></b> &#8212; index <b>O(1)</b> · push/pop front <em>and</em> back <b>O(1)</b> · middle insert/erase <b>O(n)</b>`,
    `<b><code>list</code></b> &#8212; insert/erase/splice at a known position <b>O(1)</b> · index <b>n/a</b> · find <b>O(n)</b>`,
    `<b><code>map</code> / <code>set</code></b> (tree) &#8212; insert/find/erase <b>O(log n)</b> · ordered iteration, <code>lower_bound</code> <b>O(log n)</b>`,
    `<b><code>unordered_map</code> / <code>unordered_set</code></b> (hash) &#8212; insert/find/erase <b>O(1)</b> average, <b>O(n)</b> worst`,
    `<b><code>priority_queue</code></b> (heap) &#8212; push/pop <b>O(log n)</b> · peek top <b>O(1)</b>`,
  ]),
  worked("A 'which container' walkthrough — reasoning out loud","This is the shape of a good interview answer: name the operations the problem needs, then pick the container whose cheap operations match. The comments are the reasoning you'd say aloud.",
`// "Process a stream of jobs; sometimes pull from the front, sometimes the back."
//   -> need O(1) at BOTH ends  -> std::deque
std::deque<Job> jobs;

// "Count how many times each word appears."
//   -> key -> value, no order needed, want speed  -> unordered_map
std::unordered_map<std::string, int> freq;

// "Keep events sorted by timestamp; query the next event after time t."
//   -> need sorted order + range query (lower_bound)  -> std::map (or std::set)
std::map<long, Event> timeline;
auto it = timeline.lower_bound(t);   // first event at time >= t, O(log n)

// "Build a list of results, then index into it."
//   -> append + random access, nothing fancy  -> std::vector (the default)
std::vector<Result> out;`),
  sub("Part 2: iterators — the glue, and why categories matter"),
  p(`An iterator is a generalized pointer: an object that points at an element and knows how to move to the next one. <code>v.begin()</code> points at the first element, <code>v.end()</code> points <em>one past</em> the last (a sentinel, not a real element &#8212; never dereference it), and <code>++it</code> advances. The reason the whole STL hangs together is that algorithms are written purely in terms of iterators, so any container that can hand out iterators can run any compatible algorithm. That's the decoupling from the top of the lesson, made literal.`),
  p(`The catch &#8212; and the part worth understanding &#8212; is that not all iterators can do the same things, and algorithms advertise what they require. Iterators come in <b>categories</b>, each a superset of the last:`),
  ul([
    `<b>Input / output</b> &#8212; single-pass, read-only or write-only (e.g. reading from a stream). Move forward, once.`,
    `<b>Forward</b> &#8212; can pass over the data multiple times, one direction. (<code>forward_list</code>.)`,
    `<b>Bidirectional</b> &#8212; can also go backward with <code>--it</code>. This is what <code>list</code>, <code>map</code>, and <code>set</code> give you.`,
    `<b>Random-access</b> &#8212; can jump anywhere in O(1): <code>it + 5</code>, <code>it[3]</code>, compare with <code>&lt;</code>. Only the contiguous containers (<code>vector</code>, <code>deque</code>, <code>array</code>) provide this.`,
  ]),
  p(`Here's why that hierarchy is not academic. <code>std::sort</code> needs <b>random-access</b> iterators &#8212; it jumps around partitioning the range, so it must reach element <code>k</code> in O(1). A <code>std::list</code> only offers <em>bidirectional</em> iterators (you can step forward and back, but not leap), so <code>sort(list.begin(), list.end())</code> <b>won't even compile</b>. That's not a bug; it's the type system refusing an operation the container can't do efficiently. The fix is the member function <code>list.sort()</code>, which sorts in place by relinking nodes. Same story for <code>binary_search</code>, <code>lower_bound</code> on a raw range, and <code>nth_element</code>: they want random access, which is exactly why these algorithms pair naturally with <code>vector</code>.`),
  note("📌","The compile error is a feature",`When <code>std::sort</code> on a <code>list</code> fails with a wall of template errors, the real message buried in there is "this iterator isn't random-access." The library is telling you the operation would be inefficient on this structure, so it declines rather than silently giving you an O(n&#178;) surprise. Knowing to reach for <code>list::sort()</code> &#8212; and <em>why</em> &#8212; is a small, senior-sounding detail.`),
  sub("Part 3: iterator invalidation — the bug that costs offers"),
  p(`This is the highest-value topic in the lesson, because it's the source of real, shipped, hard-to-find bugs &#8212; and a very common interview question. The rules come straight from how each container stores its data, so you can <em>derive</em> them rather than memorize a table.`),
  p(`<b>For <code>vector</code>, the killer is reallocation.</b> Recall from the Arrays lesson that when a <code>vector</code> outgrows its capacity, it allocates a bigger buffer, moves every element across, and frees the old one. Any iterator, pointer, or reference you were holding still points at the <em>old, freed</em> buffer. So <b>any <code>push_back</code> that grows past capacity invalidates everything</b> &#8212; every iterator, every pointer, every reference into that vector. <code>erase</code> is gentler but still invalidates everything from the erased position onward, since those elements shift left.`),
  svg("stl_invalidate","The vector was full (size == capacity). push_back has to allocate a new, larger buffer at a different address, move the elements, and free the old one. The iterator <code>it</code> captured before the push still holds the old address — now freed — so using it is undefined behavior. reserve() up front prevents the realloc and keeps iterators valid."),
  p(`<b>For node-based containers (<code>list</code>, <code>map</code>, <code>set</code>), iterators are far more stable.</b> Each element is its own heap node that never moves, so inserting or erasing one element leaves every <em>other</em> element's node &#8212; and therefore every other iterator &#8212; perfectly valid. The only iterator invalidated by an erase is the one pointing at the element you erased (it's now dangling, because that node is gone). This stability is one of the few genuine reasons to choose <code>list</code>: when you must hold iterators across many insertions and erasures.`),
  worked("The classic invalidation bug — and three fixes","Holding a reference across a push_back is the textbook trap. The first version reads from freed memory the moment the vector reallocates. Each fix sidesteps it a different way; the reserve fix is the one that reads as 'I understand why this happens.'",
`std::vector<int> v = {1, 2, 3, 4};   // suppose capacity == 4 (full)
int& first = v[0];                   // reference into the buffer
v.push_back(5);                      // FULL -> reallocates -> buffer moves
int bad = first;                     // BUG: 'first' points at the freed buffer

// Fix A — reserve up front so no reallocation happens (best when you know the size):
std::vector<int> a = {1, 2, 3, 4};
a.reserve(100);                      // one allocation; capacity won't grow under us
int& f = a[0];
a.push_back(5);                      // no realloc -> f stays valid

// Fix B — don't hold the reference across the mutation; take a copy:
int copy = v[0];                     // copy now, immune to reallocation
v.push_back(6);

// Fix C — re-fetch after the mutation instead of holding across it:
v.push_back(7);
int& fresh = v[0];                   // grab the reference AFTER the growth`),
  pit("Erasing while iterating a vector in a loop",`The other half of the invalidation trap is structural: erasing inside a <code>for</code> loop. <code>v.erase(it)</code> invalidates <code>it</code> (and everything after it), so <code>++it</code> on the next line steps off a dead iterator. The fix is that <code>erase</code> <em>returns</em> the next valid iterator, so you write <code>it = v.erase(it);</code> and only <code>++it</code> when you didn't erase. Better still for value-based removal, use the erase-remove idiom below &#8212; it does the whole thing correctly in one line.`),
  code(`// erase-during-iteration, done right (the returned iterator is the next valid one)
for (auto it = v.begin(); it != v.end(); ) {
    if (shouldRemove(*it)) it = v.erase(it);  // erase returns the next valid iterator
    else                   ++it;              // only advance when we kept the element
}`),
  sub("Part 4: the &lt;algorithm&gt; toolbox"),
  p(`<code>&lt;algorithm&gt;</code> is a kit of generic functions that all speak iterators, so they run on any suitable container. Reaching for them instead of hand-rolling loops is both faster to write and clearer to read &#8212; "show me you know the standard library" is a real interview signal. The ones worth knowing cold:`),
  ul([
    `<b><code>sort(first, last)</code></b> &#8212; sorts a random-access range in O(n log n). Pass a comparator for custom order: <code>sort(v.begin(), v.end(), greater&lt;&gt;())</code>.`,
    `<b><code>find</code> / <code>count</code></b> &#8212; linear O(n) scans for a value or a tally.`,
    `<b><code>lower_bound</code> / <code>upper_bound</code></b> &#8212; binary search on a <em>sorted</em> range, O(log n) on random-access iterators: first element &#8805; (or &gt;) a target. The building block of the Binary Search lesson.`,
    `<b><code>accumulate(first, last, init)</code></b> &#8212; folds a range to one value (sum by default; pass an op for product, etc.). Lives in <code>&lt;numeric&gt;</code>.`,
    `<b><code>transform</code></b> &#8212; applies a function to every element, writing results to an output range (a <code>map</code> in the functional sense).`,
    `<b><code>all_of</code> / <code>any_of</code> / <code>none_of</code></b> &#8212; test a predicate across a range, short-circuiting.`,
    `<b><code>min_element</code> / <code>max_element</code></b> &#8212; return an <em>iterator</em> to the smallest/largest; dereference for the value.`,
  ]),
  sub("The erase-remove idiom — the one that trips people up"),
  p(`Here's the gotcha that catches even strong C++ developers, and it follows directly from the iterator rules. <code>std::remove(first, last, value)</code> does <b>not</b> erase anything &#8212; it can't, because an algorithm only has iterators, not the container, so it has no power to change the container's size. What it actually does is <em>shuffle</em>: it overwrites the unwanted elements by moving the kept elements forward, packing them at the front, and returns an iterator to the new logical end. Everything past that point is leftover junk. The vector is still the same length.`),
  p(`To actually shrink the container, you pair <code>remove</code> with the container's <code>erase</code>, handing it the range from "new logical end" to "real end." That's the <b>erase-remove idiom</b>: <code>remove</code> does the shuffling, <code>erase</code> trims the tail. It's the idiomatic, correct, one-line way to delete all elements equal to a value (or matching a predicate, with <code>remove_if</code>).`),
  worked("Erase-remove, and why remove alone is a bug","remove only compacts the kept elements to the front and returns the new end — it leaves the size unchanged, with stale values in the tail. The container's erase is what physically removes the tail. Forgetting the erase half is the classic mistake.",
`std::vector<int> v = {1, 2, 3, 2, 4, 2};

// WRONG — remove alone: v becomes {1, 3, 4, ?, ?, ?}, size still 6.
std::remove(v.begin(), v.end(), 2);     // returns the new end, but we ignored it

// RIGHT — erase-remove: remove shuffles, erase trims the tail.
v.erase(std::remove(v.begin(), v.end(), 2), v.end());   // v == {1, 3, 4}, size 3

// remove_if for a predicate (e.g. drop all evens):
v.erase(std::remove_if(v.begin(), v.end(),
                       [](int x){ return x % 2 == 0; }),
        v.end());

// C++20 tidies this into a free function (does both halves):
// std::erase(v, 2);  std::erase_if(v, pred);`),
  note("📌","C++20 finally fixed the footgun",`If your environment is C++20, <code>std::erase(v, value)</code> and <code>std::erase_if(v, pred)</code> do the whole erase-remove in one call &#8212; no iterator juggling. It's worth mentioning both: "I'd use the erase-remove idiom, or <code>std::erase</code> in C++20." Knowing the idiom <em>and</em> its modern replacement is exactly the kind of currency interviewers notice.`),
  sub("emplace_back vs push_back, and views"),
  p(`Two more fluency markers, both callbacks to earlier lessons. <code>push_back(x)</code> takes an already-built object and copies or moves it into the container. <code>emplace_back(args...)</code> forwards the constructor <em>arguments</em> and builds the element <em>in place</em>, inside the container's storage &#8212; skipping the temporary entirely. For a type that's cheap to move it's a wash, but for one that's expensive to construct, <code>emplace_back</code> avoids building-then-moving. This is the Move Semantics lesson cashing out: <code>push_back</code> of an lvalue copies, <code>push_back(std::move(x))</code> moves, and <code>emplace_back</code> constructs in place.`),
  code(`std::vector<std::pair<int, std::string>> v;
v.push_back({1, "hello"});          // builds a temporary pair, then moves it in
v.emplace_back(1, "hello");         // constructs the pair directly in the buffer
v.push_back(std::move(existing));   // move an existing object in (no deep copy)`),
  p(`Finally, <b>non-owning views</b> &#8212; the modern way to pass data without copying, straight from the Value vs Reference lesson's "borrow, don't copy" rule. A <code>std::string_view</code> (C++17) is a <code>{pointer, length}</code> pair that looks at characters it doesn't own; a <code>std::span&lt;T&gt;</code> (C++20) does the same for any contiguous range. Taking a <code>string_view</code> parameter instead of <code>const std::string&amp;</code> means a string literal or a substring can be passed with <em>zero</em> allocation or copying &#8212; the view just records where the data is and how long it is.`),
  code(`// Reads characters but copies nothing — accepts std::string, const char*, or a slice.
size_t countVowels(std::string_view s) {     // a {ptr, len} view, not an owner
    size_t n = 0;
    for (char c : s)
        if (std::string_view("aeiou").find(c) != std::string_view::npos) ++n;
    return n;
}
// span<T> is the same idea for any contiguous buffer:
int sum(std::span<const int> data) {          // views a vector, array, or C array
    int total = 0;
    for (int x : data) total += x;
    return total;
}`),
  pit("A view does not own — outlive it and you dangle",`<code>string_view</code> and <code>span</code> are non-owning, so the data they point at must outlive the view. Returning a <code>string_view</code> into a local <code>std::string</code>, or holding one after the underlying <code>vector</code> reallocates, leaves you pointing at freed memory &#8212; the same dangling-reference failure as iterator invalidation, just wearing a different hat. Views are for <em>passing</em> data down, not for <em>storing</em> it.`),
  sub("The pitfalls interviewers probe"),
  pit("Iterator invalidation is the #1","Mutating a container while holding iterators/pointers/references into it is the most common STL bug. <code>vector</code>: any growing <code>push_back</code> invalidates everything; <code>erase</code> invalidates from the point on. Node-based (<code>list</code>/<code>map</code>/<code>set</code>): only the erased element's iterator dies. When in doubt, <code>reserve</code> first, or re-fetch after the mutation."),
  pit("map operator[] silently inserts","Just like the Arrays lesson warned: <code>m[key]</code> on a missing key <em>default-constructs and inserts</em> an entry, so using it to <em>check</em> existence is a bug that quietly grows the map. To test membership without inserting, use <code>m.count(key)</code> or <code>m.find(key) != m.end()</code> (or <code>m.contains(key)</code> in C++20). The auto-insert is only what you want for <code>++m[key]</code> frequency counting."),
  pit("unordered_map is O(1) average, not guaranteed","Hash containers are O(1) <em>average</em> but O(n) <em>worst case</em> when keys collide into one bucket. For adversarial or untrusted keys this matters; for normal data the standard hash spreads keys well. Saying \"average O(1), worst case O(n) on collisions\" out loud is the precise answer &#8212; and if worst-case guarantees matter, the tree-based <code>map</code> with its hard O(log n) is the safer pick."),
  pit("sort on a list won't compile","<code>std::sort</code> needs random-access iterators; <code>list</code> only offers bidirectional ones, so the call fails to compile. Use the member <code>list.sort()</code>, which sorts by relinking nodes in place. Same restriction applies to <code>binary_search</code> and <code>nth_element</code> &#8212; they're random-access algorithms, which is why they live most naturally on <code>vector</code>."),
  cx(`vector index <b>O(1)</b>, push <b>O(1)</b> amortized · map/set <b>O(log n)</b> · unordered_map <b>O(1)</b> avg / O(n) worst · sort <b>O(n log n)</b> · lower_bound <b>O(log n)</b> · find/count <b>O(n)</b>`),
  idea("The interview answers, in order",`<b>"Which container?"</b> &#8212; "Default to <code>vector</code>: contiguous, O(1) index, amortized O(1) append, best cache behavior. <code>deque</code> if I need both ends, <code>unordered_map/set</code> for keyed lookups or counting, <code>map/set</code> when I need sorted order or range queries, and the adapters (<code>stack/queue/priority_queue</code>) to express intent." <b>"What's iterator invalidation?"</b> &#8212; "Mutating a container can invalidate iterators into it. For <code>vector</code>, a <code>push_back</code> that grows past capacity reallocates and invalidates everything; <code>erase</code> invalidates from that point on. Node-based containers only invalidate the erased element. I <code>reserve</code> when I know the size, and I use the erase-remove idiom &#8212; or <code>std::erase</code> in C++20 &#8212; for value removal, because <code>std::remove</code> alone only shuffles and doesn't change the size." Delivering both with the <em>why</em> attached is the whole game.`)
]},
{group:"C++ Deep Dives",num:"⟨⟩",id:"templates",color:"#9333EA",title:"Templates & Generic Programming",badge:"C++ deep dive",blocks:[
  cue(`<b>Reach for this when</b> you'd otherwise copy-paste the same algorithm or container for <code>int</code>, then <code>float</code>, then your own type &#8212; or when an interviewer asks how <code>std::vector</code>, <code>std::sort</code>, or <code>make_unique</code> can work for <em>any</em> type with no runtime cost. Templates are how the entire STL is built, so the vocabulary here doubles as the vocabulary for reading the standard library.`),
  p(`You already write generic code every day &#8212; <code>vector&lt;int&gt;</code>, <code>sort(begin, end)</code>, <code>make_unique&lt;Foo&gt;()</code>. Templates are the machinery underneath all of it. This lesson is about being able to <em>write</em> that machinery and, more importantly for interviews, explain how it works: what the compiler actually does with <code>template&lt;class T&gt;</code>, why template code lives in headers, and why this gives you polymorphism with zero runtime overhead. None of it is exotic; it's the same generic-programming instinct you have from game-engine work, made precise.`),
  sub("The problem templates solve"),
  p(`Say you need a <code>max</code> function. Without generics you'd write one for <code>int</code>, copy it for <code>double</code>, copy it again for your <code>Vector3</code> &#8212; three functions, identical except for the type, that all drift out of sync the moment you fix a bug in one. The classic escape hatch is a common base class with a <code>virtual</code> method, so one function can work through a base pointer. That works, but it forces every type to inherit from your base, boxes values behind a pointer, and pays an indirect call on <em>every</em> use (the runtime-polymorphism story from the Polymorphism lesson).`),
  p(`Templates take the other road. You write the algorithm <em>once</em>, with the type left as a blank to be filled in, and the compiler generates a separate, fully concrete, fully optimized version for each type you actually use. No base class, no inheritance, no pointer indirection, no runtime cost &#8212; the generated <code>max&lt;int&gt;</code> is byte-for-byte what you'd have hand-written. That's the core trade to be able to state in an interview: <em>templates move the &#8220;which type?&#8221; decision from run time to compile time</em>, and buy back all the overhead.`),
  sub("Function templates: the compiler deduces T"),
  p(`A function template is an ordinary function with the concrete type swapped out for a type parameter. <code>template&lt;class T&gt;</code> (or the identical <code>template&lt;typename T&gt;</code> &#8212; the two keywords mean the same thing here) introduces a placeholder <code>T</code>; the rest reads like normal code that happens to use <code>T</code> wherever a fixed type would go.`),
  code(`template<class T>
T max(T a, T b) {
    return (a < b) ? b : a;   // works for any T that supports operator<
}

int    m = max(3, 7);          // T deduced as int    -> max<int>
double d = max(2.5, 1.5);      // T deduced as double -> max<double>
auto   s = max(std::string("ab"), std::string("az")); // T = std::string`),
  p(`The thing to notice: you never wrote <code>max&lt;int&gt;(3, 7)</code>. The compiler looked at the arguments, saw two <code>int</code>s, and <em>deduced</em> <code>T = int</code> for you. That argument-driven <em>template argument deduction</em> is why generic calls read as cleanly as ordinary ones. You <em>can</em> specify the type explicitly &#8212; <code>max&lt;double&gt;(3, 7)</code> &#8212; and occasionally must, when there's nothing to deduce from (like a factory whose type appears only in the return), but most of the time deduction does it silently.`),
  worked("A generic swap, deduced from its arguments","swap is the canonical first template: the logic is identical for every type, only the type of the temporary changes. T is deduced from the two references; std::move (from the Move Semantics lesson) makes the three steps transfers rather than copies, so swapping two big vectors is three pointer-shuffles, not three deep copies.",
`template<class T>
void swap(T& a, T& b) {
    T tmp = std::move(a);   // steal a's guts into tmp   (no copy)
    a     = std::move(b);   // steal b's guts into a
    b     = std::move(tmp); // steal tmp's guts into b
}

int x = 1, y = 2;
swap(x, y);                 // T = int

std::vector<int> p{1,2,3}, q{4,5,6};
swap(p, q);                 // T = vector<int> : swaps the buffers, O(1)`),
  svg("templates_instantiate","One template definition fans out into one concrete function per type you actually call it with. The template itself emits no code; each used type stamps out its own optimized copy at the call site."),
  sub("How instantiation works (and why it matters)"),
  p(`Here is the mental model that makes everything else fall into place. A template is <em>not code</em> &#8212; it's a recipe for generating code. When you call <code>max(3, 7)</code>, the compiler performs <em>instantiation</em>: it substitutes <code>T = int</code> through the template body and produces a real <code>max&lt;int&gt;</code> function, then compiles that. Call it with <code>double</code> and it generates a second function. Three consequences follow directly, and each is a common interview question.`),
  ul([
    `<b>Unused templates cost nothing.</b> If you never instantiate <code>max</code> with <code>std::string</code>, no <code>max&lt;std::string&gt;</code> is ever generated &#8212; it's not in your binary at all. You only pay for the types you actually use.`,
    `<b>Each type means more code.</b> The flip side: instantiate <code>max</code> for ten types and you get ten functions in the binary. That's <em>code bloat</em> &#8212; usually a fine trade for the speed, but the reason heavily-templated builds get large and slow to compile.`,
    `<b>The compiler needs the full definition at every call site.</b> To stamp out <code>max&lt;int&gt;</code>, the compiler must see the <em>body</em> of <code>max</code> in the translation unit doing the call. A function declaration isn't enough, because there's nothing to instantiate. This is the big practical one.`,
  ]),
  pit("Templates go in headers — a .cpp definition gives a linker error",`Put a template's <em>definition</em> (not just its declaration) in a header, so every file that uses it can see the body and instantiate it. The intuitive move &#8212; declaration in <code>.h</code>, body in <code>.cpp</code> &#8212; fails: the <code>.cpp</code> compiles fine but generates no instantiations (it never sees a call with a concrete type), and every <em>other</em> file gets an &#8220;undefined reference to <code>max&lt;int&gt;</code>&#8221; at link time. The fix is almost always &#8220;move the body into the header.&#8221; This trips up everyone once; knowing <em>why</em> &#8212; the compiler instantiates at the use site and needs the body there &#8212; is the senior answer. (It's the same translation-unit story from the Build Model lesson.)`),
  sub("Templates are duck-typed"),
  p(`A template doesn't constrain <code>T</code> up front &#8212; it just uses <code>T</code> however the body needs to. <code>max</code> uses <code>operator&lt;</code>; <code>swap</code> uses move-assignment. The instantiation <em>succeeds</em> if and only if those operations exist for the type you plugged in. There's no interface to declare and no inheritance &#8212; if it walks like a duck (supports the operations the template uses), it works. This is &#8220;compile-time duck typing.&#8221;`),
  p(`The upside is freedom: any type with the right operations just works, including types written years after the template. The downside is the failure mode. Hand <code>max</code> a type with no <code>operator&lt;</code> and you don't get a clean &#8220;this type isn't comparable&#8221; &#8212; you get a wall of errors pointing <em>inside</em> the template at the line <code>a &lt; b</code>, because that's where the missing operation surfaced. The error is technically accurate and practically miserable. Concepts (below) exist to fix exactly this.`),
  note("&#128221;","typename for dependent types",`One syntax wrinkle worth recognizing: when a name depends on a template parameter and is itself a type &#8212; like <code>T::value_type</code> &#8212; you must write <code>typename T::value_type</code>. Without <code>typename</code> the compiler can't tell whether <code>T::value_type</code> names a type or a static value, so it assumes the latter and errors. The rule: a <em>dependent</em> type name needs <code>typename</code> in front. You'll mostly meet this in library-style code; just don't be surprised by the &#8220;missing typename&#8221; diagnostic.`),
  sub("auto and trailing return types"),
  p(`<code>auto</code> is the lightweight cousin of templates: it asks the compiler to deduce a type the same way template deduction does, so you rarely spell out an iterator or lambda type by hand. In a return position, <code>auto</code> deduces the function's return type from its <code>return</code> statement. When the return type depends on the parameters &#8212; say it's whatever <code>a + b</code> produces &#8212; the <em>trailing return type</em> <code>-&gt; decltype(a + b)</code> lets you name it after the parameters are in scope.`),
  code(`template<class A, class B>
auto add(A a, B b) -> decltype(a + b) {   // return type = type of (a + b)
    return a + b;
}
auto r = add(1, 2.5);   // A=int, B=double -> returns double

// Since C++14 plain 'auto' (no trailing type) usually suffices:
template<class A, class B>
auto add2(A a, B b) { return a + b; }     // deduced the same way`),
  sub("Class templates: your own generic container"),
  p(`Everything above applies to whole classes too. <code>std::vector&lt;T&gt;</code>, <code>std::pair&lt;A, B&gt;</code>, <code>std::unique_ptr&lt;T&gt;</code> are class templates: one definition, parameterized over the element type, instantiated per type you use. You write the class with type parameters and the compiler generates a concrete class &#8212; <code>vector&lt;int&gt;</code> and <code>vector&lt;double&gt;</code> are genuinely different types, each with its own generated code.`),
  worked("A tiny generic Stack<T>","A stack that works for any element type, backed by a vector<T> (Rule of Zero from Move Semantics: the vector member manages itself, so we write no destructor, copy, or move). T is a class-level parameter — fixed when you write Stack<int> — so every method can use it. Note push has both a copy and a move overload, exactly like the standard containers.",
`template<class T>
class Stack {
    std::vector<T> data;                  // the vector does the real work
public:
    bool empty() const { return data.empty(); }
    std::size_t size() const { return data.size(); }

    void push(const T& v) { data.push_back(v); }            // copy in
    void push(T&& v)      { data.push_back(std::move(v)); } // move in

    T& top()             { return data.back(); }
    void pop()           { data.pop_back(); }
};

Stack<int> s;          s.push(1); s.push(2);   // Stack<int>
Stack<std::string> w;  w.push("hi");           // Stack<std::string> : separate type`),
  pit("Class-template definitions live in headers too",`Same rule as function templates, same reason: the compiler instantiates <code>Stack&lt;int&gt;</code> at the point of use, so it needs the full class <em>and method</em> bodies visible there. Member functions of a class template are conventionally defined inline in the header (or in a <code>.tpp</code>/<code>.ipp</code> the header <code>#include</code>s at the bottom). Splitting them into a <code>.cpp</code> resurrects the same &#8220;undefined reference&#8221; at link time.`),
  sub("Variadic templates and perfect forwarding"),
  p(`How does <code>make_unique&lt;Widget&gt;(a, b, c)</code> accept <em>any</em> argument list and hand it to <code>Widget</code>'s constructor untouched? <em>Variadic templates.</em> A <em>parameter pack</em> <code>class... Args</code> captures any number of type parameters, and <code>Args&amp;&amp; ... args</code> captures the matching arguments. You then expand the pack with <code>...</code> to pass them along. You don't need to write these often, but recognizing the pieces lets you read the STL and answer the &#8220;how does <code>emplace_back</code> work?&#8221; question.`),
  code(`template<class T, class... Args>            // Args is a type pack
std::unique_ptr<T> make_unique(Args&&... args) {        // args is a value pack
    return std::unique_ptr<T>(
        new T(std::forward<Args>(args)...)  // expand: forward each arg, in order
    );
}
// make_unique<Widget>(3, "hi") -> new Widget(3, "hi"), arguments untouched`),
  note("&#128221;","This is perfect forwarding (callback to Move Semantics)",`The <code>Args&amp;&amp;</code> here is <em>not</em> an rvalue reference &#8212; in a template, <code>T&amp;&amp;</code> is a <em>forwarding reference</em> that binds to both lvalues and rvalues. <code>std::forward&lt;Args&gt;(args)...</code> then preserves, per argument, whether the caller handed you something movable or not: rvalues stay movable, lvalues stay copyable. That's <em>perfect forwarding</em> &#8212; the thing the Move Semantics lesson flagged as &#8220;<code>T&amp;&amp;</code>-in-a-template plus <code>std::forward</code>.&#8221; It's how <code>emplace_back</code> forwards your constructor arguments straight into an in-place construction with no extra copy or move.`),
  sub("Compile-time computation: if constexpr and type traits"),
  p(`Because instantiation happens at compile time, the compiler knows everything about <code>T</code> while it's generating code &#8212; so you can <em>branch on type properties</em> and have the dead branch vanish entirely. <code>if constexpr (cond)</code> is a compile-time <code>if</code>: the false branch is discarded before it's even type-checked for that instantiation, so each branch only has to be valid for the types that reach it. Paired with <em>type traits</em> like <code>std::is_integral_v&lt;T&gt;</code> (compile-time questions about a type), it lets one template do genuinely different things per type with no runtime test.`),
  worked("Branch at compile time on a type property","describe asks, at compile time, whether T is an integer. For Stack<int> only the integral branch is compiled; for double only the other. The discarded branch isn't just skipped at run time — it's not generated at all, so it needn't even be valid for the other type. This is how generic code specializes its behaviour without a virtual call or a runtime branch.",
`template<class T>
std::string describe(T value) {
    if constexpr (std::is_integral_v<T>) {       // decided at compile time
        return "integer: " + std::to_string(value);
    } else {
        return "non-integer value";              // only compiled when T isn't integral
    }
}
describe(42);    // -> "integer: 42"
describe(3.14);  // -> "non-integer value"`),
  sub("Concepts (C++20): naming the requirements"),
  p(`Concepts are the modern fix for the duck-typing failure mode. A <em>concept</em> names the requirements a type parameter must satisfy, and you constrain a template with it. If a caller violates the constraint, the error is short and points at the call &#8212; &#8220;<code>Widget</code> does not satisfy <code>std::totally_ordered</code>&#8221; &#8212; instead of a fifty-line spew from deep inside the body. The constraint also documents intent: the signature now <em>states</em> what <code>T</code> needs.`),
  code(`#include <concepts>

template<std::totally_ordered T>   // T must support < <= > >=
T max(T a, T b) {
    return (a < b) ? b : a;
}

max(3, 7);            // fine
max(Widget{}, Widget{});  // clean error AT THE CALL: Widget isn't totally_ordered
                          //   (not a wall of errors inside max's body)`),
  note("&#128161;","No C++20? static_assert is the poor-man's concept",`If you're stuck pre-C++20, a <code>static_assert</code> at the top of the template &#8212; <code>static_assert(std::is_arithmetic_v&lt;T&gt;, "max needs a number");</code> &#8212; gives you most of the benefit: a clear, early, custom message instead of the deep-template spew. Concepts are cleaner and compose, but the goal is the same: turn a confusing failure into a legible one. Mentioning either in an interview shows you know the duck-typing footgun and how to tame it.`),
  sub("Templates vs virtual: compile-time vs runtime polymorphism"),
  p(`This is the comparison interviewers most want to hear, because it's a real design decision, not trivia. Both give you &#8220;one piece of code, many types,&#8221; but they resolve the type at opposite ends of the timeline.`),
  svg("templates_polymorphism","Two kinds of polymorphism. Templates (and CRTP) resolve the type at compile time — a direct, inlinable, zero-overhead call, but the type is fixed when you build. Virtual functions resolve at run time through a vtable — one indirect pointer hop, but the concrete type can vary per object and be decided at run time."),
  ul([
    `<b>Compile-time (templates, CRTP).</b> The type is baked in at instantiation. The call is direct and usually <em>inlined</em>, so there's literally zero overhead versus hand-written code. Cost: the type must be known at compile time, you can't store a mixed bag of types in one container, and you pay in code size and compile time. CRTP &#8212; the curiously-recurring template pattern from the Polymorphism lesson &#8212; uses this to get virtual-like dispatch with no vtable.`,
    `<b>Runtime (virtual functions).</b> The type can vary per object and be decided at run time &#8212; a <code>vector&lt;unique_ptr&lt;Shape&gt;&gt;</code> can hold circles and squares mixed together. Cost: each call is an <em>indirect</em> jump through the vtable (one pointer hop), which can't be inlined, plus a per-object vtable pointer.`,
  ]),
  p(`The rule of thumb: if the set of types is fixed and known when you compile &#8212; an algorithm over &#8220;whatever element type this container holds&#8221; &#8212; reach for a template and pay nothing. If the concrete type genuinely varies at run time, or you need a heterogeneous collection behind one interface, that's what <code>virtual</code> is for. The STL is the template side of this taken to its conclusion: <code>sort</code>, <code>find</code>, every container &#8212; all compile-time generic, all zero-overhead.`),
  pit("The error messages are the real tax",`The honest downside of templates, and worth saying out loud in an interview: when something doesn't fit, the diagnostics are brutal &#8212; multi-screen errors pointing inside library code you didn't write. Two habits tame it: constrain your parameters (concepts, or a <code>static_assert</code> with a human message) so failures surface at the call with a sentence you can read, and instantiate new templates with a simple type early so mistakes show up before the code is buried under three layers of generic calls.`),
  cx(`Instantiation is compile-time work &#8212; <b>zero</b> runtime cost; a templated call is a <b>direct, inlinable</b> call (vs. a virtual's <b>indirect vtable hop</b>). Trade: more <b>code size</b> and <b>compile time</b> per instantiated type.`),
  idea("Say it like this",`"A template is a recipe, not code: <code>template&lt;class T&gt;</code> leaves the type blank, and the compiler <em>instantiates</em> a separate concrete copy for each type I actually use &#8212; deducing <code>T</code> from the arguments for functions. That's compile-time polymorphism: the call is direct and inlinable, so it's zero-overhead, unlike a <code>virtual</code>'s indirect vtable hop &#8212; the trade-off being the type is fixed at compile time and I pay in code size. Because instantiation happens at the use site, the compiler needs the full definition there, which is why templates live in headers &#8212; splitting one into a <code>.cpp</code> gives undefined-reference linker errors. Templates are duck-typed, so a bad type yields a wall of errors from inside the body; I'd constrain parameters with a C++20 concept or a <code>static_assert</code> so the failure shows up cleanly at the call. And variadic templates with <code>std::forward</code> are how <code>make_unique</code> and <code>emplace_back</code> forward an arbitrary argument list untouched."`)
]},
{group:"C++ Deep Dives",num:"⚠",id:"ub",color:"#EA580C",title:"Undefined Behavior & the Build Model",badge:"C++ deep dive",blocks:[
  cue(`Two questions that quietly separate "writes C++" from "understands C++": <em>"What is undefined behavior?"</em> and <em>"Walk me through what happens between hitting your source file and getting an executable."</em> The first is about a trap that makes the language fast and dangerous; the second is the compile-and-link pipeline every C++ engineer is expected to be able to sketch. They live together here because both are about what the compiler is actually <em>allowed</em> to do with your code &#8212; and both explain bugs that look impossible until you know the rules.`),
  p(`You ship real C++ in a game engine, so you've already met both of these in the wild: the crash that only happens in the shipping build, and the cryptic <code>undefined reference to ...</code> that has nothing to do with your logic. This lesson gives you the vocabulary and the mental model to explain <em>why</em> those happen, which is exactly what the interview is checking.`),
  sub("Part one — Undefined behavior: the standard imposes no requirements"),
  p(`Here is the precise definition, because the precision is the point. When your program executes <b>undefined behavior</b> (UB), the C++ standard imposes <em>no requirements whatsoever</em> on what happens. Not "it crashes," not "you get garbage," not "it's platform-specific" &#8212; literally <em>anything</em> is a conforming outcome. The program may work, may crash, may corrupt unrelated data, may appear to ignore the offending line entirely. The standard washes its hands of the whole execution. This is the source of the folklore that UB can "make demons fly out of your nose" &#8212; the joke encodes a real rule: once you've triggered UB, you have no guarantees about <em>any</em> part of the run.`),
  p(`Crucially, UB is not a runtime error the language promises to detect. It's a <em>contract</em> you signed: by writing the code, you promised the compiler this situation never occurs. And the compiler takes you at your word. That's where the danger lives.`),
  sub("Why the compiler optimizing on that promise is what burns you"),
  p(`This is the half people miss. The compiler is <em>allowed to assume UB never happens</em>, and a good optimizer leans on that assumption hard to generate faster code. If your code contains a path that would be UB, the optimizer reasons "that can't happen, the programmer guaranteed it" &#8212; and deletes the check, the branch, or the bounds test that only mattered on the impossible path. Your code didn't fail to compile; it compiled into something that does less than you wrote, because the compiler trusted a promise you accidentally broke.`),
  svg("ub_release","The same source file built two ways. At <code>-O0</code> the optimizer is mostly off, so the UB happens to produce a benign result and every local test passes. At <code>-O2</code> the optimizer assumes the UB <em>can't</em> occur and rewrites the code on that basis &#8212; deleting a branch it has decided is unreachable &#8212; so the release build silently behaves differently from the debug build you tested."),
  p(`That is why UB is uniquely nasty in practice: <b>a program can pass every test in a debug build and silently break in an optimized release build.</b> Same source, same compiler, different optimization level &#8212; different program. The classic "it worked on my machine" bug report is very often a UB report in disguise: the developer ran the unoptimized debug build, the CI or the shipping target ran <code>-O2</code>, and the optimizer cashed in an assumption the code couldn't actually keep.`),
  note(`&#128221;`,`"Undefined" is a specific word &#8212; not "implementation-defined", not "unspecified"`,`Interviewers like this distinction because it shows you've actually read the rules. <b>Undefined behavior</b> &#8594; no requirements at all; the program is meaningless (out-of-bounds access, use-after-free). <b>Unspecified behavior</b> &#8594; the standard allows several outcomes and the implementation needn't tell you which (e.g. the order arguments are evaluated). <b>Implementation-defined behavior</b> &#8594; one of several outcomes, but the implementation must document its choice (e.g. <code>sizeof(int)</code>, whether <code>char</code> is signed). Only UB can make the whole program meaningless; the other two are bounded and at worst non-portable.`),
  sub("The common sources of UB &#8212; learn to smell each one"),
  p(`You don't memorize the standard; you build a nose for the handful of situations that are UB, so you flag them while writing. These are the ones that come up constantly:`),
  ul([
    `<b>Out-of-bounds access.</b> <code>v[v.size()]</code>, an array index past the end, an off-by-one in a loop. <code>operator[]</code> does no bounds checking &#8212; reading or writing outside the buffer is UB, full stop. (Use <code>.at()</code> when you want a checked access that throws instead.)`,
    `<b>Use-after-free / dangling pointers.</b> Touching memory after <code>delete</code>, or through a pointer to an object that's already gone. The headline case: <em>returning the address of a local</em> &#8212; the stack frame is reclaimed the instant the function returns, so the pointer dangles immediately. This is the Pointers lesson's dangling-pointer trap, now named for what it is.`,
    `<b>Signed-integer overflow.</b> <code>INT_MAX + 1</code> is UB. (Unsigned overflow is <em>defined</em> &#8212; it wraps modulo 2&#8319;.) This one is a favorite optimizer exploit, below.`,
    `<b>Reading an uninitialized variable.</b> <code>int x; use(x);</code> &#8212; the value is indeterminate, and reading it is UB. Not "you get a random number"; the compiler may assume the read never happens.`,
    `<b>Dereferencing null.</b> <code>*p</code> when <code>p == nullptr</code>. Often crashes &#8212; but "often" isn't "always," and the optimizer may assume any pointer you dereference is non-null and prune your later null check.`,
    `<b>A data race.</b> Two threads touch the same non-atomic object and at least one writes, with no synchronization &#8212; UB by definition. This is the whole reason for <code>std::atomic</code> and mutexes (the Concurrency material): they turn races into defined, ordered access.`,
    `<b>Breaking strict aliasing.</b> Reading the bytes of a <code>float</code> through an <code>int*</code> (or most mismatched pointer types) lets the compiler assume the two never refer to the same memory, and it reorders accordingly. Use <code>std::memcpy</code> or <code>std::bit_cast</code> to reinterpret bytes safely.`,
  ]),
  note(`&#128161;`,`The two callbacks worth naming out loud`,`Half of this list is just earlier lessons under a new heading. Dangling pointers and returning the address of a local are the <em>Pointers &amp; Memory</em> failure modes; the data race is exactly what <em>Concurrency</em> exists to prevent; and the cleanest way to never write a use-after-free is the <em>RAII</em> discipline &#8212; let an owning type control the lifetime so there's no manual <code>delete</code> to outlive. UB isn't a separate topic so much as the formal name for "what goes wrong when those disciplines slip."`),
  worked("UB the optimizer exploits: signed overflow and an uninitialized read","Two tiny functions that look harmless and behave differently across optimization levels. In <code>willOverflow</code>, the check <code>x + 1 &lt; x</code> can only be true if signed overflow occurred &#8212; but signed overflow is UB, so the optimizer concludes the condition is <em>always false</em> and deletes the entire branch, including the print. In <code>maybe</code>, <code>flag</code> is read uninitialized; at <code>-O0</code> it happens to hold whatever was on the stack, but the optimizer is free to assume the read never happens and pick either path. Neither bug shows up as a compile error.",
