  p(`The template differs slightly from the array version: <code>lo</code> and <code>hi</code> bound the <em>answer values</em> (not indices), and you're hunting the flip, so you don't return on a "hit" &#8212; you converge until <code>lo == hi</code>. This is the half-open mindset: when <code>feasible(mid)</code> is true, <code>mid</code> might itself be the answer, so you keep it (<code>hi = mid</code>); when false, <code>mid</code> is ruled out (<code>lo = mid + 1</code>).`),
  worked("Koko eating bananas: minimum speed to finish in H hours","Answer space = eating speed, from 1 to the largest pile. feasible(speed) = \"can Koko finish all piles within h hours at this speed?\" &#8212; higher speed never hurts, so it's monotonic. Binary-search the smallest feasible speed. ceil division is (pile + speed - 1) / speed.",
`int minEatingSpeed(const vector<int>& piles, int h) {
    int lo = 1, hi = *max_element(piles.begin(), piles.end());
    auto feasible = [&](int speed) {                 // monotonic in speed
        long long hours = 0;
        for (int p : piles) hours += (p + speed - 1) / speed;  // ceil(p / speed)
        return hours <= h;
    };
    while (lo < hi) {                                 // converge to the flip
        int mid = lo + (hi - lo) / 2;
        if (feasible(mid)) hi = mid;                  // mid works -> keep it, search lower
        else               lo = mid + 1;             // mid too slow -> must go faster
    }
    return lo;                                        // lo == hi == smallest feasible speed
}`),
  idea("Same skeleton, many problems","\"Ship within D days,\" \"split array into k subarrays minimizing the largest sum,\" \"minimum capacity / maximum distance\" &#8212; these are all the <em>same</em> binary-search-the-answer pattern with a different <code>feasible</code>. Once you can write the feasibility check, the search is the boilerplate above. The skill the interviewer is testing is spotting that the answer is monotonic; the loop is the easy part."),
  sub("Worked medium: search in a rotated sorted array"),
  p(`A sorted array rotated at an unknown pivot &#8212; e.g. <code>[4,5,6,7,0,1,2]</code> &#8212; isn't globally sorted, so plain binary search breaks. But here's the key observation: <em>at least one half of any subrange is still sorted.</em> Look at <code>mid</code>; compare <code>nums[left]</code> to <code>nums[mid]</code>. If <code>nums[left] &lt;= nums[mid]</code>, the left half is the clean, sorted one; otherwise the right half is. Once you know which half is sorted, you can test in <code>O(1)</code> whether <code>target</code> lies <em>within</em> that sorted half's range &#8212; if so, search there; if not, search the other half. Still <code>O(log n)</code>, still one array, you've just added a "which half is sane?" decision.`),
  worked("Search in rotated sorted array","Decide which side is sorted, then decide whether target falls inside that sorted side's value window. Half-open reasoning on the ranges keeps the off-by-ones honest. Assumes distinct values (the canonical LeetCode 33).",
`int search(const vector<int>& nums, int target) {
    int left = 0, right = (int)nums.size() - 1;
    while (left <= right) {
        int mid = left + (right - left) / 2;
        if (nums[mid] == target) return mid;
        if (nums[left] <= nums[mid]) {                 // LEFT half is sorted
            if (nums[left] <= target && target < nums[mid]) right = mid - 1;  // target in left
            else                                            left  = mid + 1;  // else right
        } else {                                       // RIGHT half is sorted
            if (nums[mid] < target && target <= nums[right]) left  = mid + 1; // target in right
            else                                             right = mid - 1; // else left
        }
    }
    return -1;
}`),
  p(`The lesson generalizes: binary search survives "broken" structure as long as <em>each step</em> can still decide which half to discard with certainty. Rotation, bitonic arrays, and 2D sorted matrices all yield to the same "find the locally-sorted region, then prune" reasoning.`),
  sub("Pitfalls that cost the interview"),
  pit("Confirm it's monotonic before you write a line",`Binary search needs a sorted range, or an answer space where the yes/no condition flips exactly once (all-false then all-true). If the condition can flip back and forth, halving is invalid and you'll silently skip the answer &#8212; with no error, just a wrong result. State the monotonic property out loud first: "if speed X finishes in time, every speed above X does too." If you can't justify that sentence, binary search is the wrong tool.`),
  pit("Integer overflow in the midpoint",`<code>(left + right) / 2</code> can overflow when both are near <code>INT_MAX</code> &#8212; the sum wraps negative and <code>mid</code> goes haywire. Always write <code>left + (right - left) / 2</code>. In the search-the-answer variants the <em>values</em> can be large too: accumulate feasibility sums in <code>long long</code>, as the Koko example does, so a sum of many piles doesn't overflow an <code>int</code>.`),
  pit("Off-by-one and the never-shrinking range",`The two classic failures are (a) <code>mid</code> that doesn't move &#8212; <code>left = mid</code> with <code>left &lt; right</code> spins forever &#8212; and (b) the wrong loop condition for your invariant (<code>&lt;</code> vs <code>&lt;=</code>) leaving the final candidate unchecked or over-running by one. Both vanish if you commit to a single invariant: inclusive <code>[left, right]</code> with <code>&lt;=</code> and <code>mid&#177;1</code>, or half-open <code>[lo, hi)</code> with <code>&lt;</code> and <code>hi = mid</code>. Don't blend them.`),
  cx(`Array search <b>O(log n)</b> time, <b>O(1)</b> space &#183; search-the-answer <b>O(n &#183; log(range))</b> time (one <code>O(n)</code> feasibility check per halving)`),
  {t:"probs",items:[["Binary Search","binary-search","easy"],["Search in Rotated Sorted Array","search-in-rotated-sorted-array","med"],["Median of Two Sorted Arrays","median-of-two-sorted-arrays","hard"]]}
]},
{group:"Week 3 · Patterns + C++",num:"⚛",id:"raii",color:"#A855F7",title:"RAII & Smart Pointers",badge:"Week 3 · C++ deep dive",blocks:[
  cue(`Two of the most reliable C++ interview questions: "What's RAII?" and "When do you use <code>unique_ptr</code> vs <code>shared_ptr</code>?" This picks up exactly where the Pointers lesson left off &#8212; remember the leaks, double-frees, and dangling pointers from raw <code>new</code>/<code>delete</code>? Smart pointers exist to make those bugs impossible, and they do it with one idea: RAII. Get this lesson cold and you can answer the whole family of ownership questions without hesitating.`),
  p(`RAII &#8212; <em>Resource Acquisition Is Initialization</em> &#8212; is arguably the single most important idea in C++, and the worst-named. Ignore the name; here's the idea. You tie a resource's lifetime to an object's lifetime: <b>acquire the resource in a constructor, release it in the destructor.</b> Then you let the language's scope rules do the bookkeeping. Because C++ guarantees a destructor runs the instant an object leaves scope, cleanup stops being something you remember to do and becomes something that <em>can't not happen</em>.`),
  svg("raii","RAII ties cleanup to scope (left): the resource is released the instant the enclosing block ends. Smart pointers (right) apply that same idea to heap memory, with either single (<code>unique_ptr</code>) or reference-counted (<code>shared_ptr</code>) ownership."),
  sub("Deterministic destruction: the dtor runs at scope exit, guaranteed"),
  p(`This is the part to internalize, because it's what makes C++ different from garbage-collected languages. In Java, C#, Python, or Go, an object's memory is reclaimed <em>eventually</em>, by a collector, at some unpredictable time after the last reference drops &#8212; and non-memory resources (files, locks, sockets) aren't handled at all unless you write explicit <code>try/finally</code> or <code>using</code>/<code>with</code> blocks. C++ gives you something stronger: <b>deterministic destruction</b>. The moment control leaves a scope &#8212; the closing brace, a <code>return</code>, a thrown exception &#8212; every local object's destructor runs, in reverse order of construction, right then. Not later. Not maybe. Then.`),
  p(`That single guarantee is the foundation everything else in this lesson is built on. A smart pointer is "just" a class whose destructor calls <code>delete</code>; a <code>lock_guard</code> is "just" a class whose destructor calls <code>unlock()</code>. The magic isn't in those classes &#8212; it's in the language promise that their destructors will fire at the right moment, every time, on every exit path.`),
  note(`&#129504;`,`The GC contrast, stated for the interview`,`A garbage collector answers "when is the memory freed?" with "eventually, we'll get to it." RAII answers "at the closing brace, deterministically." That's why C++ can manage <em>any</em> resource the same way &#8212; not just memory, but files, mutexes, database handles, GPU buffers &#8212; while GC languages need a separate mechanism (<code>finally</code>, <code>using</code>, <code>defer</code>) for everything that isn't memory. If asked "how is RAII different from GC," that contrast is the whole answer.`),
  sub("Exception safety: why RAII makes leak-free code for free"),
  p(`Here's the scenario that sells RAII. You allocate something, then call a function that throws before you get to clean up. With raw <code>new</code>/<code>delete</code>, the <code>delete</code> is simply skipped &#8212; the stack unwinds straight past it and you've leaked. With RAII, the unwinding stack runs every local destructor on its way out, so the resource is released <em>as part of the exception propagating</em>. You wrote zero cleanup code and the code is still leak-free on the error path.`),
  worked("The same code with and without RAII","Both functions do the same work, but only one is correct when <code>mightThrow()</code> throws. The raw version leaks: the exception skips the <code>delete</code> entirely. The RAII version can't leak, because as the stack unwinds it runs <code>w</code>'s destructor, which frees the widget &#8212; no matter how the function exits.",
`// BROKEN: leaks if mightThrow() throws
void rawVersion() {
    Widget* w = new Widget();
    mightThrow();          // throws -> the delete below is never reached
    delete w;              // skipped on the exception path -> LEAK
}

// CORRECT: leak-free on every path, including exceptions
void raiiVersion() {
    auto w = std::make_unique<Widget>();
    mightThrow();          // throws -> stack unwinds...
    // ...w's destructor runs during unwinding and frees the Widget
}                          // normal exit also frees it here`),
  p(`Notice you didn't write a single line of cleanup in the correct version &#8212; no <code>try</code>, no <code>catch</code>, no <code>delete</code>. That's the point. Writing exception-safe code by hand (guarding every allocation with try/catch) is tedious and easy to get wrong; RAII makes <em>not writing it</em> the correct default. This is why "every resource should be owned by an RAII object" is the load-bearing rule of modern C++.`),
  sub("RAII is bigger than memory"),
  p(`Smart pointers are the famous example, but RAII is the pattern behind most of the standard library's well-behaved types. Anywhere you'd otherwise pair an "acquire" with a matching "release," RAII bundles the release into a destructor so you can't forget it:`),
  ul([
    `<b><code>std::lock_guard</code> / <code>std::unique_lock</code></b> &#8212; constructor locks a mutex, destructor unlocks it. You never call <code>unlock()</code>; leaving the scope (or throwing) releases the lock. This single-handedly kills the "returned early and forgot to unlock &#8594; deadlock" bug.`,
    `<b><code>std::fstream</code></b> &#8212; constructor opens the file, destructor flushes and closes it. The file handle is released when the stream goes out of scope, exception or not.`,
    `<b><code>std::vector</code> / <code>std::string</code> and every container</b> &#8212; they own a heap buffer; their destructor frees it. The reason you almost never call <code>delete[]</code> in real C++ is that a vector is doing RAII on that buffer for you.`,
    `<b><code>std::unique_ptr</code> / <code>std::shared_ptr</code></b> &#8212; RAII applied specifically to a heap pointer. The rest of this lesson.`,
  ]),
  code(`{
    std::lock_guard<std::mutex> guard(m);   // mutex locked here
    sharedData.push_back(value);            // critical section
    if (somethingWrong) return;             // lock STILL released on this path
}                                           // guard's dtor unlocks m here`),
  note(`&#128221;`,`The mental rule: "own it with a type"`,`Whenever you find yourself thinking "I need to remember to free / close / unlock / release this later," stop and wrap it in an object whose destructor does the release. That's the whole RAII discipline. The standard library already did it for memory, files, locks, and threads &#8212; for anything else (a C API handle, say), a few-line wrapper class earns its keep.`),
  sub("Why raw new/delete is a trap"),
  p(`The Pointers lesson catalogued the failure modes: forget the <code>delete</code> and you leak; an exception or early <code>return</code> between <code>new</code> and <code>delete</code> skips the cleanup; <code>delete</code> the same pointer twice and you corrupt the heap; mix up <code>delete</code> and <code>delete[]</code> and it's undefined behavior. Every one of these is a bookkeeping error &#8212; the kind humans make constantly under pressure. Smart pointers don't ask you to be more careful; they remove the bookkeeping. A smart pointer is an RAII wrapper around a raw pointer: it owns the memory and picks the right <code>delete</code> for you, automatically, at scope exit.`),
  sub("unique_ptr — exclusive ownership, your default"),
  p(`<code>std::unique_ptr&lt;T&gt;</code> models <b>exclusive ownership</b>: exactly one <code>unique_ptr</code> owns the object at a time. To enforce that, it's <em>move-only</em> &#8212; you can't copy it (that would create a second owner), but you can move it to transfer ownership. When the <code>unique_ptr</code> is destroyed, so is the object it owns. And it does all this at <b>zero overhead</b>: a <code>unique_ptr</code> is the size of a raw pointer and compiles down to the same instructions, so there's no reason to prefer a raw owning pointer over it.`),
  code(`auto a = std::make_unique<Node>(5);   // a is the sole owner
// auto b = a;                         // ERROR: can't copy a unique_ptr
auto b = std::move(a);                 // OK: ownership moves a -> b; a is now null
// when b goes out of scope, the Node is deleted automatically`),
  p(`Because it's move-only, <code>unique_ptr</code> is the natural return type for a <em>factory</em> &#8212; a function that creates an object on the heap and hands ownership back to the caller. The move happens implicitly on <code>return</code>, so it's both cheap and unambiguous about who owns the result.`),
  worked("A factory returning unique_ptr, plus an RAII resource","Two patterns at once. <code>makeEnemy</code> is a factory: it builds a heap object and returns ownership as a <code>unique_ptr</code> &#8212; the caller can't accidentally leak it and doesn't have to remember to delete it. <code>FileHandle</code> is a hand-rolled RAII wrapper around a C-style resource: it acquires in the constructor and releases in the destructor, so the file closes itself. Note <code>unique_ptr&lt;Sprite[]&gt;</code> for owning an array &#8212; it calls <code>delete[]</code> for you.",
`// Factory: creates on the heap, returns exclusive ownership.
std::unique_ptr<Enemy> makeEnemy(int hp) {
    auto e = std::make_unique<Enemy>();
    e->hp = hp;
    return e;                    // ownership moves out to the caller (cheap)
}

void spawn() {
    auto boss = makeEnemy(500);  // 'boss' now owns the Enemy
    boss->takeHit(50);
}                                // Enemy deleted automatically here

// unique_ptr<T[]> owns a heap array and calls delete[] for you:
std::unique_ptr<Sprite[]> frames = std::make_unique<Sprite[]>(8);

// A hand-rolled RAII wrapper around a C resource:
class FileHandle {
    FILE* f;
public:
    explicit FileHandle(const char* path) : f(std::fopen(path, "r")) {}  // acquire
    ~FileHandle() { if (f) std::fclose(f); }                             // release
    FILE* get() const { return f; }
};`),
  note(`&#128221;`,`Custom deleters, briefly`,`<code>unique_ptr</code>'s second template parameter is a deleter. That's how you adapt it to non-<code>new</code> resources without writing a wrapper class: <code>std::unique_ptr&lt;FILE, decltype(&amp;fclose)&gt; f(fopen(path,"r"), &amp;fclose);</code> closes the file in the destructor. Worth knowing it exists; in interviews, naming the feature and saying "for C handles like <code>FILE*</code> or <code>SDL</code> objects" is plenty.`),
  sub("shared_ptr — counted ownership, and what it costs"),
  p(`<code>std::shared_ptr&lt;T&gt;</code> models <b>shared ownership</b>: several <code>shared_ptr</code>s can co-own one object, and the object is destroyed only when the <em>last</em> owner goes away. It does this with a <b>control block</b> &#8212; a small heap allocation, separate from the object, holding a reference count. Copying a <code>shared_ptr</code> bumps the count up; destroying one bumps it down; when the count hits zero, the object (and eventually the control block) is freed.`),
  svg("raii_ctrlblock","A <code>shared_ptr</code> is two pointers: one to the object, one to a shared control block holding the reference count. Copying a <code>shared_ptr</code> increments the strong count; each destructor decrements it; the object is deleted when the strong count reaches zero."),
  p(`That convenience isn't free, and naming the costs is exactly what separates a strong answer. The reference count is <b>atomic</b> &#8212; increments and decrements use atomic operations so the count stays correct when <code>shared_ptr</code>s are copied across threads &#8212; and atomics are meaningfully slower than a plain integer bump. A <code>shared_ptr</code> is also <b>twice the size</b> of a raw pointer (object pointer + control-block pointer), and there's an extra allocation for the control block. None of this is catastrophic, but it's why the rule is "<code>shared_ptr</code> only when ownership is genuinely shared," not "<code>shared_ptr</code> everywhere to be safe."`),
  worked("Copying a shared_ptr bumps the count","One object, several owners, automatic cleanup. Each copy increments the shared count; each scope exit decrements it. The <code>Texture</code> is freed exactly once, at the moment the last owner disappears &#8212; you never decide where the <code>delete</code> goes.",
`auto tex = std::make_shared<Texture>("brick.png");  // count = 1
{
    auto a = tex;          // copy -> count = 2
    auto b = tex;          // copy -> count = 3
    render(*a);
}                          // a and b destroyed -> count = 2

useElsewhere(tex);
// when the last shared_ptr (tex) goes out of scope -> count = 0
// -> Texture's destructor runs, memory freed exactly once`),
  pit("Never build a second owner from .get()","Calling <code>sp.get()</code> hands you the raw pointer <em>without</em> touching the count. If you then construct another <code>shared_ptr</code> from it &#8212; <code>shared_ptr&lt;T&gt; bad(sp.get());</code> &#8212; you've created a <em>second, independent</em> control block for the same object. Now two counts both think they're solely responsible, and the object gets deleted twice. Use <code>.get()</code> only to pass a non-owning raw pointer to code that won't free it; never to create another owner. To copy ownership, copy the <code>shared_ptr</code> itself."),
  sub("weak_ptr — breaking reference cycles"),
  p(`There's one situation where <code>shared_ptr</code>'s reference counting quietly fails: a <b>cycle</b>. If object A holds a <code>shared_ptr</code> to B, and B holds a <code>shared_ptr</code> back to A, then each keeps the other's count at 1 &#8212; even after every external reference is gone. The counts never reach zero, the destructors never run, and both objects leak. Reference counting can't collect cycles; that's its one structural weakness.`),
  svg("raii_cycle","A parent and child that each hold a <code>shared_ptr</code> to the other form a cycle: neither count can reach zero, so both leak (left). Making one direction a <code>weak_ptr</code> &#8212; a non-owning observer that doesn't bump the count &#8212; breaks the cycle, so dropping the parent frees both (right)."),
  p(`<code>std::weak_ptr&lt;T&gt;</code> is the fix. It's a <b>non-owning observer</b>: it points at an object managed by a <code>shared_ptr</code> without incrementing the strong count. It doesn't keep the object alive, so it can't be part of a cycle. To use what it points at, you call <code>.lock()</code>, which atomically checks "is the object still alive?" and, if so, hands you a real <code>shared_ptr</code> (count bumped for the duration); if the object is already gone, <code>.lock()</code> returns null and you handle that case. The classic rule: in a parent/child tree, the parent owns children with <code>shared_ptr</code>; each child points <em>back</em> at its parent with a <code>weak_ptr</code>.`),
  worked("The parent/child cycle, and the weak_ptr fix","With both links as <code>shared_ptr</code> (the commented-out line), <code>parent</code> and <code>child</code> co-own each other; when the local variables die, each still has a count of 1 from the other, so neither is ever freed &#8212; a leak you won't see without a tool. Making the child's back-pointer a <code>weak_ptr</code> breaks the cycle: it observes the parent without owning it, so when the last owning reference drops, both destructors run.",
`struct Node {
    std::shared_ptr<Node> child;     // parent OWNS its child
    std::weak_ptr<Node>   parent;    // child OBSERVES its parent (no ownership)
    // std::shared_ptr<Node> parent; // <- this version would LEAK (a cycle)
};

auto parent = std::make_shared<Node>();
auto child  = std::make_shared<Node>();
parent->child = child;               // strong link down
child->parent = parent;              // WEAK link up -> no cycle

// To use the parent from the child, lock the weak_ptr:
if (auto p = child->parent.lock()) { // got a live shared_ptr?
    use(*p);                         // safe: object guaranteed alive in this block
}                                    // else: parent already gone, p is null`),
  sub("make_unique / make_shared — and why"),
  p(`Prefer <code>std::make_unique&lt;T&gt;(args)</code> and <code>std::make_shared&lt;T&gt;(args)</code> over writing <code>new</code> yourself. Two concrete reasons, both interview-worthy:`),
  ul([
    `<b>Exception safety.</b> In a call like <code>f(std::shared_ptr&lt;T&gt;(new T), g())</code>, the compiler may evaluate <code>new T</code>, then call <code>g()</code> (which throws), <em>before</em> the <code>shared_ptr</code> is constructed &#8212; leaking the <code>T</code>. <code>make_shared</code> bundles the allocation and the ownership into one call, so there's no gap for an exception to leak through. The same reasoning applies to <code>make_unique</code>.`,
    `<b>One allocation (make_shared specifically).</b> Writing <code>shared_ptr&lt;T&gt;(new T)</code> allocates twice: once for the object, once for the control block. <code>make_shared</code> allocates them together in a single block &#8212; fewer allocations, better cache locality.`,
    `<b>It's also just cleaner.</b> No raw <code>new</code>, no repeating the type, no chance of a <code>new</code>/<code>delete</code> mismatch.`,
  ]),
  code(`auto a = std::make_unique<Node>(5);    // preferred over unique_ptr<Node>(new Node(5))
auto b = std::make_shared<Node>(5);    // one allocation, exception-safe`),
  note(`&#128161;`,`The one caveat on make_shared`,`Because <code>make_shared</code> puts the object and its control block in the <em>same</em> allocation, that memory can't be returned until <em>both</em> the strong count and the weak count hit zero. So a long-lived <code>weak_ptr</code> to a big object keeps the object's storage around after the object itself is destroyed. Rare in practice; if it matters, fall back to <code>shared_ptr&lt;T&gt;(new T)</code>. Worth a sentence if an interviewer pushes on "any downside to <code>make_shared</code>?"`),
  sub("Raw pointers still have a job: non-owning observers"),
  p(`Smart pointers are about <em>ownership</em>. Once you adopt them, raw pointers don't disappear &#8212; they take on a narrower, well-defined role: a <code>T*</code> means "I observe this object but I don't own it; someone else is responsible for its lifetime." This is the modern convention, and it makes ownership readable straight from a signature. A function that just <em>uses</em> a widget takes <code>Widget*</code> (or <code>Widget&amp;</code>); it does not take <code>shared_ptr&lt;Widget&gt;</code>, because taking a <code>shared_ptr</code> by value says "I want to share ownership," which is usually a lie and always a needless atomic bump.`),
  code(`void inspect(const Widget* w);   // observes; does NOT own. Pass owner.get().
void store(std::unique_ptr<Widget> w);          // TAKES ownership (sink)
void share(std::shared_ptr<Widget> w);          // shares ownership (rare)

auto owner = std::make_unique<Widget>();
inspect(owner.get());            // hand over a non-owning view; owner still owns`),
  note(`&#128221;`,`Reading ownership from a signature`,`<b>By value <code>unique_ptr</code></b> &#8594; "give me ownership" (a sink). <b>By value <code>shared_ptr</code></b> &#8594; "I'll share ownership." <b>Raw <code>T*</code> or <code>T&amp;</code></b> &#8594; "I'm only borrowing; you keep owning it." Picking the right one documents intent and avoids accidental refcount traffic. Most function parameters should be the borrowing kind.`),
  sub("Rule of Zero, Three, Five"),
  p(`This is the follow-up question that ties RAII back to the shallow-copy trap from the Value vs Reference lesson. The rules are about the <em>special member functions</em> &#8212; destructor, copy constructor, copy assignment, and (since C++11) move constructor and move assignment.`),
  ul([
    `<b>Rule of Three.</b> If your class manually manages a resource and needs a custom <em>destructor</em>, it almost certainly also needs a custom <em>copy constructor</em> and <em>copy assignment</em> &#8212; otherwise the compiler-generated shallow copy duplicates the raw pointer, two objects free the same memory, and you get a double-free. (That's the exact shallow-copy bug from the earlier lesson.)`,
    `<b>Rule of Five.</b> Once you've written those three, you usually want a <em>move constructor</em> and <em>move assignment</em> too, so your type moves efficiently instead of falling back to a copy.`,
    `<b>Rule of Zero &#8212; the one to actually follow.</b> Don't manage raw resources by hand at all. Make every member a type that already manages itself (a <code>unique_ptr</code>, a <code>vector</code>, a <code>string</code>). Then you write <em>none</em> of the five &#8212; the compiler-generated versions are correct, because each member cleans up, copies, and moves itself. Most well-designed modern classes need zero special members.`,
  ]),
  worked("Rule of Five vs Rule of Zero","The top class owns a raw <code>int*</code>, so to be correct it must hand-write the destructor, copy, and move &#8212; the full Rule of Five, and every line is a chance for a bug. The bottom class stores the same thing in a <code>unique_ptr</code>, so it manages itself: no special members, no double-free, correct copies and moves by construction. Reach for the bottom shape every time.",
`// Rule of Five: managing a raw resource by hand (verbose, bug-prone)
class Owns {
    int* data;
public:
    Owns() : data(new int[100]) {}
    ~Owns() { delete[] data; }                              // 1 destructor
    Owns(const Owns& o) : data(new int[100]) {              // 2 copy ctor
        std::copy(o.data, o.data + 100, data);
    }
    Owns& operator=(const Owns& o) { /* ...copy-and-swap... */ return *this; } // 3
    Owns(Owns&& o) noexcept : data(o.data) { o.data = nullptr; }   // 4 move ctor
    Owns& operator=(Owns&& o) noexcept { /* ...steal... */ return *this; }     // 5
};

// Rule of Zero: let the member manage itself (this is the goal)
class Clean {
    std::unique_ptr<int[]> data = std::make_unique<int[]>(100);
    // no destructor, no copy, no move written -> all correct automatically
    // (copies are disabled because unique_ptr is move-only -- usually what you want)
};`),
  sub("Pitfalls to name before they name them"),
  pit("shared_ptr cycles leak silently","Two objects holding <code>shared_ptr</code>s to each other never reach count zero, so they leak with no crash and no error &#8212; the worst kind of bug. Break every cycle by making the back-edge a <code>weak_ptr</code>. Parent owns child (<code>shared_ptr</code>); child observes parent (<code>weak_ptr</code>)."),
  pit("Don't reach for shared_ptr when unique_ptr suffices","<code>shared_ptr</code> looks like the safe default, but it costs an atomic refcount, double the size, and an extra allocation &#8212; and worse, it muddies your design by implying shared ownership where there's really one owner. Default to <code>unique_ptr</code>; upgrade to <code>shared_ptr</code> only when two or more parties genuinely must keep the object alive."),
  pit("One object, one control block","Never make a second <code>shared_ptr</code> from a raw pointer you got via <code>.get()</code> &#8212; that creates a second control block and leads to a double-free. And don't mix <code>delete</code>/<code>delete[]</code> by hand on memory a smart pointer owns; let the smart pointer (and <code>unique_ptr&lt;T[]&gt;</code> for arrays) choose the right one."),
  idea("The crisp interview answer",`"RAII ties a resource's lifetime to an object's scope &#8212; acquire in the constructor, release in the destructor &#8212; and because C++ guarantees the destructor runs at scope exit, cleanup is automatic and exception-safe even when the stack unwinds. For ownership I default to <code>unique_ptr</code> (exclusive, move-only, zero overhead), reach for <code>shared_ptr</code> only when ownership is genuinely shared (it carries an atomic refcount and a control block), and use <code>weak_ptr</code> to break reference cycles. I prefer <code>make_unique</code>/<code>make_shared</code> for exception safety and one allocation, and I follow the Rule of Zero &#8212; let members manage themselves so I write no destructor, copy, or move at all." That answer, delivered in order, covers the entire question and its usual follow-ups.`)
]},
{group:"Week 3 · Patterns + C++",num:"➜",id:"moves",color:"#0EA5E9",title:"Move Semantics",badge:"Week 3 · C++ deep dive",blocks:[
  cue(`Your own C++ self-assessment flagged this as the gap: not the concept, the precise vocabulary. This lesson gives you the exact words &#8212; lvalue, rvalue, rvalue reference, move constructor, <code>std::move</code> &#8212; plus the mechanics underneath them, so you can answer cleanly under pressure and write the special members by hand if asked.`),
  p(`The Value-vs-Reference lesson left you with one promise: returning a big vector by value is cheap now, because the compiler either elides the copy or <em>moves</em> the object out. This is the lesson that cashes that promise. Move semantics are how modern C++ transfers a resource instead of duplicating it &#8212; and once the mechanics click, a lot of "why is idiomatic C++ written this way?" answers itself.`),
  sub("The problem move solves"),
  p(`Recall what a <code>vector&lt;int&gt;</code> really is: a small handle (pointer, size, capacity) and a separate heap buffer holding the elements. Copying it is a <em>deep copy</em> &#8212; allocate a fresh buffer, duplicate every element, point the new handle at it. That's O(n), and it's the right thing to do when the source is still alive and you both need independent data.`),
  p(`But copies often happen at a moment when the source is <em>about to be destroyed anyway</em> &#8212; a temporary returned from a function, an argument you've finished with, an element being relocated during a vector's growth. Deep-copying into the destination and then immediately throwing the source away is pure waste: you allocated a buffer and copied a megabyte just to free the original a microsecond later. Move semantics let you skip all of it. Instead of copying the buffer, the destination <em>steals the pointer</em> &#8212; takes ownership of the existing buffer and leaves the source empty. No allocation, no element copying. That's a move, and it's O(1).`),
  svg("move",`Copy (left) duplicates the underlying buffer &#8212; two arrays, O(n). Move (right) hands the existing buffer to the destination and empties the source &#8212; one buffer changes hands, O(1). The buffer never gets copied; only the handle's pointer is rewritten.`),
  sub("The vocabulary, precisely"),
  p(`The reason this trips people up in interviews isn't the idea &#8212; it's that the words are slippery. Here they are with sharp edges. The whole framework hangs on one distinction: is the thing I'm reading from going to <em>survive</em>, or is it <em>about to die</em>?`),
  ul([
    `<b>lvalue</b> &#8212; a named object with a stable identity you could take the address of: a variable <code>x</code>, an element <code>v[i]</code>, a dereference <code>*p</code>. It <em>persists</em> past this expression, so stealing from it behind your back would be a bug &#8212; the language won't move from it automatically.`,
    `<b>rvalue</b> &#8212; a temporary with no name, about to expire at the end of the full expression: the result of <code>a + b</code>, a function returning by value, a braced literal. You can't take its address. Because it's about to be destroyed, stealing from it is safe and free.`,
    `<b>rvalue reference (<code>T&amp;&amp;</code>)</b> &#8212; a reference type that binds <em>only</em> to rvalues. It's the hook that lets you write a function (or constructor) which says "I'll only accept things you're done with, so I'm allowed to gut them." Don't confuse it with <code>T&amp;</code> (an ordinary lvalue reference).`,
    `<b>move constructor / move assignment</b> &#8212; the special members that perform the steal. They take a <code>T&amp;&amp;</code>. The compiler calls them automatically whenever the source is an rvalue.`,
    `<b><code>std::move</code></b> &#8212; despite the name, it <em>moves nothing</em>. It's a cast: it turns an lvalue into an rvalue so that move (rather than copy) gets selected. You're telling the compiler "I promise I'm done with this named object &#8212; you may steal from it."`,
  ]),
  svg("moves_lvalue",`The litmus test: can you take its address? A named, persistent thing (<code>x</code>, <code>v[i]</code>, <code>*p</code>) is an <b>lvalue</b> &#8212; it survives, so it gets copied. A nameless temporary (<code>a + b</code>, a by-value return, <code>std::move(x)</code>) is an <b>rvalue</b> &#8212; it's expiring, so it can be stolen from.`),
  note("&#128221;","Why \"lvalue\" and \"rvalue\"",`The names are historical: an <em>lvalue</em> could appear on the <em>left</em> of an assignment (it names a place you can store into), an <em>rvalue</em> only on the <em>right</em>. That's a rough mnemonic, not a definition &#8212; <code>const</code> lvalues can't be assigned to either &#8212; but "left = has identity, right = temporary" is the right intuition to carry into the move discussion.`),
  sub("std::move is just a cast"),
  p(`This is the single most misunderstood line in the topic, so be precise about it. <code>std::move(x)</code> does not touch <code>x</code>, does not move anything, generates no instructions of its own. It is a compile-time cast to <code>T&amp;&amp;</code>. All it changes is <em>overload resolution</em>: by making the expression an rvalue, it steers the compiler to the move constructor / move assignment instead of the copy ones. The actual stealing happens inside <em>those</em> members, not inside <code>std::move</code>.`),
  code(`vector<int> a = {1, 2, 3};
vector<int> b = a;             // COPY: a is an lvalue, still needed -> deep copy, O(n)
vector<int> c = std::move(a);  // MOVE: cast a to rvalue -> move ctor steals a's buffer, O(1)
// 'a' is now valid but unspecified: empty in practice. Don't read its value.`),
  pit("The moved-from object is valid, not gone",`After <code>std::move(a)</code>, <code>a</code> is in a <em>valid but unspecified</em> state. It's not destroyed and not undefined &#8212; you can still assign to it, call <code>a.clear()</code>, or let it go out of scope safely. What you must <em>not</em> do is rely on its value. For a standard container "unspecified" means empty in practice, but treat reading a moved-from object as a bug regardless. The one safe move after moving from something is to give it a fresh value.`),
  sub("When moves happen automatically vs. when you opt in"),
  p(`You do not sprinkle <code>std::move</code> everywhere. The compiler already moves for you whenever the source is an rvalue. You only reach for <code>std::move</code> to move from a <em>named</em> object &#8212; an lvalue the compiler isn't allowed to assume you're finished with.`),
  ul([
    `<b>Automatic (no <code>std::move</code> needed):</b> returning a local variable by value; passing a temporary like <code>f(make())</code> or <code>v.push_back(string("hi"))</code>; constructing from any expression that's already an rvalue. The source is expiring, so the compiler picks move on its own.`,
    `<b>Opt in with <code>std::move</code>:</b> you have a named variable you're <em>done with</em> and want to hand its guts to something else &#8212; <code>v.push_back(std::move(name))</code>, or moving a member out of <code>*this</code>. The object has a name, so the compiler treats it as an lvalue (still alive) unless you explicitly cast it.`,
  ]),
  pit("Don't write return std::move(local)",`It looks like an optimization; it's the opposite. Returning a local by value already moves (or, better, elides the copy entirely). Wrapping it in <code>std::move</code> forces a move and <em>disables copy elision / RVO</em> &#8212; you turn a zero-cost return into a guaranteed move. Just write <code>return local;</code>. The compiler does the right thing, and most modern compilers will warn you about the <code>std::move</code> here.`),
  sub("Writing a move constructor and move assignment"),
  p(`Now the part interviewers sometimes ask you to do live: implement the steal yourself for a class that owns a raw buffer. The move constructor takes the source's pointer, then nulls the source so its destructor frees nothing. The move assignment does the same but must first free what <em>it</em> already owns, and guard against self-assignment. Member-by-member, a move is: copy the source's pointer/size, then zero them out in the source.`),
  svg("moves_steal",`The move constructor in pictures. <b>Before:</b> <code>src</code> owns the heap buffer, <code>dst</code> is being built. <b>After:</b> <code>dst.ptr</code> points at the same buffer and <code>src.ptr</code> is set to null &#8212; two pointer writes, no allocation, no element copy. Nulling <code>src</code> is what stops both destructors from freeing the one buffer.`),
  worked("A move ctor + move assignment by hand","A minimal class owning a heap array. The move operations transfer <code>data</code> and <code>n</code>, then null the source so its destructor is a no-op. Note the three things that make this correct: nulling the source, freeing the existing buffer in assignment, and the self-assignment guard. Mark them <code>noexcept</code> &#8212; the next section explains why that one keyword matters.",
`class Buffer {
    int*   data = nullptr;
    size_t n    = 0;
public:
    Buffer(size_t count) : data(new int[count]), n(count) {}
    ~Buffer() { delete[] data; }                 // owns the buffer

    // MOVE CONSTRUCTOR: steal src's buffer, leave src empty
    Buffer(Buffer&& src) noexcept
        : data(src.data), n(src.n) {             // take the pointer
        src.data = nullptr;                       // null the source...
        src.n    = 0;                             // ...so ~Buffer frees nothing
    }

    // MOVE ASSIGNMENT: free what we own, then steal src's
    Buffer& operator=(Buffer&& src) noexcept {
        if (this != &src) {                       // self-assignment guard
            delete[] data;                        // release our current buffer
            data = src.data;  n = src.n;          // steal src's
            src.data = nullptr;  src.n = 0;       // and empty src
        }
        return *this;
    }
};`),
  note("&#128221;","This is the hard way &#8212; usually you delete it all",`The class above is what a move <em>looks like</em>, which is worth knowing. But you'd almost never write it. Hold a <code>std::vector&lt;int&gt;</code> or <code>std::unique_ptr</code> instead of a raw <code>int*</code>, and the compiler generates a correct move (and copy, and destructor) for free. The hand-written version exists for the interview question and for the rare case you're building the owning type itself. The Rule of Zero section drives this home.`),
  sub("The Rule of 0/3/5"),
  p(`This is the classic follow-up, and the name encodes a decision tree. The "special members" are the destructor, copy constructor, copy assignment, move constructor, and move assignment. The rule is about <em>which ones you must write</em>:`),
  ul([
    `<b>Rule of Three (pre-C++11 core):</b> if you need to write a custom <em>destructor</em>, <em>copy constructor</em>, or <em>copy assignment</em>, you almost certainly need all three. Needing one means you're managing a resource by hand, and the default versions of the other two will get that resource wrong (the shallow-copy double-free from the Value-vs-Reference lesson).`,
    `<b>Rule of Five (C++11+):</b> once moves exist, the set grows to five &#8212; add the move constructor and move assignment. If you're managing a resource and care about performance, you want the move pair too, or you'll silently fall back to copying.`,
    `<b>Rule of Zero (what you should actually aim for):</b> design your class so you need to write <em>none</em> of them. Hold members that manage themselves &#8212; <code>vector</code>, <code>string</code>, <code>unique_ptr</code>, <code>shared_ptr</code> &#8212; and the compiler-generated special members are all correct: copies deep-copy, moves steal, destruction cleans up. Each RAII member does its own part.`,
  ]),
  note("&#128161;","Prefer Rule of Zero &#8212; and say so",`The senior answer to "implement the Rule of Five" is often "I'd restructure so I don't have to." Declaring <em>any</em> special member also has a subtle effect: writing a destructor or copy operation <em>suppresses</em> the implicitly-generated move operations, so a class with a hand-written destructor silently loses its moves and copies instead. That's a real performance footgun &#8212; another reason to keep ownership inside RAII members (see the RAII &amp; Smart Pointers lesson) and let the compiler generate everything.`),
  sub("Copy elision and RVO"),
  p(`Here's the twist that makes return-by-value genuinely free: often the compiler doesn't even move &#8212; it <em>elides</em> the copy/move entirely. <em>Return value optimization</em> constructs the returned object directly in the caller's storage, so there's no separate temporary to copy or move at all. Since C++17, elision is <em>mandatory</em> for prvalues &#8212; returning a nameless temporary, or constructing from one, is guaranteed to skip the copy/move. For named locals (NRVO) it's a permitted-but-not-guaranteed optimization that every real compiler performs.`),
  worked("Why returning a big vector is free","The function builds a vector and returns it by value. No copy happens on return: either RVO constructs <code>result</code> straight into the caller's variable (the common case), or, if elision can't apply, the vector is moved out &#8212; O(1) either way. This is exactly why the Value-vs-Reference lesson told you to return big objects by value and not contort your code to avoid it.",
`vector<int> buildSquares(int n) {
    vector<int> result;                 // built locally
    result.reserve(n);
    for (int i = 0; i < n; ++i)
        result.push_back(i * i);
    return result;                      // RVO: no copy, no move - or a cheap move
}

vector<int> v = buildSquares(1000000); // the million elements are never copied`),
  sub("Moving into containers: push_back vs emplace_back"),
  p(`Containers are where you'll actually type <code>std::move</code>. <code>push_back(x)</code> copies <code>x</code> in; <code>push_back(std::move(x))</code> moves it in &#8212; one overload takes <code>const T&amp;</code> (copy), the other takes <code>T&amp;&amp;</code> (move), and your cast selects the second. <code>emplace_back(args...)</code> goes one step further: it constructs the element <em>in place</em> inside the container from the arguments you pass, skipping even the temporary. For an existing object you're done with, <code>push_back(std::move(x))</code>; for a fresh one, <code>emplace_back(ctor args)</code>.`),
  worked("Moving an object you're finished with into a vector","<code>name</code> is a named lvalue, so the compiler won't move from it on its own &#8212; you opt in with <code>std::move</code>. After the move, <code>name</code> is empty; the vector holds its buffer with zero copying. <code>emplace_back</code> on the next line builds the string directly in the vector from the literal, no temporary at all.",
`vector<string> names;
string name = "a-very-long-name-with-heap-data";

names.push_back(name);             // COPY: name is an lvalue, duplicated into the vector
names.push_back(std::move(name));  // MOVE: steal name's buffer; name is now empty
names.emplace_back("built-in-place"); // construct the string directly inside the vector
// using 'name' here would be reading a moved-from object - don't.`),
  sub("noexcept moves and vector growth"),
  p(`One detail with outsized practical impact: mark your move operations <code>noexcept</code>. When a <code>vector</code> grows and reallocates, it has to relocate existing elements into the new buffer. It will only <em>move</em> them if their move constructor is <code>noexcept</code>; otherwise it falls back to <em>copying</em>, to preserve its strong exception guarantee (a throw mid-move could leave elements half-destroyed with no way back). So a non-<code>noexcept</code> move constructor quietly turns every vector reallocation into O(n) copies. Compiler-generated moves are <code>noexcept</code> when they can be &#8212; another win for the Rule of Zero.`),
  note("&#128221;","Perfect forwarding (awareness level)",`You'll see <code>T&amp;&amp;</code> in templates too &#8212; <code>template&lt;class T&gt; void wrap(T&amp;&amp; arg)</code>. There it's not an rvalue reference but a <em>forwarding reference</em>, which binds to either lvalues or rvalues, and you pass it along with <code>std::forward&lt;T&gt;(arg)</code> to preserve whether the caller gave you something movable. That's how <code>emplace_back</code> and <code>make_unique</code> forward your arguments untouched. You don't need to write these to interview well &#8212; just recognize that <code>T&amp;&amp;</code>-in-a-template plus <code>std::forward</code> is "perfect forwarding," distinct from a plain move.`),
  pit("Moves that don't actually help",`Move is only a win when there's a heap resource to steal. <code>std::move</code> on an <code>int</code>, a <code>double</code>, or a plain struct of scalars does nothing &#8212; there's no buffer, so the "move" is just a copy. Worse: <code>std::move</code> on a <em>const</em> object silently copies, because a move constructor can't take a <code>const T&amp;&amp;</code> (it needs to mutate the source to null it out), so overload resolution falls back to the copy constructor. The cast compiles and looks like a move; you get a copy. Don't <code>std::move</code> scalars, and don't move from <code>const</code>.`),
  cx(`Copy a container <b>O(n)</b> · move it <b>O(1)</b> (steal the pointer) · return-by-value <b>O(1)</b> via RVO or move`),
  sub("Why interviewers care"),
  p(`Move semantics are the reason modern C++ can return big objects by value with no penalty, why <code>push_back(std::move(x))</code> beats <code>push_back(x)</code> for heavy types, and why "hold RAII members and let the compiler generate the rest" is the idiomatic default. Being able to define lvalue vs rvalue crisply, explain that <code>std::move</code> is only a cast, and name the Rule of Zero / RVO follow-ups signals that you know exactly where the costs live &#8212; which is most of what this question is checking.`),
  idea("Say it like this",`"An lvalue is a named, persistent object; an rvalue is a temporary about to expire. A move steals an rvalue's heap resource instead of copying it &#8212; the move constructor takes the source's pointer and nulls the source, turning an O(n) copy into an O(1) pointer transfer. <code>std::move</code> moves nothing itself; it's a cast that lets me opt a named lvalue into being moved from. The compiler moves automatically when the source is already an rvalue &#8212; returning a local, passing a temporary &#8212; and often elides even that via RVO. In my own code I aim for the Rule of Zero: hold <code>vector</code>, <code>string</code>, and <code>unique_ptr</code> members so the correct copy, move, and destructor are all generated for free."`)
]},
{group:"Week 4+ · More Patterns",num:"06",id:"linked",color:"#38BDF8",title:"Linked Lists",badge:"Week 4 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> nodes and pointers — reversal, detecting a cycle, finding a midpoint, or merging ordered lists.`),
  p(`This is where the Pointers lesson pays off directly. Three moves cover almost everything: reversing pointers one node at a time, the fast/slow (tortoise &amp; hare) trick for cycles and midpoints (the "flavor two" from Two Pointers, now on real <code>ListNode*</code>s), and a dummy head node to kill annoying edge cases. Draw the arrows on paper — nobody tracks linked-list pointers in their head, and the interviewer expects to see you sketch.`),
  cx(`Time <b>O(n)</b> · space <b>O(1)</b>`),
  {t:"probs",items:[["Reverse Linked List","reverse-linked-list","easy"],["Add Two Numbers","add-two-numbers","med"],["Merge k Sorted Lists","merge-k-sorted-lists","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"07",id:"trees",color:"#8B5CF6",title:"Trees",badge:"Week 4 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> hierarchical data — you're recursing on left/right children, or walking the tree level by level.`),
  p(`Nearly every tree problem is one of two things: DFS (recursion — pre/in/post-order) or BFS (a queue, processing one level at a time). Figure out which the question wants and the recursion almost writes itself. In-order traversal of a binary search tree, notably, visits values in sorted order — a fact that unlocks a whole class of problems.`),
  cx(`Time <b>O(n)</b> · space <b>O(h)</b> (tree height)`),
  {t:"probs",items:[["Invert Binary Tree","invert-binary-tree","easy"],["Validate BST","validate-binary-search-tree","med"],["Serialize & Deserialize Tree","serialize-and-deserialize-binary-tree","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"08",id:"tries",color:"#A855F7",title:"Tries",badge:"Week 5 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> prefix lookups, autocomplete, or searching a big dictionary of words fast.`),
  p(`A trie is a tree where each edge is a character, so words sharing a prefix share the same path. Insert and lookup cost O(word length) regardless of how many words are stored — which is why autocomplete feels instant. Each node typically holds a map or array of child pointers plus an "is end of word" flag.`),
  cx(`Time <b>O(L)</b> per operation (L = word length)`),
  {t:"probs",items:[["Implement Trie","implement-trie-prefix-tree","med"],["Add & Search Word","design-add-and-search-words-data-structure","med"],["Word Search II","word-search-ii","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"09",id:"heaps",color:"#EC4899",title:"Heaps / Priority Queue",badge:"Week 6 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> top-K, the K-th largest/smallest, a streaming median, or repeatedly grabbing the current min or max.`),
  p(`A <code>priority_queue</code> always hands you the extreme element in O(log n). For "top K," keep a heap of size K and let everything else fall out. For a running median, balance two heaps — a max-heap for the lower half and a min-heap for the upper half — so the middle is always at their tops.`),
  cx(`push/pop <b>O(log n)</b> · peek <b>O(1)</b>`),
  {t:"probs",items:[["Kth Largest in a Stream","kth-largest-element-in-a-stream","easy"],["K Closest Points to Origin","k-closest-points-to-origin","med"],["Find Median from Data Stream","find-median-from-data-stream","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"10",id:"backtrack",color:"#F43F5E",title:"Backtracking",badge:"Week 6 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> "generate ALL" combinations, permutations, or subsets — or "find every way to do X."`),
  p(`The template never changes: choose → recurse → un-choose. You add to a partial solution, explore deeper, then undo that last choice and try the next option. The art is pruning: cut off branches that obviously can't lead to a valid answer, because the raw search space is exponential and pruning is the only thing that makes it tractable.`),
  cx(`Exponential in general — pruning is what saves you`),
  {t:"probs",items:[["Subsets","subsets","med"],["Combination Sum","combination-sum","med"],["N-Queens","n-queens","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"11",id:"graphs",color:"#0EA5E9",title:"Graphs",badge:"Week 7 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> nodes + edges, grids, connectivity, shortest paths, or dependencies ("do X before Y").`),
  p(`Grids are graphs in disguise. BFS (a queue) finds shortest paths in unweighted graphs; DFS (recursion or a stack) explores connectivity and components; topological sort orders things with dependencies. Most solutions start by building an adjacency list, then run one of those traversals while tracking a <code>visited</code> set to avoid cycles.`),
  cx(`Time <b>O(V + E)</b> (vertices + edges)`),
  {t:"probs",items:[["Number of Islands","number-of-islands","med"],["Course Schedule","course-schedule","med"],["Word Ladder","word-ladder","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"12",id:"dp",color:"#84CC16",title:"Dynamic Programming",badge:"Week 8 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> overlapping subproblems plus a "min / max / number of ways" that builds on smaller answers.`),
  p(`Define the subproblem in one sentence first ("<code>dp[i]</code> = the best answer using the first i items"). Then find the recurrence — how <code>dp[i]</code> is built from earlier <code>dp</code> values — and fill the table. Always start from the plain recursive brute force, confirm it's correct, then add memoization to cache repeated subproblems. DP is the pattern most worth slowing down on; it rewards understanding over memorization.`),
  cx(`Usually <b>O(n)</b> or <b>O(n·m)</b>`),
  {t:"probs",items:[["Climbing Stairs","climbing-stairs","easy"],["Coin Change","coin-change","med"],["Edit Distance","edit-distance","hard"]]}
]},
{group:"Week 4+ · More Patterns",num:"13",id:"intervals",color:"#F59E0B",title:"Intervals",badge:"Week 8 · full lesson coming",blocks:[
  cue(`<b>Spot it when:</b> ranges with a start and end — overlaps, merging, or scheduling.`),
  p(`Almost always step one: sort by start time. After that a single left-to-right pass lets you ask "does this interval start before the previous one ended?" — and from that one check you can merge overlaps, count them, or schedule. The sort dominates the cost, so these are O(n log n).`),
  cx(`Time <b>O(n log n)</b> — the sort dominates`),
  {t:"probs",items:[["Merge Intervals","merge-intervals","med"],["Insert Interval","insert-interval","med"],["Non-overlapping Intervals","non-overlapping-intervals","med"]]}
]},
{group:"Beyond Code",num:"▦",id:"sysdesign",color:"#14B8A6",title:"System Design Basics",badge:"Week 10 · intro",blocks:[
  cue(`Even for a mid-level role, you'll often get a lightweight design round: "design a URL shortener," "design a rate limiter." It's not about a perfect answer — it's about structured thinking out loud.`),
  p(`System design interviews test whether you can take a fuzzy prompt and reason about building something real: clarify the requirements, sketch the major components, and discuss the trade-offs. There's no single right answer; the interviewer wants to see you ask about scale, identify bottlenecks, and make justified choices. The vocabulary below is what those conversations are built from.`),
  sub("The building blocks to know"),
  ul([
    `<b>Client / server, latency vs throughput.</b> Latency is how long one request takes; throughput is how many you handle per second. Many decisions trade one for the other.`,
    `<b>Caching.</b> Store hot results in fast memory to avoid recomputing or re-fetching. Know hit/miss, eviction (LRU), and where caches sit (client, CDN, server, database).`,
    `<b>Load balancing &amp; scaling.</b> Horizontal (more machines) vs vertical (a bigger machine). A load balancer spreads requests across servers.`,
    `<b>SQL vs NoSQL.</b> Relational databases give you structure and joins; NoSQL trades that for scale and flexibility. Indexing makes lookups fast at the cost of write speed.`,
    `<b>A rough approach.</b> Clarify requirements → estimate scale → define the API → sketch components → zoom into the data model → discuss bottlenecks and trade-offs.`,
  ]),
  note("📚","Where to go deeper",`This is the on-ramp. For real depth, the standard resources are <em>Grokking the System Design Interview</em> and the <em>System Design Primer</em>. I can expand this into a full lesson with a worked example (designing a URL shortener end to end) on request.`),
]},
{group:"Beyond Code",num:"★",id:"behavioral",color:"#FB923C",title:"Behavioral & STAR",badge:"Week 10 · intro",blocks:[
  cue(`Almost every loop includes a behavioral round, and strong engineers routinely underprepare for it and lose offers there. A little structure goes a very long way.`),
  p(`Behavioral interviews probe how you work: how you handle conflict, ownership, failure, and collaboration. The trap is rambling. The fix is the <strong>STAR</strong> framework — a structure that keeps your answers tight and concrete: <b>Situation</b> (set the scene briefly), <b>Task</b> (your specific responsibility), <b>Action</b> (what <em>you</em> did, the bulk of the answer), and <b>Result</b> (the measurable outcome, ideally with a number).`),
  sub("Prepare these stories in advance"),
  ul([
    `<b>A shipped accomplishment</b> — something you built end to end and its impact.`,
    `<b>A hard technical problem</b> — a nasty bug or performance issue you diagnosed and fixed.`,
    `<b>A measured win</b> — a change where you can quote a real number (latency dropped X%, etc.).`,
    `<b>Conflict or hard feedback</b> — a disagreement you navigated, and what you learned.`,
    `<b>A failure</b> — something that went wrong, your ownership of it, and the change you made after.`,
  ]),
  idea("Lead with the result, then prove it",`Strong answers often state the outcome first — "I cut our build time roughly in half" — then back into the Situation/Task/Action that earned it. It hooks the interviewer and guarantees you actually land the point instead of running out of time mid-story.`),

const page=document.getElementById("page"),navEl=document.getElementById("nav");
const reduce=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
const idIndex={};course.forEach((s,i)=>idIndex[s.id]=i);
const allSlugs=[];course.forEach(s=>s.blocks.forEach(b=>{if(b.t==="probs")b.items.forEach(it=>allSlugs.push(it[1]));}));
const PKEY="cpp-course-progress-v1";
function loadDone(){try{return new Set(JSON.parse(localStorage.getItem(PKEY)||"[]"));}catch(e){return new Set();}}
function saveDone(set){try{localStorage.setItem(PKEY,JSON.stringify([...set]));}catch(e){}}
let doneSet=loadDone();
const ringFill=document.getElementById("ringFill"),ringVal=document.getElementById("ringVal"),doneC=document.getElementById("doneCount"),totalC=document.getElementById("totalCount"),CIRC=119.4;
function updateProgress(){const done=allSlugs.filter(s=>doneSet.has(s)).length,total=allSlugs.length,pct=total?done/total:0;ringFill.style.strokeDashoffset=CIRC*(1-pct);ringVal.textContent=Math.round(pct*100)+"%";doneC.textContent=done;totalC.textContent=total;}
function renderBlocks(blocks,color){
  let h="";
  blocks.forEach(b=>{
    if(b.t==="p")h+=`<p>${b.h}</p>`;
    else if(b.t==="h")h+=`<div class="subhead">${b.t2}</div>`;
    else if(b.t==="ul")h+=`<ul>${b.items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
    else if(b.t==="code")h+=`<div class="codeblock"><pre><code>${highlight(b.c)}</code></pre></div>`;
    else if(b.t==="cue")h+=`<div class="cue"><span class="ic">&#127919;</span><p>${b.h}</p></div>`;
    else if(b.t==="cx")h+=`<div><span class="complexity">&#9201; ${b.h}</span></div>`;
    else if(b.t==="note")h+=`<div class="note"><span class="ic">${b.ic}</span><div class="nbody"><strong>${b.title}</strong>${b.h}</div></div>`;
    else if(b.t==="idea")h+=`<div class="note idea"><span class="ic">&#128161;</span><div class="nbody"><strong>${b.title}</strong>${b.h}</div></div>`;
    else if(b.t==="pit")h+=`<div class="note pit"><span class="ic">&#9888;&#65039;</span><div class="nbody"><strong>${b.title}</strong>${b.h}</div></div>`;
    else if(b.t==="svg")h+=`<div class="svg-wrap">${SVG[b.key]}<div class="cap">${b.cap}</div></div>`;
    else if(b.t==="worked")h+=`<div class="worked"><div class="whead"><span class="wt">Worked example</span>${b.title}</div><div class="wexp">${b.exp}</div><pre><code>${highlight(b.c)}</code></pre></div>`;
    else if(b.t==="demoslot")h+=`<div data-demoslot></div>`;
    else if(b.t==="probs"){
      h+=`<div class="probwrap"><div class="pl">Practice &mdash; do these on LeetCode</div><div class="probs">`+b.items.map(pr=>{
        const dl={easy:"Easy",med:"Medium",hard:"Hard"}[pr[2]];
        return `<a class="prob" href="https://leetcode.com/problems/${pr[1]}/" target="_blank" rel="noopener" style="--db:${color}" data-prob><div class="chk" data-slug="${pr[1]}" role="button" tabindex="0" aria-label="Mark solved"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div><span class="badge ${pr[2]}">${dl}</span><span class="pname">${pr[0]}</span><span class="go">Open on LeetCode &#8594;</span></a>`;
      }).join("")+`</div></div>`;
    }
    else if(b.t==="primer"){primerData.forEach(c=>{h+=`<div class="pcard"><div class="ptitle"><span class="pin"></span>${c.title}</div>`;c.items.forEach(it=>h+=`<div class="pitem"><div class="plabel">${it[0]}</div><div><pre><code>${highlight(it[1])}</code></pre></div></div>`);h+=`</div>`;});}
    else if(b.t==="cheat"){h+=`<div class="cheatgrid">`;cheatData.forEach(g=>{h+=`<div class="ccard"><div class="chead" style="--cc:${g.cc}">${g.title}</div>`;g.rows.forEach(r=>h+=`<div class="crow" style="--cc:${g.cc}"><span class="clabel">${r[0]}</span><code>${esc(r[1])}</code><button class="copy" data-copy="${esc(r[1]).replace(/"/g,"&quot;")}" aria-label="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></button></div>`);h+=`</div>`;});h+=`</div>`;}
  });
  return h;
}
let lastGroup="",navHTML=`<a href="#/" data-nav=""><span class="num">&#183;</span> Welcome / Home</a>`;
course.forEach(s=>{if(s.group!==lastGroup){navHTML+=`<div class="group">${s.group}</div>`;lastGroup=s.group;}navHTML+=`<a href="#/${s.id}" data-nav="${s.id}" style="--ac:${s.color}"><span class="num">${s.num}</span><span class="dot"></span> ${s.title}</a>`;});
navEl.innerHTML=navHTML;
function setActive(id){[...navEl.querySelectorAll("a")].forEach(a=>a.classList.toggle("active",a.getAttribute("data-nav")===id));}
const homeHTML=`<div class="hero"><div class="eyebrow">Welcome</div><h2>Ten weeks to<br><em>interview-ready</em>.</h2><p class="lead">This isn't a problem dump. It's a course: deep written lessons with diagrams, the C++ language topics interviewers probe beyond data structures, and the exact common questions waiting for you on LeetCode. Concepts and patterns are interleaved &mdash; you learn an idea, then immediately use it.</p><p class="lead2">Each lesson is its own page. Move with the sidebar, or the Previous / Next buttons at the bottom of every page. Your solved-problem progress saves automatically on this device.</p><div class="startrow"><a class="btn primary" href="#/how">Start with Lesson 1 &#8594;</a><a class="btn ghost" href="#/syntax">Jump to the syntax primer</a></div><div class="planbar">${plan.map(x=>`<a class="pb" href="#/${x[2]}"><div class="wk">${x[0]}</div><div class="ti">${x[1]}</div></a>`).join("")}</div></div>`;
function wirePage(){
  page.querySelectorAll("[data-prob] .chk").forEach(chk=>{
    const slug=chk.getAttribute("data-slug");
    if(slug&&doneSet.has(slug))chk.classList.add("done");
    const tog=e=>{e.preventDefault();e.stopPropagation();chk.classList.toggle("done");if(slug){chk.classList.contains("done")?doneSet.add(slug):doneSet.delete(slug);saveDone(doneSet);}updateProgress();};
    chk.addEventListener("click",tog);chk.addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter")tog(e);});
  });
  page.querySelectorAll(".copy").forEach(btn=>{btn.addEventListener("click",async()=>{const txt=btn.getAttribute("data-copy").replace(/&quot;/g,'"').replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">");try{await navigator.clipboard.writeText(txt);}catch(e){const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(_){}document.body.removeChild(ta);}btn.classList.add("copied");setTimeout(()=>btn.classList.remove("copied"),1100);});});
}
function renderHome(){setActive("");page.className=reduce?"":"anim";page.innerHTML=homeHTML;wirePage();window.scrollTo(0,0);}
function renderLesson(s,i){
  const N=course.length;
  let h=`<div class="lesson-head" style="--accent:${s.color}"><div class="lh-meta"><span class="lh-week">${s.group}</span><span class="lh-count">Lesson ${i+1} of ${N}</span></div><h1 class="lh-title">${s.title}</h1></div>`;
  if(s.badge&&s.badge.indexOf("coming")>=0)h+=`<div class="soonpill">&#9675; Concise lesson &mdash; ask me to expand this one into full depth</div>`;
  h+=`<div class="lesson">${renderBlocks(s.blocks,s.color)}</div>`;
  const prev=course[i-1],next=course[i+1];
  h+=`<div class="pager">`;
  h+=prev?`<a class="pg" href="#/${prev.id}"><span>&#8592; Previous</span><b>${prev.title}</b></a>`:`<span></span>`;
  h+=next?`<a class="pg next start" href="#/${next.id}"><span>Next &#8594;</span><b>${next.title}</b></a>`:`<span></span>`;
  h+=`</div>`;
  page.className=reduce?"":"anim";
  page.innerHTML=h;
  setActive(s.id);
  if(s.demo){const slot=page.querySelector("[data-demoslot]");if(slot)slot.id="demo-"+s.demo;}
  initTwoPointers();initSlidingWindow();
  wirePage();updateProgress();window.scrollTo(0,0);
}
const sidebar=document.getElementById("sidebar"),hamb=document.getElementById("hamb"),scrim=document.getElementById("scrim");
function closeMenu(){sidebar.classList.remove("open");scrim.classList.remove("show");}
hamb&&hamb.addEventListener("click",()=>{sidebar.classList.toggle("open");scrim.classList.toggle("show");});
scrim&&scrim.addEventListener("click",closeMenu);
function route(){
  const hash=location.hash;
  let id=hash.indexOf("#/")===0?hash.slice(2):"";
  if(sidebar.classList.contains("open"))closeMenu();
  if(!id||!(id in idIndex))renderHome();
  else renderLesson(course[idIndex[id]],idIndex[id]);
}
function initTwoPointers(){
  const host=document.getElementById("demo-twoPointers");if(!host)return;
  const arr=[1,3,5,7,9,11],target=14;
  host.innerHTML=`<div class="demo" style="--accent:#FF8A3D"><div class="dlabel">&#9654; Live: find two numbers that sum to ${target}</div><div class="cells" id="tp-cells"></div><div class="readout" id="tp-read">Two pointers start at the ends and walk inward.</div><div class="dctrl"><button class="run" id="tp-run">Run it</button><button id="tp-reset">Reset</button></div></div>`;
  const cells=host.querySelector("#tp-cells"),read=host.querySelector("#tp-read");let timer=null;
  function draw(l,r,done){cells.innerHTML=arr.map((v,i)=>{let cls="cell",ptr="";if(i===l){cls+=" lp";ptr=`<span class="ptr">L</span>`;}if(i===r){cls+=" rp";ptr=`<span class="ptr">R</span>`;}if(done&&(i===l||i===r))cls="cell win";return `<div class="${cls}">${v}${ptr}</div>`;}).join("");}
  function reset(){if(timer)clearInterval(timer);timer=null;draw(-1,-1,false);read.innerHTML="Two pointers start at the ends and walk inward.";}
  function run(){if(timer)clearInterval(timer);let l=0,r=arr.length-1;draw(l,r,false);const step=()=>{const sum=arr[l]+arr[r];if(sum===target){draw(l,r,true);read.innerHTML=`<b>${arr[l]} + ${arr[r]} = ${target}</b> &#10003; found it`;clearInterval(timer);return;}if(sum<target){read.innerHTML=`${arr[l]} + ${arr[r]} = ${sum} &lt; ${target} &#8594; move <b>L</b> right`;l++;}else{read.innerHTML=`${arr[l]} + ${arr[r]} = ${sum} &gt; ${target} &#8594; move <b>R</b> left`;r--;}if(l>=r){read.innerHTML="No pair found.";clearInterval(timer);return;}draw(l,r,false);};timer=setInterval(step,1050);}
  host.querySelector("#tp-run").addEventListener("click",run);host.querySelector("#tp-reset").addEventListener("click",reset);reset();
}
function initSlidingWindow(){
  const host=document.getElementById("demo-slidingWindow");if(!host)return;
  const arr=[2,1,5,1,3,2],k=3;
  host.innerHTML=`<div class="demo" style="--accent:#FFC53D"><div class="dlabel">&#9654; Live: biggest sum of any ${k} in a row</div><div class="cells" id="sw-cells"></div><div class="readout" id="sw-read">A window of ${k} slides across &mdash; add the new, drop the old.</div><div class="dctrl"><button class="run" id="sw-run">Run it</button><button id="sw-reset">Reset</button></div></div>`;
  const cells=host.querySelector("#sw-cells"),read=host.querySelector("#sw-read");let timer=null;
  function draw(start){cells.innerHTML=arr.map((v,i)=>{const inWin=start>=0&&i>=start&&i<start+k;return `<div class="cell${inWin?" win":""}">${v}</div>`;}).join("");}
  function sumAt(s){let t=0;for(let i=s;i<s+k;i++)t+=arr[i];return t;}
  function reset(){if(timer)clearInterval(timer);timer=null;draw(-1);read.innerHTML=`A window of ${k} slides across &mdash; add the new, drop the old.`;}
  function run(){if(timer)clearInterval(timer);let s=0,best=-1,bestAt=0;const last=arr.length-k;const step=()=>{const sum=sumAt(s);draw(s);if(sum>best){best=sum;bestAt=s;}read.innerHTML=`window [${s}..${s+k-1}] sums to ${sum} &nbsp;&bull;&nbsp; best so far <b>${best}</b>`;if(s>=last){draw(bestAt);read.innerHTML=`Best window sums to <b>${best}</b> &#10003;`;clearInterval(timer);return;}s++;};timer=setInterval(step,1050);}
  host.querySelector("#sw-run").addEventListener("click",run);host.querySelector("#sw-reset").addEventListener("click",reset);reset();
}
